id = "RUN-020-cache-report-cross-stage-breakdown"
suite = "run"
command = "run"
source = "fixtures/smoke.nb"
args = ["--run-gate", "none", "--profile", "fast", "--cache-report", "on", "--cache-report-format", "json", "-o", "artifacts/run_cross_stage.out"]
expect_rc = 0
expect_stdout_contains = [
