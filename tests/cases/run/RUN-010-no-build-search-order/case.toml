id = "RUN-010-no-build-search-order"
suite = "run"

[[steps]]
kind = "nebula"
command = "build"
source = "fixtures/smoke.nb"
args = ["--diag-format", "json"]
expect_rc = 0
must_exist = ["generated_cpp/smoke.out", "generated_cpp/smoke.out.nebmeta"]

[[steps]]
kind = "shell"
run = "cp generated_cpp/smoke.out smoke.out && cp generated_cpp/smoke.out.nebmeta smoke.out.nebmeta && rm -f generated_cpp/smoke.out generated_cpp/smoke.out.nebmeta"
expect_rc = 0
must_exist = ["smoke.out", "smoke.out.nebmeta"]
must_not_exist = ["generated_cpp/smoke.out", "generated_cpp/smoke.out.nebmeta"]

[[steps]]
kind = "nebula"
command = "run"
source = "fixtures/smoke.nb"
args = ["--diag-format", "json", "--no-build"]
expect_rc = 0
forbid_diag = [{ code = "NBL-CLI-NOBUILD-MISSING" }]
expect_stdout_regex = ["\\[cmd\\] \".*smoke\\.out\""]
