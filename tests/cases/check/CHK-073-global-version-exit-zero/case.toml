id = "CHK-073-global-version-exit-zero"
suite = "check"

[[steps]]
kind = "shell"
run = "version=$(cat \"$NEBULA_REPO_ROOT/VERSION\") && out=\"$($NEBULA_BINARY --version 2>&1)\" && printf '%s\n' \"$out\" && test \"$(printf '%s' \"$out\" | tr -d '\\r\\n')\" = \"nebula v$version\" && ! printf '%s\n' \"$out\" | grep -F 'USAGE:' >/dev/null"
expect_rc = 0
