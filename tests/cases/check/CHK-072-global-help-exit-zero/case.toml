id = "CHK-072-global-help-exit-zero"
suite = "check"

[[steps]]
kind = "shell"
run = "version=$(cat \"$NEBULA_REPO_ROOT/VERSION\") && out=\"$($NEBULA_BINARY --help 2>&1)\" && printf '%s\n' \"$out\" && printf '%s\n' \"$out\" | grep -F \"nebula v$version\" >/dev/null && printf '%s\n' \"$out\" | grep -F 'USAGE:' >/dev/null"
expect_rc = 0
