id = "TST-177-lsp-local-references-shadowing-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport json\nimport os\nimport subprocess\nimport tempfile\nfrom pathlib import Path\n\n\ndef msg(obj: dict) -> bytes:\n    body = json.dumps(obj, separators=(',', ':')).encode('utf-8')\n    return f'Content-Length: {len(body)}\\r\\n\\r\\n'.encode('utf-8') + body\n\n\ndef parse_messages(data: bytes) -> list[dict]:\n    out = []\n    cursor = 0\n    while cursor < len(data):\n        header_end = data.find(b'\\r\\n\\r\\n', cursor)\n        if header_end < 0:\n            break\n        headers = data[cursor:header_end].decode('utf-8')\n        length = 0\n        for line in headers.split('\\r\\n'):\n            if line.lower().startswith('content-length:'):\n                length = int(line.split(':', 1)[1].strip())\n        cursor = header_end + 4\n        body = data[cursor:cursor + length]\n        cursor += length\n        out.append(json.loads(body.decode('utf-8')))\n    return out\n\n\ndef nth_index(text: str, needle: str, count: int) -> int:\n    start = -1\n    for _ in range(count):\n        start = text.index(needle, start + 1)\n    return start\n\n\nroot = Path(tempfile.mkdtemp(prefix='nebula-lsp-local-'))\nsource = root / 'main.nb'\nsource.write_text(\n    'module main\\n\\n'\n    'enum Box {\\n'\n    '  One(Int),\\n'\n    '}\\n\\n'\n    'fn main(x: Int, v: Box) -> Int {\\n'\n    '  let a = x + 1\\n'\n    '  if true {\\n'\n    '    let x = a + 2\\n'\n    '  }\\n'\n    '  return match v {\\n'\n    '    One(value) => value + x\\n'\n    '  }\\n'\n    '}\\n',\n    encoding='utf-8',\n)\ntext = source.read_text(encoding='utf-8')\nlines = text.splitlines()\nparam_x_char = nth_index(lines[12], 'x', 1)\nvalue_char = nth_index(lines[12], 'value', 2)\nrequests = b''.join([\n    msg({'jsonrpc': '2.0', 'id': 1, 'method': 'initialize', 'params': {}}),\n    msg({'jsonrpc': '2.0', 'method': 'textDocument/didOpen', 'params': {'textDocument': {'uri': 'file://' + str(source.resolve()), 'languageId': 'nebula', 'version': 1, 'text': text}}}),\n    msg({'jsonrpc': '2.0', 'id': 2, 'method': 'textDocument/references', 'params': {'textDocument': {'uri': 'file://' + str(source.resolve())}, 'position': {'line': 12, 'character': param_x_char}}}),\n    msg({'jsonrpc': '2.0', 'id': 3, 'method': 'textDocument/references', 'params': {'textDocument': {'uri': 'file://' + str(source.resolve())}, 'position': {'line': 12, 'character': value_char}}}),\n    msg({'jsonrpc': '2.0', 'id': 4, 'method': 'textDocument/definition', 'params': {'textDocument': {'uri': 'file://' + str(source.resolve())}, 'position': {'line': 12, 'character': value_char}}}),\n    msg({'jsonrpc': '2.0', 'id': 5, 'method': 'textDocument/hover', 'params': {'textDocument': {'uri': 'file://' + str(source.resolve())}, 'position': {'line': 12, 'character': param_x_char}}}),\n])\nout = subprocess.check_output([os.environ['NEBULA_BINARY'], 'lsp'], input=requests)\nresponses = {item.get('id'): item.get('result') for item in parse_messages(out) if 'id' in item}\nparam_refs = responses[2]\nif len(param_refs) != 3:\n    raise SystemExit(f'expected 3 parameter references, got {param_refs!r}')\nvalue_refs = responses[3]\nif len(value_refs) != 2:\n    raise SystemExit(f'expected 2 match-binder references, got {value_refs!r}')\nvalue_def = responses[4]\nif value_def['range']['start']['line'] != 12:\n    raise SystemExit(f'match binder definition pointed at the wrong line: {value_def!r}')\nhover_value = responses[5]['contents']['value']\nif 'param x' not in hover_value:\n    raise SystemExit(f'local hover did not resolve parameter binding: {hover_value!r}')\nprint('lsp-local-shadowing-ok')\nPY"
expect_rc = 0
expect_stdout_contains = ["lsp-local-shadowing-ok"]
