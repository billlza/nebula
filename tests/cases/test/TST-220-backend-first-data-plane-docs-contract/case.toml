id = "TST-220-backend-first-data-plane-docs-contract"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nfrom pathlib import Path\nimport os\n\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nchecks = [\n    (repo_root / 'README.md', [\n        'backend-first internal control-plane products',\n        'official/nebula-db-sqlite'\n    ]),\n    (repo_root / 'docs' / 'support_matrix.md', [\n        'nebula-db-sqlite',\n        'the first internal-app platform wave remains backend-first'\n    ]),\n    (repo_root / 'docs' / 'service_profile.md', [\n        'official/nebula-db-sqlite'\n    ]),\n    (repo_root / 'docs' / 'thin_host_app_shell.md', [\n        'Current sequencing constraint for the backend-first internal-app wave'\n    ]),\n    (repo_root / 'docs' / 'post_1_0_workstreams.md', [\n        'Track 3.5: Embedded Data Plane',\n        'official/nebula-db-sqlite'\n    ]),\n    (repo_root / 'docs' / 'official_package_tiering.md', [\n        'nebula-db-sqlite',\n        'embedded SQLite data-plane slice for backend-first internal apps'\n    ]),\n]\nfor path, fragments in checks:\n    text = path.read_text(encoding='utf-8')\n    missing = [fragment for fragment in fragments if fragment not in text]\n    if missing:\n        raise SystemExit(f'{path} missing fragments: {missing!r}')\nprint('backend-first-data-plane-docs-ok')\nPY"
expect_rc = 0
expect_stdout_contains = ["backend-first-data-plane-docs-ok"]
