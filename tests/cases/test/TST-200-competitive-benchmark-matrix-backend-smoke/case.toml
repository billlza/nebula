id = "TST-200-competitive-benchmark-matrix-backend-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport json\nimport os\nimport platform\nimport subprocess\nfrom pathlib import Path\n\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nout_path = Path('work/backend_crypto_matrix_backend.json')\nout_path.parent.mkdir(parents=True, exist_ok=True)\nsubprocess.run([\n    'python3',\n    str(repo_root / 'scripts' / 'competitive_bench.py'),\n    'run-matrix',\n    '--binary',\n    os.environ['NEBULA_BINARY'],\n    '--workload',\n    'bytes_frame_hotpath',\n    '--json-out',\n    str(out_path),\n], check=True)\nreport = json.loads(out_path.read_text(encoding='utf-8'))\nif report['kind'] != 'backend_crypto_competitive_results':\n    raise SystemExit(f'unexpected result kind: {report!r}')\nworkload = report['workloads'][0]\nif workload['id'] != 'bytes_frame_hotpath':\n    raise SystemExit(f'unexpected workload row: {workload!r}')\nresults = workload['results']\nif results['nebula']['status'] != 'ok' or results['cpp']['status'] != 'ok':\n    raise SystemExit(f'backend matrix missing nebula/cpp success: {results!r}')\nif results['rust']['status'] not in ('ok', 'skipped_toolchain_missing'):\n    raise SystemExit(f'unexpected rust backend status: {results[\"rust\"]!r}')\nallowed_swift = {'ok', 'skipped_toolchain_missing'}\nif platform.system() != 'Darwin':\n    allowed_swift.add('skipped_swift_scope_macos_only')\nif results['swift']['status'] not in allowed_swift:\n    raise SystemExit(f'unexpected swift backend status: {results[\"swift\"]!r}')\nif workload['comparisons']['cpp']['throughput_delta_pct'] is None:\n    raise SystemExit(f'backend matrix missing cpp diff: {workload!r}')\nprint('competitive-benchmark-matrix-backend-ok')\nPY"
expect_rc = 0
expect_stdout_contains = ["competitive-benchmark-matrix-backend-ok"]
