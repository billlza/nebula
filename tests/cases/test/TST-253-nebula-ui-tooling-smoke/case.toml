id = "TST-253-nebula-ui-tooling-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "cat > work/ui_unformatted.nb <<'EOF'\nmodule main\nstruct State {\ntitle: String\n}\nui Dashboard(state: State) { view Window(title = state.title) { view Text(text = state.title) view Input(value = \"targets\", action = \"targets.filter\", accessibility_label = \"Filter targets\") } }\nfn main() -> Void {\nprint(\"ok\")\n}\nEOF\n$NEBULA_BINARY fmt work/ui_unformatted.nb\ngrep -F 'ui Dashboard(state: State)' work/ui_unformatted.nb\ngrep -F 'view Window(title = state.title)' work/ui_unformatted.nb\ngrep -F 'view Input(value = \"targets\", action = \"targets.filter\", accessibility_label = \"Filter targets\")' work/ui_unformatted.nb\npython3 - <<'PY'\nimport json\nimport os\nimport subprocess\nfrom pathlib import Path\n\npath = Path('work/ui_unformatted.nb').resolve()\ntext = path.read_text(encoding='utf-8')\nuri = 'file://' + str(path)\n\ndef msg(obj):\n    body = json.dumps(obj, separators=(',', ':')).encode('utf-8')\n    return f'Content-Length: {len(body)}\\r\\n\\r\\n'.encode('utf-8') + body\n\ndef parse_messages(data):\n    out = []\n    cursor = 0\n    while cursor < len(data):\n        header_end = data.find(b'\\r\\n\\r\\n', cursor)\n        if header_end < 0:\n            break\n        headers = data[cursor:header_end].decode('utf-8')\n        length = 0\n        for line in headers.split('\\r\\n'):\n            if line.lower().startswith('content-length:'):\n                length = int(line.split(':', 1)[1].strip())\n        cursor = header_end + 4\n        body = data[cursor:cursor + length]\n        cursor += length\n        out.append(json.loads(body.decode('utf-8')))\n    return out\n\nrequests = b''.join([\n    msg({'jsonrpc':'2.0','id':1,'method':'initialize','params':{}}),\n    msg({'jsonrpc':'2.0','method':'textDocument/didOpen','params':{'textDocument':{'uri':uri,'languageId':'nebula','version':1,'text':text}}}),\n    msg({'jsonrpc':'2.0','id':2,'method':'textDocument/documentSymbol','params':{'textDocument':{'uri':uri}}}),\n    msg({'jsonrpc':'2.0','id':3,'method':'textDocument/semanticTokens/full','params':{'textDocument':{'uri':uri}}}),\n])\nout = subprocess.check_output([os.environ['NEBULA_BINARY'], 'lsp'], input=requests)\nresponses = {item.get('id'): item.get('result') for item in parse_messages(out) if 'id' in item}\nsymbols = responses[2]\nif not any(item.get('name') == 'Dashboard' and item.get('detail', '').startswith('ui Dashboard') for item in symbols):\n    raise SystemExit(f'missing Dashboard UI symbol: {symbols!r}')\ntokens = responses[3]['data']\nif not tokens or len(tokens) % 5 != 0:\n    raise SystemExit(f'malformed semantic token response: {tokens!r}')\nprint('nebula-ui-tooling-ok')\nPY"
expect_rc = 0
expect_stdout_contains = ["nebula-ui-tooling-ok"]
