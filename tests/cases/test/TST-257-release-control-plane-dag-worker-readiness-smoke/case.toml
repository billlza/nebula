id = "TST-257-release-control-plane-dag-worker-readiness-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport json\nimport os\nimport sys\nfrom pathlib import Path\n\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nsys.path.insert(0, str(repo_root / 'tests' / 'lib'))\nfrom release_control_plane_workspace import (\n    copy_example,\n    fetch_workspace,\n    require_success,\n    run_ctl,\n    start_service,\n    terminate_process,\n    wait_until_health_ok,\n)\n\nbinary = os.environ['NEBULA_BINARY']\nroot = Path('work/release_control_plane_dag_worker_readiness')\nstate_dir = root / 'state'\nctl_out = root / '.ctl-out'\ncopy_example(repo_root, root)\nfetch_workspace(binary, root)\nproc, stderr_lines, port = start_service(binary, root, {'APP_STATE_DIR': str(state_dir)})\ntry:\n    wait_until_health_ok(proc, stderr_lines, port)\n    base_url = f'http://127.0.0.1:{port}'\n    prewarm = run_ctl(binary, root, 'control-plane-validate', '--url', base_url, out_dir=ctl_out)\n    require_success(prewarm, 'prewarm ctl binary')\n\n    config_put = run_ctl(binary, root, 'config', 'put', '--app', 'control-plane', '--channel', 'prod', '--key', 'feature.flag', '--bool', 'true', '--description', 'dag readiness', '--url', base_url, '--json', out_dir=ctl_out, no_build=True)\n    require_success(config_put, 'config put')\n\n    release_put = run_ctl(binary, root, 'release', 'put', '--app', 'control-plane', '--channel', 'prod', '--version', '2026.04.23', '--config-revision', '1', '--description', 'dag readiness', '--url', base_url, '--json', out_dir=ctl_out, no_build=True)\n    require_success(release_put, 'release put')\n\n    spec = root / 'workflow-dag.json'\n    spec.write_text(json.dumps({\n        'trigger_kind': 'internal_event',\n        'event_kind': 'release_apply_requested',\n        'stages': [\n            {'name': 'approval', 'kind': 'approval_gate', 'task_kind': '', 'timeout_s': 0, 'max_attempts': 0, 'depends_on': []},\n            {'name': 'apply-a', 'kind': 'leased_task', 'task_kind': 'apply_release', 'timeout_s': 30, 'max_attempts': 3, 'depends_on': ['approval']},\n            {'name': 'apply-b', 'kind': 'leased_task', 'task_kind': 'apply_release', 'timeout_s': 30, 'max_attempts': 3, 'depends_on': ['approval']},\n        ],\n    }), encoding='utf-8')\n    workflow_put = run_ctl(binary, root, 'workflow', 'put', '--app', 'control-plane', '--channel', 'prod', '--if-match', '1', '--spec-file', str(spec), '--url', base_url, '--json', out_dir=ctl_out, no_build=True)\n    require_success(workflow_put, 'workflow put dag')\n\n    approval = run_ctl(binary, root, 'approval', 'decide', '--app', 'control-plane', '--channel', 'prod', '--if-match', '1', '--decision', 'approved', '--reason', 'dag approved', '--url', base_url, '--json', out_dir=ctl_out, no_build=True)\n    require_success(approval, 'approval decide')\n\n    submit = run_ctl(binary, root, 'workflow', 'event', 'submit', '--app', 'control-plane', '--channel', 'prod', '--event-id', 'dag-event-1', '--event-kind', 'release_apply_requested', '--release-revision', '1', '--url', base_url, '--json', out_dir=ctl_out, no_build=True)\n    require_success(submit, 'workflow event submit')\n    run_payload = json.loads(submit.stdout)\n    run_id = run_payload.get('run', {}).get('run_id')\n    stages = run_payload.get('run', {}).get('meta', {}).get('stages', [])\n    ready_names = [stage.get('stage_name') for stage in stages if stage.get('status') == 'ready']\n    if ready_names != ['apply-a', 'apply-b']:\n        raise SystemExit(f'expected both DAG sibling stages ready, got: {stages!r}')\n\n    claim_a = run_ctl(binary, root, 'worker', 'claim', '--worker-id', 'worker-a', '--task-kind', 'apply_release', '--url', base_url, '--json', out_dir=ctl_out, no_build=True)\n    require_success(claim_a, 'worker claim a')\n    claim_a_payload = json.loads(claim_a.stdout)\n    lease_a = claim_a_payload.get('lease', {})\n\n    claim_b = run_ctl(binary, root, 'worker', 'claim', '--worker-id', 'worker-b', '--task-kind', 'apply_release', '--url', base_url, '--json', out_dir=ctl_out, no_build=True)\n    require_success(claim_b, 'worker claim b')\n    claim_b_payload = json.loads(claim_b.stdout)\n    lease_b = claim_b_payload.get('lease', {})\n\n    claimed_names = sorted([lease_a.get('stage_name'), lease_b.get('stage_name')])\n    if claimed_names != ['apply-a', 'apply-b'] or lease_a.get('lease_id') == lease_b.get('lease_id'):\n        raise SystemExit(f'DAG sibling claims were not distinct: {claim_a_payload!r} {claim_b_payload!r}')\n\n    complete_a = run_ctl(binary, root, 'worker', 'complete', '--worker-id', 'worker-a', '--lease-id', lease_a.get('lease_id'), '--status', 'succeeded', '--message', 'a done', '--url', base_url, '--json', out_dir=ctl_out, no_build=True)\n    require_success(complete_a, 'complete a')\n    complete_b = run_ctl(binary, root, 'worker', 'complete', '--worker-id', 'worker-b', '--lease-id', lease_b.get('lease_id'), '--status', 'succeeded', '--message', 'b done', '--url', base_url, '--json', out_dir=ctl_out, no_build=True)\n    require_success(complete_b, 'complete b')\n    completed = json.loads(complete_b.stdout).get('run', {})\n    if completed.get('meta', {}).get('status') != 'completed':\n        raise SystemExit(f'DAG run did not complete: {completed!r}')\nfinally:\n    terminate_process(proc)\n\nprint('release-control-plane-dag-worker-readiness-ok')\nPY"
expect_rc = 0
expect_stdout_contains = ["release-control-plane-dag-worker-readiness-ok"]
