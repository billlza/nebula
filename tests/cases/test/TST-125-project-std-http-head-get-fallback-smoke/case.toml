id = "TST-125-project-std-http-head-get-fallback-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nfrom pathlib import Path\n\nroot = Path('work/http_head_server')\n(root / 'src').mkdir(parents=True, exist_ok=True)\nport_path = (root / 'port.txt').resolve()\nif port_path.exists():\n    port_path.unlink()\n(root / 'nebula.toml').write_text('schema_version = 1\\n\\n[package]\\nname = \"http-head-server\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n', encoding='utf-8')\n(root / 'src' / 'server.nb').write_text('''module server\\nimport std::http\\nimport std::net\\nimport std::result\\n\\nasync fn handle_request(request: Request) -> Response {\\n  return await dispatch1(\\n    request,\\n    Get,\\n    \"/hello\",\\n    handle_hello,\\n    not_found_text(\"not-found\")\\n  )\\n}\\n\\nasync fn handle_hello(request: Request) -> Response {\\n  return ok_text(\"hello-head\")\\n}\\n\\nasync fn serve_one(listener: TcpListener) -> Void {\\n  match await serve_n(listener, 1, handle_request) {\\n    Ok(_) => {}\\n    Err(msg) => { print(msg) }\\n  }\\n}\\n''', encoding='utf-8')\n(root / 'src' / 'main.nb').write_text(f'''module main\\nimport server\\nimport std::fs\\nimport std::json\\nimport std::net\\nimport std::result\\nimport std::task\\n\\nasync fn main() -> Void {{\\n  match ipv4(\"127.0.0.1\", 0) {{\\n    Ok(addr) => {{\\n      match await bind(addr) {{\\n        Ok(listener) => {{\\n          match listener.local_addr() {{\\n            Ok(bound_addr) => {{\\n              match bound_addr.port() {{\\n                Ok(port) => {{\\n                  match write_string(\"{port_path}\", stringify(int_value(port))) {{\\n                    Ok(_) => {{\\n                      let task = spawn(serve_one(listener))\\n                      await join(task)\\n                      listener.close()\\n                    }}\\n                    Err(msg) => {{ print(msg) }}\\n                  }}\\n                }}\\n                Err(msg) => {{ print(msg) }}\\n              }}\\n            }}\\n            Err(msg) => {{ print(msg) }}\\n          }}\\n        }}\\n        Err(msg) => {{ print(msg) }}\\n      }}\\n    }}\\n    Err(msg) => {{ print(msg) }}\\n  }}\\n}}\\n''', encoding='utf-8')\nPY"
expect_rc = 0

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport os\nimport socket\nimport subprocess\nimport time\nfrom pathlib import Path\n\nroot = Path('work/http_head_server')\nport_path = root / 'port.txt'\nproc = subprocess.Popen([os.environ['NEBULA_BINARY'], 'run', str(root), '--run-gate', 'none'], stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True)\ntry:\n    deadline = time.time() + 8.0\n    port = None\n    while time.time() < deadline:\n        if proc.poll() is not None:\n            raise SystemExit(proc.returncode)\n        try:\n            port = int(port_path.read_text(encoding='utf-8').strip())\n            break\n        except (FileNotFoundError, ValueError):\n            time.sleep(0.05)\n    if port is None:\n        raise SystemExit('server did not publish port in time')\n    deadline = time.time() + 8.0\n    while time.time() < deadline:\n        try:\n            with socket.create_connection(('127.0.0.1', port), timeout=0.3) as sock:\n                sock.sendall(b'HEAD /hello HTTP/1.1\\r\\nHost: localhost\\r\\nContent-Length: 0\\r\\n\\r\\n')\n                data = b''\n                while True:\n                    chunk = sock.recv(4096)\n                    if not chunk:\n                        break\n                    data += chunk\n                Path('work/http_head_response.bin').write_bytes(data)\n                break\n        except OSError:\n            if proc.poll() is not None:\n                raise SystemExit(proc.returncode)\n            time.sleep(0.05)\n    else:\n        raise SystemExit('server did not accept connections in time')\nfinally:\n    stdout, stderr = proc.communicate(timeout=10)\n    Path('work/http_head_stdout.txt').write_text(stdout, encoding='utf-8')\n    Path('work/http_head_stderr.txt').write_text(stderr, encoding='utf-8')\n    if proc.returncode != 0:\n        raise SystemExit(proc.returncode)\nPY"
expect_rc = 0

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nfrom pathlib import Path\nraw = Path('work/http_head_response.bin').read_bytes()\ntext = raw.decode('utf-8')\nif not text.startswith('HTTP/1.1 200 OK\\r\\n'):\n    raise SystemExit('missing 200 status line')\nheader_end = raw.find(b'\\r\\n\\r\\n')\nif header_end == -1:\n    raise SystemExit('missing header terminator')\nbody = raw[header_end + 4:]\nif body != b'':\n    raise SystemExit('HEAD response unexpectedly carried a body: ' + repr(body))\nprint('server-head-ok')\nPY"
expect_rc = 0
