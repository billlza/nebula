id = "TST-263-release-control-plane-shell-sidecar-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport json\nimport os\nimport subprocess\nimport sys\nfrom pathlib import Path\n\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nsys.path.insert(0, str(repo_root / 'tests' / 'lib'))\nfrom release_control_plane_workspace import (\n    build_service_binary,\n    copy_example,\n    fetch_workspace,\n    require_success,\n    run_ctl,\n    start_service,\n    terminate_process,\n    wait_until_health_ok,\n)\n\nbinary = os.environ['NEBULA_BINARY']\nroot = Path('work/release_control_plane_shell_sidecar')\nstate_dir = root / 'state'\nctl_out = root / '.ctl-out'\nwork_dir = root / 'shell-work'\nallowlist_path = root / 'shell-allowlist.json'\nadmin_token = 'admin-shell-token'\nwriter_token = 'writer-shell-token'\nreader_token = 'reader-shell-token'\nworker_token = 'worker-shell-token'\n\ncopy_example(repo_root, root)\nfetch_workspace(binary, root)\nwork_dir.mkdir(parents=True, exist_ok=True)\nallowlist_path.write_text(json.dumps({\n    'commands': [\n        {\n            'id': 'echo',\n            'program': '/bin/echo',\n            'args': ['fixed'],\n            'timeout_ms': 1000,\n            'max_stdout_bytes': 1024,\n            'max_stderr_bytes': 1024,\n            'allow_event_args': True,\n        },\n        {\n            'id': 'fail',\n            'program': '/bin/sh',\n            'args': ['-c', 'echo boom >&2; exit 4'],\n            'timeout_ms': 1000,\n            'max_stdout_bytes': 1024,\n            'max_stderr_bytes': 1024,\n            'allow_event_args': False,\n        },\n    ],\n}, separators=(',', ':')), encoding='utf-8')\n\nservice_env = {\n    'APP_STATE_DIR': str(state_dir),\n    'APP_SHELL_TASKS_PREVIEW': '1',\n    'APP_SHELL_TASK_ALLOWLIST': str(allowlist_path),\n    'APP_SHELL_TASK_WORK_DIR': str(work_dir),\n    'APP_AUTH_REQUIRED': '1',\n    'APP_ADMIN_TOKEN': admin_token,\n    'APP_WRITE_TOKEN': writer_token,\n    'APP_READ_TOKEN': reader_token,\n    'APP_WORKER_TOKEN': worker_token,\n}\n\nproc, stderr_lines, port = start_service(binary, root, service_env)\ntry:\n    wait_until_health_ok(proc, stderr_lines, port)\n    base_url = f'http://127.0.0.1:{port}'\n    require_success(run_ctl(binary, root, 'control-plane-validate', '--url', base_url, out_dir=ctl_out), 'prewarm ctl')\n\n    validate = run_ctl(binary, root, 'shell', 'allowlist', 'validate', '--file', str(allowlist_path), '--json', out_dir=ctl_out, no_build=True)\n    require_success(validate, 'shell allowlist validate')\n    if json.loads(validate.stdout).get('status') != 'ok':\n        raise SystemExit(f'allowlist validate payload drifted: {validate.stdout!r}')\n\n    require_success(run_ctl(binary, root, 'config', 'put', '--app', 'control-plane', '--channel', 'prod', '--key', 'feature.flag', '--bool', 'true', '--description', 'shell sidecar', '--url', base_url, '--token', writer_token, '--json', out_dir=ctl_out, no_build=True), 'config put')\n    require_success(run_ctl(binary, root, 'release', 'put', '--app', 'control-plane', '--channel', 'prod', '--version', '2026.04.23', '--config-revision', '1', '--description', 'shell sidecar', '--url', base_url, '--token', writer_token, '--json', out_dir=ctl_out, no_build=True), 'release put')\n\n    spec = root / 'shell-workflow.json'\n    spec.write_text(json.dumps({\n        'trigger_kind': 'internal_event',\n        'event_kind': 'release_apply_requested',\n        'stages': [\n            {'name': 'approval', 'kind': 'approval_gate', 'task_kind': '', 'timeout_s': 0, 'max_attempts': 0, 'depends_on': []},\n            {'name': 'shell', 'kind': 'leased_task', 'task_kind': 'shell_command', 'timeout_s': 30, 'max_attempts': 2, 'depends_on': ['approval']},\n        ],\n    }), encoding='utf-8')\n    require_success(run_ctl(binary, root, 'workflow', 'put', '--app', 'control-plane', '--channel', 'prod', '--if-match', '1', '--spec-file', str(spec), '--url', base_url, '--token', admin_token, '--json', out_dir=ctl_out, no_build=True), 'workflow put shell')\n    require_success(run_ctl(binary, root, 'approval', 'decide', '--app', 'control-plane', '--channel', 'prod', '--if-match', '1', '--decision', 'approved', '--reason', 'shell approved', '--url', base_url, '--token', admin_token, '--json', out_dir=ctl_out, no_build=True), 'approval decide')\n\n    payload = root / 'shell-event.json'\n    payload.write_text(json.dumps({'shell_command': {'command_id': 'echo', 'args': ['hello']}}), encoding='utf-8')\n    submit = run_ctl(binary, root, 'workflow', 'event', 'submit', '--app', 'control-plane', '--channel', 'prod', '--event-id', 'shell-event-1', '--event-kind', 'release_apply_requested', '--release-revision', '1', '--payload-file', str(payload), '--url', base_url, '--token', writer_token, '--json', out_dir=ctl_out, no_build=True)\n    require_success(submit, 'workflow shell event submit')\n    run_id = json.loads(submit.stdout).get('run', {}).get('run_id')\n\n    sidecar = run_ctl(binary, root, 'shell', 'worker', 'run-once', '--worker-id', 'shell-worker', '--allowlist-file', str(allowlist_path), '--work-dir', str(work_dir), '--url', base_url, '--token', worker_token, '--json', out_dir=ctl_out, no_build=True)\n    require_success(sidecar, 'shell worker run-once')\n    completed = json.loads(sidecar.stdout).get('run', {})\n    if completed.get('meta', {}).get('status') != 'completed':\n        raise SystemExit(f'shell workflow did not complete: {completed!r}')\n\n    run_view = run_ctl(binary, root, 'workflow', 'run', '--app', 'control-plane', '--channel', 'prod', '--run-id', str(run_id), '--url', base_url, '--token', reader_token, '--json', out_dir=ctl_out, no_build=True)\n    require_success(run_view, 'workflow run view')\n    stages = json.loads(run_view.stdout).get('run', {}).get('meta', {}).get('stages', [])\n    shell_stage = next((stage for stage in stages if stage.get('stage_name') == 'shell'), {})\n    payload_out = shell_stage.get('meta', {}).get('result_payload', {})\n    if payload_out.get('kind') != 'shell_task_result' or payload_out.get('stdout') != 'fixed hello\\n' or payload_out.get('exit_code') != 0:\n        raise SystemExit(f'unexpected shell result payload: {payload_out!r}')\n\n    fail_payload = root / 'shell-event-fail.json'\n    fail_payload.write_text(json.dumps({'shell_command': {'command_id': 'fail', 'args': []}}), encoding='utf-8')\n    require_success(run_ctl(binary, root, 'workflow', 'event', 'submit', '--app', 'control-plane', '--channel', 'prod', '--event-id', 'shell-event-2', '--event-kind', 'release_apply_requested', '--release-revision', '1', '--payload-file', str(fail_payload), '--url', base_url, '--token', writer_token, '--json', out_dir=ctl_out, no_build=True), 'workflow shell fail event submit')\n    failed = run_ctl(binary, root, 'shell', 'worker', 'run-once', '--worker-id', 'shell-worker', '--allowlist-file', str(allowlist_path), '--work-dir', str(work_dir), '--url', base_url, '--token', worker_token, '--json', out_dir=ctl_out, no_build=True)\n    require_success(failed, 'shell worker failed command completes lease')\n    failed_run = json.loads(failed.stdout).get('run', {})\n    failed_stage = next((stage for stage in failed_run.get('meta', {}).get('stages', []) if stage.get('stage_name') == 'shell'), {})\n    failed_payload = failed_stage.get('meta', {}).get('result_payload', {})\n    if failed_run.get('meta', {}).get('status') != 'failed' or failed_payload.get('exit_code') != 4 or failed_payload.get('stderr') != 'boom\\n':\n        raise SystemExit(f'unexpected failed shell payload: {failed_payload!r}')\nfinally:\n    terminate_process(proc)\n\nservice_binary = build_service_binary(binary, root)\nmissing_env = {\n    **os.environ,\n    'NEBULA_BIND_HOST': '127.0.0.1',\n    'NEBULA_PORT': '0',\n    'APP_STATE_DIR': str(root / 'state-shell-missing'),\n    'APP_SHELL_TASKS_PREVIEW': '1',\n    'APP_AUTH_REQUIRED': '1',\n    'APP_ADMIN_TOKEN': admin_token,\n    'APP_WRITE_TOKEN': writer_token,\n    'APP_READ_TOKEN': reader_token,\n    'APP_WORKER_TOKEN': worker_token,\n}\nfailed_start = subprocess.run([str(service_binary)], capture_output=True, text=True, env=missing_env, timeout=10)\nif failed_start.returncode == 0:\n    raise SystemExit('shell preview unexpectedly started without allowlist/workdir')\nif 'startup preflight failed: free_form_shell_command_tasks preview requires APP_SHELL_TASK_ALLOWLIST' not in failed_start.stdout:\n    print(failed_start.stdout, end='')\n    print(failed_start.stderr, end='')\n    raise SystemExit('missing shell allowlist diagnostic')\n\nprint('release-control-plane-shell-sidecar-ok')\nPY"
expect_rc = 0
expect_stdout_contains = ["release-control-plane-shell-sidecar-ok"]
