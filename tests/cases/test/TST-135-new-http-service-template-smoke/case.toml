id = "TST-135-new-http-service-template-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nfrom pathlib import Path\nPath('work').mkdir(parents=True, exist_ok=True)\nport_path = Path('work/new_http_port.txt').resolve()\nif port_path.exists():\n    port_path.unlink()\nPY"
expect_rc = 0

[[steps]]
kind = "shell"
run = "$NEBULA_BINARY new work/new_http --template http-service"
expect_rc = 0
expect_stdout_contains = ["new_http", "http-service"]
must_exist = [
  "work/new_http/nebula.toml",
  "work/new_http/README.md",
  "work/new_http/.gitignore",
  "work/new_http/src/main.nb",
  "work/new_http/src/server.nb",
]

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport os\nimport signal\nimport socket\nimport subprocess\nimport time\nfrom pathlib import Path\n\nport_path = Path('work/new_http_port.txt').resolve()\nserver_path = Path('work/new_http/src/server.nb')\nserver_path.write_text(f'''module server\\nimport std::env\\nimport std::fs\\nimport std::http\\nimport std::json\\nimport std::net\\nimport std::result\\n\\nfn bind_port() -> Result<Int, String> {{\\n  return get_int_or(\"PORT\", 40480)\\n}}\\n\\nasync fn handle_request(request: Request) -> Response {{\\n  return await dispatch2(\\n    request,\\n    Get,\\n    \"/healthz\",\\n    handle_health,\\n    Get,\\n    \"/hello/:name\",\\n    handle_hello,\\n    not_found_text(\"not found\")\\n  )\\n}}\\n\\nasync fn handle_health(request: Request) -> Response {{\\n  return ok_text(\"ok\")\\n}}\\n\\nasync fn handle_hello(request: Request) -> Response {{\\n  match route_param1(\"/hello/:name\", request) {{\\n    Ok(name) => {{\\n      return ok_text(name)\\n    }}\\n    Err(msg) => {{\\n      return internal_error_text(msg)\\n    }}\\n  }}\\n}}\\n\\nasync fn run_service() -> Result<Void, String> {{\\n  match bind_port() {{\\n    Ok(port) => {{\\n      match ipv4(\"127.0.0.1\", port) {{\\n        Ok(addr) => {{\\n          match await bind(addr) {{\\n            Ok(listener) => {{\\n              match listener.local_addr() {{\\n                Ok(bound_addr) => {{\\n                  match bound_addr.port() {{\\n                    Ok(actual_port) => {{\\n                      match write_string(\"{port_path}\", stringify(int_value(actual_port))) {{\\n                        Ok(_) => {{\\n                          return await serve(listener, handle_request)\\n                        }}\\n                        Err(msg) => {{\\n                          return Err(msg)\\n                        }}\\n                      }}\\n                    }}\\n                    Err(msg) => {{\\n                      return Err(msg)\\n                    }}\\n                  }}\\n                }}\\n                Err(msg) => {{\\n                  return Err(msg)\\n                }}\\n              }}\\n            }}\\n            Err(msg) => {{\\n              return Err(msg)\\n            }}\\n          }}\\n        }}\\n        Err(msg) => {{\\n          return Err(msg)\\n        }}\\n      }}\\n    }}\\n    Err(msg) => {{\\n      return Err(msg)\\n    }}\\n  }}\\n}}\\n''', encoding='utf-8')\nenv = os.environ.copy()\nenv['PORT'] = '0'\nproc = subprocess.Popen([\n    os.environ['NEBULA_BINARY'],\n    'run',\n    'work/new_http',\n    '--run-gate',\n    'none',\n], stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True, env=env, start_new_session=True)\n\ndef round_trip(port: int, request_bytes: bytes, out_path: str, timeout_seconds: float, error_message: str) -> None:\n    deadline = time.time() + timeout_seconds\n    while time.time() < deadline:\n        try:\n            with socket.create_connection(('127.0.0.1', port), timeout=0.3) as sock:\n                sock.sendall(request_bytes)\n                data = b''\n                while True:\n                    chunk = sock.recv(4096)\n                    if not chunk:\n                        break\n                    data += chunk\n                Path(out_path).write_text(data.decode('utf-8'), encoding='utf-8')\n                return\n        except OSError:\n            if proc.poll() is not None:\n                raise SystemExit(proc.returncode)\n            time.sleep(0.05)\n    raise SystemExit(error_message)\n\ntry:\n    deadline = time.time() + 8.0\n    port = None\n    while time.time() < deadline:\n        if proc.poll() is not None:\n            raise SystemExit(proc.returncode)\n        try:\n            port = int(port_path.read_text(encoding='utf-8').strip())\n            break\n        except (FileNotFoundError, ValueError):\n            time.sleep(0.05)\n    if port is None:\n        raise SystemExit('service template did not publish port in time')\n    round_trip(\n        port,\n        b'GET /healthz HTTP/1.1\\r\\nHost: localhost\\r\\nContent-Length: 0\\r\\n\\r\\n',\n        'work/new_http_health.txt',\n        8.0,\n        'service template did not accept health request in time',\n    )\n    round_trip(\n        port,\n        b'GET /hello/nebula HTTP/1.1\\r\\nHost: localhost\\r\\nContent-Length: 0\\r\\n\\r\\n',\n        'work/new_http_hello.txt',\n        3.0,\n        'service template did not accept hello request in time',\n    )\nfinally:\n    try:\n        os.killpg(proc.pid, signal.SIGTERM)\n    except ProcessLookupError:\n        pass\n    try:\n        stdout, stderr = proc.communicate(timeout=10)\n    except subprocess.TimeoutExpired:\n        try:\n            os.killpg(proc.pid, signal.SIGKILL)\n        except ProcessLookupError:\n            pass\n        stdout, stderr = proc.communicate(timeout=10)\n    Path('work/new_http_stdout.txt').write_text(stdout, encoding='utf-8')\n    Path('work/new_http_stderr.txt').write_text(stderr, encoding='utf-8')\nPY"
expect_rc = 0

[[steps]]
kind = "shell"
run = "grep -F 'HTTP/1.1 200 OK' work/new_http_health.txt >/dev/null && grep -F 'ok' work/new_http_health.txt >/dev/null && grep -F 'HTTP/1.1 200 OK' work/new_http_hello.txt >/dev/null && grep -F 'nebula' work/new_http_hello.txt >/dev/null"
expect_rc = 0
