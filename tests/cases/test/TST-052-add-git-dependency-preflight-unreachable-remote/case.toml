id = "TST-052-add-git-dependency-preflight-unreachable-remote"
suite = "test"

[[steps]]
kind = "shell"
run = "rm -rf work/add_git_missing_remote"
expect_rc = 0

[[steps]]
kind = "shell"
run = "$NEBULA_BINARY new work/add_git_missing_remote >/dev/null"
expect_rc = 0

[[steps]]
kind = "shell"
run = "cp work/add_git_missing_remote/nebula.toml work/add_git_missing_remote/original.toml"
expect_rc = 0

[[steps]]
kind = "shell"
run = "\"$NEBULA_BINARY\" add work/add_git_missing_remote dep --git work/definitely-missing-remote --rev HEAD > work/add-git-missing-remote.out 2>&1"
expect_rc = 1

[[steps]]
kind = "shell"
run = "grep -F 'NBL-CLI-DEP-GIT-REMOTE' work/add-git-missing-remote.out && cmp -s work/add_git_missing_remote/original.toml work/add_git_missing_remote/nebula.toml"
expect_rc = 0
