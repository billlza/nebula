id = "TST-041-release-helpers-render-metadata"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport os\nimport platform\nimport shutil\nimport subprocess\nfrom pathlib import Path\n\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nroot = Path('work/release_helpers')\nroot.mkdir(parents=True, exist_ok=True)\nversion = (repo_root / 'VERSION').read_text(encoding='utf-8').strip()\nsystem = platform.system()\nmachine = platform.machine().lower()\nif system == 'Darwin' and machine in ('arm64', 'aarch64'):\n    host_target = 'darwin-arm64'\nelif system == 'Darwin' and machine == 'x86_64':\n    host_target = 'darwin-x86_64'\nelif system == 'Linux' and machine == 'x86_64':\n    host_target = 'linux-x86_64'\nelif system.startswith('MSYS') or system.startswith('MINGW') or system == 'Windows':\n    host_target = 'windows-x86_64'\nelse:\n    raise SystemExit(f'unsupported host for release helper test: {system}/{machine}')\nsubprocess.run([\n    'python3', str(repo_root / 'scripts' / 'package_release.py'),\n    '--binary', os.environ['NEBULA_BINARY'],\n    '--target', host_target,\n    '--output-dir', str(root),\n], check=True)\ncreated = [p for p in root.iterdir() if p.name.startswith('nebula-v') and p.is_file()]\nif len(created) != 1:\n    raise SystemExit(f'unexpected packaged assets: {created}')\nasset = created[0]\nrequired = [\n    f'nebula-v{version}-darwin-x86_64.tar.gz',\n    f'nebula-v{version}-darwin-arm64.tar.gz',\n    f'nebula-v{version}-linux-x86_64.tar.gz',\n    f'nebula-v{version}-windows-x86_64.zip',\n]\nfor name in required:\n    target = root / name\n    if not target.exists():\n        shutil.copy2(asset, target)\nshutil.copy2(repo_root / f'RELEASE_NOTES_v{version}.md', root / f'RELEASE_NOTES_v{version}.md')\nsubprocess.run([\n    'python3', str(repo_root / 'scripts' / 'render_homebrew_formula.py'),\n    '--artifact-dir', str(root),\n    '--output', str(root / 'nebula.rb'),\n    '--url-base', 'file://' + str(root.resolve()),\n], check=True)\nsubprocess.run([\n    'python3', str(repo_root / 'scripts' / 'generate_release_manifest.py'),\n    '--artifact-dir', str(root),\n    '--checksums-out', str(root / 'SHA256SUMS.txt'),\n    '--manifest-out', str(root / 'release-manifest.json'),\n    '--base-url', 'file://' + str(root.resolve()),\n    '--require-all', 'on',\n], check=True)\nPY"
expect_rc = 0

[[steps]]
kind = "shell"
run = "grep -F 'class Nebula < Formula' work/release_helpers/nebula.rb && grep -F 'version \"1.0.0\"' work/release_helpers/nebula.rb && grep -F 'nebula-v1.0.0-darwin-x86_64.tar.gz' work/release_helpers/SHA256SUMS.txt && grep -F '\"target\": \"windows-x86_64\"' work/release_helpers/release-manifest.json && grep -F '\"target\": \"linux-x86_64\"' work/release_helpers/release-manifest.json"
expect_rc = 0
