id = "TST-041-release-helpers-render-metadata"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport os\nimport platform\nimport shutil\nimport subprocess\nimport tarfile\nimport zipfile\nfrom pathlib import Path, PurePosixPath\n\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nroot = Path('work/release_helpers')\nroot.mkdir(parents=True, exist_ok=True)\nversion = (repo_root / 'VERSION').read_text(encoding='utf-8').strip()\nsystem = platform.system()\nmachine = platform.machine().lower()\nif system == 'Darwin' and machine in ('arm64', 'aarch64'):\n    host_target = 'darwin-arm64'\n    binary_name = 'nebula'\n    asset_name = f'nebula-v{version}-darwin-arm64.tar.gz'\nelif system == 'Darwin' and machine == 'x86_64':\n    host_target = 'darwin-x86_64'\n    binary_name = 'nebula'\n    asset_name = f'nebula-v{version}-darwin-x86_64.tar.gz'\nelif system == 'Linux' and machine == 'x86_64':\n    host_target = 'linux-x86_64'\n    binary_name = 'nebula'\n    asset_name = f'nebula-v{version}-linux-x86_64.tar.gz'\nelif system.startswith('MSYS') or system.startswith('MINGW') or system == 'Windows':\n    host_target = 'windows-x86_64'\n    binary_name = 'nebula.exe'\n    asset_name = f'nebula-v{version}-windows-x86_64.zip'\nelse:\n    raise SystemExit(f'unsupported host for release helper test: {system}/{machine}')\nsubprocess.run([\n    'python3', str(repo_root / 'scripts' / 'package_release.py'),\n    '--binary', os.environ['NEBULA_BINARY'],\n    '--target', host_target,\n    '--output-dir', str(root),\n], check=True)\nasset = root / asset_name\nif not asset.exists():\n    raise SystemExit(f'expected packaged asset missing: {asset_name}')\nprefix = f'nebula-v{version}-{host_target}'\nif asset.suffix == '.zip':\n    names = zipfile.ZipFile(asset).namelist()\nelse:\n    with tarfile.open(asset, 'r:*') as tf:\n        names = tf.getnames()\npreview_members = [name for name in names if 'official' in PurePosixPath(name).parts]\nif preview_members:\n    raise SystemExit(f'preview package content unexpectedly shipped in archive: {preview_members}')\ncache_members = [name for name in names if '__pycache__' in PurePosixPath(name).parts or name.endswith('.pyc')]\nif cache_members:\n    raise SystemExit(f'python cache content unexpectedly shipped in archive: {cache_members}')\nrequired_members = [\n    f'{prefix}/bin/{binary_name}',\n    f'{prefix}/include/runtime/nebula_runtime.hpp',\n    f'{prefix}/include/runtime/region_allocator.hpp',\n    f'{prefix}/share/nebula/registry/client.py',\n    f'{prefix}/share/nebula/registry/server.py',\n    f'{prefix}/share/nebula/registry/README.md',\n    f'{prefix}/share/doc/nebula/VERSION',\n    f'{prefix}/share/doc/nebula/README.md',\n]\nnotes_name = f'RELEASE_NOTES_v{version}.md'\nif (repo_root / notes_name).exists():\n    required_members.append(f'{prefix}/share/doc/nebula/{notes_name}')\nmissing = [name for name in required_members if name not in names]\nif missing:\n    raise SystemExit(f'missing packaged members: {missing}')\nrequired = [\n    f'nebula-v{version}-darwin-x86_64.tar.gz',\n    f'nebula-v{version}-darwin-arm64.tar.gz',\n    f'nebula-v{version}-linux-x86_64.tar.gz',\n    f'nebula-v{version}-windows-x86_64.zip',\n]\nfor name in required:\n    target = root / name\n    if not target.exists():\n        shutil.copy2(asset, target)\nbackend_asset = root / f'nebula-backend-sdk-v{version}-linux-x86_64.tar.gz'\nif not backend_asset.exists():\n    shutil.copy2(asset, backend_asset)\nif (repo_root / notes_name).exists():\n    shutil.copy2(repo_root / notes_name, root / notes_name)\nsubprocess.run([\n    'python3', str(repo_root / 'scripts' / 'render_homebrew_formula.py'),\n    '--artifact-dir', str(root),\n    '--output', str(root / 'nebula.rb'),\n    '--url-base', 'file://' + str(root.resolve()),\n], check=True)\nsubprocess.run([\n    'python3', str(repo_root / 'scripts' / 'generate_release_sbom.py'),\n    '--staged-root', str(root / prefix),\n    '--artifact', str(asset),\n    '--output', str(root / f'{prefix}.spdx.json'),\n    '--base-url', 'file://' + str(root.resolve()),\n], check=True)\n(root / f'{prefix}.provenance.intoto.jsonl').write_text('{}\\n', encoding='utf-8')\n(root / f'{prefix}.sbom.intoto.jsonl').write_text('{}\\n', encoding='utf-8')\n(root / f'nebula-backend-sdk-v{version}-linux-x86_64.spdx.json').write_text('{\"spdxVersion\":\"SPDX-2.3\"}\\n', encoding='utf-8')\n(root / f'nebula-backend-sdk-v{version}-linux-x86_64.provenance.intoto.jsonl').write_text('{}\\n', encoding='utf-8')\n(root / f'nebula-backend-sdk-v{version}-linux-x86_64.sbom.intoto.jsonl').write_text('{}\\n', encoding='utf-8')\nsubprocess.run([\n    'python3', str(repo_root / 'scripts' / 'generate_release_manifest.py'),\n    '--artifact-dir', str(root),\n    '--checksums-out', str(root / 'SHA256SUMS.txt'),\n    '--manifest-out', str(root / 'release-manifest.json'),\n    '--base-url', 'file://' + str(root.resolve()),\n    '--require-all', 'on',\n], check=True)\nPY"
expect_rc = 0

[[steps]]
kind = "shell"
run = "version=$(cat \"$NEBULA_REPO_ROOT/VERSION\") && host=$(python3 - <<'PY'\nimport platform\nsystem = platform.system()\nmachine = platform.machine().lower()\nif system == 'Darwin' and machine in ('arm64', 'aarch64'):\n    print('darwin-arm64')\nelif system == 'Darwin' and machine == 'x86_64':\n    print('darwin-x86_64')\nelif system == 'Linux' and machine == 'x86_64':\n    print('linux-x86_64')\nelif system.startswith('MSYS') or system.startswith('MINGW') or system == 'Windows':\n    print('windows-x86_64')\nelse:\n    raise SystemExit('unsupported host')\nPY\n) && grep -F 'class Nebula < Formula' work/release_helpers/nebula.rb && grep -F 'depends_on \"llvm\"' work/release_helpers/nebula.rb && grep -F 'CXX:=' work/release_helpers/nebula.rb && grep -F \"version \\\"$version\\\"\" work/release_helpers/nebula.rb && grep -F \"nebula-v${version}-darwin-x86_64.tar.gz\" work/release_helpers/SHA256SUMS.txt && grep -F \"nebula-v${version}-${host}.spdx.json\" work/release_helpers/SHA256SUMS.txt && grep -F \"nebula-backend-sdk-v${version}-linux-x86_64.tar.gz\" work/release_helpers/SHA256SUMS.txt && grep -F '\"spdxVersion\": \"SPDX-2.3\"' \"work/release_helpers/nebula-v${version}-${host}.spdx.json\" && grep -F '\"fileName\": \"./bin/nebula' \"work/release_helpers/nebula-v${version}-${host}.spdx.json\" && grep -F '\"target\": \"windows-x86_64\"' work/release_helpers/release-manifest.json && grep -F '\"target\": \"linux-x86_64\"' work/release_helpers/release-manifest.json && grep -F '\"backend_sdks\": [' work/release_helpers/release-manifest.json && grep -F '\"sboms\": [' work/release_helpers/release-manifest.json && grep -F '\"attestations\": [' work/release_helpers/release-manifest.json && grep -F '.provenance.intoto.jsonl' work/release_helpers/release-manifest.json && grep -F '\"checksums\": {' work/release_helpers/release-manifest.json && grep -F '\"manifest\": {' work/release_helpers/release-manifest.json && grep -F '\"size\":' work/release_helpers/release-manifest.json && grep -F '\"sha256\":' work/release_helpers/release-manifest.json"
expect_rc = 0
