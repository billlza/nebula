id = "TST-187-official-observe-prometheus-bridge-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport http.client\nimport importlib.util\nimport os\nimport shutil\nimport subprocess\nimport sys\nimport threading\nimport time\nfrom pathlib import Path\n\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nsys.path.insert(0, str(repo_root / 'tests' / 'lib'))\nfrom service_probe import wait_for_observe_event_in_file\nroot = Path('work/official_observe_prom_bridge')\nshutil.rmtree(root, ignore_errors=True)\n(root / 'src').mkdir(parents=True, exist_ok=True)\nlog_path = root / 'service.observe.ndjson'\n(root / 'nebula.toml').write_text('''schema_version = 1\\n\\n[package]\\nname = \"official-observe-prom-bridge\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n\\n[dependencies]\\nservice = { path = \"''' + str(repo_root / 'official' / 'nebula-service') + '''\" }\\n''', encoding='utf-8')\n(root / 'src' / 'server.nb').write_text('''module server\\nimport service::context\\nimport service::health\\nimport service::routing\\nimport std::http\\nimport std::result\\n\\nasync fn handle_request(ctx: RequestContext, request: Request) -> Result<Response, String> {\\n  return await dispatch_ctx2_result(\\n    ctx,\\n    request,\\n    Get,\\n    \"/healthz\",\\n    handle_health_route,\\n    Get,\\n    \"/boom\",\\n    handle_boom_route,\\n    not_found_text(\"not found\")\\n  )\\n}\\n\\nasync fn handle_health_route(ctx: RequestContext, request: Request) -> Result<Response, String> {\\n  return Ok(live_response_with_context(ctx))\\n}\\n\\nasync fn handle_boom_route(ctx: RequestContext, request: Request) -> Result<Response, String> {\\n  return Err(\"boom\")\\n}\\n''', encoding='utf-8')\n(root / 'src' / 'main.nb').write_text('''module main\\nimport service::config\\nimport service::drain\\nimport service::server\\nimport server\\n\\nasync fn main() -> Void {\\n  match config_from_env(\"svc-observe-bridge\", 0) {\\n    Ok(cfg) => {\\n      match from_env() {\\n        Ok(drain_cfg) => {\\n          match await bind_listener(cfg) {\\n            Ok(listener) => {\\n              match await serve_requests_result_until_drained(listener, cfg, drain_cfg, handle_request) {\\n                Ok(_) => {}\\n                Err(msg) => { print(msg) }\\n              }\\n            }\\n            Err(msg) => { print(msg) }\\n          }\\n        }\\n        Err(msg) => { print(msg) }\\n      }\\n    }\\n    Err(msg) => { print(msg) }\\n  }\\n}\\n''', encoding='utf-8')\nsubprocess.run([os.environ['NEBULA_BINARY'], 'update', str(root)], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\nbridge_path = repo_root / 'official' / 'nebula-observe' / 'prometheus_bridge.py'\nspec = importlib.util.spec_from_file_location('prometheus_bridge', bridge_path)\nbridge_mod = importlib.util.module_from_spec(spec)\nspec.loader.exec_module(bridge_mod)\nlog_handle = log_path.open('w')\nservice = subprocess.Popen([\n    os.environ['NEBULA_BINARY'],\n    'run',\n    str(root),\n    '--run-gate',\n    'none',\n], stdout=subprocess.DEVNULL, stderr=log_handle, text=True, env={**os.environ, 'NEBULA_BIND_HOST': '127.0.0.1', 'NEBULA_PORT': '0'})\nbound = wait_for_observe_event_in_file(log_path, 'listener_bound', 45, service)\nservice_port = bound.get('port')\nif not isinstance(service_port, int) or service_port <= 0:\n    raise SystemExit(f'invalid listener_bound payload: {bound!r}')\nbridge_server = bridge_mod.MetricsServer(('127.0.0.1', 0), log_path.resolve())\nbridge_port = bridge_server.server_address[1]\nbridge_thread = threading.Thread(target=bridge_server.serve_forever, kwargs={'poll_interval': 0.2}, daemon=True)\nbridge_thread.start()\ntry:\n    deadline = time.time() + 20\n    ready = False\n    while time.time() < deadline:\n        if service.poll() is not None:\n            raise SystemExit(f'observe bridge smoke service exited early: rc={service.returncode}')\n        try:\n            conn = http.client.HTTPConnection('127.0.0.1', service_port, timeout=1)\n            conn.request('GET', '/healthz')\n            resp = conn.getresponse()\n            body = resp.read().decode('utf-8')\n            conn.close()\n            if resp.status == 200 and '\"status\":\"ok\"' in body:\n                ready = True\n                break\n        except Exception:\n            time.sleep(0.1)\n    if not ready:\n        raise SystemExit('observe bridge smoke service did not become ready')\n\n    bridge_ready = False\n    deadline = time.time() + 10\n    while time.time() < deadline:\n        try:\n            conn = http.client.HTTPConnection('127.0.0.1', bridge_port, timeout=1)\n            conn.request('GET', '/healthz')\n            resp = conn.getresponse()\n            body = resp.read().decode('utf-8')\n            conn.close()\n            if resp.status == 200 and '\"status\":\"ok\"' in body:\n                bridge_ready = True\n                break\n        except Exception:\n            time.sleep(0.1)\n    if not bridge_ready:\n        raise SystemExit('prometheus bridge did not become ready')\n\n    conn = http.client.HTTPConnection('127.0.0.1', service_port, timeout=2)\n    conn.request('GET', '/boom')\n    resp = conn.getresponse()\n    resp.read()\n    conn.close()\n    if resp.status != 500:\n        raise SystemExit(f'unexpected boom status: {resp.status!r}')\n\n    metrics_text = ''\n    deadline = time.time() + 10\n    while time.time() < deadline:\n        conn = http.client.HTTPConnection('127.0.0.1', bridge_port, timeout=2)\n        conn.request('GET', '/metrics')\n        resp = conn.getresponse()\n        metrics_text = resp.read().decode('utf-8')\n        conn.close()\n        if ('nebula_service_handler_errors_total{service=\"svc-observe-bridge\"} 1' in metrics_text and\n            'nebula_service_requests_total{service=\"svc-observe-bridge\",status=\"200\"} 1' in metrics_text and\n            'nebula_service_requests_total{service=\"svc-observe-bridge\",status=\"500\"} 1' in metrics_text and\n            'nebula_service_request_duration_ms_count{service=\"svc-observe-bridge\"} 2' in metrics_text and\n            'nebula_service_events_by_classification_total{service=\"svc-observe-bridge\",event=\"handler_error\",reason=\"request_start\",detail=\"peer_request_ready\"} 1' in metrics_text and\n            'nebula_service_requests_by_classification_total{service=\"svc-observe-bridge\",status=\"200\",reason=\"response_complete\",detail=\"response_written\"} 1' in metrics_text and\n            'nebula_service_requests_by_classification_total{service=\"svc-observe-bridge\",status=\"500\",reason=\"response_complete\",detail=\"response_written\"} 1' in metrics_text and\n            'nebula_service_request_duration_ms_count_by_classification{service=\"svc-observe-bridge\",reason=\"response_complete\",detail=\"response_written\"} 2' in metrics_text):\n            break\n        time.sleep(0.1)\n    else:\n        raise SystemExit(f'bridge metrics missing expected request families: {metrics_text!r}')\n\n    if '# HELP nebula_service_handler_errors_total ' not in metrics_text:\n        raise SystemExit(f'bridge metrics missing handler_errors HELP line: {metrics_text!r}')\n    if '# TYPE nebula_service_handler_errors_total counter' not in metrics_text:\n        raise SystemExit(f'bridge metrics missing handler_errors TYPE line: {metrics_text!r}')\n    if '# HELP nebula_service_requests_total ' not in metrics_text:\n        raise SystemExit(f'bridge metrics missing request total HELP line: {metrics_text!r}')\n    if '# HELP nebula_service_request_duration_ms_sum ' not in metrics_text:\n        raise SystemExit(f'bridge metrics missing duration sum HELP line: {metrics_text!r}')\n    if '# HELP nebula_service_request_duration_ms_count ' not in metrics_text:\n        raise SystemExit(f'bridge metrics missing duration count HELP line: {metrics_text!r}')\n    if '# HELP nebula_service_events_by_classification_total ' not in metrics_text:\n        raise SystemExit(f'bridge metrics missing classified event HELP line: {metrics_text!r}')\n    if '# HELP nebula_service_requests_by_classification_total ' not in metrics_text:\n        raise SystemExit(f'bridge metrics missing classified request HELP line: {metrics_text!r}')\n    if '# HELP nebula_service_request_duration_ms_sum_by_classification ' not in metrics_text:\n        raise SystemExit(f'bridge metrics missing classified duration sum HELP line: {metrics_text!r}')\n    if '# HELP nebula_service_request_duration_ms_count_by_classification ' not in metrics_text:\n        raise SystemExit(f'bridge metrics missing classified duration count HELP line: {metrics_text!r}')\n\n    snapshot_path = root / 'snapshot.observe.ndjson'\n    snapshot_path.write_text(\n        '{\"schema\":\"nebula.observe.metric.v1\",\"signal\":\"metric\",\"service\":\"svc-observe-bridge\",\"metric\":\"handler_errors\",\"unit\":\"1\",\"value\":2,\"unix_ms\":1}\\n'\n        '{\"schema\":\"nebula.observe.metric.v1\",\"signal\":\"metric\",\"service\":\"svc-observe-bridge\",\"metric\":\"handler_errors\",\"unit\":\"1\",\"value\":3,\"unix_ms\":2}\\n'\n        '{\"schema\":\"nebula.observe.metric.v1\",\"signal\":\"metric\",\"service\":\"svc-observe-bridge\",\"metric\":\"write_timeouts\",\"unit\":\"1\",\"value\":1,\"unix_ms\":3}\\n'\n        '{\"service\":\"svc-observe-bridge\",\"event\":\"handler_timeout\",\"message\":\"timeout\",\"request_id\":9,\"classification\":{\"reason\":\"request_start\",\"detail\":\"peer_request_ready\"},\"unix_ms\":4}\\n'\n        '{\"service\":\"svc-observe-bridge\",\"event\":\"request_finished\",\"request_id\":10,\"status\":200,\"duration_ms\":7,\"classification\":{\"reason\":\"response_complete\",\"detail\":\"response_written\"}}\\n'\n        '{\"service\":\"svc-observe-bridge\",\"event\":\"request_finished\",\"request_id\":11,\"status\":500,\"duration_ms\":11,\"classification\":{\"reason\":\"response_complete\",\"detail\":\"response_written\"}}\\n'\n        '{\"schema\":\"nebula.observe.metric.v1\",\"signal\":\"metric\",\"service\":\"svc-observe-bridge\",\"metric\":\"ignored_bytes\",\"unit\":\"bytes\",\"value\":8,\"unix_ms\":4}\\n'\n        'not-json\\n',\n        encoding='utf-8'\n    )\n    rendered = subprocess.check_output([\n        'python3',\n        str(repo_root / 'official' / 'nebula-observe' / 'prometheus_bridge.py'),\n        'render',\n        '--input',\n        str(snapshot_path.resolve()),\n    ], text=True)\n    if 'nebula_service_handler_errors_total{service=\"svc-observe-bridge\"} 5' not in rendered:\n        raise SystemExit(f'render output did not accumulate handler_errors samples: {rendered!r}')\n    if 'nebula_service_write_timeouts_total{service=\"svc-observe-bridge\"} 1' not in rendered:\n        raise SystemExit(f'render output missing write_timeouts sample: {rendered!r}')\n    if 'nebula_service_requests_total{service=\"svc-observe-bridge\",status=\"200\"} 1' not in rendered:\n        raise SystemExit(f'render output missing 200 request total: {rendered!r}')\n    if 'nebula_service_requests_total{service=\"svc-observe-bridge\",status=\"500\"} 1' not in rendered:\n        raise SystemExit(f'render output missing 500 request total: {rendered!r}')\n    if 'nebula_service_request_duration_ms_sum{service=\"svc-observe-bridge\"} 18' not in rendered:\n        raise SystemExit(f'render output missing request duration sum: {rendered!r}')\n    if 'nebula_service_request_duration_ms_count{service=\"svc-observe-bridge\"} 2' not in rendered:\n        raise SystemExit(f'render output missing request duration count: {rendered!r}')\n    if 'nebula_service_events_by_classification_total{service=\"svc-observe-bridge\",event=\"handler_timeout\",reason=\"request_start\",detail=\"peer_request_ready\"} 1' not in rendered:\n        raise SystemExit(f'render output missing classified handler_timeout event: {rendered!r}')\n    if 'nebula_service_requests_by_classification_total{service=\"svc-observe-bridge\",status=\"200\",reason=\"response_complete\",detail=\"response_written\"} 1' not in rendered:\n        raise SystemExit(f'render output missing classified 200 request total: {rendered!r}')\n    if 'nebula_service_requests_by_classification_total{service=\"svc-observe-bridge\",status=\"500\",reason=\"response_complete\",detail=\"response_written\"} 1' not in rendered:\n        raise SystemExit(f'render output missing classified 500 request total: {rendered!r}')\n    if 'nebula_service_request_duration_ms_sum_by_classification{service=\"svc-observe-bridge\",reason=\"response_complete\",detail=\"response_written\"} 18' not in rendered:\n        raise SystemExit(f'render output missing classified request duration sum: {rendered!r}')\n    if 'nebula_service_request_duration_ms_count_by_classification{service=\"svc-observe-bridge\",reason=\"response_complete\",detail=\"response_written\"} 2' not in rendered:\n        raise SystemExit(f'render output missing classified request duration count: {rendered!r}')\n    if 'ignored_bytes' in rendered:\n        raise SystemExit(f'render output should ignore non-unit=1 metrics: {rendered!r}')\n\n    print('observe-prometheus-bridge-ok')\nfinally:\n    bridge_server.shutdown()\n    bridge_server.server_close()\n    if service.poll() is None:\n        service.terminate()\n        try:\n            service.wait(timeout=5)\n        except subprocess.TimeoutExpired:\n            service.kill()\n            service.wait(timeout=5)\n    log_handle.close()\nPY"
expect_rc = 0
expect_stdout_contains = ["observe-prometheus-bridge-ok"]
