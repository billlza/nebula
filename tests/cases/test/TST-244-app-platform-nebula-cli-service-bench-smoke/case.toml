id = "TST-244-app-platform-nebula-cli-service-bench-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport json\nimport os\nimport subprocess\nfrom pathlib import Path\n\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nout_path = Path('work/app_platform_nebula_cli_service.json')\nout_path.parent.mkdir(parents=True, exist_ok=True)\nresult = subprocess.run([\n    'python3',\n    str(repo_root / 'scripts' / 'app_platform_bench.py'),\n    'run-nebula',\n    '--binary',\n    os.environ['NEBULA_BINARY'],\n    '--workload',\n    'cli_cold_start',\n    '--workload',\n    'service_json_db_crud',\n    '--json-out',\n    str(out_path),\n], capture_output=True, text=True, check=False)\nprint(result.stdout, end='')\nprint(result.stderr, end='')\nif result.returncode != 0:\n    raise SystemExit(result.returncode)\npayload = json.loads(out_path.read_text(encoding='utf-8'))\nif payload.get('kind') != 'app_platform_nebula_results':\n    raise SystemExit(f'unexpected payload kind: {payload!r}')\nresults = {item['workload']: item for item in payload.get('results', [])}\nfor workload in ('cli_cold_start', 'service_json_db_crud'):\n    if workload not in results:\n        raise SystemExit(f'missing workload result: {payload!r}')\n    item = results[workload]\n    if item.get('status') != 'ok':\n        raise SystemExit(f'workload did not run successfully: {item!r}')\n    metrics = item.get('metrics', {})\n    if 'mean_ms' not in metrics or 'throughput_ops_s' not in metrics:\n        raise SystemExit(f'workload metrics missing expected fields: {item!r}')\nprint('app-platform-nebula-cli-service-bench-ok')\nPY"
expect_rc = 0
expect_stdout_contains = ["app-platform-nebula-cli-service-bench-ok"]
