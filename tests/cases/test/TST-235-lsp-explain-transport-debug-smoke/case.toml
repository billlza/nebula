id = "TST-235-lsp-explain-transport-debug-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport json\nimport os\nimport subprocess\nimport tempfile\nfrom pathlib import Path\n\n\ndef msg(obj: dict) -> bytes:\n    body = json.dumps(obj, separators=(',', ':')).encode('utf-8')\n    return f'Content-Length: {len(body)}\\r\\n\\r\\n'.encode('utf-8') + body\n\n\ndef parse_messages(data: bytes) -> list[dict]:\n    out = []\n    cursor = 0\n    while cursor < len(data):\n        header_end = data.find(b'\\r\\n\\r\\n', cursor)\n        if header_end < 0:\n            break\n        headers = data[cursor:header_end].decode('utf-8')\n        length = 0\n        for line in headers.split('\\r\\n'):\n            if line.lower().startswith('content-length:'):\n                length = int(line.split(':', 1)[1].strip())\n        cursor = header_end + 4\n        body = data[cursor:cursor + length]\n        cursor += length\n        out.append(json.loads(body.decode('utf-8')))\n    return out\n\n\ndef offset_to_line_character(text: str, absolute: int) -> tuple[int, int]:\n    prefix = text[:absolute]\n    line = prefix.count('\\n')\n    line_start = prefix.rfind('\\n')\n    character = len(prefix) if line_start < 0 else len(prefix) - line_start - 1\n    return line, character\n\n\ndef lsp_position(text: str, needle: str, *, offset: int = 0, occurrence: int = 0) -> dict:\n    start = 0\n    index = -1\n    for _ in range(occurrence + 1):\n        index = text.index(needle, start)\n        start = index + len(needle)\n    line, character = offset_to_line_character(text, index + offset)\n    return {'line': line, 'character': character}\n\n\nroot = Path(tempfile.mkdtemp(prefix='nebula-transport-hover-'))\nproj = root / 'proj'\n(proj / 'src').mkdir(parents=True)\nsource = proj / 'src' / 'main.nb'\nservice_path = Path(os.environ['NEBULA_REPO_ROOT']) / 'official' / 'nebula-service'\n\n(proj / 'nebula.toml').write_text(\n    'schema_version = 1\\n\\n'\n    '[package]\\n'\n    'name = \"transport-debug-hover\"\\n'\n    'version = \"0.1.0\"\\n'\n    'entry = \"src/main.nb\"\\n'\n    'src_dir = \"src\"\\n\\n'\n    '[dependencies]\\n'\n    f'service = {{ path = \"{service_path}\" }}\\n',\n    encoding='utf-8',\n)\n\nmain_text = (\n    'module main\\n'\n    'import service::context\\n'\n    'import std::http\\n'\n    'import std::http_json\\n'\n    'import std::json\\n'\n    'import std::result\\n\\n'\n    'async fn handle(ctx: RequestContext, request: Request) -> Result<Response, String> {\\n'\n    '  let transport = ctx.transport_debug()\\n'\n    '  let identity = ctx.tls_peer_identity_debug()\\n'\n    '  let h2 = ctx.http2_debug_state()\\n'\n    '  return Ok(ok_json(object3(\"transport\", transport, \"identity\", identity, \"h2\", h2)))\\n'\n    '}\\n\\n'\n    'fn main() -> Int {\\n'\n    '  return 0\\n'\n    '}\\n'\n)\nsource.write_text(main_text, encoding='utf-8')\n\nupdate = subprocess.run([os.environ['NEBULA_BINARY'], 'update', str(proj)], capture_output=True, text=True)\nprint(update.stdout, end='')\nprint(update.stderr, end='')\nif update.returncode != 0:\n    raise SystemExit(update.returncode)\n\nuri = 'file://' + str(source.resolve())\ntransport_pos = lsp_position(main_text, 'transport_debug', offset=2)\nh2_pos = lsp_position(main_text, 'http2_debug_state', offset=2)\n\nrequests = b''.join([\n    msg({'jsonrpc': '2.0', 'id': 1, 'method': 'initialize', 'params': {}}),\n    msg({'jsonrpc': '2.0', 'method': 'textDocument/didOpen', 'params': {'textDocument': {'uri': uri, 'languageId': 'nebula', 'version': 1, 'text': main_text}}}),\n    msg({'jsonrpc': '2.0', 'id': 2, 'method': 'textDocument/hover', 'params': {'textDocument': {'uri': uri}, 'position': transport_pos}}),\n    msg({'jsonrpc': '2.0', 'id': 3, 'method': 'textDocument/hover', 'params': {'textDocument': {'uri': uri}, 'position': h2_pos}}),\n    msg({'jsonrpc': '2.0', 'id': 4, 'method': 'shutdown', 'params': {}}),\n    msg({'jsonrpc': '2.0', 'method': 'exit', 'params': {}}),\n])\noutput = subprocess.check_output([os.environ['NEBULA_BINARY'], 'lsp'], input=requests)\nresponses = {item.get('id'): item.get('result') for item in parse_messages(output) if 'id' in item}\n\ntransport_hover = responses[2]['contents']['value']\nif 'RequestContext.transport_debug()' not in transport_hover:\n    raise SystemExit(f'transport hover was missing the surface name: {transport_hover!r}')\nfor needle in ('alpn_protocol', 'tls_peer_identity', 'http2'):\n    if needle not in transport_hover:\n        raise SystemExit(f'transport hover was missing {needle!r}: {transport_hover!r}')\n\nh2_hover = responses[3]['contents']['value']\nif 'RequestContext.http2_debug_state()' not in h2_hover:\n    raise SystemExit(f'HTTP/2 hover was missing the surface name: {h2_hover!r}')\nfor needle in (\n    'recent_events',\n    'HEADERS',\n    'WINDOW_UPDATE',\n    'GOAWAY',\n    'stream_open',\n    'response_headers_seen',\n    'stream_closed',\n    'goaway_observed',\n    'classification',\n    'request_start',\n    'peer_final_response_headers_seen',\n    'shutdown',\n    'data_end_stream',\n):\n    if needle not in h2_hover:\n        raise SystemExit(f'HTTP/2 hover was missing {needle!r}: {h2_hover!r}')\n\nexplain = subprocess.run(\n    [\n        os.environ['NEBULA_BINARY'],\n        'explain',\n        str(proj),\n        '--file',\n        str(source.resolve()),\n        '--symbol',\n        'http2_debug_state',\n        '--format',\n        'json',\n    ],\n    capture_output=True,\n    text=True,\n)\nprint(explain.stdout, end='')\nprint(explain.stderr, end='')\nif explain.returncode != 0:\n    raise SystemExit(explain.returncode)\n\npayload = json.loads(explain.stdout)\ntransport_entries = payload.get('transport')\nif not isinstance(transport_entries, list) or not transport_entries:\n    raise SystemExit(f'explain JSON was missing transport entries: {payload!r}')\nh2_entry = next((item for item in transport_entries if item.get('kind') == 'http2_debug_state'), None)\nif h2_entry is None:\n    raise SystemExit(f'explain JSON did not include the HTTP/2 transport entry: {payload!r}')\ncontract = h2_entry.get('contract')\nif not isinstance(contract, dict):\n    raise SystemExit(f'explain JSON was missing the HTTP/2 contract payload: {payload!r}')\ntimeline = contract.get('timeline')\nif not isinstance(timeline, dict):\n    raise SystemExit(f'explain JSON was missing the timeline contract: {payload!r}')\nrecent_events = timeline.get('recent_events')\nif not isinstance(recent_events, list) or len(recent_events) < 4:\n    raise SystemExit(f'explain JSON timeline was incomplete: {payload!r}')\nframe_types = {item.get('frame_type') for item in recent_events}\nif not {'HEADERS', 'DATA', 'WINDOW_UPDATE', 'GOAWAY'}.issubset(frame_types):\n    raise SystemExit(f'explain JSON timeline was missing expected frame types: {payload!r}')\nkinds = {item.get('kind') for item in recent_events}\nif not {'stream_open', 'response_headers_seen', 'stream_closed', 'goaway_observed'}.issubset(kinds):\n    raise SystemExit(f'explain JSON timeline was missing expected semantic phases: {payload!r}')\nclassified = [item for item in recent_events if isinstance(item.get('classification'), dict)]\nif len(classified) < 4:\n    raise SystemExit(f'explain JSON timeline was missing semantic classifications: {payload!r}')\nreasons = {item['classification'].get('reason') for item in classified}\ndetails = {item['classification'].get('detail') for item in classified}\nif not {'request_start', 'response_start', 'shutdown', 'response_complete'}.issubset(reasons):\n    raise SystemExit(f'explain JSON timeline was missing stable classification reasons: {payload!r}')\nif not {'local_request_headers_sent', 'peer_final_response_headers_seen', 'peer_goaway_no_error', 'data_end_stream'}.issubset(details):\n    raise SystemExit(f'explain JSON timeline was missing stable classification details: {payload!r}')\n\nprint('lsp-explain-transport-debug-ok')\nPY"
expect_rc = 0
expect_stdout_contains = ["lsp-explain-transport-debug-ok"]
