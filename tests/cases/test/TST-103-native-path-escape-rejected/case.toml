id = "TST-103-native-path-escape-rejected"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nfrom pathlib import Path\nroot = Path('work/native_escape')\noutside = root / 'outside'\ndep = root / 'dep'\napp = root / 'app'\nfor path in [outside, dep / 'src', app / 'src']:\n    path.mkdir(parents=True, exist_ok=True)\n(outside / 'bridge.cpp').write_text('#include <cstdint>\\nstd::int64_t native_value() { return 7; }\\n', encoding='utf-8')\n(dep / 'nebula.toml').write_text('schema_version = 1\\n\\n[package]\\nname = \"escape-dep\"\\nversion = \"0.1.0\"\\nentry = \"src/lib.nb\"\\nsrc_dir = \"src\"\\n\\n[native]\\ncxx_sources = [\"../outside/bridge.cpp\"]\\n', encoding='utf-8')\n(dep / 'src' / 'lib.nb').write_text('module lib\\n\\nextern fn native_value() -> Int\\n\\nfn dep_value() -> Int {\\n  return native_value()\\n}\\n', encoding='utf-8')\n(app / 'nebula.toml').write_text('schema_version = 1\\n\\n[package]\\nname = \"escape-app\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n\\n[dependencies]\\ndep = { path = \"../dep\" }\\n', encoding='utf-8')\n(app / 'src' / 'main.nb').write_text('module main\\nimport dep::lib\\n\\nfn main() -> Void {\\n  print(dep_value())\\n}\\n', encoding='utf-8')\nPY"
expect_rc = 0

[[steps]]
kind = "nebula"
command = "fetch"
args = ["work/native_escape/app"]
expect_rc = 0

[[steps]]
kind = "shell"
run = "$NEBULA_BINARY check work/native_escape/app --diag-format json > work/native-escape.json 2>&1"
expect_rc = 1

[[steps]]
kind = "shell"
run = "grep -F '\"code\":\"NBL-CLI-NATIVE-FILE\"' work/native-escape.json && grep -F 'escapes package root' work/native-escape.json"
expect_rc = 0
