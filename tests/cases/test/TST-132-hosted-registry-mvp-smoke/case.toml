id = "TST-132-hosted-registry-mvp-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport socket\nfrom pathlib import Path\nwith socket.socket(socket.AF_INET, socket.SOCK_STREAM) as sock:\n    sock.bind(('127.0.0.1', 0))\n    port = sock.getsockname()[1]\nroot = Path('work/hosted_registry_smoke')\n(root / 'dep' / 'src').mkdir(parents=True, exist_ok=True)\n(root / 'app' / 'src').mkdir(parents=True, exist_ok=True)\n(root / 'runtime').mkdir(parents=True, exist_ok=True)\n(root / 'port.txt').write_text(str(port), encoding='utf-8')\n(root / 'token.txt').write_text('dev-token\\n', encoding='utf-8')\n(root / 'dep' / 'nebula.toml').write_text('''schema_version = 1\\n\\n[package]\\nname = \"hosted_dep\"\\nversion = \"1.2.3\"\\nentry = \"src/lib.nb\"\\nsrc_dir = \"src\"\\n''', encoding='utf-8')\n(root / 'dep' / 'src' / 'lib.nb').write_text('''module lib\\n\\nfn hosted_answer() -> Int {\\n  return 42\\n}\\n''', encoding='utf-8')\n(root / 'app' / 'nebula.toml').write_text('''schema_version = 1\\n\\n[package]\\nname = \"hosted-app\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n\\n[dependencies]\\nhosted_dep = \"1.2.3\"\\n''', encoding='utf-8')\n(root / 'app' / 'src' / 'main.nb').write_text('''module main\\nimport hosted_dep::lib\\n\\nfn main() -> Void {\\n  if hosted_answer() == 42 {\\n    print(\"hosted-registry-ok\")\\n  } else {\\n    print(\"hosted-registry-bad\")\\n  }\\n}\\n''', encoding='utf-8')\nPY"
expect_rc = 0

[[steps]]
kind = "shell"
run = """
python3 - <<'PY'
import os
import subprocess
import sys
from pathlib import Path

root = Path('work/hosted_registry_smoke')
port = (root / 'port.txt').read_text(encoding='utf-8').strip()
token = (root / 'token.txt').read_text(encoding='utf-8').strip()
repo_root = Path(os.environ['NEBULA_REPO_ROOT'])
server_script = repo_root / 'tooling' / 'registry' / 'server.py'
log_path = root / 'server.log'

command = [
    sys.executable,
    str(server_script),
    'serve',
    '--root',
    str((root / 'runtime').resolve()),
    '--host',
    '127.0.0.1',
    '--port',
    port,
    '--token',
    token,
    '--port-file',
    str((root / 'runtime' / 'server.port').resolve()),
]

with log_path.open('ab') as log_file:
    proc = subprocess.Popen(
        command,
        stdin=subprocess.DEVNULL,
        stdout=log_file,
        stderr=subprocess.STDOUT,
        start_new_session=True,
    )

(root / 'server.pid').write_text(str(proc.pid), encoding='utf-8')
PY
"""
expect_rc = 0

[[steps]]
kind = "shell"
run = """
python3 - <<'PY'
import time
from pathlib import Path
from urllib import request

root = Path('work/hosted_registry_smoke')
port_file = root / 'runtime' / 'server.port'

for _ in range(100):
    if port_file.exists():
        port = port_file.read_text(encoding='utf-8').strip()
        if port:
            try:
                with request.urlopen(f'http://127.0.0.1:{port}/healthz', timeout=0.2) as response:
                    if response.status == 200:
                        raise SystemExit(0)
            except Exception:
                pass
    time.sleep(0.05)

raise SystemExit('server health probe did not succeed in time')
PY
"""
expect_rc = 0

[[steps]]
kind = "shell"
run = "port=$(cat work/hosted_registry_smoke/port.txt) && token=$(cat work/hosted_registry_smoke/token.txt) && \"$NEBULA_BINARY\" publish work/hosted_registry_smoke/dep --registry-url \"http://127.0.0.1:$port\" --registry-token \"$token\""
expect_rc = 0
expect_stdout_contains = ["published: hosted_dep@1.2.3"]

[[steps]]
kind = "shell"
run = "port=$(cat work/hosted_registry_smoke/port.txt) && token=$(cat work/hosted_registry_smoke/token.txt) && python3 \"$NEBULA_REPO_ROOT/tooling/registry/client.py\" --server \"http://127.0.0.1:$port\" --token \"$token\" list > work/hosted_registry_smoke/list.out"
expect_rc = 0

[[steps]]
kind = "shell"
run = "grep -F 'hosted_dep 1.2.3' work/hosted_registry_smoke/list.out"
expect_rc = 0

[[steps]]
kind = "shell"
run = "port=$(cat work/hosted_registry_smoke/port.txt) && token=$(cat work/hosted_registry_smoke/token.txt) && \"$NEBULA_BINARY\" fetch work/hosted_registry_smoke/app --registry-url \"http://127.0.0.1:$port\" --registry-token \"$token\""
expect_rc = 0
must_exist = ["work/hosted_registry_smoke/app/nebula.lock", "work/hosted_registry_smoke/app/.nebula/registry/hosted_dep/1.2.3/nebula.toml"]

[[steps]]
kind = "shell"
run = "\"$NEBULA_BINARY\" run work/hosted_registry_smoke/app --run-gate none"
expect_rc = 0
expect_stdout_contains = ["hosted-registry-ok"]

[[steps]]
kind = "shell"
run = "kill $(cat work/hosted_registry_smoke/server.pid)"
expect_rc = 0
