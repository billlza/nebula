id = "TST-056-lsp-utf16-position-and-uri-encoding"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nfrom pathlib import Path\nimport json, os, subprocess, tempfile\nroot = Path(tempfile.mkdtemp(dir='work'))\nfile = root / 'defs 😀.nb'\nfile.write_text('extern fn host_add(a: Int, b: Int) -> Int\\n\\nfn main() -> Int {\\n  let value = 1\\n  return /*😀*/ host_add(value, value)\\n}\\n', encoding='utf-8')\nuri = file.resolve().as_uri()\nline_text = file.read_text(encoding='utf-8').splitlines()[4]\nprefix = line_text[:line_text.index('host_add') + 2]\ncharacter = len(prefix.encode('utf-16-le')) // 2\nproc = subprocess.Popen([os.environ['NEBULA_BINARY'], 'lsp'], stdin=subprocess.PIPE, stdout=subprocess.PIPE, stderr=subprocess.STDOUT)\n\ndef send(obj):\n    body = json.dumps(obj, separators=(',', ':')).encode('utf-8')\n    proc.stdin.write(f'Content-Length: {len(body)}\\r\\n\\r\\n'.encode('ascii') + body)\n    proc.stdin.flush()\n\ndef recv():\n    header = b''\n    while b'\\r\\n\\r\\n' not in header:\n      chunk = proc.stdout.read(1)\n      if not chunk:\n        raise RuntimeError('lsp closed while waiting for header')\n      header += chunk\n    head, _, rest = header.partition(b'\\r\\n\\r\\n')\n    length = 0\n    for line in head.decode('ascii').split('\\r\\n'):\n      if line.lower().startswith('content-length:'):\n        length = int(line.split(':', 1)[1].strip())\n    body = rest\n    while len(body) < length:\n      chunk = proc.stdout.read(length - len(body))\n      if not chunk:\n        raise RuntimeError('lsp closed while waiting for body')\n      body += chunk\n    return body.decode('utf-8')\n\nresponses = []\nmessages = [\n  {'jsonrpc': '2.0', 'id': 1, 'method': 'initialize', 'params': {}},\n  {'jsonrpc': '2.0', 'method': 'textDocument/didOpen', 'params': {'textDocument': {'uri': uri, 'languageId': 'nebula', 'version': 1, 'text': file.read_text(encoding='utf-8')}}},\n  {'jsonrpc': '2.0', 'id': 2, 'method': 'textDocument/definition', 'params': {'textDocument': {'uri': uri}, 'position': {'line': 4, 'character': character}}},\n  {'jsonrpc': '2.0', 'id': 3, 'method': 'shutdown', 'params': {}},\n]\nfor msg in messages:\n    send(msg)\n    responses.append(recv())\nsend({'jsonrpc': '2.0', 'method': 'exit', 'params': {}})\nproc.stdin.close()\nproc.wait(timeout=5)\nPath('work/lsp-utf16-uri.out').write_text('\\n'.join(responses), encoding='utf-8')\nraise SystemExit(proc.returncode)\nPY"
expect_rc = 0

[[steps]]
kind = "shell"
run = "grep -F '\"id\":2' work/lsp-utf16-uri.out && grep -F '\"range\":' work/lsp-utf16-uri.out && grep -F '%20' work/lsp-utf16-uri.out && grep -F '%F0%9F%98%80.nb' work/lsp-utf16-uri.out && grep -F '\"start\":{\"character\":0,\"line\":0}' work/lsp-utf16-uri.out"
expect_rc = 0
