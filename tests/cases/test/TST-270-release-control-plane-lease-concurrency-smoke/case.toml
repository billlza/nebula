id = "TST-270-release-control-plane-lease-concurrency-smoke"
suite = "test"
description = "release control plane lease claim and complete paths are compare-and-swap safe under concurrent workers"

[[steps]]
kind = "shell"
timeout = 240
run = """
python3 - <<'PY'
import concurrent.futures
import http.client
import json
import os
import sys
import time
from pathlib import Path

repo_root = Path(os.environ["NEBULA_REPO_ROOT"])
sys.path.insert(0, str(repo_root / "tests" / "lib"))
from release_control_plane_workspace import (
    copy_example,
    fetch_workspace,
    require_success,
    run_ctl,
    start_service,
    terminate_process,
    wait_until_health_ok,
)

binary = os.environ["NEBULA_BINARY"]
root = Path("work/release_control_plane_lease_concurrency")
state_dir = root / "state"
ctl_out = root / ".ctl-out"
admin_token = "admin-lease-token"
writer_token = "writer-lease-token"
reader_token = "reader-lease-token"
worker_token = "worker-lease-token"

copy_example(repo_root, root)
fetch_workspace(binary, root)

def post_json(port: int, path: str, token: str, payload: dict) -> tuple[int, dict]:
    body = json.dumps(payload, separators=(",", ":")).encode("utf-8")
    conn = http.client.HTTPConnection("127.0.0.1", port, timeout=20)
    try:
        conn.request("POST", path, body=body, headers={
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token,
        })
        resp = conn.getresponse()
        text = resp.read().decode("utf-8")
        try:
            parsed = json.loads(text) if text else {}
        except Exception:
            parsed = {"raw": text}
        return resp.status, parsed
    finally:
        conn.close()

def post_many(port: int, path: str, token: str, payloads: list[dict]) -> list[tuple[int, dict]]:
    with concurrent.futures.ThreadPoolExecutor(max_workers=len(payloads)) as pool:
        futures = [pool.submit(post_json, port, path, token, payload) for payload in payloads]
        return [future.result(timeout=30) for future in futures]

def drain_existing_worker_leases(port: int) -> None:
    for index in range(20):
        status, payload = post_json(port, "/v1/workers/claim", worker_token, {
            "worker_id": "drain-worker",
            "task_kind": "apply_release",
        })
        if status != 200:
            raise SystemExit(f"worker drain claim failed: {status} {payload!r}")
        if payload.get("outcome") == "idle":
            return
        lease_id = payload.get("lease", {}).get("lease_id", "")
        if lease_id:
            post_json(port, "/v1/workers/leases/" + lease_id + "/complete", worker_token, {
                "worker_id": "drain-worker",
                "status": "succeeded",
                "result_message": "drained",
                "result_payload": None,
            })
    raise SystemExit("worker drain did not converge")

def drain_existing_broker_messages(port: int) -> None:
    for index in range(20):
        status, payload = post_json(port, "/v1/broker/outbox/claim", worker_token, {
            "worker_id": "drain-broker",
            "topic": "workflow.run.created",
            "now_unix_ms": 9999999999999,
        })
        if status != 200:
            raise SystemExit(f"broker drain claim failed: {status} {payload!r}")
        if payload.get("outcome") == "empty":
            return
        message = payload.get("message", {})
        message_id = message.get("message_id")
        lease_id = message.get("meta", {}).get("lease_id", "")
        if message_id and lease_id:
            post_json(port, f"/v1/broker/outbox/{message_id}/complete", worker_token, {
                "worker_id": "drain-broker",
                "lease_id": lease_id,
                "status": "published",
                "result_message": "drained",
                "next_attempt_unix_ms": 0,
            })
    raise SystemExit("broker drain did not converge")

def setup_release_workflow(base_url: str, app_name: str) -> None:
    config_put = run_ctl(binary, root, "config", "put",
                         "--app", app_name, "--channel", "prod", "--key", "feature.flag",
                         "--bool", "true", "--description", "lease concurrency",
                         "--url", base_url, "--token", writer_token, "--json",
                         out_dir=ctl_out, no_build=True)
    require_success(config_put, "config put")
    config_revision = json.loads(config_put.stdout).get("entry", {}).get("revision_id")
    require_success(run_ctl(binary, root, "release", "put",
                            "--app", app_name, "--channel", "prod", "--version", "2026.04.23",
                            "--config-revision", str(config_revision), "--description", "lease concurrency",
                            "--url", base_url, "--token", writer_token, "--json",
                            out_dir=ctl_out, no_build=True), "release put")
    spec = root / (app_name + "-workflow.json")
    spec.write_text(json.dumps({
        "trigger_kind": "internal_event",
        "event_kind": "release_apply_requested",
        "stages": [
            {"name": "approval", "kind": "approval_gate", "task_kind": "", "timeout_s": 0, "max_attempts": 0, "depends_on": []},
            {"name": "apply", "kind": "leased_task", "task_kind": "apply_release", "timeout_s": 30, "max_attempts": 2, "depends_on": ["approval"]},
        ],
    }), encoding="utf-8")
    require_success(run_ctl(binary, root, "workflow", "put",
                            "--app", app_name, "--channel", "prod", "--if-match", "1",
                            "--spec-file", str(spec), "--url", base_url, "--token", admin_token,
                            "--json", out_dir=ctl_out, no_build=True), "workflow put")
    require_success(run_ctl(binary, root, "approval", "decide",
                            "--app", app_name, "--channel", "prod", "--if-match", "1",
                            "--decision", "approved", "--reason", "lease approved",
                            "--url", base_url, "--token", admin_token, "--json",
                            out_dir=ctl_out, no_build=True), "approval decide")

def setup_dag_workflow(base_url: str, app_name: str) -> None:
    config_put = run_ctl(binary, root, "config", "put",
                         "--app", app_name, "--channel", "prod", "--key", "feature.flag",
                         "--bool", "true", "--description", "dag lease concurrency",
                         "--url", base_url, "--token", writer_token, "--json",
                         out_dir=ctl_out, no_build=True)
    require_success(config_put, "dag config put")
    config_revision = json.loads(config_put.stdout).get("entry", {}).get("revision_id")
    require_success(run_ctl(binary, root, "release", "put",
                            "--app", app_name, "--channel", "prod", "--version", "2026.04.23",
                            "--config-revision", str(config_revision), "--description", "dag lease concurrency",
                            "--url", base_url, "--token", writer_token, "--json",
                            out_dir=ctl_out, no_build=True), "dag release put")
    spec = root / (app_name + "-dag-workflow.json")
    spec.write_text(json.dumps({
        "trigger_kind": "internal_event",
        "event_kind": "release_apply_requested",
        "stages": [
            {"name": "approval", "kind": "approval_gate", "task_kind": "", "timeout_s": 0, "max_attempts": 0, "depends_on": []},
            {"name": "apply-a", "kind": "leased_task", "task_kind": "apply_release", "timeout_s": 30, "max_attempts": 2, "depends_on": ["approval"]},
            {"name": "apply-b", "kind": "leased_task", "task_kind": "apply_release", "timeout_s": 30, "max_attempts": 2, "depends_on": ["approval"]},
        ],
    }), encoding="utf-8")
    require_success(run_ctl(binary, root, "workflow", "put",
                            "--app", app_name, "--channel", "prod", "--if-match", "1",
                            "--spec-file", str(spec), "--url", base_url, "--token", admin_token,
                            "--json", out_dir=ctl_out, no_build=True), "dag workflow put")
    require_success(run_ctl(binary, root, "approval", "decide",
                            "--app", app_name, "--channel", "prod", "--if-match", "1",
                            "--decision", "approved", "--reason", "dag lease approved",
                            "--url", base_url, "--token", admin_token, "--json",
                            out_dir=ctl_out, no_build=True), "dag approval decide")

def assert_single_worker_claim_and_complete(port: int, app_name: str) -> None:
    base_url = f"http://127.0.0.1:{port}"
    setup_release_workflow(base_url, app_name)
    require_success(run_ctl(binary, root, "workflow", "event", "submit",
                            "--app", app_name, "--channel", "prod", "--event-id", app_name + "-event",
                            "--event-kind", "release_apply_requested", "--release-revision", "1",
                            "--url", base_url, "--token", writer_token, "--json",
                            out_dir=ctl_out, no_build=True), "workflow event submit")
    payloads = [{"worker_id": "worker-" + str(index), "task_kind": "apply_release"} for index in range(10)]
    results = post_many(port, "/v1/workers/claim", worker_token, payloads)
    claimed_indices = [index for index, (status, payload) in enumerate(results) if status == 200 and payload.get("outcome") == "claimed"]
    claimed = [results[index] for index in claimed_indices]
    idle = [(status, payload) for status, payload in results if status == 200 and payload.get("outcome") == "idle"]
    if len(claimed) != 1 or len(idle) != 9:
        raise SystemExit(f"worker concurrent claim expected 1 claimed/9 idle, got: {results!r}")
    lease = claimed[0][1].get("lease", {})
    lease_id = lease.get("lease_id", "")
    worker_id = payloads[claimed_indices[0]]["worker_id"]
    complete_payload = {
        "worker_id": worker_id if worker_id else payloads[0]["worker_id"],
        "status": "succeeded",
        "result_message": "done",
        "result_payload": None,
    }
    completes = post_many(port, "/v1/workers/leases/" + lease_id + "/complete", worker_token, [complete_payload, complete_payload])
    success = [item for item in completes if item[0] == 200]
    conflicts = [item for item in completes if item[0] == 409]
    if len(success) != 1 or len(conflicts) != 1:
        raise SystemExit(f"worker duplicate complete expected 1 success/1 conflict, got: {completes!r}")

def assert_single_broker_claim_and_complete(port: int, app_name: str) -> None:
    payloads = [{"worker_id": "broker-" + str(index), "topic": "workflow.run.created", "now_unix_ms": 9999999999999} for index in range(10)]
    results = post_many(port, "/v1/broker/outbox/claim", worker_token, payloads)
    claimed = [(status, payload) for status, payload in results if status == 200 and payload.get("outcome") == "claimed"]
    empty = [(status, payload) for status, payload in results if status == 200 and payload.get("outcome") == "empty"]
    if len(claimed) != 1 or len(empty) != 9:
        raise SystemExit(f"broker concurrent claim expected 1 claimed/9 empty, got: {results!r}")
    message = claimed[0][1].get("message", {})
    message_id = message.get("message_id")
    lease_id = message.get("meta", {}).get("lease_id", "")
    worker_id = message.get("meta", {}).get("worker_id", "")
    complete_payload = {
        "worker_id": worker_id,
        "lease_id": lease_id,
        "status": "published",
        "result_message": "published",
        "next_attempt_unix_ms": 0,
    }
    completes = post_many(port, f"/v1/broker/outbox/{message_id}/complete", worker_token, [complete_payload, complete_payload])
    success = [item for item in completes if item[0] == 200]
    conflicts = [item for item in completes if item[0] == 409]
    if len(success) != 1 or len(conflicts) != 1:
        raise SystemExit(f"broker duplicate complete expected 1 success/1 conflict, got: {completes!r}")

def assert_concurrent_dag_sibling_complete(port: int, app_name: str) -> None:
    base_url = f"http://127.0.0.1:{port}"
    setup_dag_workflow(base_url, app_name)
    submit = run_ctl(binary, root, "workflow", "event", "submit",
                     "--app", app_name, "--channel", "prod", "--event-id", app_name + "-event",
                     "--event-kind", "release_apply_requested", "--release-revision", "1",
                     "--url", base_url, "--token", writer_token, "--json",
                     out_dir=ctl_out, no_build=True)
    require_success(submit, "dag workflow event submit")
    run_id = json.loads(submit.stdout).get("run", {}).get("run_id")
    claim_a = post_json(port, "/v1/workers/claim", worker_token, {
        "worker_id": "dag-worker-a",
        "task_kind": "apply_release",
    })
    claim_b = post_json(port, "/v1/workers/claim", worker_token, {
        "worker_id": "dag-worker-b",
        "task_kind": "apply_release",
    })
    if claim_a[0] != 200 or claim_b[0] != 200:
        raise SystemExit(f"dag claims failed: {claim_a!r} {claim_b!r}")
    lease_a = claim_a[1].get("lease", {})
    lease_b = claim_b[1].get("lease", {})
    if sorted([lease_a.get("stage_name"), lease_b.get("stage_name")]) != ["apply-a", "apply-b"]:
        raise SystemExit(f"dag sibling claims did not claim both siblings: {claim_a!r} {claim_b!r}")
    complete_payloads = [
        ("/v1/workers/leases/" + lease_a.get("lease_id", "") + "/complete", {
            "worker_id": "dag-worker-a",
            "status": "succeeded",
            "result_message": "a done",
            "result_payload": None,
        }),
        ("/v1/workers/leases/" + lease_b.get("lease_id", "") + "/complete", {
            "worker_id": "dag-worker-b",
            "status": "succeeded",
            "result_message": "b done",
            "result_payload": None,
        }),
    ]
    with concurrent.futures.ThreadPoolExecutor(max_workers=2) as pool:
        futures = [pool.submit(post_json, port, path, worker_token, payload) for path, payload in complete_payloads]
        completes = [future.result(timeout=30) for future in futures]
    if any(status != 200 for status, _ in completes):
        raise SystemExit(f"dag sibling completes failed: {completes!r}")
    view = run_ctl(binary, root, "workflow", "run",
                   "--app", app_name, "--channel", "prod", "--run-id", str(run_id),
                   "--url", base_url, "--token", reader_token, "--json",
                   out_dir=ctl_out, no_build=True)
    require_success(view, "dag workflow run view")
    run_status = json.loads(view.stdout).get("run", {}).get("meta", {}).get("status")
    if run_status != "completed":
        raise SystemExit(f"dag sibling completes left run status={run_status!r}: {view.stdout!r}")

def run_lane(name: str, extra_env: dict[str, str]) -> None:
    env = {
        "APP_STATE_DIR": str(state_dir / name),
        "APP_EXTERNAL_BROKER_PREVIEW": "1",
        "APP_EXTERNAL_BROKER_URL": "http://127.0.0.1:1",
        "APP_AUTH_REQUIRED": "1",
        "APP_ADMIN_TOKEN": admin_token,
        "APP_WRITE_TOKEN": writer_token,
        "APP_READ_TOKEN": reader_token,
        "APP_WORKER_TOKEN": worker_token,
    }
    env.update(extra_env)
    proc, stderr_lines, port = start_service(binary, root, env)
    try:
        wait_until_health_ok(proc, stderr_lines, port)
        require_success(run_ctl(binary, root, "control-plane-validate",
                                "--url", f"http://127.0.0.1:{port}",
                                out_dir=ctl_out), name + " prewarm ctl")
        drain_existing_worker_leases(port)
        drain_existing_broker_messages(port)
        app_name = "lease-" + name + "-" + str(int(time.time() * 1000))
        assert_single_worker_claim_and_complete(port, app_name)
        assert_single_broker_claim_and_complete(port, app_name)
        assert_concurrent_dag_sibling_complete(port, app_name + "-dag")
    finally:
        terminate_process(proc)

run_lane("sqlite", {})

dsn = os.environ.get("NEBULA_TEST_POSTGRES_DSN", "")
if dsn:
    dsn_file = root / "postgres.dsn"
    dsn_file.write_text(dsn, encoding="utf-8")
    run_lane("postgres", {
        "APP_DATA_BACKEND": "postgres",
        "APP_POSTGRES_PREVIEW": "1",
        "APP_POSTGRES_DSN_FILE": str(dsn_file),
    })
else:
    print("lease-concurrency-postgres-live-skip")

print("release-control-plane-lease-concurrency-ok")
PY
"""
expect_rc = 0
expect_stdout_contains = ["release-control-plane-lease-concurrency-ok"]
