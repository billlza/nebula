id = "TST-047-host-cxx-explicit-path-with-spaces-works"
suite = "test"

[[steps]]
kind = "shell"
run = "rm -rf work/cxx_space_app work/cxx-space-bin && mkdir -p 'work/cxx-space-bin'"
expect_rc = 0

[[steps]]
kind = "shell"
run = "$NEBULA_BINARY new work/cxx_space_app >/dev/null"
expect_rc = 0

[[steps]]
kind = "shell"
run = "real_clang=$(command -v clang++) && printf '#!/bin/sh\nexec \"%s\" \"$@\"\n' \"$real_clang\" > 'work/cxx-space-bin/clang++ with spaces' && chmod +x 'work/cxx-space-bin/clang++ with spaces' && CXX=\"$PWD/work/cxx-space-bin/clang++ with spaces\" $NEBULA_BINARY run work/cxx_space_app --run-gate none > work/cxx-space.out 2>&1"
expect_rc = 0

[[steps]]
kind = "shell"
run = "grep -F 'Hello from Nebula' work/cxx-space.out"
expect_rc = 0
