id = "TST-169-example-hello-api-shutdown-source-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport http.client\nimport os\nimport shutil\nimport subprocess\nimport sys\nimport time\nfrom pathlib import Path\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nsys.path.insert(0, str(repo_root / 'tests' / 'lib'))\nfrom service_probe import collect_observe_events, fail_with_output, finish_process_output, wait_for_listener_bound\nroot = Path('work/example_hello_api_shutdown')\nshutil.rmtree(root, ignore_errors=True)\nshutil.copytree(repo_root / 'examples' / 'hello_api', root)\n(root / 'nebula.toml').write_text(f'''schema_version = 1\\n\\n[package]\\nname = \"hello-api-shutdown\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n\\n[dependencies]\\nservice = {{ path = \"{(repo_root / 'official' / 'nebula-service').resolve()}\" }}\\n''', encoding='utf-8')\nsubprocess.run([os.environ['NEBULA_BINARY'], 'update', str(root)], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\nshutdown_file = root / 'hello-api.shutdown'\nproc = subprocess.Popen([os.environ['NEBULA_BINARY'], 'run', str(root), '--run-gate', 'none'], stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True, env={**os.environ, 'NEBULA_BIND_HOST': '127.0.0.1', 'NEBULA_PORT': '0', 'NEBULA_SHUTDOWN_FILE': str(shutdown_file), 'NEBULA_DRAIN_POLL_MS': '100'})\nstderr_lines = []\n_, port = wait_for_listener_bound(proc, stderr_lines)\ntry:\n    deadline = time.time() + 20\n    ready = False\n    while time.time() < deadline:\n        if proc.poll() is not None:\n            fail_with_output(proc, stderr_lines, f'hello_api exited before ready: rc={proc.returncode}')\n        try:\n            conn = http.client.HTTPConnection('127.0.0.1', port, timeout=1)\n            conn.request('GET', '/healthz')\n            resp = conn.getresponse()\n            resp.read()\n            conn.close()\n            if resp.status == 200:\n                ready = True\n                break\n        except Exception:\n            time.sleep(0.1)\n    if not ready:\n        fail_with_output(proc, stderr_lines, 'hello_api did not become ready')\n    shutdown_file.write_text('shutdown\\n', encoding='utf-8')\n    try:\n        proc.wait(timeout=10)\n    except subprocess.TimeoutExpired:\n        raise SystemExit('hello_api did not exit after shutdown source was requested')\n    stdout, stderr = finish_process_output(proc, stderr_lines)\n    print(stdout, end='')\n    print(stderr, end='')\n    observe_events = collect_observe_events(stderr)\n    shutdown_events = [item for item in observe_events if item.get('event') == 'shutdown_requested']\n    stopped_events = [item for item in observe_events if item.get('event') == 'listener_stopped']\n    if len(shutdown_events) != 1:\n        raise SystemExit(f'expected one shutdown_requested event: {observe_events!r}')\n    if len(stopped_events) != 1:\n        raise SystemExit(f'expected one listener_stopped event: {observe_events!r}')\n    if shutdown_events[0].get('path') != str(shutdown_file):\n        raise SystemExit(f'shutdown_requested path mismatch: {shutdown_events[0]!r}')\n    print('example-hello-api-shutdown-ok')\nfinally:\n    if proc.poll() is None:\n        proc.terminate()\n        try:\n            proc.wait(timeout=5)\n        except subprocess.TimeoutExpired:\n            proc.kill()\n            proc.wait(timeout=5)\nPY"
expect_rc = 0
expect_stdout_contains = ["example-hello-api-shutdown-ok"]
