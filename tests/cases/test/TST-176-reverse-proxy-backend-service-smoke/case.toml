id = "TST-176-reverse-proxy-backend-service-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport http.client\nimport http.server\nimport os\nimport platform\nimport subprocess\nimport sys\nimport threading\nimport time\nfrom pathlib import Path\n\nif platform.system().lower().startswith('windows'):\n    print('reverse-proxy-skip-unsupported-host')\n    raise SystemExit(0)\n\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nsys.path.insert(0, str(repo_root / 'tests' / 'lib'))\nfrom service_probe import fail_with_output, wait_for_listener_bound\nroot = Path('work/reverse_proxy_backend')\nimport shutil\nshutil.rmtree(root, ignore_errors=True)\nsubprocess.run([os.environ['NEBULA_BINARY'], 'new', str(root), '--template', 'backend-service'], check=True)\nsubprocess.run([os.environ['NEBULA_BINARY'], 'fetch', str(root)], check=True)\nservice = subprocess.Popen([\n    os.environ['NEBULA_BINARY'],\n    'run',\n    str(root),\n    '--run-gate',\n    'none',\n], env={**os.environ, 'NEBULA_BIND_HOST': '127.0.0.1', 'NEBULA_PORT': '0'}, stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True)\nstderr_lines = []\n_, backend_port = wait_for_listener_bound(service, stderr_lines)\n\nclass Proxy(http.server.BaseHTTPRequestHandler):\n    def do_GET(self):\n        conn = http.client.HTTPConnection('127.0.0.1', backend_port, timeout=5)\n        headers = {k: v for k, v in self.headers.items()}\n        conn.request('GET', self.path, headers=headers)\n        resp = conn.getresponse()\n        body = resp.read()\n        self.send_response(resp.status)\n        for key, value in resp.getheaders():\n            if key.lower() == 'transfer-encoding':\n                continue\n            self.send_header(key, value)\n        self.end_headers()\n        self.wfile.write(body)\n        conn.close()\n    def log_message(self, *args):\n        return\n\nserver = http.server.ThreadingHTTPServer(('127.0.0.1', 0), Proxy)\nproxy_port = server.server_address[1]\nthread = threading.Thread(target=server.serve_forever, daemon=True)\nthread.start()\ntry:\n    deadline = time.time() + 20\n    ready = False\n    while time.time() < deadline:\n        if service.poll() is not None:\n            fail_with_output(service, stderr_lines, f'backend service exited before proxy ready: rc={service.returncode}')\n        try:\n            conn = http.client.HTTPConnection('127.0.0.1', proxy_port, timeout=1)\n            conn.request('GET', '/healthz', headers={'X-Request-Id': 'client-123'})\n            resp = conn.getresponse()\n            body = resp.read().decode('utf-8')\n            conn.close()\n            if resp.status == 200 and '\"status\":\"ok\"' in body:\n                ready = True\n                break\n        except Exception:\n            time.sleep(0.1)\n    if not ready:\n        fail_with_output(service, stderr_lines, 'reverse proxy did not reach backend healthz in time')\n    conn = http.client.HTTPConnection('127.0.0.1', proxy_port, timeout=2)\n    conn.request('GET', '/readyz')\n    ready_resp = conn.getresponse()\n    ready_body = ready_resp.read().decode('utf-8')\n    conn.close()\n    conn = http.client.HTTPConnection('127.0.0.1', proxy_port, timeout=2)\n    conn.request('GET', '/hello/proxy')\n    hello_resp = conn.getresponse()\n    hello_body = hello_resp.read().decode('utf-8')\n    conn.close()\n    if ready_resp.status != 200 or '\"status\":\"ready\"' not in ready_body:\n        raise SystemExit('reverse proxy readyz response was incorrect')\n    if hello_resp.status != 200 or hello_body != 'proxy':\n        raise SystemExit('reverse proxy hello route was incorrect')\n    print('reverse-proxy-backend-ok')\nfinally:\n    server.shutdown()\n    server.server_close()\n    if service.poll() is None:\n        service.terminate()\n        try:\n            service.wait(timeout=5)\n        except subprocess.TimeoutExpired:\n            service.kill()\n            service.wait(timeout=5)\nPY"
expect_rc = 0
