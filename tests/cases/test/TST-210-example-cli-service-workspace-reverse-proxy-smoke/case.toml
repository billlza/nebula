id = "TST-210-example-cli-service-workspace-reverse-proxy-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport json\nimport os\nimport sys\nimport threading\nfrom http.server import BaseHTTPRequestHandler, ThreadingHTTPServer\nfrom pathlib import Path\n\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nsys.path.insert(0, str(repo_root / 'tests' / 'lib'))\nfrom cli_service_workspace import (\n    copy_example,\n    fetch_workspace,\n    print_completed,\n    require_success,\n    run_ctl,\n    start_service,\n    terminate_process,\n    wait_until_health_ok,\n)\n\nbinary = os.environ['NEBULA_BINARY']\nroot = Path('work/example_cli_service_workspace_proxy')\ncopy_example(repo_root, root)\nfetch_workspace(binary, root)\nproc, stderr_lines, port = start_service(binary, root)\nwait_until_health_ok(proc, stderr_lines, port)\n\nclass Proxy(BaseHTTPRequestHandler):\n    def _forward(self, method: str) -> None:\n        if not self.path.startswith('/api'):\n            self.send_response(404)\n            self.end_headers()\n            return\n        upstream_path = self.path[len('/api'):]\n        if upstream_path == '':\n            upstream_path = '/'\n        body = None\n        if method == 'POST':\n            length = int(self.headers.get('Content-Length', '0'))\n            body = self.rfile.read(length)\n        import http.client\n        conn = http.client.HTTPConnection('127.0.0.1', port, timeout=5)\n        headers = {k: v for k, v in self.headers.items()}\n        conn.request(method, upstream_path, body=body, headers=headers)\n        resp = conn.getresponse()\n        payload = resp.read()\n        self.send_response(resp.status)\n        for key, value in resp.getheaders():\n            if key.lower() == 'transfer-encoding':\n                continue\n            self.send_header(key, value)\n        self.end_headers()\n        self.wfile.write(payload)\n        conn.close()\n\n    def do_GET(self) -> None:\n        self._forward('GET')\n\n    def do_POST(self) -> None:\n        self._forward('POST')\n\n    def log_message(self, format: str, *args) -> None:\n        return\n\nserver = ThreadingHTTPServer(('127.0.0.1', 0), Proxy)\nproxy_port = server.server_address[1]\nthread = threading.Thread(target=server.serve_forever, daemon=True)\nthread.start()\ntry:\n    proxied_base = f'http://127.0.0.1:{proxy_port}/api/'\n\n    status_result = run_ctl(binary, root, 'status', '--json', '--url', proxied_base)\n    require_success(status_result, 'proxied ctl status --json')\n    status_payload = json.loads(status_result.stdout)\n    if status_payload.get('base_url') != f'http://127.0.0.1:{proxy_port}/api' or status_payload.get('ok') is not True:\n        print_completed(status_result)\n        raise SystemExit(f'unexpected proxied ctl status payload: {status_payload!r}')\n\n    info_result = run_ctl(binary, root, 'info', '--url', proxied_base)\n    require_success(info_result, 'proxied ctl info')\n    if 'service=cli-service-skeleton' not in info_result.stdout:\n        print_completed(info_result)\n        raise SystemExit('proxied ctl info did not render the service contract')\n\n    ping_result = run_ctl(binary, root, 'ping', 'proxy', '--json', '--url', proxied_base)\n    require_success(ping_result, 'proxied ctl ping --json')\n    ping_payload = json.loads(ping_result.stdout)\n    if ping_payload.get('message') != 'proxy' or ping_payload.get('service') != 'cli-service-skeleton':\n        print_completed(ping_result)\n        raise SystemExit(f'unexpected proxied ctl ping payload: {ping_payload!r}')\n\n    print('example-cli-service-workspace-proxy-ok')\nfinally:\n    server.shutdown()\n    server.server_close()\n    terminate_process(proc)\nPY"
expect_rc = 0
expect_stdout_contains = ["example-cli-service-workspace-proxy-ok"]
