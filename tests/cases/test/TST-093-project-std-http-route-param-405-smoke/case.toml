id = "TST-093-project-std-http-route-param-405-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nfrom pathlib import Path\n\nroot = Path('work/httproute')\n(root / 'src').mkdir(parents=True, exist_ok=True)\nport_path = (root / 'port.txt').resolve()\nif port_path.exists():\n    port_path.unlink()\n(root / 'nebula.toml').write_text('schema_version = 1\\n\\n[package]\\nname = \"httproute\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n', encoding='utf-8')\n(root / 'src' / 'server.nb').write_text('module server\\nimport std::http\\nimport std::net\\nimport std::result\\n\\nasync fn handle_request(request: Request) -> Response {\\n  return await dispatch1(\\n    request,\\n    Get,\\n    \"/hello/:name\",\\n    handle_hello,\\n    not_found_text(\"not-found\")\\n  )\\n}\\n\\nasync fn handle_hello(request: Request) -> Response {\\n  match route_param1(\"/hello/:name\", request) {\\n    Ok(name) => {\\n      return ok_text(name)\\n    }\\n    Err(msg) => {\\n      return internal_error_text(msg)\\n    }\\n  }\\n}\\n\\nasync fn serve_twice(listener: TcpListener) -> Void {\\n  match await serve_n(listener, 2, handle_request) {\\n    Ok(_) => {}\\n    Err(msg) => { print(msg) }\\n  }\\n}\\n', encoding='utf-8')\n(root / 'src' / 'main.nb').write_text(f'''module main\\nimport server\\nimport std::fs\\nimport std::json\\nimport std::net\\nimport std::result\\nimport std::task\\nimport std::time\\n\\nasync fn main() -> Void {{\\n  match ipv4(\"127.0.0.1\", 0) {{\\n    Ok(addr) => {{\\n      match await bind(addr) {{\\n        Ok(listener) => {{\\n          match listener.local_addr() {{\\n            Ok(bound_addr) => {{\\n              match bound_addr.port() {{\\n                Ok(port) => {{\\n                  match write_string(\"{port_path}\", stringify(int_value(port))) {{\\n                    Ok(_) => {{\\n                      let task = spawn(serve_twice(listener))\\n                      await join(task)\\n                      listener.close()\\n                    }}\\n                    Err(msg) => {{ print(msg) }}\\n                  }}\\n                }}\\n                Err(msg) => {{ print(msg) }}\\n              }}\\n            }}\\n            Err(msg) => {{ print(msg) }}\\n          }}\\n        }}\\n        Err(msg) => {{ print(msg) }}\\n      }}\\n    }}\\n    Err(msg) => {{ print(msg) }}\\n  }}\\n}}\\n''', encoding='utf-8')\nPY"
expect_rc = 0

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport os\nimport socket\nimport subprocess\nimport time\nfrom pathlib import Path\n\nroot = Path('work/httproute')\nport_path = root / 'port.txt'\nproc = subprocess.Popen([os.environ['NEBULA_BINARY'], 'run', str(root), '--run-gate', 'none'], stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True)\n\ndef round_trip(port: int, request_bytes: bytes, out_path: str, timeout_seconds: float, error_message: str):\n    deadline = time.time() + timeout_seconds\n    while time.time() < deadline:\n        try:\n            with socket.create_connection(('127.0.0.1', port), timeout=0.3) as sock:\n                sock.sendall(request_bytes)\n                data = b''\n                while True:\n                    chunk = sock.recv(4096)\n                    if not chunk:\n                        break\n                    data += chunk\n                Path(out_path).write_text(data.decode('utf-8'), encoding='utf-8')\n                return\n        except OSError:\n            if proc.poll() is not None:\n                raise SystemExit(proc.returncode)\n            time.sleep(0.05)\n    raise SystemExit(error_message)\n\ntry:\n    deadline = time.time() + 8.0\n    port = None\n    while time.time() < deadline:\n        if proc.poll() is not None:\n            raise SystemExit(proc.returncode)\n        try:\n            port = int(port_path.read_text(encoding='utf-8').strip())\n            break\n        except (FileNotFoundError, ValueError):\n            time.sleep(0.05)\n    if port is None:\n        raise SystemExit('server did not publish port in time')\n    round_trip(\n        port,\n        b'GET /hello/nebula HTTP/1.1\\r\\nHost: localhost\\r\\nContent-Length: 0\\r\\n\\r\\n',\n        'work/httproute_get.txt',\n        8.0,\n        'server did not accept first connection in time',\n    )\n    round_trip(\n        port,\n        b'POST /hello/nebula HTTP/1.1\\r\\nHost: localhost\\r\\nContent-Length: 0\\r\\n\\r\\n',\n        'work/httproute_post.txt',\n        3.0,\n        'server did not accept second connection in time',\n    )\nfinally:\n    stdout, stderr = proc.communicate(timeout=10)\n    Path('work/httproute_stdout.txt').write_text(stdout, encoding='utf-8')\n    Path('work/httproute_stderr.txt').write_text(stderr, encoding='utf-8')\n    if proc.returncode != 0:\n        raise SystemExit(proc.returncode)\nPY"
expect_rc = 0

[[steps]]
kind = "shell"
run = "grep -F 'HTTP/1.1 200 OK' work/httproute_get.txt >/dev/null && grep -F 'nebula' work/httproute_get.txt >/dev/null && grep -F 'HTTP/1.1 405 Method Not Allowed' work/httproute_post.txt >/dev/null && grep -F 'method not allowed' work/httproute_post.txt >/dev/null"
expect_rc = 0
