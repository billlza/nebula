id = "TST-194-official-service-listener-bound-actual-port"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport json\nimport os\nimport shutil\nimport socket\nimport subprocess\nimport time\nfrom pathlib import Path\n\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nroot = Path('work/official_service_listener_bound_actual_port')\nshutil.rmtree(root, ignore_errors=True)\n(root / 'src').mkdir(parents=True, exist_ok=True)\n(root / 'nebula.toml').write_text('''schema_version = 1\\n\\n[package]\\nname = \"official-service-listener-bound-actual-port\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n\\n[dependencies]\\nservice = { path = \"''' + str(repo_root / 'official' / 'nebula-service') + '''\" }\\n''', encoding='utf-8')\n(root / 'src' / 'server.nb').write_text('''module server\\nimport service::context\\nimport std::http\\nimport std::result\\n\\nasync fn handle_request(ctx: RequestContext, request: Request) -> Result<Response, String> {\\n  return Ok(ok_text(\"bound\"))\\n}\\n''', encoding='utf-8')\n(root / 'src' / 'main.nb').write_text('''module main\\nimport service::config\\nimport service::server\\nimport server\\n\\nasync fn main() -> Void {\\n  match config_from_env(\"svc-listener-bound\", 0) {\\n    Ok(cfg) => {\\n      match await bind_listener(cfg) {\\n        Ok(listener) => {\\n          match await serve_requests_n_result_with_context(listener, cfg, 1, handle_request) {\\n            Ok(_) => {}\\n            Err(msg) => { print(msg) }\\n          }\\n        }\\n        Err(msg) => { print(msg) }\\n      }\\n    }\\n    Err(msg) => { print(msg) }\\n  }\\n}\\n''', encoding='utf-8')\nsubprocess.run([os.environ['NEBULA_BINARY'], 'update', str(root)], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\nproc = subprocess.Popen([\n    os.environ['NEBULA_BINARY'], 'run', str(root), '--run-gate', 'none'\n], stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True, env={**os.environ, 'NEBULA_BIND_HOST': '127.0.0.1', 'NEBULA_PORT': '0'})\nclient = None\nstderr_lines = []\ntry:\n    deadline = time.time() + 10\n    actual_port = None\n    while time.time() < deadline:\n        line = proc.stderr.readline()\n        if not line:\n            if proc.poll() is not None:\n                raise SystemExit(proc.returncode)\n            time.sleep(0.05)\n            continue\n        stderr_lines.append(line)\n        stripped = line.strip()\n        json_start = stripped.find('{')\n        if json_start == -1:\n            continue\n        try:\n            payload = json.loads(stripped[json_start:])\n        except json.JSONDecodeError:\n            continue\n        if payload.get('event') == 'listener_bound':\n            actual_port = payload.get('port')\n            break\n    if not isinstance(actual_port, int) or actual_port <= 0:\n        raise SystemExit(f'failed to read actual bound port from listener_bound: {actual_port!r}')\n    client = socket.create_connection(('127.0.0.1', actual_port), timeout=2)\n    client.settimeout(2)\n    client.sendall(b'GET /hello HTTP/1.1\\r\\nHost: localhost\\r\\nContent-Length: 0\\r\\n\\r\\n')\n    response = b''\n    while True:\n        chunk = client.recv(4096)\n        if not chunk:\n            break\n        response += chunk\n    if b'200 OK' not in response or not response.endswith(b'bound'):\n        raise SystemExit(f'unexpected bound response: {response!r}')\n    stdout, stderr = proc.communicate(timeout=10)\n    stderr_lines.append(stderr)\n    print(stdout, end='')\n    print(stderr, end='')\n    if proc.returncode != 0:\n        raise SystemExit(proc.returncode)\n    observe_events = []\n    for raw_line in ''.join(stderr_lines).splitlines():\n        line = raw_line.strip()\n        json_start = line.find('{')\n        if json_start == -1:\n            continue\n        observe_events.append(json.loads(line[json_start:]))\n    bound_events = [item for item in observe_events if item.get('event') == 'listener_bound']\n    if len(bound_events) != 1:\n        raise SystemExit(f'expected one listener_bound event: {observe_events!r}')\n    event = bound_events[0]\n    if event.get('bind_host') != '127.0.0.1':\n        raise SystemExit(f'unexpected bind_host in listener_bound: {event!r}')\n    if event.get('port') != actual_port:\n        raise SystemExit(f'listener_bound port mismatch: actual_port={actual_port!r}, event={event!r}')\n    print('service-listener-bound-actual-port-ok')\nfinally:\n    if client is not None:\n        client.close()\n    if proc.poll() is None:\n        proc.terminate()\n        try:\n            proc.wait(timeout=5)\n        except subprocess.TimeoutExpired:\n            proc.kill()\n            proc.wait(timeout=5)\nPY"
expect_rc = 0
expect_stdout_contains = ["service-listener-bound-actual-port-ok"]
