id = "TST-190-backend-service-template-metrics-bridge-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport http.client\nimport importlib.util\nimport os\nimport shutil\nimport socket\nimport subprocess\nimport sys\nimport threading\nimport time\nfrom pathlib import Path\n\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nsys.path.insert(0, str(repo_root / 'tests' / 'lib'))\nfrom service_probe import wait_for_observe_event_in_file\nroot = Path('work/backend_service_template_metrics')\nshutil.rmtree(root, ignore_errors=True)\nsubprocess.run([os.environ['NEBULA_BINARY'], 'new', str(root), '--template', 'backend-service'], check=True)\nsubprocess.run([os.environ['NEBULA_BINARY'], 'fetch', str(root)], check=True)\nlog_path = root / 'service.observe.ndjson'\nbridge_path = repo_root / 'official' / 'nebula-observe' / 'prometheus_bridge.py'\nspec = importlib.util.spec_from_file_location('prometheus_bridge', bridge_path)\nbridge_mod = importlib.util.module_from_spec(spec)\nspec.loader.exec_module(bridge_mod)\nlog_handle = log_path.open('w')\nservice = subprocess.Popen([\n    os.environ['NEBULA_BINARY'],\n    'run',\n    str(root),\n    '--run-gate',\n    'none',\n], stdout=subprocess.DEVNULL, stderr=log_handle, text=True, env={**os.environ, 'NEBULA_BIND_HOST': '127.0.0.1', 'NEBULA_PORT': '0'})\nbound = wait_for_observe_event_in_file(log_path, 'listener_bound', 45, service)\nservice_port = bound.get('port')\nif not isinstance(service_port, int) or service_port <= 0:\n    raise SystemExit(f'invalid listener_bound payload: {bound!r}')\nbridge_server = bridge_mod.MetricsServer(('127.0.0.1', 0), log_path.resolve())\nbridge_port = bridge_server.server_address[1]\nbridge_thread = threading.Thread(target=bridge_server.serve_forever, kwargs={'poll_interval': 0.2}, daemon=True)\nbridge_thread.start()\ntry:\n    deadline = time.time() + 20\n    ready = False\n    while time.time() < deadline:\n        if service.poll() is not None:\n            raise SystemExit(f'backend-service template metrics smoke exited early: rc={service.returncode}')\n        try:\n            conn = http.client.HTTPConnection('127.0.0.1', service_port, timeout=1)\n            conn.request('GET', '/healthz')\n            resp = conn.getresponse()\n            body = resp.read().decode('utf-8')\n            conn.close()\n            if resp.status == 200 and '\"status\":\"ok\"' in body:\n                ready = True\n                break\n        except Exception:\n            time.sleep(0.1)\n    if not ready:\n        raise SystemExit('backend-service template metrics smoke did not become ready')\n\n    bridge_ready = False\n    deadline = time.time() + 10\n    while time.time() < deadline:\n        try:\n            conn = http.client.HTTPConnection('127.0.0.1', bridge_port, timeout=1)\n            conn.request('GET', '/healthz')\n            resp = conn.getresponse()\n            body = resp.read().decode('utf-8')\n            conn.close()\n            if resp.status == 200 and '\"status\":\"ok\"' in body:\n                bridge_ready = True\n                break\n        except Exception:\n            time.sleep(0.1)\n    if not bridge_ready:\n        raise SystemExit('backend-service template metrics bridge did not become ready')\n\n    conn = http.client.HTTPConnection('127.0.0.1', service_port, timeout=2)\n    conn.request('GET', '/readyz')\n    resp = conn.getresponse()\n    body = resp.read().decode('utf-8')\n    conn.close()\n    if resp.status != 200 or '\"status\":\"ready\"' not in body:\n        raise SystemExit(f'unexpected readyz response: {(resp.status, body)!r}')\n\n    conn = http.client.HTTPConnection('127.0.0.1', service_port, timeout=2)\n    conn.request('GET', '/hello/nebula')\n    resp = conn.getresponse()\n    body = resp.read().decode('utf-8')\n    conn.close()\n    if resp.status != 200 or body != 'nebula':\n        raise SystemExit(f'unexpected hello response: {(resp.status, body)!r}')\n\n    huge_header = 'a' * 20000\n    bad_request = ('GET /hello/nebula HTTP/1.1\\r\\n'\n                   'Host: 127.0.0.1\\r\\n'\n                   'X-Big: ' + huge_header + '\\r\\n\\r\\n').encode('ascii')\n    with socket.create_connection(('127.0.0.1', service_port), timeout=2) as bad_sock:\n        bad_sock.sendall(bad_request)\n        bad_sock.settimeout(1)\n        bad_response = bad_sock.recv(4096).decode('latin1', 'replace')\n    if '400 Bad Request' not in bad_response:\n        raise SystemExit(f'backend-service template did not reject oversized headers: {bad_response!r}')\n\n    metrics_text = ''\n    deadline = time.time() + 10\n    while time.time() < deadline:\n        conn = http.client.HTTPConnection('127.0.0.1', bridge_port, timeout=2)\n        conn.request('GET', '/metrics')\n        resp = conn.getresponse()\n        metrics_text = resp.read().decode('utf-8')\n        conn.close()\n        if 'nebula_service_bad_requests_total{service=\"backend_service_template_metrics\"} 1' in metrics_text:\n            break\n        time.sleep(0.1)\n    else:\n        raise SystemExit(f'backend-service template metrics missing bad_requests counter: {metrics_text!r}')\n\n    if '# TYPE nebula_service_bad_requests_total counter' not in metrics_text:\n        raise SystemExit(f'backend-service template metrics missing TYPE line: {metrics_text!r}')\n\n    print('backend-service-template-metrics-ok')\nfinally:\n    bridge_server.shutdown()\n    bridge_server.server_close()\n    if service.poll() is None:\n        service.terminate()\n        try:\n            service.wait(timeout=5)\n        except subprocess.TimeoutExpired:\n            service.kill()\n            service.wait(timeout=5)\n    log_handle.close()\nPY"
expect_rc = 0
expect_stdout_contains = ["backend-service-template-metrics-ok"]
