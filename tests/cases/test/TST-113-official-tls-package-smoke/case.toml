id = "TST-113-official-tls-package-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport os\nimport platform\nimport queue\nimport shutil\nimport socket\nimport ssl\nimport subprocess\nimport threading\nfrom pathlib import Path\n\nsystem = platform.system().lower()\nif system.startswith('windows') or system.startswith('msys') or system.startswith('mingw') or system.startswith('cygwin'):\n    print('tls-skip-unsupported-host')\n    raise SystemExit(0)\nif shutil.which('openssl') is None:\n    raise SystemExit('openssl is required for official TLS smoke test')\n\nroot = Path('work/official_tls')\napp = root / 'app'\n(app / 'src').mkdir(parents=True, exist_ok=True)\n\n(root / 'openssl_ca.cnf').write_text('''[req]\\ndistinguished_name = dn\\nx509_extensions = v3_ca\\nprompt = no\\n\\n[dn]\\nCN = Nebula Test CA\\n\\n[v3_ca]\\nsubjectKeyIdentifier = hash\\nauthorityKeyIdentifier = keyid:always,issuer\\nbasicConstraints = critical, CA:true\\nkeyUsage = critical, digitalSignature, keyCertSign, cRLSign\\n''', encoding='utf-8')\n(root / 'openssl_server.cnf').write_text('''[req]\\ndistinguished_name = dn\\nreq_extensions = v3_req\\nprompt = no\\n\\n[dn]\\nCN = localhost\\n\\n[v3_req]\\nsubjectAltName = @alt_names\\nbasicConstraints = CA:false\\nkeyUsage = critical, digitalSignature, keyEncipherment\\nextendedKeyUsage = serverAuth\\n\\n[alt_names]\\nDNS.1 = localhost\\nIP.1 = 127.0.0.1\\n''', encoding='utf-8')\nsubprocess.run([\n    'openssl', 'req', '-x509', '-newkey', 'rsa:2048', '-nodes',\n    '-keyout', str(root / 'ca.key'),\n    '-out', str(root / 'ca.pem'),\n    '-days', '2',\n    '-config', str(root / 'openssl_ca.cnf'),\n], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\nsubprocess.run([\n    'openssl', 'req', '-newkey', 'rsa:2048', '-nodes',\n    '-keyout', str(root / 'server.key'),\n    '-out', str(root / 'server.csr'),\n    '-config', str(root / 'openssl_server.cnf'),\n], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\nsubprocess.run([\n    'openssl', 'x509', '-req',\n    '-in', str(root / 'server.csr'),\n    '-CA', str(root / 'ca.pem'),\n    '-CAkey', str(root / 'ca.key'),\n    '-CAcreateserial',\n    '-out', str(root / 'server.pem'),\n    '-days', '2', '-sha256',\n    '-extfile', str(root / 'openssl_server.cnf'),\n    '-extensions', 'v3_req',\n], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\n\nport_q: queue.Queue[int] = queue.Queue()\ndone_q: queue.Queue[object] = queue.Queue()\n\ndef serve() -> None:\n    try:\n        ctx = ssl.SSLContext(ssl.PROTOCOL_TLS_SERVER)\n        ctx.load_cert_chain(str(root / 'server.pem'), str(root / 'server.key'))\n        with socket.socket(socket.AF_INET, socket.SOCK_STREAM) as sock:\n            sock.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)\n            sock.bind(('127.0.0.1', 0))\n            sock.listen(1)\n            sock.settimeout(60)\n            port_q.put(sock.getsockname()[1])\n            conn, _ = sock.accept()\n            with ctx.wrap_socket(conn, server_side=True) as tls:\n                tls.settimeout(60)\n                data = tls.recv(4096)\n                if data == b'ping':\n                    tls.sendall(b'tls-ok')\n                else:\n                    tls.sendall(b'bad:' + data)\n        done_q.put(None)\n    except Exception as exc:\n        done_q.put(exc)\n\nthread = threading.Thread(target=serve, daemon=True)\nthread.start()\nport = port_q.get(timeout=10)\n\nca_pem = (root / 'ca.pem').read_text(encoding='utf-8')\nca_literal = ca_pem.replace('\\\\', '\\\\\\\\').replace('\\n', '\\\\n').replace('\"', '\\\\\"')\n(app / 'nebula.toml').write_text(f'''schema_version = 1\\n\\n[package]\\nname = \"official-tls-smoke\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n\\n[dependencies]\\ntls = {{ path = \"{os.environ['NEBULA_REPO_ROOT']}/official/nebula-tls\" }}\\n''', encoding='utf-8')\n(app / 'src' / 'main.nb').write_text(f'''module main\\nimport std::bytes\\nimport std::net\\nimport tls::client\\n\\nasync fn main() -> Void {{\\n  match client_config_from_ca_pem_text(\"{ca_literal}\") {{\\n    Ok(config) => {{\\n      match ipv4(\"127.0.0.1\", {port}) {{\\n        Ok(addr) => {{\\n          match await dial(addr, \"localhost\", config) {{\\n            Ok(stream) => {{\\n              match await TlsClientStream_write_all(stream, from_string(\"ping\")) {{\\n                Ok(_) => {{\\n                  match await TlsClientStream_read(stream, 128) {{\\n                    Ok(bytes) => {{\\n                      print(to_string(bytes))\\n                    }}\\n                    Err(msg) => {{\\n                      print(msg)\\n                    }}\\n                  }}\\n                  let _ = await TlsClientStream_close(stream)\\n                }}\\n                Err(msg) => {{\\n                  print(msg)\\n                }}\\n              }}\\n            }}\\n            Err(msg) => {{\\n              print(msg)\\n            }}\\n          }}\\n        }}\\n        Err(msg) => {{\\n          print(msg)\\n        }}\\n      }}\\n    }}\\n    Err(msg) => {{\\n      print(msg)\\n    }}\\n  }}\\n}}\\n''', encoding='utf-8')\n\nupdate = subprocess.run([\n    os.environ['NEBULA_BINARY'], 'update', str(app)\n], capture_output=True, text=True, env=os.environ.copy())\nprint(update.stdout, end='')\nprint(update.stderr, end='')\nif update.returncode != 0:\n    raise SystemExit(update.returncode)\n\nrun = subprocess.run([\n    os.environ['NEBULA_BINARY'], 'run', str(app), '--run-gate', 'none'\n], capture_output=True, text=True, env=os.environ.copy())\nprint(run.stdout, end='')\nprint(run.stderr, end='')\nif run.returncode != 0:\n    raise SystemExit(run.returncode)\n\nserver_result = done_q.get(timeout=60)\nif server_result is not None:\n    raise server_result\nif 'tls-ok' not in run.stdout:\n    raise SystemExit('tls-ok missing from official TLS smoke output')\nPY"
expect_rc = 0
