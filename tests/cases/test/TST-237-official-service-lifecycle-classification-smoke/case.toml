id = "TST-237-official-service-lifecycle-classification-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = '''
python3 - <<'PY'
import os
import shutil
import subprocess
import sys
import time
from pathlib import Path

repo_root = Path(os.environ['NEBULA_REPO_ROOT'])
sys.path.insert(0, str(repo_root / 'tests' / 'lib'))
from service_probe import collect_observe_events, fail_with_output, finish_process_output, wait_for_listener_bound

root = Path('work/official_service_lifecycle_classification')
shutil.rmtree(root, ignore_errors=True)
(root / 'src').mkdir(parents=True, exist_ok=True)
drain_file = root / 'service.draining'

(root / 'nebula.toml').write_text(f"""schema_version = 1

[package]
name = "official-service-lifecycle-classification"
version = "0.1.0"
entry = "src/main.nb"
src_dir = "src"

[dependencies]
service = {{ path = "{repo_root / 'official' / 'nebula-service'}" }}
""", encoding='utf-8')

(root / 'src' / 'server.nb').write_text("""module server
import service::context
import std::http
import std::result

async fn handle_request(ctx: RequestContext, request: Request) -> Result<Response, String> {
  return Ok(ok_text("ok"))
}
""", encoding='utf-8')

(root / 'src' / 'main.nb').write_text("""module main
import service::config
import service::drain
import service::server
import server

async fn main() -> Void {
  match config_from_env("svc-lifecycle-classification", 0) {
    Ok(cfg) => {
      match from_env() {
        Ok(drain_cfg) => {
          match await bind_listener(cfg) {
            Ok(listener) => {
              match await serve_requests_result_until_drained(listener, cfg, drain_cfg, handle_request) {
                Ok(_) => {}
                Err(msg) => { print(msg) }
              }
            }
            Err(msg) => { print(msg) }
          }
        }
        Err(msg) => { print(msg) }
      }
    }
    Err(msg) => { print(msg) }
  }
}
""", encoding='utf-8')

subprocess.run([os.environ['NEBULA_BINARY'], 'update', str(root)], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
proc = subprocess.Popen([
    os.environ['NEBULA_BINARY'],
    'run',
    str(root),
    '--run-gate',
    'none',
], stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True, env={**os.environ, 'NEBULA_BIND_HOST': '127.0.0.1', 'NEBULA_PORT': '0', 'NEBULA_DRAIN_FILE': str(drain_file), 'NEBULA_DRAIN_POLL_MS': '100'})
stderr_lines = []
_, port = wait_for_listener_bound(proc, stderr_lines, timeout=45.0)
if not isinstance(port, int) or port <= 0:
    fail_with_output(proc, stderr_lines, f'invalid listener port: {port!r}')

try:
    drain_file.write_text('drain\n', encoding='utf-8')
    try:
        proc.wait(timeout=10)
    except subprocess.TimeoutExpired:
        raise SystemExit('service did not exit after drain lifecycle request')
    stdout, stderr = finish_process_output(proc, stderr_lines)
    print(stdout, end='')
    print(stderr, end='')
    if proc.returncode != 0:
        raise SystemExit(proc.returncode)

    observe_events = collect_observe_events(stderr)
    drain_events = [item for item in observe_events if item.get('event') == 'drain_requested']
    stopped_events = [item for item in observe_events if item.get('event') == 'listener_stopped']
    if len(drain_events) != 1:
        raise SystemExit(f'expected one drain_requested event: {observe_events!r}')
    if len(stopped_events) != 1:
        raise SystemExit(f'expected one listener_stopped event: {observe_events!r}')

    drain_event = drain_events[0]
    stopped_event = stopped_events[0]
    if drain_event.get('path') != str(drain_file):
        raise SystemExit(f'drain_requested path mismatch: {drain_event!r}')
    drain_classification = drain_event.get('classification')
    if not isinstance(drain_classification, dict):
        raise SystemExit(f'drain_requested classification missing: {drain_event!r}')
    if drain_classification.get('reason') != 'shutdown' or drain_classification.get('detail') != 'drain_requested':
        raise SystemExit(f'drain_requested classification mismatch: {drain_event!r}')

    if stopped_event.get('reason') != 'drained':
        raise SystemExit(f'listener_stopped reason mismatch: {stopped_event!r}')
    stopped_classification = stopped_event.get('classification')
    if not isinstance(stopped_classification, dict):
        raise SystemExit(f'listener_stopped classification missing: {stopped_event!r}')
    if stopped_classification.get('reason') != 'shutdown' or stopped_classification.get('detail') != 'drained':
        raise SystemExit(f'listener_stopped classification mismatch: {stopped_event!r}')

    print('official-service-lifecycle-classification-ok')
finally:
    if proc.poll() is None:
        proc.terminate()
        try:
            proc.wait(timeout=5)
        except subprocess.TimeoutExpired:
            proc.kill()
            proc.wait(timeout=5)
PY
'''
expect_rc = 0
expect_stdout_contains = ["official-service-lifecycle-classification-ok"]
