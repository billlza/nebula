id = "TST-226-official-service-tls-listener-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport json\nimport os\nimport platform\nimport shutil\nimport socket\nimport ssl\nimport subprocess\nimport time\nfrom pathlib import Path\n\nsystem = platform.system().lower()\nif system.startswith('windows') or system.startswith('msys') or system.startswith('mingw') or system.startswith('cygwin'):\n    print('service-tls-listener-skip-unsupported-host')\n    raise SystemExit(0)\nif shutil.which('openssl') is None:\n    raise SystemExit('openssl is required for official service TLS listener smoke test')\n\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nroot = Path('work/official_service_tls_listener')\napp = root / 'app'\nshutil.rmtree(root, ignore_errors=True)\n(app / 'src').mkdir(parents=True, exist_ok=True)\n\n(root / 'openssl_ca.cnf').write_text('''[req]\\ndistinguished_name = dn\\nx509_extensions = v3_ca\\nprompt = no\\n\\n[dn]\\nCN = Nebula Service TLS CA\\n\\n[v3_ca]\\nsubjectKeyIdentifier = hash\\nauthorityKeyIdentifier = keyid:always,issuer\\nbasicConstraints = critical, CA:true\\nkeyUsage = critical, digitalSignature, keyCertSign, cRLSign\\n''', encoding='utf-8')\n(root / 'openssl_server.cnf').write_text('''[req]\\ndistinguished_name = dn\\nreq_extensions = v3_req\\nprompt = no\\n\\n[dn]\\nCN = localhost\\n\\n[v3_req]\\nsubjectAltName = @alt_names\\nbasicConstraints = CA:false\\nkeyUsage = critical, digitalSignature, keyEncipherment\\nextendedKeyUsage = serverAuth\\n\\n[alt_names]\\nDNS.1 = localhost\\nIP.1 = 127.0.0.1\\n''', encoding='utf-8')\nsubprocess.run(['openssl', 'req', '-x509', '-newkey', 'rsa:2048', '-nodes', '-keyout', str(root / 'ca.key'), '-out', str(root / 'ca.pem'), '-days', '2', '-config', str(root / 'openssl_ca.cnf')], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\nsubprocess.run(['openssl', 'req', '-newkey', 'rsa:2048', '-nodes', '-keyout', str(root / 'server.key'), '-out', str(root / 'server.csr'), '-config', str(root / 'openssl_server.cnf')], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\nsubprocess.run(['openssl', 'x509', '-req', '-in', str(root / 'server.csr'), '-CA', str(root / 'ca.pem'), '-CAkey', str(root / 'ca.key'), '-CAcreateserial', '-out', str(root / 'server.pem'), '-days', '2', '-sha256', '-extfile', str(root / 'openssl_server.cnf'), '-extensions', 'v3_req'], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\n\nserver_cert = (root / 'server.pem').read_text(encoding='utf-8')\nserver_key = (root / 'server.key').read_text(encoding='utf-8')\nca_pem = (root / 'ca.pem').read_text(encoding='utf-8')\nserver_cert_literal = server_cert.replace('\\\\', '\\\\\\\\').replace('\\n', '\\\\n').replace('\"', '\\\\\"')\nserver_key_literal = server_key.replace('\\\\', '\\\\\\\\').replace('\\n', '\\\\n').replace('\"', '\\\\\"')\n\n(app / 'nebula.toml').write_text(f'''schema_version = 1\\n\\n[package]\\nname = \"official-service-tls-listener-smoke\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n\\n[dependencies]\\nservice = {{ path = \"{repo_root / 'official' / 'nebula-service'}\" }}\\ntlss = {{ path = \"{repo_root / 'official' / 'nebula-tls-server'}\" }}\\n''', encoding='utf-8')\n(app / 'src' / 'server.nb').write_text('''module server\\nimport service::context\\nimport std::http\\nimport std::http_json\\nimport std::json\\nimport std::result\\n\\nasync fn handle_request(ctx: RequestContext, request: Request) -> Result<Response, String> {\\n  return Ok(ok_json(object4(\\n    \"path\",\\n    string_value(request.path),\\n    \"request_id_text\",\\n    string_value(ctx.request_id_text),\\n    \"tls_peer_present\",\\n    bool_value(ctx.tls_peer_present()),\\n    \"tls_peer_verified\",\\n    bool_value(ctx.tls_peer_verified())\\n  )))\\n}\\n''', encoding='utf-8')\n(app / 'src' / 'main.nb').write_text(f'''module main\\nimport server\\nimport service::config\\nimport service::drain\\nimport service::tls\\nimport std::result\\nimport tlss::server\\n\\nasync fn main() -> Void {{\\n  match config_from_env(\"svc-tls-listener\", 0) {{\\n    Ok(cfg) => {{\\n      match from_env() {{\\n        Ok(drain_cfg) => {{\\n          match server_identity_from_pem_text(\"{server_cert_literal}\", \"{server_key_literal}\") {{\\n            Ok(identity) => {{\\n              let tls_cfg0 = with_version_policy(server_config(identity), tls12_or_13_policy())\\n              let tls_cfg1 = with_alpn_policy(tls_cfg0, alpn_none_policy())\\n              let tls_cfg2 = with_client_auth_policy(tls_cfg1, disabled_client_auth())\\n              match await bind_tls_listener(cfg, tls_cfg2) {{\\n                Ok(listener) => {{\\n                  match await serve_requests_n_result_with_context_tls(listener, cfg, 1, handle_request) {{\\n                    Ok(_) => {{}}\\n                    Err(msg) => {{ print(msg) }}\\n                  }}\\n                }}\\n                Err(msg) => {{ print(msg) }}\\n              }}\\n            }}\\n            Err(msg) => {{ print(msg) }}\\n          }}\\n        }}\\n        Err(msg) => {{ print(msg) }}\\n      }}\\n    }}\\n    Err(msg) => {{ print(msg) }}\\n  }}\\n}}\\n''', encoding='utf-8')\n\nupdate = subprocess.run([os.environ['NEBULA_BINARY'], 'update', str(app)], capture_output=True, text=True, env=os.environ.copy())\nprint(update.stdout, end='')\nprint(update.stderr, end='')\nif update.returncode != 0:\n    raise SystemExit(update.returncode)\n\nproc = subprocess.Popen([os.environ['NEBULA_BINARY'], 'run', str(app), '--run-gate', 'none'], stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True, env={**os.environ, 'NEBULA_BIND_HOST': '127.0.0.1', 'NEBULA_PORT': '0'})\nstderr_lines = []\ntry:\n    deadline = time.time() + 30\n    port = None\n    while time.time() < deadline:\n        line = proc.stderr.readline()\n        if line:\n            stderr_lines.append(line)\n            stripped = line.strip()\n            json_start = stripped.find('{')\n            if json_start != -1:\n                try:\n                    payload = json.loads(stripped[json_start:])\n                except json.JSONDecodeError:\n                    payload = None\n                if payload is not None and payload.get('event') == 'listener_bound':\n                    port = payload.get('port')\n                    break\n        else:\n            if proc.poll() is not None:\n                out, err = proc.communicate(timeout=5)\n                print(out, end='')\n                print(''.join(stderr_lines), end='')\n                print(err, end='')\n                raise SystemExit(f'service TLS app exited early rc={proc.returncode}')\n            time.sleep(0.05)\n    if not isinstance(port, int) or port <= 0:\n        out, err = proc.communicate(timeout=5)\n        print(out, end='')\n        print(''.join(stderr_lines), end='')\n        print(err, end='')\n        raise SystemExit(f'failed to capture listener_bound port: {port!r}')\n\n    ctx = ssl.SSLContext(ssl.PROTOCOL_TLS_CLIENT)\n    ctx.check_hostname = True\n    ctx.verify_mode = ssl.CERT_REQUIRED\n    ctx.load_verify_locations(cadata=ca_pem)\n    with socket.create_connection(('127.0.0.1', port), timeout=10) as raw:\n        with ctx.wrap_socket(raw, server_hostname='localhost') as tls_sock:\n            request = (\n                'GET /hello HTTP/1.1\\r\\n'\n                f'Host: localhost:{port}\\r\\n'\n                'Connection: close\\r\\n\\r\\n'\n            )\n            tls_sock.sendall(request.encode('utf-8'))\n            data = b''\n            while True:\n                chunk = tls_sock.recv(4096)\n                if not chunk:\n                    break\n                data += chunk\n\n    header, body = data.split(b'\\r\\n\\r\\n', 1)\n    if b'200 OK' not in header:\n        raise SystemExit(f'unexpected TLS service response head: {header!r}')\n    payload = json.loads(body.decode('utf-8'))\n    if payload.get('path') != '/hello':\n        raise SystemExit(f'unexpected TLS service payload path: {payload!r}')\n    if payload.get('tls_peer_present') is not False or payload.get('tls_peer_verified') is not False:\n        raise SystemExit(f'unexpected TLS peer metadata payload: {payload!r}')\n    if not payload.get('request_id_text'):\n        raise SystemExit(f'missing request id payload: {payload!r}')\n\n    out, err = proc.communicate(timeout=10)\n    print(out, end='')\n    print(''.join(stderr_lines), end='')\n    print(err, end='')\n    if proc.returncode != 0:\n        raise SystemExit(proc.returncode)\n    print('service-tls-listener-ok')\nfinally:\n    if proc.poll() is None:\n        proc.terminate()\n        try:\n            proc.wait(timeout=5)\n        except subprocess.TimeoutExpired:\n            proc.kill()\n            proc.wait(timeout=5)\nPY"
expect_rc = 0
