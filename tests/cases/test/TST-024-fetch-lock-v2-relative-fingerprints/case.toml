id = "TST-024-fetch-lock-v2-relative-fingerprints"
suite = "test"

[[steps]]
kind = "shell"
run = "rm -rf work/package_app work/package_dep && cp -R fixtures/package_app work/package_app && cp -R fixtures/package_dep work/package_dep"
expect_rc = 0

[[steps]]
kind = "nebula"
command = "fetch"
args = ["work/package_app"]
expect_rc = 0
must_exist = ["work/package_app/nebula.lock"]

[[steps]]
kind = "shell"
run = "grep -F 'schema_version = 2' work/package_app/nebula.lock && grep -F 'root_manifest_hash = \"' work/package_app/nebula.lock && grep -F 'toolchain_schema_version = 1' work/package_app/nebula.lock && grep -F 'cache_schema_version = 2' work/package_app/nebula.lock"
expect_rc = 0

[[steps]]
kind = "shell"
run = "grep -F 'manifest = \"nebula.toml\"' work/package_app/nebula.lock && grep -F 'manifest = \"../package_dep/nebula.toml\"' work/package_app/nebula.lock && grep -F 'source_fingerprint = \"' work/package_app/nebula.lock && grep -F 'integrity_fingerprint = \"' work/package_app/nebula.lock && grep -F 'manifest_hash = \"' work/package_app/nebula.lock"
expect_rc = 0
