id = "TST-134-new-cli-template-runs"
suite = "test"

[[steps]]
kind = "shell"
run = "$NEBULA_BINARY new work/new_cli --template cli"
expect_rc = 0
expect_stdout_contains = ["new_cli", "cli"]
must_exist = [
  "work/new_cli/nebula.toml",
  "work/new_cli/README.md",
  "work/new_cli/.gitignore",
  "work/new_cli/src/main.nb",
  "work/new_cli/src/app.nb",
  "work/new_cli/src/io.nb",
]

[[steps]]
kind = "shell"
run = "printf 'nebula-cli-template\\n' > work/new_cli_input.txt"
expect_rc = 0
must_exist = ["work/new_cli_input.txt"]

[[steps]]
kind = "nebula"
command = "run"
source = "work/new_cli"
args = ["--run-gate", "none", "--", "work/new_cli_input.txt", "work/new_cli_output.txt"]
expect_rc = 0

[[steps]]
kind = "shell"
run = "cmp work/new_cli_input.txt work/new_cli_output.txt"
expect_rc = 0

[[steps]]
kind = "nebula"
command = "run"
source = "work/new_cli"
args = ["--run-gate", "none"]
expect_rc = 1
expect_stdout_contains = ["usage: nebula run . --run-gate none -- <input> <output>"]
