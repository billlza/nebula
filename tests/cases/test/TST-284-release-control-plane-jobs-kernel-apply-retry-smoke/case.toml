id = "TST-284-release-control-plane-jobs-kernel-apply-retry-smoke"
suite = "test"
description = "release apply uses the jobs-kernel max-attempt retry semantics for apply_release worker leases"

[[steps]]
kind = "shell"
timeout = 240
run = """
python3 - <<'PY'
import json
import os
import sys
from pathlib import Path

repo_root = Path(os.environ["NEBULA_REPO_ROOT"])
sys.path.insert(0, str(repo_root / "tests" / "lib"))
from release_control_plane_workspace import (
    copy_example,
    fetch_workspace,
    require_success,
    run_ctl,
    start_service,
    terminate_process,
    wait_until_health_ok,
)

binary = os.environ["NEBULA_BINARY"]
root = Path("work/release_control_plane_jobs_kernel_apply_retry")
state_dir = root / "state"
ctl_out = root / ".ctl-out"

copy_example(repo_root, root)
fetch_workspace(binary, root)
proc, stderr_lines, port = start_service(binary, root, {"APP_STATE_DIR": str(state_dir)})
try:
    wait_until_health_ok(proc, stderr_lines, port)
    base_url = f"http://127.0.0.1:{port}"
    require_success(run_ctl(binary, root, "control-plane-validate", "--url", base_url, out_dir=ctl_out), "prewarm ctl")

    config_put = run_ctl(
        binary,
        root,
        "config", "put",
        "--app", "control-plane",
        "--channel", "prod",
        "--key", "feature.flag",
        "--bool", "true",
        "--description", "jobs retry",
        "--url", base_url,
        "--json",
        out_dir=ctl_out,
        no_build=True,
    )
    require_success(config_put, "config put")

    release_put = run_ctl(
        binary,
        root,
        "release", "put",
        "--app", "control-plane",
        "--channel", "prod",
        "--version", "2026.04.25",
        "--config-revision", "1",
        "--description", "jobs retry",
        "--url", base_url,
        "--json",
        out_dir=ctl_out,
        no_build=True,
    )
    require_success(release_put, "release put")

    spec = root / "retry-workflow.json"
    spec.write_text(json.dumps({
        "trigger_kind": "internal_event",
        "event_kind": "release_apply_requested",
        "stages": [
            {"name": "approval", "kind": "approval_gate", "task_kind": "", "timeout_s": 0, "max_attempts": 0, "depends_on": []},
            {"name": "apply", "kind": "leased_task", "task_kind": "apply_release", "timeout_s": 30, "max_attempts": 2, "depends_on": ["approval"]},
        ],
    }), encoding="utf-8")
    require_success(run_ctl(
        binary,
        root,
        "workflow", "put",
        "--app", "control-plane",
        "--channel", "prod",
        "--if-match", "1",
        "--spec-file", str(spec),
        "--url", base_url,
        "--json",
        out_dir=ctl_out,
        no_build=True,
    ), "workflow put retry")

    require_success(run_ctl(
        binary,
        root,
        "approval", "decide",
        "--app", "control-plane",
        "--channel", "prod",
        "--if-match", "1",
        "--decision", "approved",
        "--reason", "jobs retry approved",
        "--url", base_url,
        "--json",
        out_dir=ctl_out,
        no_build=True,
    ), "approval decide")

    apply_request = run_ctl(
        binary,
        root,
        "release", "apply",
        "--app", "control-plane",
        "--channel", "prod",
        "--if-match", "1",
        "--url", base_url,
        "--json",
        out_dir=ctl_out,
        no_build=True,
    )
    require_success(apply_request, "release apply")
    run_id = json.loads(apply_request.stdout).get("run", {}).get("run_id")
    if not run_id:
        raise SystemExit(f"release apply did not return a run id: {apply_request.stdout!r}")

    first_claim = run_ctl(
        binary,
        root,
        "worker", "claim",
        "--worker-id", "retry-worker",
        "--task-kind", "apply_release",
        "--url", base_url,
        "--json",
        out_dir=ctl_out,
        no_build=True,
    )
    require_success(first_claim, "first worker claim")
    first_lease = json.loads(first_claim.stdout).get("lease", {})
    first_lease_id = first_lease.get("lease_id", "")
    if not first_lease_id:
        raise SystemExit(f"first claim did not return a lease: {first_claim.stdout!r}")

    first_failed = run_ctl(
        binary,
        root,
        "worker", "complete",
        "--worker-id", "retry-worker",
        "--lease-id", first_lease_id,
        "--status", "failed",
        "--message", "transient failure",
        "--url", base_url,
        "--json",
        out_dir=ctl_out,
        no_build=True,
    )
    require_success(first_failed, "first failed complete")
    first_run = json.loads(first_failed.stdout).get("run", {})
    first_meta = first_run.get("meta", {})
    first_stages = first_meta.get("stages", [])
    apply_stage = next((stage for stage in first_stages if stage.get("stage_name") == "apply"), {})
    if first_meta.get("status") != "ready" or apply_stage.get("status") != "ready" or apply_stage.get("attempt") != 1:
        raise SystemExit(f"first failure did not requeue apply stage: {first_failed.stdout!r}")
    if apply_stage.get("meta", {}).get("result_message") != "transient failure":
        raise SystemExit(f"first failure result message drifted: {first_failed.stdout!r}")

    second_claim = run_ctl(
        binary,
        root,
        "worker", "claim",
        "--worker-id", "retry-worker",
        "--task-kind", "apply_release",
        "--url", base_url,
        "--json",
        out_dir=ctl_out,
        no_build=True,
    )
    require_success(second_claim, "second worker claim")
    second_lease = json.loads(second_claim.stdout).get("lease", {})
    second_lease_id = second_lease.get("lease_id", "")
    if not second_lease_id or second_lease_id == first_lease_id:
        raise SystemExit(f"second claim did not issue a fresh retry lease: {second_claim.stdout!r}")

    exhausted = run_ctl(
        binary,
        root,
        "worker", "complete",
        "--worker-id", "retry-worker",
        "--lease-id", second_lease_id,
        "--status", "failed",
        "--message", "permanent failure",
        "--url", base_url,
        "--json",
        out_dir=ctl_out,
        no_build=True,
    )
    require_success(exhausted, "exhausted failed complete")
    exhausted_run = json.loads(exhausted.stdout).get("run", {})
    exhausted_meta = exhausted_run.get("meta", {})
    exhausted_stage = next((stage for stage in exhausted_meta.get("stages", []) if stage.get("stage_name") == "apply"), {})
    if exhausted_meta.get("status") != "failed" or exhausted_stage.get("status") != "failed" or exhausted_stage.get("attempt") != 2:
        raise SystemExit(f"exhausted retry did not fail the run: {exhausted.stdout!r}")

    third_claim = run_ctl(
        binary,
        root,
        "worker", "claim",
        "--worker-id", "retry-worker",
        "--task-kind", "apply_release",
        "--url", base_url,
        "--json",
        out_dir=ctl_out,
        no_build=True,
    )
    require_success(third_claim, "third worker claim")
    if json.loads(third_claim.stdout).get("outcome") != "idle":
        raise SystemExit(f"exhausted run still produced a worker lease: {third_claim.stdout!r}")

    run_view = run_ctl(
        binary,
        root,
        "workflow", "run",
        "--app", "control-plane",
        "--channel", "prod",
        "--run-id", str(run_id),
        "--url", base_url,
        "--json",
        out_dir=ctl_out,
        no_build=True,
    )
    require_success(run_view, "workflow run view")
    if json.loads(run_view.stdout).get("run", {}).get("meta", {}).get("status") != "failed":
        raise SystemExit(f"run view did not retain failed status: {run_view.stdout!r}")
finally:
    terminate_process(proc)

print("release-control-plane-jobs-kernel-apply-retry-ok")
PY
"""
expect_rc = 0
expect_stdout_contains = ["release-control-plane-jobs-kernel-apply-retry-ok"]
