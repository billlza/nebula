id = "TST-077-build-invalid-emit-value"
suite = "test"

[[steps]]
kind = "shell"
run = "$NEBULA_BINARY build \"$NEBULA_REPO_ROOT/tests/fixtures/build_no_execute.nb\" --emit nonsense > work/invalid-emit.out 2>&1"
expect_rc = 2

[[steps]]
kind = "shell"
run = "grep -F 'error: invalid --emit value: nonsense' work/invalid-emit.out"
expect_rc = 0
