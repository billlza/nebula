id = "TST-042-install-sh-verifies-checksum"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport hashlib\nimport os\nimport platform\nimport subprocess\nfrom pathlib import Path\n\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nsystem = platform.system()\nif system.startswith('MSYS') or system.startswith('MINGW') or system == 'Windows':\n    Path('work/install-checksum-skip.txt').write_text('skip\\n', encoding='utf-8')\n    raise SystemExit(0)\nroot = Path('work/install_checksum')\nroot.mkdir(parents=True, exist_ok=True)\nmachine = platform.machine().lower()\nif system == 'Darwin' and machine in ('arm64', 'aarch64'):\n    target = 'darwin-arm64'\nelif system == 'Darwin' and machine == 'x86_64':\n    target = 'darwin-x86_64'\nelif system == 'Linux' and machine == 'x86_64':\n    target = 'linux-x86_64'\nelse:\n    raise SystemExit(f'unsupported host for install checksum test: {system}/{machine}')\nsubprocess.run([\n    'python3', str(repo_root / 'scripts' / 'package_release.py'),\n    '--binary', os.environ['NEBULA_BINARY'],\n    '--target', target,\n    '--output-dir', str(root),\n], check=True)\nasset = next(root.glob('nebula-v*.tar.gz'))\nh = hashlib.sha256()\nwith asset.open('rb') as fh:\n    for chunk in iter(lambda: fh.read(1024 * 1024), b''):\n        h.update(chunk)\n(root / 'SHA256SUMS.txt').write_text(f'{h.hexdigest()}  {asset.name}\\n', encoding='utf-8')\nPY"
expect_rc = 0

[[steps]]
kind = "shell"
run = "if [ -f work/install-checksum-skip.txt ]; then exit 0; fi\npython3 - <<'PY'\nfrom pathlib import Path\nchecksums = Path('work/install_checksum/SHA256SUMS.txt')\nasset_name = next(Path('work/install_checksum').glob('nebula-v*.tar.gz')).name\nchecksums.write_text('0'*64 + '  ' + asset_name + '\\n', encoding='utf-8')\nPY"
expect_rc = 0

[[steps]]
kind = "shell"
run = "if [ -f work/install-checksum-skip.txt ]; then exit 0; fi\nversion=$(cat \"$NEBULA_REPO_ROOT/VERSION\")\nbash \"$NEBULA_REPO_ROOT/scripts/install.sh\" --version \"$version\" --prefix \"$PWD/work/install-checksum-prefix\" --base-url \"$PWD/work/install_checksum\" > work/install-checksum.out 2>&1"
expect_rc = 1

[[steps]]
kind = "shell"
run = "if [ -f work/install-checksum-skip.txt ]; then exit 0; fi\ngrep -F 'checksum mismatch' work/install-checksum.out"
expect_rc = 0
