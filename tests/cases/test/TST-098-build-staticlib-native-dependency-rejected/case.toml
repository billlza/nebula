id = "TST-098-build-staticlib-native-dependency-rejected"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nfrom pathlib import Path\nroot = Path('work/native_cabi_reject')\ndep = root / 'dep'\napp = root / 'app'\nfor path in [dep / 'src', dep / 'native' / 'include', app / 'src']:\n    path.mkdir(parents=True, exist_ok=True)\n(dep / 'nebula.toml').write_text('schema_version = 1\\n\\n[package]\\nname = \"dep_native\"\\nversion = \"0.1.0\"\\nentry = \"src/lib.nb\"\\nsrc_dir = \"src\"\\n\\n[native]\\nc_sources = [\"native/native_offset.c\"]\\ncxx_sources = [\"native/native_bridge.cpp\"]\\ninclude_dirs = [\"native/include\"]\\ndefines = [\"NATIVE_OFFSET=2\"]\\n', encoding='utf-8')\n(dep / 'src' / 'lib.nb').write_text('module lib\\n\\nextern fn native_sum(a: Int, b: Int) -> Int\\n\\nfn dep_value() -> Int {\\n  return native_sum(20, 22)\\n}\\n', encoding='utf-8')\n(dep / 'native' / 'include' / 'native.h').write_text('#pragma once\\n#include <stdint.h>\\n#ifdef __cplusplus\\nextern \"C\" {\\n#endif\\nint64_t native_offset_value(void);\\n#ifdef __cplusplus\\n}\\n#endif\\n', encoding='utf-8')\n(dep / 'native' / 'native_offset.c').write_text('#include \"native.h\"\\nint64_t native_offset_value(void) { return NATIVE_OFFSET; }\\n', encoding='utf-8')\n(dep / 'native' / 'native_bridge.cpp').write_text('#include <cstdint>\\n#include \"native.h\"\\nstd::int64_t native_sum(std::int64_t a, std::int64_t b) { return a + b + native_offset_value(); }\\n', encoding='utf-8')\n(app / 'nebula.toml').write_text('schema_version = 1\\n\\n[package]\\nname = \"native_export\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n\\n[dependencies]\\ndep = { path = \"../dep\" }\\n', encoding='utf-8')\n(app / 'src' / 'main.nb').write_text('module main\\nimport dep::lib\\n\\n@export\\n@abi_c\\nfn exported_value() -> Int {\\n  return dep_value()\\n}\\n', encoding='utf-8')\nPY"
expect_rc = 0

[[steps]]
kind = "nebula"
command = "fetch"
args = ["work/native_cabi_reject/app"]
expect_rc = 0

[[steps]]
kind = "shell"
run = "$NEBULA_BINARY build work/native_cabi_reject/app --emit staticlib > work/native-cabi.out 2>&1"
expect_rc = 1

[[steps]]
kind = "shell"
run = "grep -F 'NBL-CLI-CABI-NATIVE' work/native-cabi.out && grep -F 'does not support [native] package sources yet' work/native-cabi.out"
expect_rc = 0
