cat > work/official-auth-rs256/app/src/main.nb <<'EOF'
module main
import auth::jwt
import std::fs
import std::json
import std::result

fn config_from_file(path: String, now_unix_s: Int) -> Result<JwtValidationConfig, String> {
  return Ok(JwtValidationConfig("https://issuer.example",
                                "release-control-plane",
                                read_string(path)?,
                                now_unix_s))
}

fn wrong_issuer_config_from_file(path: String) -> Result<JwtValidationConfig, String> {
  return Ok(JwtValidationConfig("https://other-issuer.example",
                                "release-control-plane",
                                read_string(path)?,
                                2000))
}

fn expect_valid_subject(path: String, subject: String, config: JwtValidationConfig) -> Result<Bool, String> {
  let claims = verify_rs256_jwt(read_string(path)?, config)?
  return Ok(claims.subject == subject && array_len(claims.roles)? == 1)
}

fn expect_invalid(path: String, config: JwtValidationConfig) -> Result<Bool, String> {
  match verify_rs256_jwt(read_string(path)?, config) {
    Ok(_) => {
      return Ok(false)
    }
    Err(_) => {
      return Ok(true)
    }
  }
}

fn run_checks() -> Result<Bool, String> {
  let config = config_from_file("work/official-auth-rs256/jwks.json", 2000)?
  let unknown_config = config_from_file("work/official-auth-rs256/unknown-kid-jwks.json", 2000)?
  let wrong_issuer_config = wrong_issuer_config_from_file("work/official-auth-rs256/jwks.json")?
  validate_rs256_jwks(config.jwks_text)?
  let ok = true
  ok = ok && expect_valid_subject("work/official-auth-rs256/reader.jwt", "reader", config)?
  ok = ok && expect_invalid("work/official-auth-rs256/tampered.jwt", config)?
  ok = ok && expect_invalid("work/official-auth-rs256/reader.jwt", wrong_issuer_config)?
  ok = ok && expect_invalid("work/official-auth-rs256/wrong-aud.jwt", config)?
  ok = ok && expect_invalid("work/official-auth-rs256/expired.jwt", config)?
  ok = ok && expect_invalid("work/official-auth-rs256/future.jwt", config)?
  ok = ok && expect_invalid("work/official-auth-rs256/none.jwt", config)?
  ok = ok && expect_invalid("work/official-auth-rs256/reader.jwt", unknown_config)?
  return Ok(ok)
}

fn main() -> Void {
  match run_checks() {
    Ok(ok) => {
      if ok {
        print("official-auth-jwt-rs256-ok")
      } else {
        print("official-auth-jwt-rs256-bad")
      }
    }
    Err(msg) => {
      print(msg)
    }
  }
}
EOF
