id = "TST-018-fmt-rewrites-file"
suite = "test"

[[steps]]
kind = "shell"
run = "cp fixtures/format_unformatted.nb work/unformatted.nb"
expect_rc = 0

[[steps]]
kind = "shell"
run = "$NEBULA_BINARY fmt work/unformatted.nb"
expect_rc = 0

[[steps]]
kind = "shell"
run = "grep -F 'fn main() -> Void' work/unformatted.nb"
expect_rc = 0

[[steps]]
kind = "shell"
run = "grep -F 'let x = (1 + 2)' work/unformatted.nb"
expect_rc = 0
