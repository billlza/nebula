id = "TST-026-explain-schema-query-and-machine-fields"
suite = "test"

[[steps]]
kind = "shell"
run = "$NEBULA_BINARY explain fixtures/region_escape_alias.nb --file fixtures/region_escape_alias.nb --line 7 --col 8 --format json > work/explain-v2.json"
expect_rc = 0

[[steps]]
kind = "shell"
run = "grep -F '\"schema_version\":1' work/explain-v2.json && grep -F '\"query\":{\"kind\":\"span\"' work/explain-v2.json && grep -F '\"matches\":[' work/explain-v2.json && grep -F '\"diagnostics\":[' work/explain-v2.json"
expect_rc = 0

[[steps]]
kind = "shell"
run = "grep -F '\"machine_detail\":\"return/return-via-alias-chain\"' work/explain-v2.json && grep -F '\"machine_trigger_family_detail\":\"return|call\"' work/explain-v2.json && grep -F '\"machine_owner_reason_detail\":\"\"' work/explain-v2.json && grep -F '\"first_fix\":\"eliminate escaping alias fanout first; keep one owner path to boundary\"' work/explain-v2.json"
expect_rc = 0
