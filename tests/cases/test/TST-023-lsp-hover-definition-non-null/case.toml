id = "TST-023-lsp-hover-definition-non-null"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nfrom pathlib import Path\nimport json, os, subprocess, tempfile\nroot = Path(tempfile.mkdtemp(dir='work'))\nbad = root / 'bad.nb'\nbad.write_text('fn bad(x: Int) -> Int {\\n  if x + 1 {\\n    return 1\\n  } else {\\n    return 0\\n  }\\n}\\n')\ndefs = root / 'defs.nb'\ndefs.write_text('fn helper() -> Int {\\n  return 1\\n}\\n\\nfn main() -> Int {\\n  return helper()\\n}\\n')\nproc = subprocess.Popen([os.environ['NEBULA_BINARY'], 'lsp'], stdin=subprocess.PIPE, stdout=subprocess.PIPE, stderr=subprocess.STDOUT)\n\ndef send(obj):\n    body = json.dumps(obj, separators=(',', ':')).encode()\n    payload = f'Content-Length: {len(body)}\\r\\n\\r\\n'.encode() + body\n    proc.stdin.write(payload)\n    proc.stdin.flush()\n\ndef recv():\n    header = b''\n    while b'\\r\\n\\r\\n' not in header:\n        chunk = proc.stdout.read(1)\n        if not chunk:\n            raise RuntimeError('lsp closed while waiting for header')\n        header += chunk\n    head, _, rest = header.partition(b'\\r\\n\\r\\n')\n    length = 0\n    for line in head.decode().split('\\r\\n'):\n        if line.lower().startswith('content-length:'):\n            length = int(line.split(':', 1)[1].strip())\n    body = rest\n    while len(body) < length:\n        chunk = proc.stdout.read(length - len(body))\n        if not chunk:\n            raise RuntimeError('lsp closed while waiting for body')\n        body += chunk\n    return body.decode()\n\nbad_uri = 'file://' + str(bad.resolve())\ndef_uri = 'file://' + str(defs.resolve())\nresponses = []\nmessages = [\n    {'jsonrpc': '2.0', 'id': 1, 'method': 'initialize', 'params': {}},\n    {'jsonrpc': '2.0', 'method': 'textDocument/didOpen', 'params': {'textDocument': {'uri': bad_uri, 'languageId': 'nebula', 'version': 1, 'text': bad.read_text()}}},\n    {'jsonrpc': '2.0', 'method': 'textDocument/didOpen', 'params': {'textDocument': {'uri': def_uri, 'languageId': 'nebula', 'version': 1, 'text': defs.read_text()}}},\n    {'jsonrpc': '2.0', 'id': 2, 'method': 'textDocument/hover', 'params': {'textDocument': {'uri': bad_uri}, 'position': {'line': 1, 'character': 5}}},\n    {'jsonrpc': '2.0', 'id': 3, 'method': 'textDocument/definition', 'params': {'textDocument': {'uri': def_uri}, 'position': {'line': 5, 'character': 10}}},\n    {'jsonrpc': '2.0', 'id': 4, 'method': 'shutdown', 'params': {}},\n]\nfor msg in messages:\n    send(msg)\n    responses.append(recv())\nsend({'jsonrpc': '2.0', 'method': 'exit', 'params': {}})\nproc.stdin.close()\nproc.wait(timeout=5)\nPath('work/lsp-transport.out').write_text('\\n'.join(responses))\nraise SystemExit(proc.returncode)\nPY"
expect_rc = 0

[[steps]]
kind = "shell"
run = "grep -F '\"hoverProvider\":true' work/lsp-transport.out && grep -F '\"definitionProvider\":true' work/lsp-transport.out && grep -F '\"textDocumentSync\":1' work/lsp-transport.out && grep -F 'publishDiagnostics' work/lsp-transport.out && grep -F '\"contents\":{\"kind\":\"markdown\"' work/lsp-transport.out && grep -F '\"id\":3,\"result\":{\"uri\":\"file://' work/lsp-transport.out"
expect_rc = 0
