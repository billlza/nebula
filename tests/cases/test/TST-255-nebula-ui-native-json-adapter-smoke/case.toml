id = "TST-255-nebula-ui-native-json-adapter-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = """
python3 - <<'PY'
import os
import shutil
import subprocess
from pathlib import Path

repo = Path(os.environ['NEBULA_REPO_ROOT'])
work = Path('work/nebula_ui_native_json_adapter')
shutil.rmtree(work, ignore_errors=True)
work.mkdir(parents=True, exist_ok=True)
probe = work / 'probe.cpp'
probe.write_text(r'''
#include "ui_tree_preview.hpp"

#include <iostream>

int main(int argc, char** argv) {
  if (argc != 2) return 64;
  auto loaded = nebula::ui::adapter_preview::load_tree_json_file(argv[1]);
  if (!loaded.ok) {
    std::cerr << loaded.error << "\\n";
    return 2;
  }
  nebula::ui::adapter_preview::append_smoke_summary(std::cout, loaded.summary);
  auto dispatched = nebula::ui::adapter_preview::dispatch_action(loaded.summary, "targets.refresh");
  if (!dispatched.ok) {
    std::cerr << dispatched.message << "\\n";
    return 3;
  }
  nebula::ui::adapter_preview::append_dispatch_result(std::cout, dispatched);
  auto input_dispatched = nebula::ui::adapter_preview::dispatch_action(loaded.summary, "targets.filter");
  if (!input_dispatched.ok) {
    std::cerr << input_dispatched.message << "\\n";
    return 4;
  }
  nebula::ui::adapter_preview::append_dispatch_result(std::cout, input_dispatched);
  auto missing = nebula::ui::adapter_preview::dispatch_action(loaded.summary, "targets.missing");
  if (missing.ok || missing.message != "action not found: targets.missing") {
    std::cerr << "unexpected missing-action result\\n";
    return 5;
  }
  return 0;
}
''', encoding='utf-8')
compiler = os.environ.get('CXX') or shutil.which('c++') or shutil.which('clang++') or 'c++'
out = work / 'probe'
subprocess.run([
    compiler,
    '-std=c++20',
    '-Wall',
    '-Wextra',
    '-Werror',
    '-I', str(repo / 'official' / 'nebula-ui' / 'adapters' / 'common'),
    '-iquote', str(repo),
    str(probe),
    '-o', str(out),
], check=True)

def write_case(name, text):
    path = work / name
    path.write_text(text, encoding='utf-8')
    return path

example = subprocess.run([
    os.environ['NEBULA_BINARY'],
    'run',
    str(repo / 'examples' / 'local_ops_console_ui'),
    '--run-gate',
    'none',
], capture_output=True, text=True, check=True)
good_json = next(line for line in example.stdout.splitlines() if line.startswith('{'))
good = write_case('good.json', good_json)
run = subprocess.run([str(out), str(good)], capture_output=True, text=True, check=True)
print(run.stdout, end='')
for marker in (
    'nebula-ui-tree-title=Local Ops',
    'nebula-ui-tree-button-action=targets.refresh',
    'nebula-ui-tree-input-action=targets.filter',
    'nebula-ui-tree-input-accessibility-label=Filter targets',
    'nebula-ui-accessibility-node=role:window;name:Local Ops',
    'nebula-ui-accessibility-node=role:textbox;name:Filter targets;action:targets.filter',
    'nebula-ui-accessibility-node=role:button;name:Refresh;action:targets.refresh',
    'nebula-ui-action-dispatched=targets.refresh',
    'nebula-ui-action-dispatched=targets.filter',
):
    if marker not in run.stdout:
        raise SystemExit(f'missing good-tree marker: {marker}')

bad_cases = [
    ('bad_schema.json', '{"schema":"wrong","component":"Window","props":{},"children":[]}', 'expected nebula-ui.tree.v1 root-view schema'),
    ('missing_component.json', '{"schema":"nebula-ui.tree.v1","props":{},"children":[]}', 'expected UI node component string'),
    ('unknown_component.json', '{"schema":"nebula-ui.tree.v1","component":"Stack","props":{},"children":[]}', 'unsupported UI component: Stack'),
    ('missing_children.json', '{"schema":"nebula-ui.tree.v1","component":"Window","props":{}}', 'expected UI node children array'),
    ('children_not_array.json', '{"schema":"nebula-ui.tree.v1","component":"Window","props":{},"children":{}}', 'expected UI node children array'),
    ('button_missing_action.json', '{"schema":"nebula-ui.tree.v1","component":"Window","props":{},"children":[{"schema":"nebula-ui.tree.v1","component":"Button","props":{"text":"Refresh"},"children":[]}]}', 'Button node requires non-empty action string'),
    ('button_empty_action.json', '{"schema":"nebula-ui.tree.v1","component":"Button","props":{"text":"Refresh","action":""},"children":[]}', 'Button node requires non-empty action string'),
    ('input_missing_action.json', '{"schema":"nebula-ui.tree.v1","component":"Input","props":{"value":"targets","accessibility_label":"Filter targets"},"children":[]}', 'Input node requires non-empty action string'),
    ('input_empty_action.json', '{"schema":"nebula-ui.tree.v1","component":"Input","props":{"value":"targets","action":"","accessibility_label":"Filter targets"},"children":[]}', 'Input node requires non-empty action string'),
    ('input_missing_accessibility.json', '{"schema":"nebula-ui.tree.v1","component":"Input","props":{"value":"targets","action":"targets.filter"},"children":[]}', 'Input node requires non-empty accessibility_label string'),
    ('input_empty_accessibility.json', '{"schema":"nebula-ui.tree.v1","component":"Input","props":{"value":"targets","action":"targets.filter","accessibility_label":""},"children":[]}', 'Input node requires non-empty accessibility_label string'),
]
for name, text, expected in bad_cases:
    path = write_case(name, text)
    failed = subprocess.run([str(out), str(path)], capture_output=True, text=True, check=False)
    if failed.returncode == 0:
        raise SystemExit(f'{name} unexpectedly succeeded')
    if expected not in failed.stderr:
        raise SystemExit(f'{name} stderr did not contain {expected!r}: {failed.stderr!r}')
print('nebula-ui-native-json-adapter-ok')
PY
"""
expect_rc = 0
expect_stdout_contains = ["nebula-ui-tree-title=Local Ops", "nebula-ui-tree-button-action=targets.refresh", "nebula-ui-tree-input-action=targets.filter", "nebula-ui-tree-input-accessibility-label=Filter targets", "nebula-ui-accessibility-node=role:window;name:Local Ops", "nebula-ui-accessibility-node=role:textbox;name:Filter targets;action:targets.filter", "nebula-ui-accessibility-node=role:button;name:Refresh;action:targets.refresh", "nebula-ui-action-dispatched=targets.refresh", "nebula-ui-action-dispatched=targets.filter", "nebula-ui-native-json-adapter-ok"]
