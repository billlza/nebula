id = "TST-255-nebula-ui-native-json-adapter-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport os\nimport shutil\nimport subprocess\nfrom pathlib import Path\n\nrepo = Path(os.environ['NEBULA_REPO_ROOT'])\nwork = Path('work/nebula_ui_native_json_adapter')\nwork.mkdir(parents=True, exist_ok=True)\nprobe = work / 'probe.cpp'\nprobe.write_text(r'''\n#include \"ui_tree_preview.hpp\"\n\n#include <iostream>\n\nint main(int argc, char** argv) {\n  if (argc != 2) return 64;\n  auto loaded = nebula::ui::adapter_preview::load_tree_json_file(argv[1]);\n  if (!loaded.ok) {\n    std::cerr << loaded.error << \"\\n\";\n    return 2;\n  }\n  nebula::ui::adapter_preview::append_smoke_summary(std::cout, loaded.summary);\n  auto dispatched = nebula::ui::adapter_preview::dispatch_action(loaded.summary, \"targets.refresh\");\n  if (!dispatched.ok) {\n    std::cerr << dispatched.message << \"\\n\";\n    return 3;\n  }\n  nebula::ui::adapter_preview::append_dispatch_result(std::cout, dispatched);\n  auto missing = nebula::ui::adapter_preview::dispatch_action(loaded.summary, \"targets.missing\");\n  if (missing.ok || missing.message != \"action not found: targets.missing\") {\n    std::cerr << \"unexpected missing-action result\\n\";\n    return 4;\n  }\n  return 0;\n}\n''', encoding='utf-8')\ncompiler = os.environ.get('CXX') or shutil.which('c++') or shutil.which('clang++') or 'c++'\nout = work / 'probe'\nsubprocess.run([\n    compiler,\n    '-std=c++20',\n    '-I', str(repo / 'official' / 'nebula-ui' / 'adapters' / 'common'),\n    '-iquote', str(repo),\n    str(probe),\n    '-o', str(out),\n], check=True)\n\ndef write_case(name, text):\n    path = work / name\n    path.write_text(text, encoding='utf-8')\n    return path\n\nexample = subprocess.run([\n    os.environ['NEBULA_BINARY'],\n    'run',\n    str(repo / 'examples' / 'local_ops_console_ui'),\n    '--run-gate',\n    'none',\n], capture_output=True, text=True, check=True)\ngood_json = next(line for line in example.stdout.splitlines() if line.startswith('{'))\ngood = write_case('good.json', good_json)\nrun = subprocess.run([str(out), str(good)], capture_output=True, text=True, check=True)\nprint(run.stdout, end='')\nfor marker in ('nebula-ui-tree-title=Local Ops', 'nebula-ui-tree-text=Local Ops', 'nebula-ui-tree-button-action=targets.refresh', 'nebula-ui-action-dispatched=targets.refresh'):\n    if marker not in run.stdout:\n        raise SystemExit(f'missing good-tree marker: {marker}')\n\nbad_cases = [\n    ('bad_schema.json', '{\"schema\":\"wrong\",\"component\":\"Window\",\"props\":{},\"children\":[]}', 'expected nebula-ui.tree.v1 root-view schema'),\n    ('missing_children.json', '{\"schema\":\"nebula-ui.tree.v1\",\"component\":\"Window\",\"props\":{}}', 'expected UI node children array'),\n    ('children_not_array.json', '{\"schema\":\"nebula-ui.tree.v1\",\"component\":\"Window\",\"props\":{},\"children\":{}}', 'expected UI node children array'),\n    ('button_missing_action.json', '{\"schema\":\"nebula-ui.tree.v1\",\"component\":\"Window\",\"props\":{},\"children\":[{\"schema\":\"nebula-ui.tree.v1\",\"component\":\"Button\",\"props\":{\"text\":\"Refresh\"},\"children\":[]}]}', 'Button node requires non-empty action string'),\n]\nfor name, text, expected in bad_cases:\n    path = write_case(name, text)\n    failed = subprocess.run([str(out), str(path)], capture_output=True, text=True, check=False)\n    if failed.returncode == 0:\n        raise SystemExit(f'{name} unexpectedly succeeded')\n    if expected not in failed.stderr:\n        raise SystemExit(f'{name} stderr did not contain {expected!r}: {failed.stderr!r}')\nprint('nebula-ui-native-json-adapter-ok')\nPY"
expect_rc = 0
expect_stdout_contains = ["nebula-ui-tree-title=Local Ops", "nebula-ui-tree-button-action=targets.refresh", "nebula-ui-action-dispatched=targets.refresh", "nebula-ui-native-json-adapter-ok"]
