id = "TST-217-official-service-panic-to-500-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = '''
python3 - <<'PY'
import http.client
import json
import os
import shutil
import subprocess
import sys
import time
from pathlib import Path

repo_root = Path(os.environ['NEBULA_REPO_ROOT'])
sys.path.insert(0, str(repo_root / 'tests' / 'lib'))
from service_probe import collect_observe_events, fail_with_output, finish_process_output, wait_for_listener_bound

root = Path('work/official_service_panic_to_500')
shutil.rmtree(root, ignore_errors=True)
(root / 'src').mkdir(parents=True, exist_ok=True)
(root / 'nebula.toml').write_text(
    f"""schema_version = 1

[package]
name = "official-service-panic-to-500"
version = "0.1.0"
entry = "src/main.nb"
src_dir = "src"

[dependencies]
service = {{ path = "{repo_root / 'official' / 'nebula-service'}" }}
""",
    encoding='utf-8',
)
(root / 'src' / 'server.nb').write_text(
    """module server
import service::context
import service::health
import std::http
import std::result

async fn handle_request(ctx: RequestContext, request: Request) -> Result<Response, String> {
  if path_matches("/healthz", request) {
    return Ok(live_response_with_context(ctx))
  }
  if path_matches("/panic", request) {
    panic("boom")
  }
  return Ok(not_found_text("not found"))
}
""",
    encoding='utf-8',
)
(root / 'src' / 'main.nb').write_text(
    """module main
import service::config
import service::server
import server

async fn main() -> Void {
  match config_from_env("svc-panic-500", 0) {
    Ok(cfg) => {
      match await bind_listener(cfg) {
        Ok(listener) => {
          match await serve_requests_n_result_with_context(listener, cfg, 3, handle_request) {
            Ok(_) => {}
            Err(msg) => { print(msg) }
          }
        }
        Err(msg) => { print(msg) }
      }
    }
    Err(msg) => { print(msg) }
  }
}
""",
    encoding='utf-8',
)
subprocess.run([os.environ['NEBULA_BINARY'], 'update', str(root)], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
out_dir = root / '.service-out'
subprocess.run([os.environ['NEBULA_BINARY'], 'build', str(root), '--out-dir', str(out_dir)], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
proc = subprocess.Popen(
    [str(out_dir / 'main.out')],
    stdout=subprocess.PIPE,
    stderr=subprocess.PIPE,
    text=True,
    env={**os.environ, 'NEBULA_BIND_HOST': '127.0.0.1', 'NEBULA_PORT': '0', 'NEBULA_PANIC_TO_500': '1'},
)
stderr_lines = []
_, port = wait_for_listener_bound(proc, stderr_lines)
try:
    deadline = time.time() + 20
    ready = False
    while time.time() < deadline:
        if proc.poll() is not None:
            fail_with_output(proc, stderr_lines, f'panic-to-500 service exited before ready: rc={proc.returncode}')
        try:
            conn = http.client.HTTPConnection('127.0.0.1', port, timeout=1)
            conn.request('GET', '/healthz')
            resp = conn.getresponse()
            body = resp.read().decode('utf-8')
            conn.close()
            if resp.status == 200 and '"status":"ok"' in body:
                ready = True
                break
        except Exception:
            time.sleep(0.1)
    if not ready:
        fail_with_output(proc, stderr_lines, 'panic-to-500 service did not become ready')

    conn = http.client.HTTPConnection('127.0.0.1', port, timeout=2)
    conn.request('GET', '/panic', headers={'X-Request-Id': 'panic-id-123'})
    resp = conn.getresponse()
    body = resp.read().decode('utf-8')
    conn.close()
    payload = json.loads(body)
    if resp.status != 500 or payload.get('error') != 'internal_error' or payload.get('request_id_text') != 'panic-id-123':
        raise SystemExit(f'unexpected panic response: {(resp.status, payload)!r}')

    conn = http.client.HTTPConnection('127.0.0.1', port, timeout=2)
    conn.request('GET', '/healthz')
    resp = conn.getresponse()
    body = resp.read().decode('utf-8')
    conn.close()
    if resp.status != 200 or '"status":"ok"' not in body:
        raise SystemExit(f'service did not stay alive after panic recovery: {(resp.status, body)!r}')

    try:
        proc.wait(timeout=10)
    except subprocess.TimeoutExpired:
        raise SystemExit('panic-to-500 service did not exit after expected requests')
    stdout, stderr = finish_process_output(proc, stderr_lines)
    print(stdout, end='')
    print(stderr, end='')
    if proc.returncode != 0:
        raise SystemExit(proc.returncode)
    observe_events = collect_observe_events(stderr)
    panic_events = [item for item in observe_events if item.get('event') == 'handler_panic']
    panic_metrics = [item for item in observe_events if item.get('metric') == 'handler_panics']
    if len(panic_events) != 1:
        raise SystemExit(f'expected exactly one handler_panic event: {observe_events!r}')
    if len(panic_metrics) != 1:
        raise SystemExit(f'expected exactly one handler_panics metric: {observe_events!r}')
    if panic_events[0].get('request_id_text') != 'panic-id-123':
        raise SystemExit(f'panic event request_id_text mismatch: {panic_events[0]!r}')
    panic_classification = panic_events[0].get('classification')
    if not isinstance(panic_classification, dict):
        raise SystemExit(f'panic event classification missing: {panic_events[0]!r}')
    if panic_classification.get('reason') != 'request_start' or panic_classification.get('detail') != 'peer_request_ready':
        raise SystemExit(f'panic event classification mismatch: {panic_events[0]!r}')
    if panic_metrics[0].get('service') != 'svc-panic-500' or panic_metrics[0].get('value') != 1:
        raise SystemExit(f'panic metric payload mismatch: {panic_metrics[0]!r}')
    print('official-service-panic-to-500-ok')
finally:
    if proc.poll() is None:
        proc.terminate()
        try:
            proc.wait(timeout=5)
        except subprocess.TimeoutExpired:
            proc.kill()
            proc.wait(timeout=5)
PY
'''
expect_rc = 0
expect_stdout_contains = ["official-service-panic-to-500-ok"]
