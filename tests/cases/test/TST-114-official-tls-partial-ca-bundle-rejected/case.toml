id = "TST-114-official-tls-partial-ca-bundle-rejected"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport os\nimport platform\nimport shutil\nimport subprocess\nfrom pathlib import Path\n\nsystem = platform.system().lower()\nif system.startswith('windows') or system.startswith('msys') or system.startswith('mingw') or system.startswith('cygwin'):\n    print('tls-skip-unsupported-host')\n    raise SystemExit(0)\nif shutil.which('openssl') is None:\n    raise SystemExit('openssl is required for official TLS partial-bundle test')\n\nroot = Path('work/official_tls_partial')\napp = root / 'app'\n(app / 'src').mkdir(parents=True, exist_ok=True)\n(root / 'openssl_ca.cnf').write_text('''[req]\\ndistinguished_name = dn\\nx509_extensions = v3_ca\\nprompt = no\\n\\n[dn]\\nCN = Nebula Partial CA\\n\\n[v3_ca]\\nsubjectKeyIdentifier = hash\\nauthorityKeyIdentifier = keyid:always,issuer\\nbasicConstraints = critical, CA:true\\nkeyUsage = critical, digitalSignature, keyCertSign, cRLSign\\n''', encoding='utf-8')\nsubprocess.run([\n    'openssl', 'ecparam', '-name', 'prime256v1', '-genkey', '-noout', '-out', str(root / 'ca.key')\n], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\nsubprocess.run([\n    'openssl', 'req', '-x509', '-new', '-key', str(root / 'ca.key'), '-out', str(root / 'ca.pem'), '-days', '2',\n    '-config', str(root / 'openssl_ca.cnf')\n], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\nca_pem = (root / 'ca.pem').read_text(encoding='utf-8')\nbundle = ca_pem + '\\n-----BEGIN CERTIFICATE-----\\nAAAA\\n-----END CERTIFICATE-----\\n'\nbundle_literal = bundle.replace('\\\\', '\\\\\\\\').replace('\\n', '\\\\n').replace('\"', '\\\\\"')\n(app / 'nebula.toml').write_text(f'''schema_version = 1\\n\\n[package]\\nname = \"official-tls-partial\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n\\n[dependencies]\\ntls = {{ path = \"{os.environ['NEBULA_REPO_ROOT']}/official/nebula-tls\" }}\\n''', encoding='utf-8')\n(app / 'src' / 'main.nb').write_text(f'''module main\\nimport tls::client\\n\\nfn main() -> Void {{\\n  match client_config_from_ca_pem_text(\"{bundle_literal}\") {{\\n    Ok(_) => {{\\n      print(\"unexpected-ok\")\\n    }}\\n    Err(msg) => {{\\n      print(msg)\\n    }}\\n  }}\\n}}\\n''', encoding='utf-8')\n\nupdate = subprocess.run([\n    os.environ['NEBULA_BINARY'], 'update', str(app)\n], capture_output=True, text=True, env=os.environ.copy())\nprint(update.stdout, end='')\nprint(update.stderr, end='')\nif update.returncode != 0:\n    raise SystemExit(update.returncode)\n\nrun = subprocess.run([\n    os.environ['NEBULA_BINARY'], 'run', str(app), '--run-gate', 'none'\n], capture_output=True, text=True, env=os.environ.copy())\nprint(run.stdout, end='')\nprint(run.stderr, end='')\nif run.returncode != 0:\n    raise SystemExit(run.returncode)\nif 'partially failed' not in run.stdout:\n    raise SystemExit('expected partial CA bundle rejection output')\nif 'unexpected-ok' in run.stdout:\n    raise SystemExit('partial CA bundle was unexpectedly accepted')\nPY"
expect_rc = 0
