id = "TST-172-new-backend-service-template-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport http.client\nimport os\nimport shutil\nimport subprocess\nimport sys\nimport time\nfrom pathlib import Path\n\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nsys.path.insert(0, str(repo_root / 'tests' / 'lib'))\nfrom service_probe import fail_with_output, wait_for_listener_bound\nroot = Path('work/new_backend_service')\nshutil.rmtree(root, ignore_errors=True)\nsubprocess.run([os.environ['NEBULA_BINARY'], 'new', str(root), '--template', 'backend-service'], check=True)\ntext = (root / 'nebula.toml').read_text(encoding='utf-8')\nreadme = (root / 'README.md').read_text(encoding='utf-8')\nif 'installed = \"nebula-service\"' not in text:\n    raise SystemExit('backend-service template did not declare installed nebula-service dependency')\nif 'prometheus_bridge.py serve --input service.observe.ndjson' not in readme:\n    raise SystemExit('backend-service template README missing metrics bridge guidance')\nif '/path/to/nebula-observe' in readme:\n    raise SystemExit('backend-service template README still contains a placeholder bridge path')\nsubprocess.run([os.environ['NEBULA_BINARY'], 'fetch', str(root)], check=True)\nproc = subprocess.Popen([\n    os.environ['NEBULA_BINARY'],\n    'run',\n    str(root),\n    '--run-gate',\n    'none',\n], env={**os.environ, 'NEBULA_BIND_HOST': '127.0.0.1', 'NEBULA_PORT': '0'}, stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True)\nstderr_lines = []\n_, port = wait_for_listener_bound(proc, stderr_lines)\ntry:\n    deadline = time.time() + 20\n    ready = False\n    while time.time() < deadline:\n        if proc.poll() is not None:\n            fail_with_output(proc, stderr_lines, f'backend-service template exited before ready: rc={proc.returncode}')\n        try:\n            conn = http.client.HTTPConnection('127.0.0.1', port, timeout=1)\n            conn.request('GET', '/healthz')\n            resp = conn.getresponse()\n            body = resp.read().decode('utf-8')\n            conn.close()\n            if resp.status == 200 and '\"status\":\"ok\"' in body:\n                ready = True\n                break\n        except Exception:\n            time.sleep(0.1)\n    if not ready:\n        fail_with_output(proc, stderr_lines, 'backend-service template did not become ready')\n    conn = http.client.HTTPConnection('127.0.0.1', port, timeout=2)\n    conn.request('GET', '/readyz')\n    ready_resp = conn.getresponse()\n    ready_body = ready_resp.read().decode('utf-8')\n    conn.close()\n    conn = http.client.HTTPConnection('127.0.0.1', port, timeout=2)\n    conn.request('GET', '/hello/nebula')\n    hello_resp = conn.getresponse()\n    hello_body = hello_resp.read().decode('utf-8')\n    conn.close()\n    if ready_resp.status != 200 or '\"status\":\"ready\"' not in ready_body:\n        raise SystemExit('backend-service template readyz response was incorrect')\n    if hello_resp.status != 200 or hello_body != 'nebula':\n        raise SystemExit('backend-service template hello route was incorrect')\n    print('backend-service-template-ok')\nfinally:\n    if proc.poll() is None:\n        proc.terminate()\n        try:\n            proc.wait(timeout=5)\n        except subprocess.TimeoutExpired:\n            proc.kill()\n            proc.wait(timeout=5)\nPY"
expect_rc = 0
expect_stdout_contains = ["backend-service-template-ok"]
