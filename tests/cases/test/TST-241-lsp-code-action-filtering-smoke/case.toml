id = "TST-241-lsp-code-action-filtering-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport json\nimport os\nimport subprocess\nimport tempfile\nfrom pathlib import Path\n\n\ndef msg(obj: dict) -> bytes:\n    body = json.dumps(obj, separators=(',', ':')).encode('utf-8')\n    return f'Content-Length: {len(body)}\\r\\n\\r\\n'.encode('utf-8') + body\n\n\ndef parse_messages(data: bytes) -> list[dict]:\n    out = []\n    cursor = 0\n    while cursor < len(data):\n        header_end = data.find(b'\\r\\n\\r\\n', cursor)\n        if header_end < 0:\n            break\n        headers = data[cursor:header_end].decode('utf-8')\n        length = 0\n        for line in headers.split('\\r\\n'):\n            if line.lower().startswith('content-length:'):\n                length = int(line.split(':', 1)[1].strip())\n        cursor = header_end + 4\n        body = data[cursor:cursor + length]\n        cursor += length\n        out.append(json.loads(body.decode('utf-8')))\n    return out\n\n\nroot = Path(tempfile.mkdtemp(prefix='nebula-lsp-codeaction-filter-'))\ntext = '@unsafe\\nstruct Bad {\\n  value: Int\\n}\\n'\npath = root / 'bad.nb'\npath.write_text(text, encoding='utf-8')\nuri = 'file://' + str(path.resolve())\nrequests = b''.join([\n    msg({'jsonrpc': '2.0', 'id': 1, 'method': 'initialize', 'params': {}}),\n    msg({'jsonrpc': '2.0', 'method': 'textDocument/didOpen', 'params': {'textDocument': {'uri': uri, 'languageId': 'nebula', 'version': 1, 'text': text}}}),\n    msg({'jsonrpc': '2.0', 'id': 2, 'method': 'textDocument/codeAction', 'params': {'textDocument': {'uri': uri}, 'range': {'start': {'line': 1, 'character': 0}, 'end': {'line': 3, 'character': 1}}, 'context': {'diagnostics': [], 'only': ['quickfix']}}}),\n    msg({'jsonrpc': '2.0', 'id': 3, 'method': 'textDocument/codeAction', 'params': {'textDocument': {'uri': uri}, 'range': {'start': {'line': 0, 'character': 0}, 'end': {'line': 0, 'character': 0}}, 'context': {'diagnostics': [], 'only': ['quickfix']}}}),\n    msg({'jsonrpc': '2.0', 'id': 4, 'method': 'textDocument/codeAction', 'params': {'textDocument': {'uri': uri}, 'range': {'start': {'line': 1, 'character': 0}, 'end': {'line': 3, 'character': 1}}, 'context': {'diagnostics': [], 'only': ['source']}}}),\n])\nout = subprocess.check_output([os.environ['NEBULA_BINARY'], 'lsp'], input=requests)\nresponses = {item.get('id'): item.get('result') for item in parse_messages(out) if 'id' in item}\nquickfix_actions = responses[2]\nif len(quickfix_actions) != 1 or quickfix_actions[0].get('kind') != 'quickfix' or 'edit' not in quickfix_actions[0]:\n    raise SystemExit(f'quickfix-only filter returned unexpected actions: {quickfix_actions!r}')\nmiss_actions = responses[3]\nif miss_actions != []:\n    raise SystemExit(f'non-overlapping quickfix range still returned actions: {miss_actions!r}')\nsource_actions = responses[4]\nif len(source_actions) != 1 or source_actions[0].get('kind') != 'source' or source_actions[0].get('title') != 'Format Document':\n    raise SystemExit(f'source-only filter returned unexpected actions: {source_actions!r}')\nprint('lsp-code-action-filtering-ok')\nPY"
expect_rc = 0
expect_stdout_contains = ["lsp-code-action-filtering-ok"]
