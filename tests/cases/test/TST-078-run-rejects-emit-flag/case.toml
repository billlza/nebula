id = "TST-078-run-rejects-emit-flag"
suite = "test"

[[steps]]
kind = "shell"
run = "$NEBULA_BINARY run \"$NEBULA_REPO_ROOT/tests/fixtures/build_no_execute.nb\" --emit staticlib > work/run-emit.out 2>&1"
expect_rc = 2

[[steps]]
kind = "shell"
run = "grep -F 'error: unknown option: --emit' work/run-emit.out"
expect_rc = 0
