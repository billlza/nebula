id = "TST-178-lsp-local-callable-references-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport json\nimport os\nimport subprocess\nimport tempfile\nfrom pathlib import Path\n\n\ndef msg(obj: dict) -> bytes:\n    body = json.dumps(obj, separators=(',', ':')).encode('utf-8')\n    return f'Content-Length: {len(body)}\\r\\n\\r\\n'.encode('utf-8') + body\n\n\ndef parse_messages(data: bytes) -> list[dict]:\n    out = []\n    cursor = 0\n    while cursor < len(data):\n        header_end = data.find(b'\\r\\n\\r\\n', cursor)\n        if header_end < 0:\n            break\n        headers = data[cursor:header_end].decode('utf-8')\n        length = 0\n        for line in headers.split('\\r\\n'):\n            if line.lower().startswith('content-length:'):\n                length = int(line.split(':', 1)[1].strip())\n        cursor = header_end + 4\n        body = data[cursor:cursor + length]\n        cursor += length\n        out.append(json.loads(body.decode('utf-8')))\n    return out\n\n\nroot = Path(tempfile.mkdtemp(prefix='nebula-lsp-callable-'))\nsource = root / 'main.nb'\nsource.write_text(\n    'module main\\n\\n'\n    'fn helper(v: Int) -> Int {\\n'\n    '  return v + 1\\n'\n    '}\\n\\n'\n    'fn main(x: Int) -> Int {\\n'\n    '  let f = helper\\n'\n    '  return f(x)\\n'\n    '}\\n',\n    encoding='utf-8',\n)\ntext = source.read_text(encoding='utf-8')\ncall_char = text.splitlines()[8].index('f')\nrequests = b''.join([\n    msg({'jsonrpc': '2.0', 'id': 1, 'method': 'initialize', 'params': {}}),\n    msg({'jsonrpc': '2.0', 'method': 'textDocument/didOpen', 'params': {'textDocument': {'uri': 'file://' + str(source.resolve()), 'languageId': 'nebula', 'version': 1, 'text': text}}}),\n    msg({'jsonrpc': '2.0', 'id': 2, 'method': 'textDocument/references', 'params': {'textDocument': {'uri': 'file://' + str(source.resolve())}, 'position': {'line': 8, 'character': call_char}}}),\n])\nout = subprocess.check_output([os.environ['NEBULA_BINARY'], 'lsp'], input=requests)\nresponses = {item.get('id'): item.get('result') for item in parse_messages(out) if 'id' in item}\nrefs = responses[2]\nif len(refs) != 2:\n    raise SystemExit(f'expected 2 local callable references, got {refs!r}')\nprint('lsp-local-callable-ok')\nPY"
expect_rc = 0
expect_stdout_contains = ["lsp-local-callable-ok"]
