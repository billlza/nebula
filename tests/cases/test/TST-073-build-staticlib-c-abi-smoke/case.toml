id = "TST-073-build-staticlib-c-abi-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "rm -rf work/cabi_static && cp -R \"$NEBULA_REPO_ROOT/examples/c_abi_export\" work/cabi_static"
expect_rc = 0

[[steps]]
kind = "shell"
run = "$NEBULA_BINARY build work/cabi_static --emit staticlib"
expect_rc = 0

[[steps]]
kind = "shell"
run = "test -f generated_cpp/libabi-demo.a && test -f generated_cpp/abi-demo.h && grep -F 'nebula_abi_demo_main_add' generated_cpp/abi-demo.h"
expect_rc = 0

[[steps]]
kind = "shell"
run = "cxx=${CXX:-clang++} && \"$cxx\" -std=c++23 work/cabi_static/consumer.cpp generated_cpp/libabi-demo.a -Igenerated_cpp -o work/cabi_static/consumer"
expect_rc = 0

[[steps]]
kind = "shell"
run = "work/cabi_static/consumer"
expect_rc = 0
expect_stdout_contains = ["42"]
