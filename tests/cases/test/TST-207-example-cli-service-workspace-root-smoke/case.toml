id = "TST-207-example-cli-service-workspace-root-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport os\nimport sys\nfrom pathlib import Path\n\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nsys.path.insert(0, str(repo_root / 'tests' / 'lib'))\nfrom cli_service_workspace import copy_example, fetch_workspace, nebula, require_success\n\nbinary = os.environ['NEBULA_BINARY']\nroot = Path('work/example_cli_service_workspace_root')\ncopy_example(repo_root, root)\nfetch_workspace(binary, root)\n\nif not (root / 'nebula.lock').exists():\n    raise SystemExit('workspace fetch did not write a root nebula.lock')\nif (root / 'apps' / 'ctl' / 'nebula.lock').exists() or (root / 'apps' / 'service' / 'nebula.lock').exists() or (root / 'packages' / 'core' / 'nebula.lock').exists():\n    raise SystemExit('workspace fetch should not write member lockfiles')\n\nlock_text = (root / 'nebula.lock').read_text(encoding='utf-8')\nfor fragment in [\n    'root_package = \"@workspace:',\n    'source_kind = \"workspace\"',\n    'name = \"cli-service-skeleton-service\"',\n    'name = \"nebula-service\"',\n    'source_kind = \"installed\"',\n    'host_cxx = [\"host.cpp\"]',\n]:\n    if fragment not in lock_text:\n        raise SystemExit(f'missing lockfile fragment: {fragment!r}')\n\nrequire_success(nebula(binary, 'check', root), 'workspace check')\nrequire_success(nebula(binary, 'build', root), 'workspace build')\nroot_run = nebula(binary, 'run', root, '--run-gate', 'none', '--', 'config-validate')\nrequire_success(root_run, 'workspace root run')\nif 'base_url=http://127.0.0.1:40480' not in root_run.stdout:\n    print(root_run.stdout, end='')\n    print(root_run.stderr, end='')\n    raise SystemExit('workspace root run did not target the CLI default command path')\n\ntests = nebula(binary, 'test', '--dir', root)\nrequire_success(tests, 'workspace test')\ntests_output = tests.stdout + tests.stderr\nif '[test] test_default_base_url_contract' not in tests_output or '[test] test_config_list_envelope_roundtrip' not in tests_output:\n    print(tests_output, end='')\n    raise SystemExit('workspace test did not execute the expected core tests')\n\nlatency_csv = Path('benchmark_results/latency.csv')\nif latency_csv.exists():\n    latency_csv.unlink()\nbench = nebula(binary, 'bench', '--dir', root)\nrequire_success(bench, 'workspace bench')\nbench_output = bench.stdout + bench.stderr\nif 'NEBULA_BENCH' not in bench_output:\n    print(bench_output, end='')\n    raise SystemExit('workspace bench did not emit benchmark output')\nif not latency_csv.exists():\n    raise SystemExit('workspace bench did not write benchmark_results/latency.csv')\nif 'file,warmup_iterations,measure_iterations' not in latency_csv.read_text(encoding='utf-8'):\n    raise SystemExit('workspace bench latency.csv was missing the expected header')\n\nprint('example-cli-service-workspace-root-ok')\nPY"
expect_rc = 0
expect_stdout_contains = ["example-cli-service-workspace-root-ok"]
