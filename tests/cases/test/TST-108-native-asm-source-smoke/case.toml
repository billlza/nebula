id = "TST-108-native-asm-source-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nfrom pathlib import Path\nimport platform\nroot = Path('work/native_asm')\ndep = root / 'dep'\napp = root / 'app'\nfor path in [dep / 'src', dep / 'native', app / 'src']:\n    path.mkdir(parents=True, exist_ok=True)\nsystem = platform.system()\nmachine = platform.machine().lower()\nif machine in ('arm64', 'aarch64'):\n    symbol = '_native_asm_impl' if system == 'Darwin' else 'native_asm_impl'\n    asm = f'.text\\n.globl {symbol}\\n.p2align 2\\n{symbol}:\\n  mov x0, #42\\n  ret\\n'\nelif machine == 'x86_64':\n    symbol = '_native_asm_impl' if system == 'Darwin' else 'native_asm_impl'\n    asm = f'.text\\n.globl {symbol}\\n{symbol}:\\n  mov $42, %rax\\n  ret\\n'\nelse:\n    raise SystemExit(f'unsupported host for asm smoke: {system}/{machine}')\n(dep / 'nebula.toml').write_text('schema_version = 1\\n\\n[package]\\nname = \"dep-asm\"\\nversion = \"0.1.0\"\\nentry = \"src/lib.nb\"\\nsrc_dir = \"src\"\\n\\n[[native.sources]]\\npath = \"native/value.S\"\\nlanguage = \"asm\"\\n\\n[[native.sources]]\\npath = \"native/bridge.cpp\"\\nlanguage = \"cxx\"\\n', encoding='utf-8')\n(dep / 'src' / 'lib.nb').write_text('module lib\\n\\nextern fn native_asm_value() -> Int\\n\\nfn dep_value() -> Int {\\n  return native_asm_value()\\n}\\n', encoding='utf-8')\n(dep / 'native' / 'value.S').write_text(asm, encoding='utf-8')\n(dep / 'native' / 'bridge.cpp').write_text('#include <cstdint>\\nextern \"C\" std::int64_t native_asm_impl();\\nstd::int64_t native_asm_value() { return native_asm_impl(); }\\n', encoding='utf-8')\n(app / 'nebula.toml').write_text('schema_version = 1\\n\\n[package]\\nname = \"asm-app\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n\\n[dependencies]\\ndep = { path = \"../dep\" }\\n', encoding='utf-8')\n(app / 'src' / 'main.nb').write_text('module main\\nimport dep::lib\\n\\nfn main() -> Void {\\n  if dep_value() == 42 {\\n    print(\"asm-ok\")\\n  } else {\\n    print(\"asm-bad\")\\n  }\\n}\\n', encoding='utf-8')\nPY"
expect_rc = 0

[[steps]]
kind = "nebula"
command = "fetch"
args = ["work/native_asm/app"]
expect_rc = 0

[[steps]]
kind = "nebula"
command = "run"
source = "work/native_asm/app"
args = ["--run-gate", "none"]
expect_rc = 0
expect_stdout_contains = ["asm-ok"]
