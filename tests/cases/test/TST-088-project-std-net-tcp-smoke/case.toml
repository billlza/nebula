id = "TST-088-project-std-net-tcp-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport socket\nfrom pathlib import Path\n\nwith socket.socket(socket.AF_INET, socket.SOCK_STREAM) as sock:\n    sock.bind(('127.0.0.1', 0))\n    port = sock.getsockname()[1]\n\nroot = Path('work/netproj')\n(root / 'src').mkdir(parents=True, exist_ok=True)\n(root / 'nebula.toml').write_text('schema_version = 1\\n\\n[package]\\nname = \"netproj\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n', encoding='utf-8')\n(root / 'src' / 'server.nb').write_text('module server\\nimport std::bytes\\nimport std::net\\nimport std::result\\n\\nasync fn serve_once(listener: TcpListener) -> Void {\\n  match await listener.accept() {\\n    Ok(stream) => {\\n      match stream.peer_addr() {\\n        Ok(_) => {}\\n        Err(msg) => {\\n          print(msg)\\n        }\\n      }\\n      match await stream.read(64) {\\n        Ok(bytes) => {\\n          expect_eq(len(bytes), 5)\\n          match await stream.write_all(bytes) {\\n            Ok(_) => {\\n              match stream.close() {\\n                Ok(_) => {}\\n                Err(msg) => { print(msg) }\\n              }\\n            }\\n            Err(msg) => {\\n              print(msg)\\n            }\\n          }\\n        }\\n        Err(msg) => {\\n          print(msg)\\n        }\\n      }\\n    }\\n    Err(msg) => {\\n      print(msg)\\n    }\\n  }\\n}\\n', encoding='utf-8')\n(root / 'src' / 'main.nb').write_text(f'module main\\nimport server\\nimport std::bytes\\nimport std::net\\nimport std::result\\nimport std::task\\nimport std::time\\n\\nasync fn main() -> Void {{\\n  match ipv4(\"127.0.0.1\", {port}) {{\\n    Ok(addr) => {{\\n      match await bind(addr) {{\\n        Ok(listener) => {{\\n          match listener.local_addr() {{\\n            Ok(_) => {{}}\\n            Err(msg) => {{\\n              print(msg)\\n            }}\\n          }}\\n          let task = spawn(serve_once(listener))\\n          await sleep(millis(1))\\n          match await connect(addr) {{\\n            Ok(stream) => {{\\n              match stream.local_addr() {{\\n                Ok(_) => {{}}\\n                Err(msg) => {{\\n                  print(msg)\\n                }}\\n              }}\\n              let payload = from_string(\"hello\")\\n              match await stream.write_all(payload) {{\\n                Ok(_) => {{\\n                  match await stream.read(64) {{\\n                    Ok(bytes) => {{\\n                      if to_string(bytes) == \"hello\" {{\\n                        match await stream.read(64) {{\\n                          Ok(rest) => {{\\n                            if is_empty(rest) {{\\n                              print(\"tcp-ok\")\\n                            }} else {{\\n                              print(\"tcp-extra\")\\n                            }}\\n                          }}\\n                          Err(msg) => {{\\n                            print(msg)\\n                          }}\\n                        }}\\n                      }} else {{\\n                        print(\"tcp-bad\")\\n                      }}\\n                    }}\\n                    Err(msg) => {{\\n                      print(msg)\\n                    }}\\n                  }}\\n                }}\\n                Err(msg) => {{\\n                  print(msg)\\n                }}\\n              }}\\n              match stream.close() {{\\n                Ok(_) => {{}}\\n                Err(msg) => {{ print(msg) }}\\n              }}\\n              match listener.close() {{\\n                Ok(_) => {{}}\\n                Err(msg) => {{ print(msg) }}\\n              }}\\n              await join(task)\\n            }}\\n            Err(msg) => {{\\n              print(msg)\\n            }}\\n          }}\\n        }}\\n        Err(msg) => {{\\n          print(msg)\\n        }}\\n      }}\\n    }}\\n    Err(msg) => {{\\n      print(msg)\\n    }}\\n  }}\\n}}\\n', encoding='utf-8')\nPY"
expect_rc = 0

[[steps]]
kind = "nebula"
command = "run"
source = "work/netproj"
args = ["--run-gate", "none"]
expect_rc = 0
expect_stdout_contains = ["tcp-ok"]
