id = "TST-240-lsp-workspace-edit-quickfix-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport json\nimport os\nimport subprocess\nimport tempfile\nfrom pathlib import Path\n\n\ndef msg(obj: dict) -> bytes:\n    body = json.dumps(obj, separators=(',', ':')).encode('utf-8')\n    return f'Content-Length: {len(body)}\\r\\n\\r\\n'.encode('utf-8') + body\n\n\ndef parse_messages(data: bytes) -> list[dict]:\n    out = []\n    cursor = 0\n    while cursor < len(data):\n        header_end = data.find(b'\\r\\n\\r\\n', cursor)\n        if header_end < 0:\n            break\n        headers = data[cursor:header_end].decode('utf-8')\n        length = 0\n        for line in headers.split('\\r\\n'):\n            if line.lower().startswith('content-length:'):\n                length = int(line.split(':', 1)[1].strip())\n        cursor = header_end + 4\n        body = data[cursor:cursor + length]\n        cursor += length\n        out.append(json.loads(body.decode('utf-8')))\n    return out\n\n\ndef apply_single_edit(text: str, edit: dict) -> str:\n    def offset_for_position(current: str, line: int, character: int) -> int:\n        lines = current.splitlines(keepends=True)\n        if line < 0 or line >= len(lines):\n            raise SystemExit(f'invalid line {line} for {current!r}')\n        return len(''.join(lines[:line])) + character\n\n    edit_range = edit['range']\n    start = offset_for_position(text, edit_range['start']['line'], edit_range['start']['character'])\n    end = offset_for_position(text, edit_range['end']['line'], edit_range['end']['character'])\n    return text[:start] + edit['newText'] + text[end:]\n\n\nroot = Path(tempfile.mkdtemp(prefix='nebula-lsp-quickfix-'))\nunsafe_bad_text = (\n    '@unsafe\\n'\n    'struct Bad {\\n'\n    '  value: Int\\n'\n    '}\\n'\n)\n(root / 'unsafe_bad.nb').write_text(unsafe_bad_text, encoding='utf-8')\nbad_uri = 'file://' + str((root / 'unsafe_bad.nb').resolve())\nrequests = b''.join([\n    msg({'jsonrpc': '2.0', 'id': 1, 'method': 'initialize', 'params': {}}),\n    msg({'jsonrpc': '2.0', 'method': 'textDocument/didOpen', 'params': {'textDocument': {'uri': bad_uri, 'languageId': 'nebula', 'version': 1, 'text': unsafe_bad_text}}}),\n    msg({'jsonrpc': '2.0', 'id': 2, 'method': 'textDocument/codeAction', 'params': {'textDocument': {'uri': bad_uri}, 'range': {'start': {'line': 1, 'character': 0}, 'end': {'line': 3, 'character': 1}}, 'context': {'diagnostics': []}}}),\n])\nout = subprocess.check_output([os.environ['NEBULA_BINARY'], 'lsp'], input=requests)\nresponses = {item.get('id'): item.get('result') for item in parse_messages(out) if 'id' in item}\nbad_actions = responses[2]\nbad_fix = next((item for item in bad_actions if item.get('title') == 'remove @unsafe from this struct'), None)\nif bad_fix is None:\n    raise SystemExit(f'missing invalid-annotation quickfix action: {bad_actions!r}')\nif bad_fix.get('kind') != 'quickfix' or 'edit' not in bad_fix or 'command' in bad_fix:\n    raise SystemExit(f'invalid-annotation quickfix did not return a direct WorkspaceEdit: {bad_fix!r}')\nbad_edits = bad_fix['edit']['changes'][bad_uri]\nif len(bad_edits) != 1:\n    raise SystemExit(f'unexpected invalid-annotation edit count: {bad_fix!r}')\nbad_text_after = apply_single_edit(unsafe_bad_text, bad_edits[0])\nif '@unsafe' in bad_text_after or 'struct Bad' not in bad_text_after:\n    raise SystemExit(f'invalid-annotation quickfix edit was incorrect: {bad_text_after!r}')\nprint('lsp-workspace-edit-quickfix-ok')\nPY"
expect_rc = 0
expect_stdout_contains = ["lsp-workspace-edit-quickfix-ok"]
