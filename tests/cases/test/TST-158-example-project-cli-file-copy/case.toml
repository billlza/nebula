id = "TST-158-example-project-cli-file-copy"
suite = "test"

[[steps]]
kind = "shell"
run = "printf 'project-cli-example\\n' > work/project_cli_input.txt"
expect_rc = 0
must_exist = ["work/project_cli_input.txt"]

[[steps]]
kind = "shell"
run = "\"$NEBULA_BINARY\" run \"$NEBULA_REPO_ROOT/examples/project_cli\" --run-gate none -- work/project_cli_input.txt work/project_cli_output.txt"
expect_rc = 0

[[steps]]
kind = "shell"
run = "cmp work/project_cli_input.txt work/project_cli_output.txt"
expect_rc = 0

[[steps]]
kind = "shell"
run = "\"$NEBULA_BINARY\" run \"$NEBULA_REPO_ROOT/examples/project_cli\" --run-gate none"
expect_rc = 1
expect_stdout_contains = ["usage: nebula run examples/project_cli --run-gate none -- <input> <output>"]
