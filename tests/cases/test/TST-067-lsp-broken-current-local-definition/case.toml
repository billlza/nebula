id = "TST-067-lsp-broken-current-local-definition"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nfrom pathlib import Path\nimport json, os, subprocess, tempfile\nroot = Path(tempfile.mkdtemp(dir='work'))\nfile = root / 'broken_local.nb'\ngood = 'fn main(p: Int) -> Int {\\n  let value = p + 1\\n  return value\\n}\\n'\nbad = good + '\\nfn broken( -> Int {\\n  return 0\\n}\\n'\nfile.write_text(good, encoding='utf-8')\nproc = subprocess.Popen([os.environ['NEBULA_BINARY'], 'lsp'], stdin=subprocess.PIPE, stdout=subprocess.PIPE, stderr=subprocess.STDOUT)\n\ndef send(obj):\n    body = json.dumps(obj, separators=(',', ':')).encode()\n    proc.stdin.write(f'Content-Length: {len(body)}\\r\\n\\r\\n'.encode() + body)\n    proc.stdin.flush()\n\ndef recv():\n    header = b''\n    while b'\\r\\n\\r\\n' not in header:\n        chunk = proc.stdout.read(1)\n        if not chunk:\n            raise RuntimeError('lsp closed while waiting for header')\n        header += chunk\n    head, _, rest = header.partition(b'\\r\\n\\r\\n')\n    length = 0\n    for line in head.decode().split('\\r\\n'):\n        if line.lower().startswith('content-length:'):\n            length = int(line.split(':', 1)[1].strip())\n    body = rest\n    while len(body) < length:\n        chunk = proc.stdout.read(length - len(body))\n        if not chunk:\n            raise RuntimeError('lsp closed while waiting for body')\n        body += chunk\n    return body.decode()\n\nuri = 'file://' + str(file.resolve())\nresponses = []\nmessages = [\n    {'jsonrpc': '2.0', 'id': 1, 'method': 'initialize', 'params': {}},\n    {'jsonrpc': '2.0', 'method': 'textDocument/didOpen', 'params': {'textDocument': {'uri': uri, 'languageId': 'nebula', 'version': 1, 'text': good}}},\n    {'jsonrpc': '2.0', 'method': 'textDocument/didChange', 'params': {'textDocument': {'uri': uri, 'version': 2}, 'contentChanges': [{'text': bad}]}},\n    {'jsonrpc': '2.0', 'id': 2, 'method': 'textDocument/definition', 'params': {'textDocument': {'uri': uri}, 'position': {'line': 2, 'character': 9}}},\n    {'jsonrpc': '2.0', 'id': 3, 'method': 'textDocument/hover', 'params': {'textDocument': {'uri': uri}, 'position': {'line': 1, 'character': 14}}},\n    {'jsonrpc': '2.0', 'id': 4, 'method': 'shutdown', 'params': {}},\n]\nfor msg in messages:\n    send(msg)\n    responses.append(recv())\nsend({'jsonrpc': '2.0', 'method': 'exit', 'params': {}})\nproc.stdin.close()\nproc.wait(timeout=5)\nPath('work/lsp-broken-current-local.out').write_text('\\n'.join(responses), encoding='utf-8')\nraise SystemExit(proc.returncode)\nPY"
expect_rc = 0

[[steps]]
kind = "shell"
run = "grep -F '\"id\":2' work/lsp-broken-current-local.out && grep -F '\"start\":{\"character\":6,\"line\":1}' work/lsp-broken-current-local.out && grep -F '\"id\":3,\"jsonrpc\":\"2.0\",\"result\":{\"contents\":{\"kind\":\"markdown\",\"value\":\"param p: Int\"}}' work/lsp-broken-current-local.out"
expect_rc = 0
