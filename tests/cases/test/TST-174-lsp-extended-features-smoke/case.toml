id = "TST-174-lsp-extended-features-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport json\nimport os\nimport subprocess\nimport tempfile\nfrom pathlib import Path\n\n\ndef msg(obj: dict) -> bytes:\n    body = json.dumps(obj, separators=(',', ':')).encode('utf-8')\n    return f'Content-Length: {len(body)}\\r\\n\\r\\n'.encode('utf-8') + body\n\n\ndef parse_messages(data: bytes) -> list[dict]:\n    out = []\n    cursor = 0\n    while cursor < len(data):\n        header_end = data.find(b'\\r\\n\\r\\n', cursor)\n        if header_end < 0:\n            break\n        headers = data[cursor:header_end].decode('utf-8')\n        length = 0\n        for line in headers.split('\\r\\n'):\n            if line.lower().startswith('content-length:'):\n                length = int(line.split(':', 1)[1].strip())\n        cursor = header_end + 4\n        body = data[cursor:cursor + length]\n        cursor += length\n        out.append(json.loads(body.decode('utf-8')))\n    return out\n\n\ndef lsp_position(text: str, needle: str, *, occurrence: int = 0, offset: int = 0) -> dict:\n    start = 0\n    index = -1\n    for _ in range(occurrence + 1):\n        index = text.index(needle, start)\n        start = index + len(needle)\n    absolute = index + offset\n    prefix = text[:absolute]\n    line = prefix.count('\\n')\n    line_start = prefix.rfind('\\n')\n    character = len(prefix) if line_start < 0 else len(prefix) - line_start - 1\n    return {'line': line, 'character': character}\n\n\nroot = Path(tempfile.mkdtemp(prefix='nebula-lsp-ext-'))\ndefs_text = (\n    'module defs\\n\\n'\n    'fn helper(value: Int, scale: Int) -> Int {\\n'\n    '  return value + scale\\n'\n    '}\\n'\n)\nmain_text = (\n    'module main\\n'\n    'import defs\\n\\n'\n    'fn local_only(seed: Int) -> Int {\\n'\n    '  let temp = helper(seed, 1)\\n'\n    '  return temp\\n'\n    '}\\n\\n'\n    'fn main() -> Int {\\n'\n    '  let value = local_only(40)\\n'\n    '  return value\\n'\n    '}\\n'\n)\nasync_text = (\n    'import std::task\\n\\n'\n    'async fn work() -> Int {\\n'\n    '  await yield_now()\\n'\n    '  return 1\\n'\n    '}\\n'\n)\nbroken_text = (\n    'module broken\\n\\n'\n    'fn broken( -> Int {\\n'\n    '  return 1\\n'\n    '}\\n'\n)\n(root / 'defs.nb').write_text(defs_text, encoding='utf-8')\n(root / 'main.nb').write_text(main_text, encoding='utf-8')\n(root / 'async.nb').write_text(async_text, encoding='utf-8')\n(root / 'broken.nb').write_text(broken_text, encoding='utf-8')\n\ndefs_uri = 'file://' + str((root / 'defs.nb').resolve())\nmain_uri = 'file://' + str((root / 'main.nb').resolve())\nasync_uri = 'file://' + str((root / 'async.nb').resolve())\nbroken_uri = 'file://' + str((root / 'broken.nb').resolve())\n\ncompletion_position = lsp_position(main_text, 'helper(seed, 1)', offset=3)\nreferences_position = lsp_position(main_text, 'local_only(seed', offset=2)\nawait_position = lsp_position(async_text, 'yield_now', offset=2)\nsignature_position = lsp_position(main_text, 'helper(seed, 1)', offset=len('helper(seed, '))\nrename_position = lsp_position(main_text, 'local_only(seed', offset=2)\nchange_start = lsp_position(main_text, 'local_only')\nchange_end = lsp_position(main_text, 'local_only', offset=len('local_only'))\n\nrequests = b''.join([\n    msg({'jsonrpc': '2.0', 'id': 1, 'method': 'initialize', 'params': {}}),\n    msg({'jsonrpc': '2.0', 'method': 'textDocument/didOpen', 'params': {'textDocument': {'uri': defs_uri, 'languageId': 'nebula', 'version': 1, 'text': defs_text}}}),\n    msg({'jsonrpc': '2.0', 'method': 'textDocument/didOpen', 'params': {'textDocument': {'uri': main_uri, 'languageId': 'nebula', 'version': 1, 'text': main_text}}}),\n    msg({'jsonrpc': '2.0', 'method': 'textDocument/didOpen', 'params': {'textDocument': {'uri': async_uri, 'languageId': 'nebula', 'version': 1, 'text': async_text}}}),\n    msg({'jsonrpc': '2.0', 'method': 'textDocument/didOpen', 'params': {'textDocument': {'uri': broken_uri, 'languageId': 'nebula', 'version': 1, 'text': broken_text}}}),\n    msg({'jsonrpc': '2.0', 'id': 2, 'method': 'textDocument/completion', 'params': {'textDocument': {'uri': main_uri}, 'position': completion_position}}),\n    msg({'jsonrpc': '2.0', 'id': 3, 'method': 'textDocument/references', 'params': {'textDocument': {'uri': main_uri}, 'position': references_position}}),\n    msg({'jsonrpc': '2.0', 'id': 4, 'method': 'textDocument/hover', 'params': {'textDocument': {'uri': async_uri}, 'position': await_position}}),\n    msg({'jsonrpc': '2.0', 'id': 5, 'method': 'workspace/symbol', 'params': {'query': 'helper'}}),\n    msg({'jsonrpc': '2.0', 'id': 6, 'method': 'textDocument/signatureHelp', 'params': {'textDocument': {'uri': main_uri}, 'position': signature_position}}),\n    msg({'jsonrpc': '2.0', 'id': 7, 'method': 'textDocument/rename', 'params': {'textDocument': {'uri': main_uri}, 'position': rename_position, 'newName': 'renamed_local'}}),\n    msg({'jsonrpc': '2.0', 'id': 8, 'method': 'textDocument/semanticTokens/full', 'params': {'textDocument': {'uri': main_uri}}}),\n    msg({'jsonrpc': '2.0', 'id': 9, 'method': 'textDocument/codeAction', 'params': {'textDocument': {'uri': broken_uri}, 'range': {'start': {'line': 2, 'character': 0}, 'end': {'line': 2, 'character': 4}}, 'context': {'diagnostics': []}}}),\n    msg({'jsonrpc': '2.0', 'method': 'textDocument/didChange', 'params': {'textDocument': {'uri': main_uri, 'version': 2}, 'contentChanges': [{'range': {'start': change_start, 'end': change_end}, 'text': 'compute_local'}]}}),\n    msg({'jsonrpc': '2.0', 'id': 10, 'method': 'textDocument/documentSymbol', 'params': {'textDocument': {'uri': main_uri}}}),\n])\nout = subprocess.check_output([os.environ['NEBULA_BINARY'], 'lsp'], input=requests)\nresponses = {item.get('id'): item.get('result') for item in parse_messages(out) if 'id' in item}\ninit_caps = responses[1]['capabilities']\nrequired_caps = [\n    'completionProvider',\n    'referencesProvider',\n    'documentSymbolProvider',\n    'renameProvider',\n    'workspaceSymbolProvider',\n    'codeActionProvider',\n    'signatureHelpProvider',\n    'semanticTokensProvider',\n]\nmissing_caps = [name for name in required_caps if name not in init_caps]\nif missing_caps:\n    raise SystemExit(f'initialize capabilities missing providers: {missing_caps!r}')\nif init_caps['textDocumentSync'] != {'change': 2, 'openClose': True}:\n    raise SystemExit(f'textDocumentSync was not incremental: {init_caps[\"textDocumentSync\"]!r}')\ncompletion_labels = {item.get('label') for item in responses[2]}\nif 'helper' not in completion_labels or 'fn' not in completion_labels:\n    raise SystemExit(f'completion result missing expected labels: {sorted(completion_labels)}')\nreferences = responses[3]\nreference_uris = {item.get('uri') for item in references}\nif len(references) != 2 or reference_uris != {main_uri}:\n    raise SystemExit(f'references result was incomplete: {references!r}')\nhover_value = responses[4]['contents']['value']\nif 'async await' not in hover_value or 'allocation: async-frame' not in hover_value:\n    raise SystemExit(f'async hover was missing expected metadata: {hover_value!r}')\nworkspace_symbols = responses[5]\nif not any(item.get('name') == 'helper' for item in workspace_symbols):\n    raise SystemExit(f'workspace symbol result missing helper: {workspace_symbols!r}')\nsignature_help = responses[6]\nif signature_help['activeParameter'] != 1:\n    raise SystemExit(f'signatureHelp did not track the second argument: {signature_help!r}')\nif 'fn helper(value: Int, scale: Int) -> Int' not in signature_help['signatures'][0]['label']:\n    raise SystemExit(f'signatureHelp label was unexpected: {signature_help!r}')\nrename_changes = responses[7]['changes']\nrename_edit_count = sum(len(edits) for edits in rename_changes.values())\nif set(rename_changes.keys()) != {main_uri} or rename_edit_count != 2:\n    raise SystemExit(f'rename result was incomplete: {rename_changes!r}')\nsemantic_tokens = responses[8]['data']\nif len(semantic_tokens) < 5 or len(semantic_tokens) % 5 != 0:\n    raise SystemExit(f'semantic token payload was malformed: {semantic_tokens!r}')\ncode_action_titles = {item.get('title') for item in responses[9]}\nif 'Format Document' not in code_action_titles or 'Explain Symbol' not in code_action_titles:\n    raise SystemExit(f'codeAction result missing expected commands: {sorted(code_action_titles)!r}')\ndoc_symbols = responses[10]\ndoc_symbol_names = {item.get('name') for item in doc_symbols}\nif 'compute_local' not in doc_symbol_names or 'local_only' in doc_symbol_names:\n    raise SystemExit(f'incremental didChange was not reflected in document symbols: {doc_symbols!r}')\nprint('lsp-extended-ok')\nPY"
expect_rc = 0
expect_stdout_contains = ["lsp-extended-ok"]
