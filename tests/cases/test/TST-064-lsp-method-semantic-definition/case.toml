id = "TST-064-lsp-method-semantic-definition"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nfrom pathlib import Path\nimport json, os, subprocess, tempfile\nroot = Path(tempfile.mkdtemp(dir='work'))\nfile = root / 'method_defs.nb'\nfile.write_text('struct Point {\\n  x: Int\\n}\\n\\nfn Point_len(self: Point) -> Int {\\n  return self.x\\n}\\n\\nfn make_point() -> Point {\\n  return Point(1)\\n}\\n\\nfn main() -> Int {\\n  let p = Point(7)\\n  let a = p.len()\\n  return a + make_point().len()\\n}\\n', encoding='utf-8')\nproc = subprocess.Popen([os.environ['NEBULA_BINARY'], 'lsp'], stdin=subprocess.PIPE, stdout=subprocess.PIPE, stderr=subprocess.STDOUT)\n\ndef send(obj):\n    body = json.dumps(obj, separators=(',', ':')).encode()\n    proc.stdin.write(f'Content-Length: {len(body)}\\r\\n\\r\\n'.encode() + body)\n    proc.stdin.flush()\n\ndef recv():\n    header = b''\n    while b'\\r\\n\\r\\n' not in header:\n        chunk = proc.stdout.read(1)\n        if not chunk:\n            raise RuntimeError('lsp closed while waiting for header')\n        header += chunk\n    head, _, rest = header.partition(b'\\r\\n\\r\\n')\n    length = 0\n    for line in head.decode().split('\\r\\n'):\n        if line.lower().startswith('content-length:'):\n            length = int(line.split(':', 1)[1].strip())\n    body = rest\n    while len(body) < length:\n        chunk = proc.stdout.read(length - len(body))\n        if not chunk:\n            raise RuntimeError('lsp closed while waiting for body')\n        body += chunk\n    return body.decode()\n\nuri = 'file://' + str(file.resolve())\nresponses = []\nmessages = [\n    {'jsonrpc': '2.0', 'id': 1, 'method': 'initialize', 'params': {}},\n    {'jsonrpc': '2.0', 'method': 'textDocument/didOpen', 'params': {'textDocument': {'uri': uri, 'languageId': 'nebula', 'version': 1, 'text': file.read_text(encoding='utf-8')}}},\n    {'jsonrpc': '2.0', 'id': 2, 'method': 'textDocument/definition', 'params': {'textDocument': {'uri': uri}, 'position': {'line': 14, 'character': 13}}},\n    {'jsonrpc': '2.0', 'id': 3, 'method': 'textDocument/definition', 'params': {'textDocument': {'uri': uri}, 'position': {'line': 15, 'character': 27}}},\n    {'jsonrpc': '2.0', 'id': 4, 'method': 'textDocument/hover', 'params': {'textDocument': {'uri': uri}, 'position': {'line': 14, 'character': 13}}},\n    {'jsonrpc': '2.0', 'id': 5, 'method': 'shutdown', 'params': {}},\n]\nfor msg in messages:\n    send(msg)\n    responses.append(recv())\nsend({'jsonrpc': '2.0', 'method': 'exit', 'params': {}})\nproc.stdin.close()\nproc.wait(timeout=5)\nPath('work/lsp-method-semantic.out').write_text('\\n'.join(responses), encoding='utf-8')\nraise SystemExit(proc.returncode)\nPY"
expect_rc = 0

[[steps]]
kind = "shell"
run = "grep -F '\"id\":2' work/lsp-method-semantic.out && grep -F '\"id\":3' work/lsp-method-semantic.out && grep -F '\"start\":{\"character\":0,\"line\":4}' work/lsp-method-semantic.out && grep -F '\"value\":\"fn Point_len(self: Point) -> Int\"' work/lsp-method-semantic.out"
expect_rc = 0
