id = "TST-239-app-platform-benchmark-plan-contract"
suite = "test"

[[steps]]
kind = "shell"
run = """
python3 - <<'PY'
import json
import os
import subprocess
from pathlib import Path

repo_root = Path(os.environ['NEBULA_REPO_ROOT'])
script = repo_root / 'scripts' / 'app_platform_bench.py'
subprocess.run(['python3', str(script), 'verify'], check=True)
plan_json = subprocess.check_output([
    'python3',
    str(script),
    'plan',
    '--format',
    'json',
], text=True)
payload = json.loads(plan_json)
if payload['kind'] != 'app_platform_benchmark_plan':
    raise SystemExit(f'unexpected payload kind: {payload!r}')
if payload['machine']['host_platform_tag'] == '':
    raise SystemExit(f'missing host_platform_tag: {payload!r}')
matrix = payload['matrix']
if matrix['comparison_layers'] != ['nebula_owned', 'host_owned', 'ops_owned']:
    raise SystemExit(f'unexpected comparison layers: {matrix!r}')
if sorted(matrix['reference_stacks'].keys()) != ['cpp', 'rust', 'swift']:
    raise SystemExit(f'unexpected reference stacks: {matrix!r}')
ids = [item['id'] for item in matrix['workloads']]
expected = [
    'cli_cold_start',
    'service_json_db_crud',
    'thin_host_bridge_roundtrip',
    'thin_host_payload_command_roundtrip',
    'state_sync_latency',
    'resident_memory',
    'nebula_ui_startup',
    'ui_action_roundtrip',
    'ui_snapshot_render',
    'ui_layout_pass',
    'ui_render_list_build',
    'ui_hit_test_dispatch',
    'ui_patch_apply',
    'ui_gpu_submit_smoke',
]
if ids != expected:
    raise SystemExit(f'unexpected workload ids: {ids!r}')
for key in ('clang++', 'rustc', 'swiftc', 'cmake', 'python3'):
    if key not in payload['toolchains']:
        raise SystemExit(f'missing toolchain entry: {key}')
for workload in matrix['workloads']:
    if not workload.get('nebula_paths'):
        raise SystemExit(f'missing nebula_paths: {workload!r}')
workloads = {item['id']: item for item in matrix['workloads']}
if workloads['cli_cold_start'].get('nebula_project') != 'benchmarks/app_platform/nebula/cli_cold_start':
    raise SystemExit(f'missing runnable cli_cold_start project: {workloads!r}')
if workloads['service_json_db_crud'].get('nebula_project') != 'benchmarks/app_platform/nebula/service_json_db_crud':
    raise SystemExit(f'missing runnable service_json_db_crud project: {workloads!r}')
if workloads['service_json_db_crud'].get('reference_stacks') != ['cpp']:
    raise SystemExit(f'missing cpp service_json_db_crud reference stack: {workloads!r}')
if workloads['service_json_db_crud'].get('reference_projects', {}).get('cpp') != 'benchmarks/app_platform/reference/cpp/service_json_db_crud':
    raise SystemExit(f'missing cpp service_json_db_crud reference project: {workloads!r}')
if workloads['thin_host_bridge_roundtrip'].get('nebula_project') != 'benchmarks/app_platform/nebula/thin_host_bridge_roundtrip':
    raise SystemExit(f'missing runnable thin_host_bridge_roundtrip project: {workloads!r}')
if workloads['thin_host_bridge_roundtrip'].get('reference_stacks') != ['cpp']:
    raise SystemExit(f'missing cpp thin_host_bridge_roundtrip reference stack: {workloads!r}')
if workloads['thin_host_bridge_roundtrip'].get('reference_projects', {}).get('cpp') != 'benchmarks/app_platform/reference/cpp/thin_host_bridge_roundtrip':
    raise SystemExit(f'missing cpp thin_host_bridge_roundtrip reference project: {workloads!r}')
if workloads['thin_host_payload_command_roundtrip'].get('nebula_project') != 'benchmarks/app_platform/nebula/thin_host_payload_command_roundtrip':
    raise SystemExit(f'missing runnable thin_host_payload_command_roundtrip project: {workloads!r}')
if workloads['thin_host_payload_command_roundtrip'].get('reference_stacks') != ['cpp']:
    raise SystemExit(f'missing cpp thin_host_payload_command_roundtrip reference stack: {workloads!r}')
if workloads['thin_host_payload_command_roundtrip'].get('reference_projects', {}).get('cpp') != 'benchmarks/app_platform/reference/cpp/thin_host_payload_command_roundtrip':
    raise SystemExit(f'missing cpp thin_host_payload_command_roundtrip reference project: {workloads!r}')
if workloads['state_sync_latency'].get('nebula_project') != 'benchmarks/app_platform/nebula/state_sync_latency':
    raise SystemExit(f'missing runnable state_sync_latency project: {workloads!r}')
if workloads['state_sync_latency'].get('reference_stacks') != ['cpp']:
    raise SystemExit(f'missing cpp state_sync_latency reference stack: {workloads!r}')
if workloads['state_sync_latency'].get('reference_projects', {}).get('cpp') != 'benchmarks/app_platform/reference/cpp/state_sync_latency':
    raise SystemExit(f'missing cpp state_sync_latency reference project: {workloads!r}')
if workloads['resident_memory'].get('nebula_project') != 'examples/release_control_plane_workspace/apps/service':
    raise SystemExit(f'missing runnable resident_memory project: {workloads!r}')
if workloads['resident_memory'].get('nebula_runner') != 'resident_memory':
    raise SystemExit(f'missing resident_memory runner contract: {workloads!r}')
if workloads['nebula_ui_startup'].get('nebula_project') != 'benchmarks/app_platform/nebula/nebula_ui_startup':
    raise SystemExit(f'missing runnable nebula_ui_startup project: {workloads!r}')
if workloads['ui_action_roundtrip'].get('nebula_project') != 'benchmarks/app_platform/nebula/ui_action_roundtrip':
    raise SystemExit(f'missing runnable ui_action_roundtrip project: {workloads!r}')
if workloads['ui_snapshot_render'].get('nebula_project') != 'benchmarks/app_platform/nebula/ui_snapshot_render':
    raise SystemExit(f'missing runnable ui_snapshot_render project: {workloads!r}')
for workload_id in (
    'ui_action_roundtrip',
    'ui_snapshot_render',
    'ui_layout_pass',
    'ui_render_list_build',
    'ui_hit_test_dispatch',
    'ui_patch_apply',
    'ui_gpu_submit_smoke',
):
    workload = workloads[workload_id]
    if workload.get('reference_stacks') != ['cpp']:
        raise SystemExit(f'missing cpp {workload_id} reference stack: {workloads!r}')
    expected_project = f'benchmarks/app_platform/reference/cpp/{workload_id}'
    if workload.get('reference_projects', {}).get('cpp') != expected_project:
        raise SystemExit(f'missing cpp {workload_id} reference project: {workloads!r}')
print('app-platform-benchmark-plan-ok')
PY
"""
expect_rc = 0
expect_stdout_contains = ["app-platform-benchmark-plan-ok"]
