id = "TST-319-media-player-command-rejection-smoke"
suite = "test"
description = "media player rejects malformed, unknown, and invalid commands while preserving state revision"

[[steps]]
kind = "shell"
run = """
python3 - <<'PY'
import json
import os
import shutil
import sqlite3
import subprocess
from pathlib import Path

repo = Path(os.environ["NEBULA_REPO_ROOT"])
binary = os.environ["NEBULA_BINARY"]
app = repo / "examples" / "thin_host_media_player"
root = Path("work/media_player_command_rejection")
entry = root / "thin-host-media-player"
receipt_db = root / "receipts.db"
shutil.rmtree(root, ignore_errors=True)
shutil.rmtree(Path("work/thin_host_media_player"), ignore_errors=True)
root.mkdir(parents=True, exist_ok=True)

subprocess.run([binary, "update", str(app)], check=True, capture_output=True, text=True)
check = subprocess.run([binary, "check", str(app)], capture_output=True, text=True, check=True)
if "warning:" in check.stdout or "warning:" in check.stderr:
    raise SystemExit(f"media player check emitted warnings:\\n{check.stdout}\\n{check.stderr}")
subprocess.run([binary, "build", str(app), "--out", str(entry)], check=True, capture_output=True, text=True)

env = {
    **os.environ,
    "APP_SQLITE_PATH": str(receipt_db),
    "NEBULA_MEDIA_PLAYER_COMMAND_MODE": "rejections",
}
run = subprocess.run([str(entry)], capture_output=True, text=True, env=env, check=True)
events = [
    json.loads(line[len("media-player-event:"):])
    for line in run.stdout.splitlines()
    if line.startswith("media-player-event:")
]
rejections = [event for event in events if event["kind"] == "command_rejected"]
if [event["message"] for event in rejections] != [
    "unsupported thin-host command schema",
    "unknown media-player command kind",
    "media file path is required",
]:
    raise SystemExit(f"unexpected rejection messages: {rejections!r}")
if [event["state_revision"] for event in rejections] != [0, 0, 0]:
    raise SystemExit(f"rejections must preserve revision: {rejections!r}")
if events[-1]["kind"] != "media_player_quit" or events[-1]["state_revision"] != 1:
    raise SystemExit(f"quit should be the only accepted command: {events!r}")

with sqlite3.connect(receipt_db) as conn:
    app_events = conn.execute(
        "SELECT payload FROM app_local_runtime_receipts WHERE receipt_kind = 'event' ORDER BY receipt_id"
    ).fetchall()
payloads = [json.loads(row[0]) for row in app_events]
if [payload["accepted"] for payload in payloads] != [False, False, False, True]:
    raise SystemExit(f"bad app-local accepted flags: {payloads!r}")

boundary_db = root / "boundary-receipts.db"
shutil.rmtree(Path("work/thin_host_media_player"), ignore_errors=True)
boundary_env = {
    **os.environ,
    "APP_SQLITE_PATH": str(boundary_db),
    "NEBULA_MEDIA_PLAYER_COMMAND_MODE": "boundary_rejections",
}
boundary_run = subprocess.run([str(entry)], capture_output=True, text=True, env=boundary_env, check=True)
boundary_events = [
    json.loads(line[len("media-player-event:"):])
    for line in boundary_run.stdout.splitlines()
    if line.startswith("media-player-event:")
]
if [event["kind"] for event in boundary_events] != [
    "media_player_booted",
    "library_file_imported",
    "command_rejected",
    "command_rejected",
    "command_rejected",
    "media_player_quit",
]:
    raise SystemExit(f"unexpected boundary rejection events: {boundary_events!r}")
boundary_rejections = [event for event in boundary_events if event["kind"] == "command_rejected"]
if [event["message"] for event in boundary_rejections] != [
    "media item is not in Nebula media library",
    "no active download to cancel",
    "no active download for progress update",
]:
    raise SystemExit(f"unexpected boundary rejection messages: {boundary_rejections!r}")
if [event["state_revision"] for event in boundary_rejections] != [1, 1, 1]:
    raise SystemExit(f"boundary rejections must preserve imported revision: {boundary_rejections!r}")
if boundary_events[-1]["kind"] != "media_player_quit" or boundary_events[-1]["state_revision"] != 2:
    raise SystemExit(f"boundary quit should advance from imported state: {boundary_events!r}")

print("media-player-command-rejection-ok")
PY
"""
expect_rc = 0
expect_stdout_contains = ["media-player-command-rejection-ok"]
