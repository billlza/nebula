id = "TST-227-official-service-tls-mtls-principal-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport os\nimport platform\nimport shutil\nimport subprocess\nfrom pathlib import Path\n\nsystem = platform.system().lower()\nif system.startswith('windows') or system.startswith('msys') or system.startswith('mingw') or system.startswith('cygwin'):\n    print('service-tls-mtls-principal-skip-unsupported-host')\n    raise SystemExit(0)\nif shutil.which('openssl') is None:\n    raise SystemExit('openssl is required for official service TLS mTLS principal smoke test')\n\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nroot = Path('work/official_service_tls_mtls_principal')\napp = root / 'app'\nshutil.rmtree(root, ignore_errors=True)\n(app / 'src').mkdir(parents=True, exist_ok=True)\n\n(root / 'openssl_ca.cnf').write_text('''[req]\\ndistinguished_name = dn\\nx509_extensions = v3_ca\\nprompt = no\\n\\n[dn]\\nCN = Nebula Service mTLS CA\\n\\n[v3_ca]\\nsubjectKeyIdentifier = hash\\nauthorityKeyIdentifier = keyid:always,issuer\\nbasicConstraints = critical, CA:true\\nkeyUsage = critical, digitalSignature, keyCertSign, cRLSign\\n''', encoding='utf-8')\n(root / 'openssl_server.cnf').write_text('''[req]\\ndistinguished_name = dn\\nreq_extensions = v3_req\\nprompt = no\\n\\n[dn]\\nCN = localhost\\n\\n[v3_req]\\nsubjectAltName = @alt_names\\nbasicConstraints = CA:false\\nkeyUsage = critical, digitalSignature, keyEncipherment\\nextendedKeyUsage = serverAuth\\n\\n[alt_names]\\nDNS.1 = localhost\\nIP.1 = 127.0.0.1\\n''', encoding='utf-8')\n(root / 'openssl_client.cnf').write_text('''[req]\\ndistinguished_name = dn\\nreq_extensions = v3_req\\nprompt = no\\n\\n[dn]\\nCN = nebula-client\\n\\n[v3_req]\\nbasicConstraints = CA:false\\nkeyUsage = critical, digitalSignature, keyEncipherment\\nextendedKeyUsage = clientAuth\\n''', encoding='utf-8')\nsubprocess.run(['openssl', 'req', '-x509', '-newkey', 'rsa:2048', '-nodes', '-keyout', str(root / 'ca.key'), '-out', str(root / 'ca.pem'), '-days', '2', '-config', str(root / 'openssl_ca.cnf')], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\nsubprocess.run(['openssl', 'req', '-newkey', 'rsa:2048', '-nodes', '-keyout', str(root / 'server.key'), '-out', str(root / 'server.csr'), '-config', str(root / 'openssl_server.cnf')], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\nsubprocess.run(['openssl', 'x509', '-req', '-in', str(root / 'server.csr'), '-CA', str(root / 'ca.pem'), '-CAkey', str(root / 'ca.key'), '-CAcreateserial', '-out', str(root / 'server.pem'), '-days', '2', '-sha256', '-extfile', str(root / 'openssl_server.cnf'), '-extensions', 'v3_req'], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\nsubprocess.run(['openssl', 'req', '-newkey', 'rsa:2048', '-nodes', '-keyout', str(root / 'client.key'), '-out', str(root / 'client.csr'), '-config', str(root / 'openssl_client.cnf')], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\nsubprocess.run(['openssl', 'x509', '-req', '-in', str(root / 'client.csr'), '-CA', str(root / 'ca.pem'), '-CAkey', str(root / 'ca.key'), '-CAcreateserial', '-out', str(root / 'client.pem'), '-days', '2', '-sha256', '-extfile', str(root / 'openssl_client.cnf'), '-extensions', 'v3_req'], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\n\nserver_cert = (root / 'server.pem').read_text(encoding='utf-8')\nserver_key = (root / 'server.key').read_text(encoding='utf-8')\nclient_cert = (root / 'client.pem').read_text(encoding='utf-8')\nclient_key = (root / 'client.key').read_text(encoding='utf-8')\nca_pem = (root / 'ca.pem').read_text(encoding='utf-8')\n\ndef lit(text: str) -> str:\n    return text.replace('\\\\', '\\\\\\\\').replace('\\n', '\\\\n').replace('\"', '\\\\\"')\n\n(app / 'nebula.toml').write_text(f'''schema_version = 1\\n\\n[package]\\nname = \"official-service-tls-mtls-principal-smoke\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n\\n[dependencies]\\nservice = {{ path = \"{repo_root / 'official' / 'nebula-service'}\" }}\\ntlss = {{ path = \"{repo_root / 'official' / 'nebula-tls-server'}\" }}\\ntlsc = {{ path = \"{repo_root / 'official' / 'nebula-tls'}\" }}\\n''', encoding='utf-8')\n(app / 'src' / 'server_handler.nb').write_text('''module server_handler\\nimport service::context\\nimport service::tls\\nimport std::http\\nimport std::http_json\\nimport std::json\\nimport std::result\\n\\nasync fn handle_request(ctx: RequestContext, request: Request) -> Result<Response, String> {\\n  return await authorize_mtls_result(ctx, request, handle_whoami)\\n}\\n\\nasync fn handle_whoami(ctx: RequestContext, request: Request) -> Result<Response, String> {\\n  match ctx.principal() {\\n    Ok(value) => {\\n      match get_string(value.claims, \"scheme\") {\\n        Ok(scheme) => {\\n          return Ok(ok_json(object4(\\n            \"subject\",\\n            string_value(value.subject),\\n            \"scheme\",\\n            string_value(scheme),\\n            \"tls_peer_present\",\\n            bool_value(ctx.tls_peer_present()),\\n            \"tls_peer_verified\",\\n            bool_value(ctx.tls_peer_verified())\\n          )))\\n        }\\n        Err(msg) => {\\n          return Err(msg)\\n        }\\n      }\\n    }\\n    Err(msg) => {\\n      return Err(msg)\\n    }\\n  }\\n}\\n''', encoding='utf-8')\n(app / 'src' / 'tlsutil.nb').write_text('''module tlsutil\\nimport std::result\\nimport tlsc::client\\n\\nfn trust_store_from_ca_pem_text_for_server(ca_pem: String) -> Result<TlsTrustStore, String> {\\n  return trust_store_from_ca_pem_text(ca_pem)\\n}\\n''', encoding='utf-8')\n(app / 'src' / 'server_app.nb').write_text(f'''module server_app\\nimport server_handler\\nimport service::config\\nimport service::tls\\nimport std::result\\nimport tlsutil\\nimport tlss::server\\n\\nfn build_server_tls_config(ca_pem: String) -> Result<ServerConfig, String> {{\\n  let trust_store = trust_store_from_ca_pem_text_for_server(ca_pem)?\\n  let identity = server_identity_from_pem_text(\"{lit(server_cert)}\", \"{lit(server_key)}\")?\\n  let tls_cfg0 = with_version_policy(server_config(identity), tls12_or_13_policy())\\n  let tls_cfg1 = with_alpn_policy(tls_cfg0, alpn_http11_only_policy())\\n  return Ok(with_client_auth_policy(tls_cfg1, required_client_auth(trust_store)))\\n}}\\n\\nasync fn bind_service_listener(cfg: ServiceConfig, ca_pem: String) -> Result<TlsListener, String> {{\\n  let tls_cfg = build_server_tls_config(ca_pem)?\\n  return await bind_tls_listener(cfg, tls_cfg)\\n}}\\n\\nasync fn serve_one(listener: TlsListener, cfg: ServiceConfig) -> Result<Int, String> {{\\n  return await serve_requests_n_result_with_context_tls(listener, cfg, 1, handle_request)\\n}}\\n''', encoding='utf-8')\n(app / 'src' / 'client_app.nb').write_text(f'''module client_app\\nimport std::http\\nimport std::http_json\\nimport std::json\\nimport std::result\\nimport tlsc::client\\nimport tlsc::http\\n\\nfn build_client_config(ca_pem: String) -> Result<ClientConfig, String> {{\\n  let base_cfg = client_config_from_ca_pem_text(ca_pem)?\\n  let identity = client_identity_from_pem_text(\"{lit(client_cert)}\", \"{lit(client_key)}\")?\\n  let client_cfg0 = with_client_identity(base_cfg, identity)\\n  let client_cfg1 = with_version_policy(client_cfg0, tls12_or_13())\\n  return Ok(with_alpn_policy(client_cfg1, alpn_http11_only()))\\n}}\\n\\nasync fn call_whoami(port: Int, ca_pem: String) -> Result<Json, String> {{\\n  let cfg = build_client_config(ca_pem)?\\n  match await dial_host(\"localhost\", port, cfg) {{\\n    Ok(stream) => {{\\n      let req = get_request(\"localhost\", \"/whoami\")\\n      match await TlsClientStream_write_request(stream, req) {{\\n        Ok(_) => {{\\n          match await TlsClientStream_read_response(stream) {{\\n            Ok(resp) => {{\\n              let _ = await TlsClientStream_close(stream)\\n              if resp.status != 200 {{\\n                return Err(\"unexpected status\")\\n              }}\\n              return parse_json_body(resp.body)\\n            }}\\n            Err(msg) => {{\\n              return Err(msg)\\n            }}\\n          }}\\n        }}\\n        Err(msg) => {{\\n          return Err(msg)\\n        }}\\n      }}\\n    }}\\n    Err(msg) => {{\\n      return Err(msg)\\n    }}\\n  }}\\n}}\\n''', encoding='utf-8')\n(app / 'src' / 'main.nb').write_text(f'''module main\\nimport client_app\\nimport server_app\\nimport service::config\\nimport std::json\\nimport std::result\\nimport std::task\\nimport tlss::server\\n\\nasync fn main() -> Void {{\\n  match config_from_env(\"svc-mtls-principal\", 0) {{\\n    Ok(cfg) => {{\\n      match await bind_service_listener(cfg, \"{lit(ca_pem)}\") {{\\n        Ok(listener) => {{\\n          match TlsListener_local_addr(listener) {{\\n            Ok(addr) => {{\\n              match addr.port() {{\\n                Ok(port) => {{\\n                  let task = spawn(serve_one(listener, cfg))\\n                  match await call_whoami(port, \"{lit(ca_pem)}\") {{\\n                    Ok(value) => {{\\n                      match await join(task) {{\\n                        Ok(_) => {{\\n                          match get_string(value, \"subject\") {{\\n                            Ok(subject) => {{\\n                              match get_string(value, \"scheme\") {{\\n                                Ok(scheme) => {{\\n                                  match get_bool(value, \"tls_peer_present\") {{\\n                                    Ok(peer_present) => {{\\n                                      match get_bool(value, \"tls_peer_verified\") {{\\n                                        Ok(peer_verified) => {{\\n                                          if subject == \"CN=nebula-client\" &&\\n                                             scheme == \"mtls\" &&\\n                                             peer_present == true &&\\n                                             peer_verified == true {{\\n                                            print(\"service-tls-mtls-principal-ok\")\\n                                          }} else {{\\n                                            print(stringify(value))\\n                                            print(\"service-tls-mtls-principal-bad\")\\n                                          }}\\n                                        }}\\n                                        Err(msg) => {{ print(msg) }}\\n                                      }}\\n                                    }}\\n                                    Err(msg) => {{ print(msg) }}\\n                                  }}\\n                                }}\\n                                Err(msg) => {{ print(msg) }}\\n                              }}\\n                            }}\\n                            Err(msg) => {{ print(msg) }}\\n                          }}\\n                        }}\\n                        Err(msg) => {{ print(msg) }}\\n                      }}\\n                    }}\\n                    Err(msg) => {{ print(msg) }}\\n                  }}\\n                }}\\n                Err(msg) => {{ print(msg) }}\\n              }}\\n            }}\\n            Err(msg) => {{ print(msg) }}\\n          }}\\n        }}\\n        Err(msg) => {{ print(msg) }}\\n      }}\\n    }}\\n    Err(msg) => {{ print(msg) }}\\n  }}\\n}}\\n''', encoding='utf-8')\n\nupdate = subprocess.run([os.environ['NEBULA_BINARY'], 'update', str(app)], capture_output=True, text=True, env=os.environ.copy())\nprint(update.stdout, end='')\nprint(update.stderr, end='')\nif update.returncode != 0:\n    raise SystemExit(update.returncode)\nrun = subprocess.run([os.environ['NEBULA_BINARY'], 'run', str(app), '--run-gate', 'none'], capture_output=True, text=True, env={**os.environ, 'NEBULA_BIND_HOST': '127.0.0.1', 'NEBULA_PORT': '0'})\nprint(run.stdout, end='')\nprint(run.stderr, end='')\nif run.returncode != 0:\n    raise SystemExit(run.returncode)\nif 'service-tls-mtls-principal-ok' not in run.stdout:\n    raise SystemExit('expected service-tls-mtls-principal-ok output')\nif 'service-tls-mtls-principal-bad' in run.stdout:\n    raise SystemExit('service TLS mTLS principal smoke reported failure')\nPY"
expect_rc = 0
