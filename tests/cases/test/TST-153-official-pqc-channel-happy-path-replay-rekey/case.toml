id = "TST-153-official-pqc-channel-happy-path-replay-rekey"
suite = "test"

[[steps]]
kind = "shell"
run = "rm -rf work/official-pqc-channel && mkdir -p work/official-pqc-channel && cp -R \"$NEBULA_REPO_ROOT/official/nebula-crypto\" work/official-pqc-channel/nebula-crypto && cp -R \"$NEBULA_REPO_ROOT/official/nebula-pqc-protocols\" work/official-pqc-channel/pqc && mkdir -p work/official-pqc-channel/app/src && cat > work/official-pqc-channel/app/nebula.toml <<'EOF'\nschema_version = 1\n\n[package]\nname = \"official-pqc-channel-app\"\nversion = \"0.1.0\"\nentry = \"src/main.nb\"\nsrc_dir = \"src\"\n\n[dependencies]\ncrypto = { path = \"../nebula-crypto\" }\npqc = { path = \"../pqc\" }\nEOF\ncat > work/official-pqc-channel/app/src/main.nb <<'EOF'\nmodule main\nimport crypto::pqc.kem\nimport crypto::pqc.sign\nimport pqc::channel\nimport std::bytes\nimport std::result\n\nfn main() -> Void {\n  let ok = true\n  match ml_kem_768_keypair() {\n    Ok(server_kem) => {\n      match ml_dsa_65_keypair() {\n        Ok(client_sign_keys) => {\n          match ml_dsa_65_keypair() {\n            Ok(server_sign_keys) => {\n              let client_signer = channel_signer(client_sign_keys)\n              let server_signer = channel_signer(server_sign_keys)\n              match initiate(server_kem.public_key(), signed(client_signer)) {\n                Ok(init) => {\n                  match accept(server_kem.secret_key(), signed(server_signer), init.hello()) {\n                    Ok(server_accept) => {\n                      match finalize(init, pinned_peer(server_sign_keys.public_key()), server_accept.message()) {\n                        Ok(client_state) => {\n                          let server_state = server_accept.session()\n                          let stale_client_state = client_state\n                          let request_aad = from_string(\"nebula-http-request\")\n                          let response_aad = from_string(\"nebula-http-response\")\n                          let request_ciphertext = from_string(\"\")\n                          let response_ciphertext = from_string(\"\")\n                          let stale_ciphertext = from_string(\"\")\n                          let new_ciphertext = from_string(\"\")\n                          match seal_next(client_state, from_string(\"hello-secure-channel\"), request_aad) {\n                            Ok(sent) => {\n                              client_state = sent.session()\n                              request_ciphertext = sent.ciphertext()\n                            }\n                            Err(_) => {\n                              ok = false\n                            }\n                          }\n                          match open_next(server_state, request_ciphertext, request_aad) {\n                            Ok(opened) => {\n                              server_state = opened.session()\n                              if to_string(opened.plaintext()) != \"hello-secure-channel\" {\n                                ok = false\n                              }\n                            }\n                            Err(_) => {\n                              ok = false\n                            }\n                          }\n                          match open_next(server_state, request_ciphertext, request_aad) {\n                            Ok(_) => {\n                              ok = false\n                            }\n                            Err(msg) => {\n                              if msg != \"replayed pqc channel ciphertext\" {\n                                ok = false\n                              }\n                            }\n                          }\n                          match seal_next(server_state, from_string(\"secure-reply\"), response_aad) {\n                            Ok(sent) => {\n                              server_state = sent.session()\n                              response_ciphertext = sent.ciphertext()\n                            }\n                            Err(_) => {\n                              ok = false\n                            }\n                          }\n                          match open_next(client_state, response_ciphertext, response_aad) {\n                            Ok(opened) => {\n                              client_state = opened.session()\n                              if to_string(opened.plaintext()) != \"secure-reply\" {\n                                ok = false\n                              }\n                            }\n                            Err(_) => {\n                              ok = false\n                            }\n                          }\n                          match client_state.rekey() {\n                            Ok(rekeyed) => {\n                              client_state = rekeyed\n                            }\n                            Err(_) => {\n                              ok = false\n                            }\n                          }\n                          match server_state.rekey() {\n                            Ok(rekeyed) => {\n                              server_state = rekeyed\n                            }\n                            Err(_) => {\n                              ok = false\n                            }\n                          }\n                          match seal_next(stale_client_state, from_string(\"stale-key-message\"), request_aad) {\n                            Ok(sent) => {\n                              stale_ciphertext = sent.ciphertext()\n                            }\n                            Err(_) => {\n                              ok = false\n                            }\n                          }\n                          match open_next(server_state, stale_ciphertext, request_aad) {\n                            Ok(_) => {\n                              ok = false\n                            }\n                            Err(_) => {}\n                          }\n                          match seal_next(client_state, from_string(\"new-key-message\"), request_aad) {\n                            Ok(sent) => {\n                              client_state = sent.session()\n                              new_ciphertext = sent.ciphertext()\n                            }\n                            Err(_) => {\n                              ok = false\n                            }\n                          }\n                          match open_next(server_state, new_ciphertext, request_aad) {\n                            Ok(opened) => {\n                              server_state = opened.session()\n                              if to_string(opened.plaintext()) != \"new-key-message\" {\n                                ok = false\n                              }\n                            }\n                            Err(_) => {\n                              ok = false\n                            }\n                          }\n                        }\n                        Err(_) => {\n                          ok = false\n                        }\n                      }\n                    }\n                    Err(_) => {\n                      ok = false\n                    }\n                  }\n                }\n                Err(_) => {\n                  ok = false\n                }\n              }\n            }\n            Err(_) => {\n              ok = false\n            }\n          }\n        }\n        Err(_) => {\n          ok = false\n        }\n      }\n    }\n    Err(_) => {\n      ok = false\n    }\n  }\n  if ok {\n    print(\"pqc-channel-ok\")\n  } else {\n    print(\"pqc-channel-bad\")\n  }\n}\nEOF"
expect_rc = 0

[[steps]]
kind = "nebula"
command = "fetch"
args = ["work/official-pqc-channel/app"]
expect_rc = 0

[[steps]]
kind = "nebula"
command = "run"
source = "work/official-pqc-channel/app"
args = ["--run-gate", "none"]
expect_rc = 0
expect_stdout_contains = ["pqc-channel-ok"]
