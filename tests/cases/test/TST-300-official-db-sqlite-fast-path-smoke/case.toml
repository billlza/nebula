id = "TST-300-official-db-sqlite-fast-path-smoke"
suite = "test"
description = "sqlite internal statement cache preserves errors, DDL boundaries, and first-column lookup semantics"

[[steps]]
kind = "shell"
run = """
python3 - <<'PY'
import os
import shutil
import subprocess
from pathlib import Path

repo = Path(os.environ["NEBULA_REPO_ROOT"])
root = Path("work/official_db_sqlite_fast_path")
shutil.rmtree(root, ignore_errors=True)
(root / "src").mkdir(parents=True, exist_ok=True)
(root / "nebula.toml").write_text(f'''schema_version = 1

[package]
name = "sqlite-fast-path-smoke"
version = "0.1.0"
entry = "src/main.nb"
src_dir = "src"

[dependencies]
db_sqlite = {{ path = "{repo / 'official' / 'nebula-db-sqlite'}" }}
''', encoding="utf-8")
(root / "src" / "main.nb").write_text(r'''module main
import db_sqlite::sqlite
import std::json
import std::result

fn db_path() -> String {
  return "work/official_db_sqlite_fast_path/state/cache.db"
}

fn empty_params() -> Json {
  return array_build(array_builder())
}

fn string_params(value: String) -> Json {
  let builder = array_builder()
  let builder2 = array_push(builder, string_value(value))
  return array_build(builder2)
}

fn int_params(value: Int) -> Json {
  let builder = array_builder()
  let builder2 = array_push(builder, int_value(value))
  return array_build(builder2)
}

fn tag_params(tag: String, id: Int) -> Json {
  let builder = array_builder()
  let builder2 = array_push(builder, string_value(tag))
  let builder3 = array_push(builder2, int_value(id))
  return array_build(builder3)
}

fn expect_ok_int(result: Result<Int, String>) -> Bool {
  match result {
    Ok(_) => { return true }
    Err(msg) => {
      print(msg)
      return false
    }
  }
}

fn main() -> Int {
  match open(db_path()) {
    Ok(conn) => {
      if expect_ok_int(conn.execute0("DROP TABLE IF EXISTS items")) == false { return 1 }
      if expect_ok_int(conn.execute0("CREATE TABLE items (id INTEGER PRIMARY KEY, name TEXT NOT NULL)")) == false { return 1 }
      if expect_ok_int(conn.execute("INSERT INTO items(name) VALUES (?)", string_params("alpha"))) == false { return 1 }
      if expect_ok_int(conn.execute("INSERT INTO items(name) VALUES (?)", string_params("beta"))) == false { return 1 }
      if expect_ok_int(conn.execute("INSERT INTO items(name) VALUES (?)", string_params("gamma"))) == false { return 1 }
      match conn.execute("INSERT INTO items(name) VALUES (?)", empty_params()) {
        Ok(_) => {
          print("param-mismatch-not-rejected")
          return 1
        }
        Err(_) => {}
      }
      if expect_ok_int(conn.execute("INSERT INTO items(name) VALUES (?)", string_params("delta"))) == false { return 1 }
      if expect_ok_int(conn.execute0("ALTER TABLE items ADD COLUMN tag TEXT")) == false { return 1 }
      if expect_ok_int(conn.execute("UPDATE items SET tag = ? WHERE id = ?", tag_params("hot", 1))) == false { return 1 }
      match conn.query("SELECT name, tag FROM items WHERE id = ?", int_params(1)) {
        Ok(rows) => {
          match rows.row(0) {
            Ok(row) => {
              match row.get_string("name") {
                Ok(name) => {
                  match row.get_string("tag") {
                    Ok(tag) => {
                      if name != "alpha" || tag != "hot" {
                        print("cached-query-value-bad")
                        return 1
                      }
                    }
                    Err(msg) => {
                      print(msg)
                      return 1
                    }
                  }
                }
                Err(msg) => {
                  print(msg)
                  return 1
                }
              }
            }
            Err(msg) => {
              print(msg)
              return 1
            }
          }
        }
        Err(msg) => {
          print(msg)
          return 1
        }
      }
      match conn.query0("SELECT 1 AS value, 2 AS value") {
        Ok(rows) => {
          match rows.row(0) {
            Ok(row) => {
              match row.get_int_at(0) {
                Ok(value) => {
                  if value != 1 {
                    print("duplicate-column-first-match-bad")
                    return 1
                  }
                }
                Err(msg) => {
                  print(msg)
                  return 1
                }
              }
            }
            Err(msg) => {
              print(msg)
              return 1
            }
          }
        }
        Err(msg) => {
          print(msg)
          return 1
        }
      }
      match conn.close() {
        Ok(_) => {
          print("official-db-sqlite-fast-path-ok")
          return 0
        }
        Err(msg) => {
          print(msg)
          return 1
        }
      }
    }
    Err(msg) => {
      print(msg)
      return 1
    }
  }
}
''', encoding="utf-8")
subprocess.run([os.environ["NEBULA_BINARY"], "fetch", str(root)], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
subprocess.run([os.environ["NEBULA_BINARY"], "check", str(root)], check=True)
subprocess.run([os.environ["NEBULA_BINARY"], "run", str(root), "--run-gate", "none"], check=True)
PY
"""
expect_rc = 0
expect_stdout_contains = ["official-db-sqlite-fast-path-ok"]
