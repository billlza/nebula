id = "TST-182-official-service-routing-middleware-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport os\nfrom pathlib import Path\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nroot = Path('work/official_service_routing_middleware')\n(root / 'src').mkdir(parents=True, exist_ok=True)\n(root / 'nebula.toml').write_text('''schema_version = 1\\n\\n[package]\\nname = \"official-service-routing-middleware\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n\\n[dependencies]\\nservice = { path = \"''' + str(repo_root / 'official' / 'nebula-service') + '''\" }\\n''', encoding='utf-8')\n(root / 'src' / 'main.nb').write_text('''module main\\nimport service::context\\nimport service::health\\nimport service::middleware\\nimport service::routing\\nimport std::bytes\\nimport std::http\\nimport std::json\\nimport std::result\\n\\nfn make_get() -> Method {\\n  return Get\\n}\\n\\nfn make_post() -> Method {\\n  return Post\\n}\\n\\nasync fn handle_request(ctx: RequestContext, request: Request) -> Result<Response, String> {\\n  return await dispatch_ctx3_result(\\n    ctx,\\n    request,\\n    Get,\\n    \"/healthz\",\\n    handle_health,\\n    Get,\\n    \"/readyz\",\\n    handle_ready,\\n    Get,\\n    \"/hello/:name\",\\n    handle_hello,\\n    not_found_text(\"not found\")\\n  )\\n}\\n\\nasync fn handle_health(ctx: RequestContext, request: Request) -> Result<Response, String> {\\n  return Ok(live_response_with_context(ctx))\\n}\\n\\nasync fn handle_ready(ctx: RequestContext, request: Request) -> Result<Response, String> {\\n  if ctx.is_draining() {\\n    return Ok(draining_response_with_context(ctx))\\n  }\\n  return Ok(ready_response_with_context(ctx))\\n}\\n\\nasync fn handle_hello(ctx: RequestContext, request: Request) -> Result<Response, String> {\\n  return await reject_when_draining_result(ctx, request, handle_hello_inner)\\n}\\n\\nasync fn handle_hello_inner(ctx: RequestContext, request: Request) -> Result<Response, String> {\\n  match route_param1(\"/hello/:name\", request) {\\n    Ok(name) => {\\n      return Ok(ok_text(name))\\n    }\\n    Err(msg) => {\\n      return Err(msg)\\n    }\\n  }\\n}\\n\\nasync fn main() -> Void {\\n  let ready_ctx = RequestContext(\"svc-routing\", 1, \"1\", false, 10, 11, false, false, \"\", null_value(), false, false, \"\", \"\", null_value(), null_value())\\n  let draining_ctx = RequestContext(\"svc-routing\", 2, \"2\", false, 12, 13, true, false, \"\", null_value(), false, false, \"\", \"\", null_value(), null_value())\\n  let hello_req = Request(make_get(), \"/hello/nebula\", from_string(\"\"))\\n  let health_req = Request(make_get(), \"/healthz\", from_string(\"\"))\\n  let ready_req = Request(make_get(), \"/readyz\", from_string(\"\"))\\n  let post_req = Request(make_post(), \"/hello/nebula\", from_string(\"\"))\\n  let missing_req = Request(make_get(), \"/missing\", from_string(\"\"))\\n  let ok = true\\n\\n  match await handle_request(ready_ctx, health_req) {\\n    Ok(resp) => { if resp.status != 200 { ok = false } }\\n    Err(_) => { ok = false }\\n  }\\n  match await handle_request(ready_ctx, ready_req) {\\n    Ok(resp) => { if resp.status != 200 { ok = false } }\\n    Err(_) => { ok = false }\\n  }\\n  match await handle_request(ready_ctx, hello_req) {\\n    Ok(resp) => {\\n      if resp.status != 200 || to_string(resp.body) != \"nebula\" {\\n        ok = false\\n      }\\n    }\\n    Err(_) => { ok = false }\\n  }\\n  match await handle_request(draining_ctx, hello_req) {\\n    Ok(resp) => { if resp.status != 503 { ok = false } }\\n    Err(_) => { ok = false }\\n  }\\n  match await handle_request(ready_ctx, post_req) {\\n    Ok(resp) => { if resp.status != 405 { ok = false } }\\n    Err(_) => { ok = false }\\n  }\\n  match await handle_request(ready_ctx, missing_req) {\\n    Ok(resp) => { if resp.status != 404 { ok = false } }\\n    Err(_) => { ok = false }\\n  }\\n\\n  if ok {\\n    print(\"service-routing-middleware-ok\")\\n  } else {\\n    print(\"service-routing-middleware-bad\")\\n  }\\n}\\n''', encoding='utf-8')\nPY"
expect_rc = 0

[[steps]]
kind = "shell"
run = "\"$NEBULA_BINARY\" fetch work/official_service_routing_middleware"
expect_rc = 0

[[steps]]
kind = "shell"
run = "\"$NEBULA_BINARY\" run work/official_service_routing_middleware --run-gate none"
expect_rc = 0
expect_stdout_contains = ["service-routing-middleware-ok"]
