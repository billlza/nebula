id = "TST-297-thin-host-gui-host-shell-pilot-smoke"
suite = "test"
description = "thin-host GUI host shell pilot wires UI IR dispatch to bridge events and snapshots"

[[steps]]
kind = "shell"
run = """
python3 - <<'PY'
import json
import os
import sqlite3
import subprocess
from pathlib import Path

repo = Path(os.environ["NEBULA_REPO_ROOT"])
binary = os.environ["NEBULA_BINARY"]
app = repo / "examples" / "thin_host_gui_host_shell"
receipt_db = Path("work") / "thin_host_gui_host_shell" / "app-local-receipts.db"
receipt_db.unlink(missing_ok=True)

subprocess.run([binary, "update", str(app)], check=True, capture_output=True, text=True)
check = subprocess.run([binary, "check", str(app)], capture_output=True, text=True, check=True)
if "warning:" in check.stdout or "warning:" in check.stderr:
    raise SystemExit(f"thin-host GUI shell check emitted warnings:\\n{check.stdout}\\n{check.stderr}")

run = subprocess.run([binary, "run", str(app), "--run-gate", "none"], capture_output=True, text=True, check=True)
output = run.stdout
required = [
    "thin-host-gui-shell-begin",
    "thin-host-gui-shell-telemetry-session=thin-host-gui-preview-session-0001",
    "nebula-ui-tree-title=Local Ops Shell",
    "nebula-ui-tree-button-action=targets.refresh",
    "nebula-ui-tree-input-action=targets.filter",
    "nebula-ui-tree-input-accessibility-label=Filter targets",
    "nebula-ui-action-dispatched=targets.refresh",
    "nebula-ui-action-dispatched=targets.filter",
    "thin-host-gui-shell-recovery-log=logs/thin-host-gui-host-shell.ndjson",
    "thin-host-gui-shell-recovery-policy=manual-preview",
    "thin-host-gui-shell-end renders=6",
]
for marker in required:
    if marker not in output:
        raise SystemExit(f"missing marker {marker!r}: {output!r}")
if "thin-host-gui-shell-error" in output:
    raise SystemExit(output)
if "app-local-error:" in output:
    raise SystemExit(output)

events = []
snapshots = []
app_contexts = []
app_events = []
app_recovery = []
app_updates = []
for line in output.splitlines():
    if line.startswith("event:"):
        events.append(json.loads(line[len("event:"):]))
    if line.startswith("snapshot:"):
        snapshots.append(json.loads(line[len("snapshot:"):]))
    if line.startswith("app-local-context:"):
        app_contexts.append(json.loads(line[len("app-local-context:"):]))
    if line.startswith("app-local-event:"):
        app_events.append(json.loads(line[len("app-local-event:"):]))
    if line.startswith("app-local-recovery:"):
        app_recovery.append(json.loads(line[len("app-local-recovery:"):]))
    if line.startswith("app-local-update:"):
        app_updates.append(json.loads(line[len("app-local-update:"):]))

if [event["kind"] for event in events] != [
    "ui_shell_booted",
    "ui_action_applied",
    "ui_command_rejected",
    "ui_command_rejected",
    "ui_action_applied",
    "ui_shell_quit",
]:
    raise SystemExit(f"unexpected event sequence: {events!r}")
if [event["schema"] for event in events] != ["thin-host-bridge.event.v1"] * 6:
    raise SystemExit(f"unexpected event schemas: {events!r}")
if [event["correlation_id"] for event in events] != ["boot", "gui-1", "gui-stale", "gui-unknown", "gui-2", "gui-3"]:
    raise SystemExit(f"unexpected correlation ids: {events!r}")
if [event["state_revision"] for event in events] != [0, 1, 1, 1, 2, 3]:
    raise SystemExit(f"unexpected event revisions: {events!r}")
if [item["schema"] for item in app_contexts] != ["nebula.app-local.command-context.v1"] * 5:
    raise SystemExit(f"unexpected app-local context schemas: {app_contexts!r}")
if [item["correlation_id"] for item in app_contexts] != ["gui-1", "gui-stale", "gui-unknown", "gui-2", "gui-3"]:
    raise SystemExit(f"unexpected app-local context correlations: {app_contexts!r}")
if [item["state_revision"] for item in app_contexts] != [0, 1, 1, 1, 2]:
    raise SystemExit(f"unexpected app-local context revisions: {app_contexts!r}")
if [item["command_id"] for item in app_contexts] != [
    "targets.refresh:gui-1",
    "thin-host-command:gui-stale",
    "thin-host-command:gui-unknown",
    "targets.filter:gui-2",
    "quit:gui-3",
]:
    raise SystemExit(f"unexpected app-local command ids: {app_contexts!r}")
if [item["actor_subject"] for item in app_contexts] != ["local-operator"] * 5:
    raise SystemExit(f"unexpected app-local context actor: {app_contexts!r}")
if [item["schema"] for item in app_events] != ["nebula.app-local.event.v1"] * 5:
    raise SystemExit(f"unexpected app-local event schemas: {app_events!r}")
if [item["event_kind"] for item in app_events] != [
    "ui_action_applied",
    "command_rejected",
    "command_rejected",
    "ui_action_applied",
    "ui_shell_quit",
]:
    raise SystemExit(f"unexpected app-local event kinds: {app_events!r}")
if [item["accepted"] for item in app_events] != [True, False, False, True, True]:
    raise SystemExit(f"unexpected app-local accepted flags: {app_events!r}")
if [item["state_revision"] for item in app_events] != [1, 1, 1, 2, 3]:
    raise SystemExit(f"unexpected app-local event revisions: {app_events!r}")
if len(app_recovery) != 1 or app_recovery[0]["schema"] != "nebula.app-local.recovery-marker.v1":
    raise SystemExit(f"missing app-local recovery marker: {app_recovery!r}")
if app_recovery[0]["correlation_id"] != "gui-3" or app_recovery[0]["state_revision"] != 3:
    raise SystemExit(f"bad app-local recovery marker: {app_recovery!r}")
if len(app_updates) != 1 or app_updates[0]["schema"] != "nebula.app-local.update-marker.v1":
    raise SystemExit(f"missing app-local update marker: {app_updates!r}")
if app_updates[0]["manifest_path"] != "deploy/update/manifest.preview.json":
    raise SystemExit(f"bad app-local update marker path: {app_updates!r}")
if len(app_updates[0].get("manifest_sha256", "")) != 64:
    raise SystemExit(f"bad app-local update marker checksum: {app_updates!r}")
if events[2]["payload"].get("reason") != "stale thin-host GUI command state_revision":
    raise SystemExit(f"stale command rejection reason missing: {events[2]!r}")
if events[3]["payload"].get("reason") != "unknown thin-host GUI command kind":
    raise SystemExit(f"unknown command rejection reason missing: {events[3]!r}")
if events[2]["payload"].get("last_action") != "targets.refresh" or events[3]["payload"].get("last_action") != "targets.refresh":
    raise SystemExit(f"rejected commands mutated last action unexpectedly: {events!r}")
if events[-1]["terminal"] is not True:
    raise SystemExit(f"quit event was not terminal: {events[-1]!r}")

if len(snapshots) != 6:
    raise SystemExit(f"expected six snapshots, got {len(snapshots)}: {output!r}")
for expected_revision, snapshot in zip([0, 1, 1, 1, 2, 3], snapshots):
    if snapshot["schema"] != "thin-host-bridge.snapshot.v1":
        raise SystemExit(f"bad snapshot schema: {snapshot!r}")
    if snapshot["screen"] != "local_ops_console":
        raise SystemExit(f"bad snapshot screen: {snapshot!r}")
    if snapshot["state_revision"] != expected_revision:
        raise SystemExit(f"bad snapshot revision: {snapshot!r}")
    payload = snapshot["payload"]
    if payload["schema"] != "nebula-ui.tree.v1" or payload["component"] != "Window":
        raise SystemExit(f"snapshot payload is not UI IR: {snapshot!r}")
    children = payload["children"]
    if children[0]["component"] != "Input" or children[0]["props"]["action"] != "targets.filter":
        raise SystemExit(f"snapshot input action missing: {snapshot!r}")
    if children[0]["props"]["accessibility_label"] != "Filter targets":
        raise SystemExit(f"snapshot input accessibility label missing: {snapshot!r}")
    if children[1]["component"] != "Button" or children[1]["props"]["action"] != "targets.refresh":
        raise SystemExit(f"snapshot button action missing: {snapshot!r}")

if snapshots[0]["payload"]["children"][0]["props"]["value"] != "targets":
    raise SystemExit("initial filter value missing")
if snapshots[4]["payload"]["children"][0]["props"]["value"] != "prod":
    raise SystemExit("filter command did not update UI IR snapshot")
if snapshots[1]["payload"]["children"][0]["props"]["value"] != snapshots[2]["payload"]["children"][0]["props"]["value"]:
    raise SystemExit("stale rejected command mutated snapshot state")
if snapshots[2]["payload"]["children"][0]["props"]["value"] != snapshots[3]["payload"]["children"][0]["props"]["value"]:
    raise SystemExit("unknown rejected command mutated snapshot state")

with sqlite3.connect(receipt_db) as conn:
    receipt_rows = conn.execute(
        "SELECT app_id, receipt_kind, receipt_key, correlation_id, state_revision, schema FROM app_local_runtime_receipts ORDER BY receipt_id"
    ).fetchall()
    receipt_counts = dict(conn.execute(
        "SELECT receipt_kind, COUNT(*) FROM app_local_runtime_receipts GROUP BY receipt_kind"
    ).fetchall())
if receipt_counts != {
    "snapshot": 6,
    "command_context": 5,
    "event": 5,
    "recovery_marker": 1,
    "update_marker": 1,
}:
    raise SystemExit(f"unexpected persisted app-local receipt counts: {receipt_counts!r}")
if [row[1] for row in receipt_rows[:3]] != ["snapshot", "command_context", "event"]:
    raise SystemExit(f"unexpected persisted app-local receipt kinds: {receipt_rows!r}")
if receipt_rows[0][0] != "thin-host-gui-host-shell" or receipt_rows[0][2] != "snapshot:boot":
    raise SystemExit(f"unexpected persisted app-local receipt identity: {receipt_rows[0]!r}")
command_rows = [row for row in receipt_rows if row[1] == "command_context"]
if [row[3] for row in command_rows] != ["gui-1", "gui-stale", "gui-unknown", "gui-2", "gui-3"]:
    raise SystemExit(f"unexpected persisted app-local command correlations: {receipt_rows!r}")
if command_rows[0][2] != "targets.refresh:gui-1":
    raise SystemExit(f"unexpected persisted app-local command key: {command_rows[0]!r}")
if receipt_rows[-1][5] != "nebula.app-local.update-marker.v1":
    raise SystemExit(f"unexpected persisted app-local update receipt: {receipt_rows[-1]!r}")

print("thin-host-gui-host-shell-pilot-ok")
PY
"""
expect_rc = 0
expect_stdout_contains = ["thin-host-gui-host-shell-pilot-ok"]
