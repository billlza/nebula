id = "TST-164-example-hello-api-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport http.client\nimport os\nimport shutil\nimport subprocess\nimport sys\nimport time\nfrom pathlib import Path\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nsys.path.insert(0, str(repo_root / 'tests' / 'lib'))\nfrom service_probe import fail_with_output, wait_for_listener_bound\nroot = Path('work/example_hello_api')\nshutil.rmtree(root, ignore_errors=True)\nshutil.copytree(repo_root / 'examples' / 'hello_api', root)\n(root / 'nebula.toml').write_text(f'''schema_version = 1\\n\\n[package]\\nname = \"hello-api\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n\\n[dependencies]\\nservice = {{ path = \"{(repo_root / 'official' / 'nebula-service').resolve()}\" }}\\n''', encoding='utf-8')\nsubprocess.run([os.environ['NEBULA_BINARY'], 'update', str(root)], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\ndrain_file = root / 'hello-api.draining'\nproc = subprocess.Popen([os.environ['NEBULA_BINARY'], 'run', str(root), '--run-gate', 'none'], stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True, env={**os.environ, 'NEBULA_BIND_HOST': '127.0.0.1', 'NEBULA_PORT': '0', 'NEBULA_DRAIN_FILE': str(drain_file), 'NEBULA_DRAIN_POLL_MS': '100'})\nstderr_lines = []\n_, port = wait_for_listener_bound(proc, stderr_lines)\ntry:\n    deadline = time.time() + 20\n    ready = False\n    while time.time() < deadline:\n        if proc.poll() is not None:\n            fail_with_output(proc, stderr_lines, f'hello_api exited before ready: rc={proc.returncode}')\n        try:\n            conn = http.client.HTTPConnection('127.0.0.1', port, timeout=1)\n            conn.request('GET', '/healthz')\n            resp = conn.getresponse()\n            resp.read()\n            conn.close()\n            if resp.status == 200:\n                ready = True\n                break\n        except Exception:\n            time.sleep(0.1)\n    if not ready:\n        fail_with_output(proc, stderr_lines, 'hello_api did not become ready')\n    conn = http.client.HTTPConnection('127.0.0.1', port, timeout=1)\n    conn.request('GET', '/hello/nebula')\n    resp = conn.getresponse()\n    body = resp.read().decode('utf-8')\n    conn.close()\n    if resp.status != 200 or body != 'nebula':\n        raise SystemExit(f'unexpected hello_api response: {(resp.status, body)!r}')\n    drain_file.write_text('drain\\n', encoding='utf-8')\n    draining = False\n    deadline = time.time() + 10\n    while time.time() < deadline:\n        if proc.poll() is not None:\n            fail_with_output(proc, stderr_lines, f'hello_api exited before draining readiness: rc={proc.returncode}')\n        try:\n            conn = http.client.HTTPConnection('127.0.0.1', port, timeout=1)\n            conn.request('GET', '/readyz')\n            resp = conn.getresponse()\n            resp.read()\n            conn.close()\n            if resp.status == 503:\n                draining = True\n                break\n        except Exception:\n            time.sleep(0.1)\n    if not draining:\n        fail_with_output(proc, stderr_lines, 'hello_api did not report draining readiness')\n    try:\n        proc.wait(timeout=10)\n    except subprocess.TimeoutExpired:\n        raise SystemExit('hello_api did not exit after draining quiesced')\n    print('example-hello-api-ok')\nfinally:\n    if proc.poll() is None:\n        proc.terminate()\n        try:\n            proc.wait(timeout=5)\n        except subprocess.TimeoutExpired:\n            proc.kill()\n            proc.wait(timeout=5)\nPY"
expect_rc = 0
expect_stdout_contains = ["example-hello-api-ok"]
