id = "TST-123-std-http-client-100-continue-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport os\nimport platform\nimport queue\nimport socket\nimport subprocess\nimport threading\nfrom pathlib import Path\n\nif platform.system().lower().startswith('windows'):\n    print('http-100-skip-unsupported-host')\n    raise SystemExit(0)\n\nroot = Path('work/http_client_100_continue')\napp = root / 'app'\n(app / 'src').mkdir(parents=True, exist_ok=True)\n\nport_q: queue.Queue[int] = queue.Queue()\ndone_q: queue.Queue[object] = queue.Queue()\n\ndef serve() -> None:\n    try:\n        with socket.socket(socket.AF_INET, socket.SOCK_STREAM) as sock:\n            sock.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)\n            sock.bind(('127.0.0.1', 0))\n            sock.listen(1)\n            sock.settimeout(60)\n            port_q.put(sock.getsockname()[1])\n            conn, _ = sock.accept()\n            with conn:\n                conn.settimeout(60)\n                data = b''\n                while b'\\r\\n\\r\\n' not in data:\n                    chunk = conn.recv(4096)\n                    if not chunk:\n                        break\n                    data += chunk\n                if not data.startswith(b'GET /continue HTTP/1.1\\r\\n'):\n                    raise RuntimeError('unexpected request line')\n                response = (\n                    b'HTTP/1.1 100 Continue\\r\\n\\r\\n'\n                    b'HTTP/1.1 200 OK\\r\\n'\n                    b'Content-Length: 5\\r\\n'\n                    b'Content-Type: text/plain\\r\\n'\n                    b'Connection: close\\r\\n\\r\\n'\n                    b'final'\n                )\n                conn.sendall(response)\n        done_q.put(None)\n    except Exception as exc:\n        done_q.put(exc)\n\nthread = threading.Thread(target=serve, daemon=True)\nthread.start()\nport = port_q.get(timeout=10)\n\n(app / 'nebula.toml').write_text('''schema_version = 1\\n\\n[package]\\nname = \"http-client-100-continue\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n''', encoding='utf-8')\n(app / 'src' / 'main.nb').write_text(f'''module main\\nimport std::bytes\\nimport std::http\\nimport std::net\\n\\nasync fn main() -> Void {{\\n  match ipv4(\"127.0.0.1\", {port}) {{\\n    Ok(addr) => {{\\n      match await connect(addr) {{\\n        Ok(stream) => {{\\n          let req = get_request(\"127.0.0.1:{port}\", \"/continue\")\\n          match await stream.write_request(req) {{\\n            Ok(_) => {{\\n              match await stream.read_response() {{\\n                Ok(resp) => {{\\n                  if resp.status == 200 && to_string(resp.body) == \"final\" {{\\n                    print(\"http-100-ok\")\\n                  }} else {{\\n                    print(\"http-100-bad\")\\n                  }}\\n                }}\\n                Err(msg) => {{ print(msg) }}\\n              }}\\n            }}\\n            Err(msg) => {{ print(msg) }}\\n          }}\\n          stream.close()\\n        }}\\n        Err(msg) => {{ print(msg) }}\\n      }}\\n    }}\\n    Err(msg) => {{ print(msg) }}\\n  }}\\n}}\\n''', encoding='utf-8')\n\nupdate = subprocess.run([os.environ['NEBULA_BINARY'], 'update', str(app)], capture_output=True, text=True, env=os.environ.copy())\nprint(update.stdout, end='')\nprint(update.stderr, end='')\nif update.returncode != 0:\n    raise SystemExit(update.returncode)\nrun = subprocess.run([os.environ['NEBULA_BINARY'], 'run', str(app), '--run-gate', 'none'], capture_output=True, text=True, env=os.environ.copy())\nprint(run.stdout, end='')\nprint(run.stderr, end='')\nif run.returncode != 0:\n    raise SystemExit(run.returncode)\nserver_result = done_q.get(timeout=60)\nif server_result is not None:\n    raise server_result\nif 'http-100-ok' not in run.stdout:\n    raise SystemExit('http-100-ok missing from output')\nPY"
expect_rc = 0
