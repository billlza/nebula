id = "TST-216-example-cli-service-workspace-https-ctl-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = """
python3 - <<'PY'
import json
import os
import shutil
import ssl
import subprocess
import sys
import threading
from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer
from pathlib import Path

repo_root = Path(os.environ['NEBULA_REPO_ROOT'])
sys.path.insert(0, str(repo_root / 'tests' / 'lib'))
from cli_service_workspace import copy_example, fetch_workspace, print_completed, require_success, run_ctl

binary = os.environ['NEBULA_BINARY']
root = Path('work/example_cli_service_workspace_https_ctl')
ctl_out_dir = root / '.ctl-out'
copy_example(repo_root, root)
fetch_workspace(binary, root)

cert_dir = root / 'certs'
cert_dir.mkdir(parents=True, exist_ok=True)
(cert_dir / 'openssl_ca.cnf').write_text(
    '''
[req]
distinguished_name = dn
x509_extensions = v3_ca
prompt = no

[dn]
CN = Nebula Test CA

[v3_ca]
basicConstraints = critical, CA:true
keyUsage = critical, keyCertSign, cRLSign
subjectKeyIdentifier = hash
''',
    encoding='utf-8',
)
(cert_dir / 'openssl_server.cnf').write_text(
    '''
[req]
distinguished_name = dn
req_extensions = v3_req
prompt = no

[dn]
CN = localhost

[v3_req]
subjectAltName = @alt_names
basicConstraints = CA:false
keyUsage = critical, digitalSignature, keyEncipherment
extendedKeyUsage = serverAuth

[alt_names]
DNS.1 = localhost
IP.1 = 127.0.0.1
''',
    encoding='utf-8',
)
subprocess.run(
    ['openssl', 'req', '-x509', '-newkey', 'rsa:2048', '-nodes', '-keyout', str(cert_dir / 'ca.key'), '-out', str(cert_dir / 'ca.pem'), '-days', '2', '-config', str(cert_dir / 'openssl_ca.cnf')],
    check=True,
    stdout=subprocess.DEVNULL,
    stderr=subprocess.DEVNULL,
)
subprocess.run(
    ['openssl', 'req', '-newkey', 'rsa:2048', '-nodes', '-keyout', str(cert_dir / 'server.key'), '-out', str(cert_dir / 'server.csr'), '-config', str(cert_dir / 'openssl_server.cnf')],
    check=True,
    stdout=subprocess.DEVNULL,
    stderr=subprocess.DEVNULL,
)
subprocess.run(
    ['openssl', 'x509', '-req', '-in', str(cert_dir / 'server.csr'), '-CA', str(cert_dir / 'ca.pem'), '-CAkey', str(cert_dir / 'ca.key'), '-CAcreateserial', '-out', str(cert_dir / 'server.pem'), '-days', '2', '-sha256', '-extfile', str(cert_dir / 'openssl_server.cnf'), '-extensions', 'v3_req'],
    check=True,
    stdout=subprocess.DEVNULL,
    stderr=subprocess.DEVNULL,
)

class Handler(BaseHTTPRequestHandler):
    protocol_version = 'HTTP/1.1'

    def _send_json(self, status, payload):
        body = json.dumps(payload).encode('utf-8')
        self.send_response(status)
        self.send_header('Content-Type', 'application/json; charset=utf-8')
        self.send_header('Content-Length', str(len(body)))
        self.end_headers()
        self.wfile.write(body)

    def do_GET(self):
        if self.path == '/v1/info':
            self._send_json(
                200,
                {
                    'service': 'https-svc',
                    'version': '0.2.0',
                    'profile': 'https-proxy',
                    'request_id': 'https-info-1',
                    'unix_ms': 1,
                },
            )
            return
        if self.path == '/v1/auth/whoami':
            if self.headers.get('Authorization') != 'Bearer admin-token':
                self._send_json(401, {'message': 'authorization header is required'})
                return
            self._send_json(
                200,
                {
                    'auth_enabled': True,
                    'actor': 'admin',
                    'role': 'admin',
                    'request_id': 'https-auth-1',
                    'unix_ms': 2,
                },
            )
            return
        self._send_json(404, {'message': 'not found'})

    def log_message(self, fmt, *args):
        return

server = ThreadingHTTPServer(('127.0.0.1', 0), Handler)
context = ssl.SSLContext(ssl.PROTOCOL_TLS_SERVER)
context.load_cert_chain(str(cert_dir / 'server.pem'), str(cert_dir / 'server.key'))
server.socket = context.wrap_socket(server.socket, server_side=True)
port = server.server_address[1]
thread = threading.Thread(target=server.serve_forever, daemon=True)
thread.start()

try:
    base_url = f'https://127.0.0.1:{port}'
    ca_file = str(cert_dir / 'ca.pem')

    prewarm = run_ctl(binary, root, 'config-validate', '--url', base_url, '--ca-file', ca_file, out_dir=ctl_out_dir)
    require_success(prewarm, 'prewarm ctl https binary')

    info = run_ctl(binary, root, 'info', '--url', base_url, '--ca-file', ca_file, '--json', out_dir=ctl_out_dir, no_build=True)
    require_success(info, 'https info')
    info_payload = json.loads(info.stdout)
    if info_payload.get('service') != 'https-svc' or info_payload.get('profile') != 'https-proxy':
        print_completed(info)
        raise SystemExit(f'unexpected https info payload: {info_payload!r}')

    whoami = run_ctl(binary, root, 'auth', 'whoami', '--url', base_url, '--ca-file', ca_file, '--token', 'admin-token', '--json', out_dir=ctl_out_dir, no_build=True)
    require_success(whoami, 'https whoami')
    whoami_payload = json.loads(whoami.stdout)
    if whoami_payload.get('actor') != 'admin' or whoami_payload.get('role') != 'admin':
        print_completed(whoami)
        raise SystemExit(f'unexpected https whoami payload: {whoami_payload!r}')

    print('example-cli-service-workspace-https-ctl-ok')
finally:
    server.shutdown()
    server.server_close()
PY
"""
expect_rc = 0
expect_stdout_contains = ["example-cli-service-workspace-https-ctl-ok"]
