id = "TST-271-release-control-plane-jwt-auth-smoke"
suite = "test"
description = "release control plane supports default-off RS256 JWT resource-server auth"

[[steps]]
kind = "shell"
timeout = 240
run = """
python3 - <<'PY'
import json
import os
import subprocess
import sys
from pathlib import Path

repo_root = Path(os.environ["NEBULA_REPO_ROOT"])
sys.path.insert(0, str(repo_root / "tests" / "lib"))
from release_control_plane_workspace import (
    build_service_binary,
    copy_example,
    fetch_workspace,
    print_completed,
    require_success,
    run_ctl,
    start_service,
    terminate_process,
    wait_until_health_ok,
)

binary = os.environ["NEBULA_BINARY"]
root = Path("work/release_control_plane_jwt_auth")
state_dir = root / "state"
ctl_out_dir = root / ".ctl-out"
secrets_dir = root / "jwt"
jwks_file = secrets_dir / "jwks.json"
reader_file = secrets_dir / "reader.jwt"
writer_file = secrets_dir / "writer.jwt"
admin_file = secrets_dir / "admin.jwt"
worker_file = secrets_dir / "worker.jwt"

JWKS = '{"keys":[{"kty":"RSA","kid":"test-key","alg":"RS256","n":"u1XzrSC7xLK4FJVZNaJ578TOvBS0g6Gv2P66IUCnzWx6kAi0W1tkI5skloF75EjLCPvi-CT4AP07PTee62TEiLQNC9MkVATTT_mbCkhMWqeUr4S6Bj3N19yhL2Fmymfg7RU8kTA7R2l9XhPdUGNqXfpLTD7aXXtSrlgvw-6WjHa1vAR60QJb31PAjmQKwo8EoJtkrY-DsEgKhhFqKmfhTp_H119vB5UfygkvcypsLdOXK89Iz7t2E1RmqDLe1-ngiOnYbIIJueB33VKnJCITo5RZb0Qj6-zbu7iBcz9lgztezT-kN-orcmkoYTrSkCBzszDO7_lKvLLk2pQadMBmpw","e":"AQAB"}]}'
READER = "eyJhbGciOiJSUzI1NiIsImtpZCI6InRlc3Qta2V5IiwidHlwIjoiSldUIn0.eyJpc3MiOiJodHRwczovL2lzc3Vlci5leGFtcGxlIiwiYXVkIjoicmVsZWFzZS1jb250cm9sLXBsYW5lIiwiZXhwIjo0MTAyNDQ0ODAwLCJuYmYiOjEwMDAsInN1YiI6InJlYWRlciIsInJvbGVzIjpbInJlYWRlciJdfQ.ODsFGAvLT3lIkDuhA28kGBUg-dCvVNiVAxPUg_hB5QEiwr8C58qnZwJGYNYmuM2TBXYOXLyDkPg8wwXdNng3Hzv1dAFWrsPRDl6oFiY0TE7WnwV3B0Ik-wgTdu5u8VryRWJjMArJOdC3Uiqb7dTukNhcWKL3GMIL3qwgjulOUa5KUeJfdcNBYwyNrnJY14rNpaeGBSRB47Te_LAA-HtPvkq4P4Ohd565IaeWzT0hgc4PozqH7YEgxb4CEsIefWunpGIBgRzFEkYGWev17Oa8SfrKRFvPTQNbT2A6GnHhZGH8eMDTLf7Od1gbjQNIcrhJ6oUz1UjNApGSyS-AwHAWvw"
WRITER = "eyJhbGciOiJSUzI1NiIsImtpZCI6InRlc3Qta2V5IiwidHlwIjoiSldUIn0.eyJpc3MiOiJodHRwczovL2lzc3Vlci5leGFtcGxlIiwiYXVkIjoicmVsZWFzZS1jb250cm9sLXBsYW5lIiwiZXhwIjo0MTAyNDQ0ODAwLCJuYmYiOjEwMDAsInN1YiI6IndyaXRlciIsInJvbGVzIjpbIndyaXRlciJdfQ.KEId8JtcdsFVuWVUbgoqnbeNvx6ZILEp4lEK_TaOZCE3FYUATNBCzBKLWgiEEH8gkK7GLoK6EJ4yKAQfRbrRMoqVY8JTDA6hUrwpDsHFgfIRuzluMDspjCY6MtJaTxy8sxoBTlN1rerR0zBLJ1nJ8Mn9pQBdlSKpk8-qn1SImV1WJVraET_jj8pQUKM5PQapimCSyrCWQ87miV0IpmcdUncKWWfAYEkgNfExqXrxIFTjdNwS9c4CE-iH2Af2uTY5zHO8PZ0huaqrZo3AWdw09-mgtEeOGzkmUCG_BPgP7zoOjfWDTKzNIPV9RhP4xzKPwJrv-PK35rm939ppRI9JmQ"
ADMIN = "eyJhbGciOiJSUzI1NiIsImtpZCI6InRlc3Qta2V5IiwidHlwIjoiSldUIn0.eyJpc3MiOiJodHRwczovL2lzc3Vlci5leGFtcGxlIiwiYXVkIjoicmVsZWFzZS1jb250cm9sLXBsYW5lIiwiZXhwIjo0MTAyNDQ0ODAwLCJuYmYiOjEwMDAsInN1YiI6ImFkbWluIiwicm9sZXMiOlsiYWRtaW4iXX0.RpiboD2z984vRU17KGuUSKOEYJYts5Z1kXPiPdISDtrSZdN3CLoNqLRhGPCqXie54RO577jtyG08fW9_3WYulSrJ05YDFM5AjPv3O7BTI4oDsD4UyAYzQCHX28hNUifLr-ZqMzk7-E2OFSyhBRZ9ngoJqMW5brnD6xLFRn4mSusPHaw0DqgiQhfG-OhYyzH81lqnlA5ZKYSyB6OHNTsNsVawiT07TcDNqyHD8Ibs4ex088Ejp5OO4wAytSCAK4L01iBRh3KpE7tF9lx9FEmIG8_N1DyUp6Gp5Jd3NELU9pk8fQeo4Zh1armmKAN3oCpFObhkCOJdwhm3yKTf6-t1Dw"
WORKER = "eyJhbGciOiJSUzI1NiIsImtpZCI6InRlc3Qta2V5IiwidHlwIjoiSldUIn0.eyJpc3MiOiJodHRwczovL2lzc3Vlci5leGFtcGxlIiwiYXVkIjoicmVsZWFzZS1jb250cm9sLXBsYW5lIiwiZXhwIjo0MTAyNDQ0ODAwLCJuYmYiOjEwMDAsInN1YiI6IndvcmtlciIsInJvbGVzIjpbIndvcmtlciJdfQ.REMRvBKQPWgw32gFJlQ9UqgJPcbwPQIOfyp90URpWBD-7uYk-LnStdR9BkfrZQ7HJguRQrI-y0cI_ERag-qoq_lKWpW62k-y7WBtt8PG3M4c7Zf_5UfsJyhjBhSE3HRgDrYcVvLIc3BUcHijG5nvqPR-bqBRJfyQIbgO_EMVKV6Zuu812Fk90mm1XTsjvavaZE2do002mRSLS6UQgvl_bpxarY0o-ZGe4H11VYvm0yEytYHeAoL4WU-74OqEA_PbY5-pIbb7hSet8sTMp91m-L2slLpovc5r_e6wCexKizDFQQHo3oyxuR88orkP-n63PXqF2nG2ZU7tadbuFXa9bA"

copy_example(repo_root, root)
secrets_dir.mkdir(parents=True, exist_ok=True)
jwks_file.write_text(JWKS, encoding="utf-8")
reader_file.write_text(READER + "\\n", encoding="utf-8")
writer_file.write_text(WRITER + "\\n", encoding="utf-8")
admin_file.write_text(ADMIN + "\\n", encoding="utf-8")
worker_file.write_text(WORKER + "\\n", encoding="utf-8")
fetch_workspace(binary, root)
service_binary = build_service_binary(binary, root)

base_env = {
    **os.environ,
    "NEBULA_BIND_HOST": "127.0.0.1",
    "NEBULA_PORT": "0",
    "APP_STATE_DIR": str(state_dir / "missing-preview"),
    "APP_AUTH_REQUIRED": "1",
    "APP_AUTH_MODE": "jwt",
    "APP_AUTH_JWT_ISSUER": "https://issuer.example",
    "APP_AUTH_JWT_AUDIENCE": "release-control-plane",
    "APP_AUTH_JWKS_FILE": str(jwks_file),
}

missing_preview = subprocess.run([str(service_binary)], capture_output=True, text=True, env=base_env, timeout=10)
if missing_preview.returncode == 0:
    raise SystemExit("jwt auth unexpectedly started without APP_AUTH_JWT_PREVIEW=1")
if "startup preflight failed: APP_AUTH_MODE=jwt requires APP_AUTH_JWT_PREVIEW=1" not in (missing_preview.stdout + missing_preview.stderr):
    print(missing_preview.stdout, end="")
    print(missing_preview.stderr, end="")
    raise SystemExit("missing jwt preview diagnostic")

no_auth_env = {
    **base_env,
    "APP_STATE_DIR": str(state_dir / "no-auth-required"),
    "APP_AUTH_REQUIRED": "0",
    "APP_AUTH_JWT_PREVIEW": "1",
}
no_auth = subprocess.run([str(service_binary)], capture_output=True, text=True, env=no_auth_env, timeout=10)
if no_auth.returncode == 0:
    raise SystemExit("jwt auth unexpectedly started without APP_AUTH_REQUIRED=1")
if "startup preflight failed: APP_AUTH_MODE=jwt requires APP_AUTH_REQUIRED=1" not in (no_auth.stdout + no_auth.stderr):
    print(no_auth.stdout, end="")
    print(no_auth.stderr, end="")
    raise SystemExit("missing jwt auth-required diagnostic")

proc, stderr_lines, port = start_service(
    binary,
    root,
    {
        "APP_STATE_DIR": str(state_dir / "jwt"),
        "APP_AUTH_REQUIRED": "1",
        "APP_AUTH_MODE": "jwt",
        "APP_AUTH_JWT_PREVIEW": "1",
        "APP_AUTH_JWT_ISSUER": "https://issuer.example",
        "APP_AUTH_JWT_AUDIENCE": "release-control-plane",
        "APP_AUTH_JWKS_FILE": str(jwks_file),
    },
)
try:
    wait_until_health_ok(proc, stderr_lines, port)
    base_url = f"http://127.0.0.1:{port}"
    prewarm = run_ctl(binary, root, "control-plane-validate", "--url", base_url, out_dir=ctl_out_dir)
    require_success(prewarm, "prewarm ctl")

    local_verify = run_ctl(binary, root, "auth", "jwt-verify",
                           "--token-file", str(reader_file),
                           "--jwks-file", str(jwks_file),
                           "--issuer", "https://issuer.example",
                           "--audience", "release-control-plane",
                           "--now-unix-s", "2000",
                           "--json",
                           out_dir=ctl_out_dir,
                           no_build=True)
    require_success(local_verify, "local jwt verify")
    local_payload = json.loads(local_verify.stdout)
    if local_payload.get("subject") != "reader" or local_payload.get("roles") != ["reader"]:
        print_completed(local_verify)
        raise SystemExit(f"unexpected local jwt verify payload: {local_payload!r}")

    reader_token = reader_file.read_text(encoding="utf-8").strip()
    writer_token = writer_file.read_text(encoding="utf-8").strip()
    admin_token = admin_file.read_text(encoding="utf-8").strip()
    worker_token = worker_file.read_text(encoding="utf-8").strip()

    whoami = run_ctl(binary, root, "auth", "whoami", "--url", base_url, "--token", reader_token, "--json", out_dir=ctl_out_dir, no_build=True)
    require_success(whoami, "jwt reader whoami")
    whoami_payload = json.loads(whoami.stdout)
    if whoami_payload.get("actor") != "reader" or whoami_payload.get("role") != "reader":
        print_completed(whoami)
        raise SystemExit(f"unexpected jwt whoami payload: {whoami_payload!r}")

    no_token = run_ctl(binary, root, "config", "list", "--app", "control-plane", "--channel", "prod", "--url", base_url, out_dir=ctl_out_dir, no_build=True)
    if no_token.returncode != 1 or "authorization header is required" not in no_token.stdout:
        print_completed(no_token)
        raise SystemExit("missing authorization header did not fail as expected")

    writer_put = run_ctl(binary, root, "config", "put", "--app", "control-plane", "--channel", "prod", "--key", "feature.flag", "--bool", "true", "--description", "jwt secured flag", "--url", base_url, "--token", writer_token, "--json", out_dir=ctl_out_dir, no_build=True)
    require_success(writer_put, "jwt writer config put")
    writer_payload = json.loads(writer_put.stdout)
    current_revision_id = writer_payload.get("entry", {}).get("revision_id")
    if writer_payload.get("entry", {}).get("meta", {}).get("updated_by") != "writer":
        print_completed(writer_put)
        raise SystemExit(f"expected writer actor in jwt config payload: {writer_payload!r}")

    reader_put = run_ctl(binary, root, "config", "put", "--app", "control-plane", "--channel", "prod", "--key", "feature.flag", "--bool", "false", "--if-match", str(current_revision_id), "--url", base_url, "--token", reader_token, out_dir=ctl_out_dir, no_build=True)
    if reader_put.returncode != 1 or "required role: writer" not in reader_put.stdout:
        print_completed(reader_put)
        raise SystemExit("reader jwt unexpectedly wrote config")

    admin_delete = run_ctl(binary, root, "config", "delete", "--app", "control-plane", "--channel", "prod", "--key", "feature.flag", "--if-match", str(current_revision_id), "--url", base_url, "--token", admin_token, "--json", out_dir=ctl_out_dir, no_build=True)
    require_success(admin_delete, "jwt admin config delete")

    writer_claim = run_ctl(binary, root, "worker", "claim", "--worker-id", "writer-worker", "--task-kind", "apply_release", "--url", base_url, "--token", writer_token, out_dir=ctl_out_dir, no_build=True)
    if writer_claim.returncode != 1 or "required role: worker" not in writer_claim.stdout:
        print_completed(writer_claim)
        raise SystemExit("writer jwt unexpectedly accessed worker route")

    worker_claim = run_ctl(binary, root, "worker", "claim", "--worker-id", "jwt-worker", "--task-kind", "apply_release", "--url", base_url, "--token", worker_token, "--json", out_dir=ctl_out_dir, no_build=True)
    require_success(worker_claim, "jwt worker claim")
    worker_payload = json.loads(worker_claim.stdout)
    if worker_payload.get("outcome") != "idle":
        print_completed(worker_claim)
        raise SystemExit(f"unexpected jwt worker claim payload: {worker_payload!r}")
finally:
    terminate_process(proc)

print("release-control-plane-jwt-auth-ok")
PY
"""
expect_rc = 0
expect_stdout_contains = ["release-control-plane-jwt-auth-ok"]
