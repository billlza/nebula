id = "TST-145-official-service-handler-timeout"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport os\nfrom pathlib import Path\nimport subprocess\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nroot = Path('work/official_service_handler_timeout')\n(root / 'src').mkdir(parents=True, exist_ok=True)\n(root / 'nebula.toml').write_text('''schema_version = 1\\n\\n[package]\\nname = \"official-service-handler-timeout\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n\\n[dependencies]\\nservice = { path = \"''' + str(repo_root / 'official' / 'nebula-service') + '''\" }\\n''', encoding='utf-8')\n(root / 'src' / 'server.nb').write_text('''module server\\nimport std::http\\nimport std::task\\nimport std::time\\n\\nasync fn handle_request(request: Request) -> Response {\\n  await sleep(millis(150))\\n  return ok_text(\"late\")\\n}\\n''', encoding='utf-8')\n(root / 'src' / 'main.nb').write_text('''module main\\nimport server\\nimport service::config\\nimport service::server\\nimport std::http\\nimport std::http_json\\nimport std::json\\nimport std::net\\nimport std::task\\nimport std::time\\n\\nasync fn main() -> Void {\\n  let cfg = with_timeouts(default_config(\"svc-handler-timeout\", 0), 1000, 50, 50)\\n  match await bind_listener(cfg) {\\n    Ok(listener) => {\\n      match listener.local_addr() {\\n        Ok(addr) => {\\n          let task = spawn(serve_requests_n(listener, cfg, 1, handle_request))\\n          await sleep(millis(1))\\n          match await connect(addr) {\\n            Ok(stream) => {\\n              let req = get_request(\"localhost\", \"/slow\")\\n              match await stream.write_request(req) {\\n                Ok(_) => {\\n                  match await timeout(millis(500), stream.read_response()) {\\n                    Ok(outcome) => {\\n                      match outcome {\\n                        Ok(resp) => {\\n                          stream.close()\\n                          listener.close()\\n                          match await join(task) {\\n                            Ok(_) => {\\n                              if resp.status == 408 && resp.content_type == \"application/json; charset=utf-8\" {\\n                                match parse_json_body(resp.body) {\\n                                  Ok(value) => {\\n                                    match get_string(value, \"error\") {\\n                                      Ok(error_code) => {\\n                                        if error_code == \"handler_timeout\" {\\n                                          print(\"service-handler-timeout-ok\")\\n                                        } else {\\n                                          print(\"service-handler-timeout-bad\")\\n                                        }\\n                                      }\\n                                      Err(msg) => { print(msg) }\\n                                    }\\n                                  }\\n                                  Err(msg) => { print(msg) }\\n                                }\\n                              } else {\\n                                print(\"service-handler-timeout-bad\")\\n                              }\\n                            }\\n                            Err(msg) => { print(msg) }\\n                          }\\n                        }\\n                        Err(msg) => { print(msg) }\\n                      }\\n                    }\\n                    Err(msg) => { print(msg) }\\n                  }\\n                }\\n                Err(msg) => { print(msg) }\\n              }\\n            }\\n            Err(msg) => { print(msg) }\\n          }\\n        }\\n        Err(msg) => { print(msg) }\\n      }\\n    }\\n    Err(msg) => { print(msg) }\\n  }\\n}\\n''', encoding='utf-8')\nupdate = subprocess.run([os.environ['NEBULA_BINARY'], 'update', str(root)], capture_output=True, text=True, env=os.environ.copy())\nprint(update.stdout, end='')\nprint(update.stderr, end='')\nraise SystemExit(update.returncode)\nPY"
expect_rc = 0

[[steps]]
kind = "shell"
run = "\"$NEBULA_BINARY\" run work/official_service_handler_timeout --run-gate none"
expect_rc = 0
expect_stdout_contains = ["service-handler-timeout-ok"]
