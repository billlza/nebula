id = "TST-146-official-service-write-timeout"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport os\nimport socket\nimport subprocess\nimport sys\nimport time\nfrom pathlib import Path\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nsys.path.insert(0, str(repo_root / 'tests' / 'lib'))\nfrom service_probe import fail_with_output, finish_process_output, wait_for_listener_bound\nroot = Path('work/official_service_write_timeout')\n(root / 'src').mkdir(parents=True, exist_ok=True)\npayload = 'x' * 4000000\n(root / 'nebula.toml').write_text('''schema_version = 1\\n\\n[package]\\nname = \"official-service-write-timeout\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n\\n[dependencies]\\nservice = { path = \"''' + str(repo_root / 'official' / 'nebula-service') + '''\" }\\n''', encoding='utf-8')\n(root / 'src' / 'server.nb').write_text('''module server\\nimport std::bytes\\nimport std::http\\n\\nasync fn handle_request(request: Request) -> Response {\\n  return response(200, \"text/plain; charset=utf-8\", from_string(\"'''+ payload + '''\"))\\n}\\n''', encoding='utf-8')\n(root / 'src' / 'main.nb').write_text('''module main\\nimport server\\nimport service::config\\nimport service::server\\n\\nasync fn main() -> Void {\\n  match config_from_env(\"svc-write-timeout\", 0) {\\n    Ok(base_cfg) => {\\n      let cfg = with_timeouts(base_cfg, 1000, 1000, 50)\\n      match await bind_listener(cfg) {\\n        Ok(listener) => {\\n          match await serve_requests_n(listener, cfg, 1, handle_request) {\\n            Ok(count) => {\\n              if count == 1 {\\n                print(\"service-write-timeout-ok\")\\n              } else {\\n                print(\"service-write-timeout-bad\")\\n              }\\n            }\\n            Err(msg) => { print(msg) }\\n          }\\n        }\\n        Err(msg) => { print(msg) }\\n      }\\n    }\\n    Err(msg) => { print(msg) }\\n  }\\n}\\n''', encoding='utf-8')\nupdate = subprocess.run([os.environ['NEBULA_BINARY'], 'update', str(root)], capture_output=True, text=True, env=os.environ.copy())\nprint(update.stdout, end='')\nprint(update.stderr, end='')\nif update.returncode != 0:\n    raise SystemExit(update.returncode)\nproc = subprocess.Popen([os.environ['NEBULA_BINARY'], 'run', str(root), '--run-gate', 'none'], stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True, env={**os.environ, 'NEBULA_BIND_HOST': '127.0.0.1', 'NEBULA_PORT': '0'})\nstderr_lines = []\n_, port = wait_for_listener_bound(proc, stderr_lines)\nrequest = b'GET /big HTTP/1.1\\r\\nHost: localhost\\r\\nContent-Length: 0\\r\\n\\r\\n'\nclient = None\ntry:\n    deadline = time.time() + 10.0\n    while time.time() < deadline:\n        try:\n            client = socket.create_connection(('127.0.0.1', port), timeout=0.2)\n            break\n        except OSError:\n            if proc.poll() is not None:\n                fail_with_output(proc, stderr_lines, f'service exited before accepting connections: rc={proc.returncode}')\n            time.sleep(0.05)\n    if client is None:\n        fail_with_output(proc, stderr_lines, 'service did not start listening in time')\n    client.setsockopt(socket.SOL_SOCKET, socket.SO_RCVBUF, 1024)\n    client.sendall(request)\n    time.sleep(0.25)\n    try:\n        proc.wait(timeout=1.5)\n    except subprocess.TimeoutExpired:\n        raise SystemExit('service did not bound stalled response write in time')\nfinally:\n    if client is not None:\n        client.close()\nstdout, stderr = finish_process_output(proc, stderr_lines)\nprint(stdout, end='')\nprint(stderr, end='')\nif proc.returncode != 0:\n    raise SystemExit(proc.returncode)\nif 'service-write-timeout-ok' not in stdout:\n    raise SystemExit('service-write-timeout-ok missing from output')\nPY"
expect_rc = 0
