id = "TST-131-official-pqc-protocols-package-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport os\nfrom pathlib import Path\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nroot = Path('work/official_pqc_protocols_smoke')\n(root / 'src').mkdir(parents=True, exist_ok=True)\n(root / 'nebula.toml').write_text('''schema_version = 1\\n\\n[package]\\nname = \"official-pqc-protocols-smoke\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n\\n[dependencies]\\ncrypto = { path = \"''' + str(repo_root / 'official' / 'nebula-crypto') + '''\" }\\npqc = { path = \"''' + str(repo_root / 'official' / 'nebula-pqc-protocols') + '''\" }\\n''', encoding='utf-8')\n(root / 'src' / 'main.nb').write_text('''module main\\nimport crypto::hash\\nimport crypto::pqc.kem\\nimport crypto::pqc.sign\\nimport pqc::kem\\nimport pqc::signed\\nimport std::bytes\\nimport std::json\\nimport std::result\\n\\nfn main() -> Void {\\n  let ok = true\\n  let body = from_string(\"nebula-pqc-protocols\")\\n  match ml_kem_768_keypair() {\\n    Ok(kem_pair) => {\\n      match encapsulate_wire(kem_pair.public_key()) {\\n        Ok(wire) => {\\n          let envelope = wire.envelope()\\n          let shared_secret = wire.shared_secret()\\n          if envelope.format_version() != 1 {\\n            ok = false\\n          }\\n          if envelope.kem_algorithm() != \"ml-kem-768\" {\\n            ok = false\\n          }\\n          if envelope.ciphertext_hex() == hex(shared_secret.to_bytes()) {\\n            ok = false\\n          }\\n          let text = stringify(envelope.as_json())\\n          match ml_kem_768_ciphertext_envelope_from_json_text(text) {\\n            Ok(parsed) => {\\n              match decapsulate_wire(kem_pair.secret_key(), parsed) {\\n                Ok(recovered) => {\\n                  if recovered.equal(shared_secret) == false {\\n                    ok = false\\n                  }\\n                }\\n                Err(_) => {\\n                  ok = false\\n                }\\n              }\\n            }\\n            Err(_) => {\\n              ok = false\\n            }\\n          }\\n          match ml_kem_768_ciphertext_envelope_from_json_text(\"{\\\\\"format_version\\\\\":2,\\\\\"kem_algorithm\\\\\":\\\\\"ml-kem-768\\\\\",\\\\\"ciphertext_hex\\\\\":\\\\\"00\\\\\"}\") {\\n            Ok(parsed) => {\\n              match decapsulate_wire(kem_pair.secret_key(), parsed) {\\n                Ok(_) => {\\n                  ok = false\\n                }\\n                Err(msg) => {\\n                  if msg != \"unsupported ml_kem_768 envelope format_version\" {\\n                    ok = false\\n                  }\\n                }\\n              }\\n            }\\n            Err(_) => {\\n              ok = false\\n            }\\n          }\\n        }\\n        Err(_) => {\\n          ok = false\\n        }\\n      }\\n    }\\n    Err(_) => {\\n      ok = false\\n    }\\n  }\\n  match ml_dsa_65_keypair() {\\n    Ok(keypair) => {\\n      match sign_body(keypair.secret_key(), body) {\\n        Ok(envelope) => {\\n          let envelope_text = stringify(envelope.as_json())\\n          match signed_body_from_json_text(envelope_text) {\\n            Ok(parsed) => {\\n              if envelope.body_sha3_256_hex() != hex(sha3_256(body)) {\\n                ok = false\\n              }\\n              match verify_signed_body(keypair.public_key(), body, parsed) {\\n                Ok(valid) => {\\n                  if valid == false {\\n                    ok = false\\n                  }\\n                }\\n                Err(_) => {\\n                  ok = false\\n                }\\n              }\\n              match verify_signed_body(keypair.public_key(), from_string(\"tampered\"), parsed) {\\n                Ok(valid) => {\\n                  if valid {\\n                    ok = false\\n                  }\\n                }\\n                Err(_) => {\\n                  ok = false\\n                }\\n              }\\n            }\\n            Err(_) => {\\n              ok = false\\n            }\\n          }\\n        }\\n        Err(_) => {\\n          ok = false\\n        }\\n      }\\n    }\\n    Err(_) => {\\n      ok = false\\n    }\\n  }\\n  if ok {\\n    print(\"official-pqc-protocols-ok\")\\n  } else {\\n    print(\"official-pqc-protocols-bad\")\\n  }\\n}\\n''', encoding='utf-8')\nPY"
expect_rc = 0

[[steps]]
kind = "shell"
run = "\"$NEBULA_BINARY\" fetch work/official_pqc_protocols_smoke"
expect_rc = 0

[[steps]]
kind = "shell"
run = "\"$NEBULA_BINARY\" run work/official_pqc_protocols_smoke --run-gate none"
expect_rc = 0
expect_stdout_contains = ["official-pqc-protocols-ok"]
