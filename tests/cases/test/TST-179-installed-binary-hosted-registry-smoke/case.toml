id = "TST-179-installed-binary-hosted-registry-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport hashlib\nimport os\nimport platform\nimport shutil\nimport socket\nimport subprocess\nimport sys\nimport time\nfrom pathlib import Path\nfrom urllib import request\n\nsystem = platform.system().lower()\nif system.startswith('windows') or system.startswith('msys') or system.startswith('mingw') or system.startswith('cygwin'):\n    print('installed-hosted-registry-skip-unsupported-host')\n    raise SystemExit(0)\n\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nroot = Path('work/installed_hosted_registry')\nrelease_root = Path('work/release_asset_hosted_registry')\ninstall_root = Path('work/install-root-hosted-registry')\nshutil.rmtree(root, ignore_errors=True)\nshutil.rmtree(release_root, ignore_errors=True)\nshutil.rmtree(install_root, ignore_errors=True)\nroot.mkdir(parents=True, exist_ok=True)\nrelease_root.mkdir(parents=True, exist_ok=True)\n(root / 'runtime').mkdir(parents=True, exist_ok=True)\n(root / 'dep' / 'src').mkdir(parents=True, exist_ok=True)\n(root / 'app' / 'src').mkdir(parents=True, exist_ok=True)\n\nmachine = platform.machine().lower()\nif system == 'darwin' and machine in ('arm64', 'aarch64'):\n    target = 'darwin-arm64'\nelif system == 'darwin' and machine == 'x86_64':\n    target = 'darwin-x86_64'\nelif system == 'linux' and machine == 'x86_64':\n    target = 'linux-x86_64'\nelse:\n    raise SystemExit(f'unsupported host for installed hosted registry smoke: {system}/{machine}')\n\nversion = (repo_root / 'VERSION').read_text(encoding='utf-8').strip()\nsubprocess.run([\n    'python3', str(repo_root / 'scripts' / 'package_release.py'),\n    '--binary', os.environ['NEBULA_BINARY'],\n    '--target', target,\n    '--output-dir', str(release_root),\n], check=True)\nasset = next(release_root.glob('nebula-v*.*'))\nh = hashlib.sha256()\nwith asset.open('rb') as fh:\n    for chunk in iter(lambda: fh.read(1024 * 1024), b''):\n        h.update(chunk)\n(release_root / 'SHA256SUMS.txt').write_text(f'{h.hexdigest()}  {asset.name}\\n', encoding='utf-8')\nsubprocess.run([\n    'bash', str(repo_root / 'scripts' / 'install.sh'),\n    '--version', version,\n    '--prefix', str(install_root),\n    '--base-url', str(release_root),\n], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\n\nhelper_root = install_root / 'tooling' / 'registry'\nif not (helper_root / 'server.py').exists():\n    helper_root = install_root / 'share' / 'nebula' / 'registry'\nif not (helper_root / 'server.py').exists() or not (helper_root / 'client.py').exists():\n    raise SystemExit(f'installed registry helpers missing under {install_root}')\n\nwith socket.socket(socket.AF_INET, socket.SOCK_STREAM) as sock:\n    sock.bind(('127.0.0.1', 0))\n    port = sock.getsockname()[1]\ntoken = 'dev-token'\n(root / 'dep' / 'nebula.toml').write_text('''schema_version = 1\\n\\n[package]\\nname = \"hosted_dep\"\\nversion = \"1.2.3\"\\nentry = \"src/lib.nb\"\\nsrc_dir = \"src\"\\n''', encoding='utf-8')\n(root / 'dep' / 'src' / 'lib.nb').write_text('''module lib\\n\\nfn hosted_answer() -> Int {\\n  return 42\\n}\\n''', encoding='utf-8')\n(root / 'app' / 'nebula.toml').write_text('''schema_version = 1\\n\\n[package]\\nname = \"installed-hosted-app\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n\\n[dependencies]\\nhosted_dep = \"1.2.3\"\\n''', encoding='utf-8')\n(root / 'app' / 'src' / 'main.nb').write_text('''module main\\nimport hosted_dep::lib\\n\\nfn main() -> Void {\\n  if hosted_answer() == 42 {\\n    print(\"hosted-registry-installed-ok\")\\n  } else {\\n    print(\"hosted-registry-installed-bad\")\\n  }\\n}\\n''', encoding='utf-8')\n\nserver_log = root / 'server.log'\nserver = subprocess.Popen([\n    sys.executable,\n    str(helper_root / 'server.py'),\n    'serve',\n    '--root',\n    str((root / 'runtime').resolve()),\n    '--host',\n    '127.0.0.1',\n    '--port',\n    str(port),\n    '--token',\n    token,\n    '--port-file',\n    str((root / 'runtime' / 'server.port').resolve()),\n], stdin=subprocess.DEVNULL, stdout=server_log.open('ab'), stderr=subprocess.STDOUT, start_new_session=True)\n\ntry:\n    for _ in range(100):\n        port_file = root / 'runtime' / 'server.port'\n        if port_file.exists():\n            chosen_port = port_file.read_text(encoding='utf-8').strip()\n            if chosen_port:\n                try:\n                    with request.urlopen(f'http://127.0.0.1:{chosen_port}/healthz', timeout=0.2) as response:\n                        if response.status == 200:\n                            break\n                except Exception:\n                    pass\n        time.sleep(0.05)\n    else:\n        raise SystemExit('installed hosted registry server health probe did not succeed in time')\n\n    installed_nebula = install_root / 'bin' / 'nebula'\n    env = dict(os.environ)\n    env['PYTHON'] = sys.executable\n\n    publish = subprocess.run([\n        str(installed_nebula),\n        'publish',\n        str(root / 'dep'),\n        '--registry-url',\n        f'http://127.0.0.1:{port}',\n        '--registry-token',\n        token,\n    ], check=True, capture_output=True, text=True, env=env)\n    if 'published: hosted_dep@1.2.3' not in publish.stdout:\n        raise SystemExit(f'unexpected publish output: {publish.stdout!r}')\n\n    listed = subprocess.run([\n        sys.executable,\n        str(helper_root / 'client.py'),\n        '--server',\n        f'http://127.0.0.1:{port}',\n        '--token',\n        token,\n        'list',\n    ], check=True, capture_output=True, text=True, env=env)\n    if 'hosted_dep 1.2.3' not in listed.stdout:\n        raise SystemExit(f'installed client list output missing hosted_dep: {listed.stdout!r}')\n\n    subprocess.run([\n        str(installed_nebula),\n        'fetch',\n        str(root / 'app'),\n        '--registry-url',\n        f'http://127.0.0.1:{port}',\n        '--registry-token',\n        token,\n    ], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL, env=env)\n    lock_text = (root / 'app' / 'nebula.lock').read_text(encoding='utf-8')\n    if 'source_kind = \"registry\"' not in lock_text or 'source_hint = \"hosted_dep@1.2.3\"' not in lock_text:\n        raise SystemExit(f'lockfile missing mirrored registry source entry: {lock_text!r}')\n    if not (root / 'app' / '.nebula' / 'registry' / 'hosted_dep' / '1.2.3' / 'nebula.toml').exists():\n        raise SystemExit('mirrored hosted dependency was not written to the local registry root')\n\n    run = subprocess.run([\n        str(installed_nebula),\n        'run',\n        str(root / 'app'),\n        '--run-gate',\n        'none',\n    ], check=True, capture_output=True, text=True, env=env)\n    if 'hosted-registry-installed-ok' not in run.stdout:\n        raise SystemExit(f'installed hosted registry app output was unexpected: {run.stdout!r}')\nfinally:\n    server.terminate()\n    try:\n        server.wait(timeout=5)\n    except subprocess.TimeoutExpired:\n        server.kill()\n        server.wait(timeout=5)\n\nprint('installed-hosted-registry-ok')\nPY"
expect_rc = 0
expect_stdout_contains = ["installed-hosted-registry-ok"]
