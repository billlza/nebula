id = "TST-219-official-db-sqlite-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport os\nimport shutil\nimport subprocess\nfrom pathlib import Path\n\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nroot = Path('work/official_db_sqlite_smoke')\nshutil.rmtree(root, ignore_errors=True)\n(root / 'src').mkdir(parents=True, exist_ok=True)\n(root / 'nebula.toml').write_text('''schema_version = 1\\n\\n[package]\\nname = \"sqlite-smoke\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n\\n[dependencies]\\ndb_sqlite = { path = \"''' + str(repo_root / 'official' / 'nebula-db-sqlite') + '''\" }\\n''', encoding='utf-8')\n(root / 'src' / 'main.nb').write_text('''module main\\nimport db_sqlite::sqlite\\nimport std::bytes\\nimport std::json\\n\\nfn db_path() -> String {\\n  return \"work/official_db_sqlite_smoke/state/control.db\"\\n}\\n\\nfn migration_set() -> Json {\\n  let builder = array_builder()\\n  let sql = \"CREATE TABLE IF NOT EXISTS items (id INTEGER PRIMARY KEY, name TEXT NOT NULL, enabled INTEGER NOT NULL, payload TEXT NOT NULL)\"\\n  builder = array_push(builder, migration(1, \"create_items\", sql))\\n  return array_build(builder)\\n}\\n\\nfn insert_params(name: String, enabled: Bool, payload: Json) -> Json {\\n  let builder = array_builder()\\n  builder = array_push(builder, string_value(name))\\n  builder = array_push(builder, bool_value(enabled))\\n  builder = array_push(builder, payload)\\n  return array_build(builder)\\n}\\n\\nfn id_params(id: Int) -> Json {\\n  let builder = array_builder()\\n  let builder2 = array_push(builder, int_value(id))\\n  return array_build(builder2)\\n}\\n\\nfn main() -> Int {\\n  match open(db_path()) {\\n    Ok(conn) => {\\n      match conn.run_migrations(migration_set()) {\\n        Ok(applied) => {\\n          if applied != 1 {\\n            print(\"migration-count-bad\")\\n            return 1\\n          }\\n        }\\n        Err(msg) => {\\n          print(msg)\\n          return 1\\n        }\\n      }\\n      match conn.execute0(\"DELETE FROM items\") {\\n        Ok(_) => {}\\n        Err(msg) => {\\n          print(msg)\\n          return 1\\n        }\\n      }\\n      match conn.execute(\"INSERT INTO items(name, enabled, payload) VALUES (?, ?, ?)\", insert_params(\"alpha\", true, object1(\"kind\", string_value(\"project\")))) {\\n        Ok(_) => {}\\n        Err(msg) => {\\n          print(msg)\\n          return 1\\n        }\\n      }\\n      match conn.begin_transaction() {\\n        Ok(tx) => {\\n          match tx.execute(\"INSERT INTO items(name, enabled, payload) VALUES (?, ?, ?)\", insert_params(\"beta\", false, object1(\"kind\", string_value(\"rollback\")))) {\\n            Ok(_) => {}\\n            Err(msg) => {\\n              print(msg)\\n              return 1\\n            }\\n          }\\n          match tx.rollback() {\\n            Ok(_) => {}\\n            Err(msg) => {\\n              print(msg)\\n              return 1\\n            }\\n          }\\n        }\\n        Err(msg) => {\\n          print(msg)\\n          return 1\\n        }\\n      }\\n      match conn.query0(\"SELECT id, name, enabled, payload FROM items ORDER BY id ASC\") {\\n        Ok(rows) => {\\n          match rows.len() {\\n            Ok(count) => {\\n              if count != 1 {\\n                print(\"row-count-bad\")\\n                return 1\\n              }\\n            }\\n            Err(msg) => {\\n              print(msg)\\n              return 1\\n            }\\n          }\\n          match rows.row(0) {\\n            Ok(row) => {\\n              match row.get_int(\"id\") {\\n                Ok(id) => {\\n                  match row.get_string(\"name\") {\\n                    Ok(name) => {\\n                      match row.get_bool(\"enabled\") {\\n                        Ok(enabled) => {\\n                          match row.get_json(\"payload\") {\\n                            Ok(payload) => {\\n                              match get_string(payload, \"kind\") {\\n                                Ok(kind) => {\\n                                  match conn.query(\"SELECT id FROM items WHERE id = ?\", id_params(id)) {\\n                                    Ok(filtered) => {\\n                                      match filtered.len() {\\n                                        Ok(filtered_count) => {\\n                                          match conn.query0(\"SELECT X'6162' AS data\") {\\n                                            Ok(blob_rows) => {\\n                                              match blob_rows.row(0) {\\n                                                Ok(blob_row) => {\\n                                                  match blob_row.get_bytes(\"data\") {\\n                                                    Ok(data) => {\\n                                                      if name == \"alpha\" && enabled == true && kind == \"project\" && filtered_count == 1 && to_string(data) == \"ab\" {\\n                                                        print(\"official-db-sqlite-ok\")\\n                                                        return 0\\n                                                      }\\n                                                      print(\"sqlite-data-bad\")\\n                                                      return 1\\n                                                    }\\n                                                    Err(msg) => {\\n                                                      print(msg)\\n                                                      return 1\\n                                                    }\\n                                                  }\\n                                                }\\n                                                Err(msg) => {\\n                                                  print(msg)\\n                                                  return 1\\n                                                }\\n                                              }\\n                                            }\\n                                            Err(msg) => {\\n                                              print(msg)\\n                                              return 1\\n                                            }\\n                                          }\\n                                        }\\n                                        Err(msg) => {\\n                                          print(msg)\\n                                          return 1\\n                                        }\\n                                      }\\n                                    }\\n                                    Err(msg) => {\\n                                      print(msg)\\n                                      return 1\\n                                    }\\n                                  }\\n                                }\\n                                Err(msg) => {\\n                                  print(msg)\\n                                  return 1\\n                                }\\n                              }\\n                            }\\n                            Err(msg) => {\\n                              print(msg)\\n                              return 1\\n                            }\\n                          }\\n                        }\\n                        Err(msg) => {\\n                          print(msg)\\n                          return 1\\n                        }\\n                      }\\n                    }\\n                    Err(msg) => {\\n                      print(msg)\\n                      return 1\\n                    }\\n                  }\\n                }\\n                Err(msg) => {\\n                  print(msg)\\n                  return 1\\n                }\\n              }\\n            }\\n            Err(msg) => {\\n              print(msg)\\n              return 1\\n            }\\n          }\\n        }\\n        Err(msg) => {\\n          print(msg)\\n          return 1\\n        }\\n      }\\n    }\\n    Err(msg) => {\\n      print(msg)\\n      return 1\\n    }\\n  }\\n}\\n''', encoding='utf-8')\nsubprocess.run([os.environ['NEBULA_BINARY'], 'fetch', str(root)], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\nsubprocess.run([os.environ['NEBULA_BINARY'], 'check', str(root)], check=True)\nsubprocess.run([os.environ['NEBULA_BINARY'], 'run', str(root), '--run-gate', 'none'], check=True)\nPY"
expect_rc = 0
expect_stdout_contains = ["official-db-sqlite-ok"]
