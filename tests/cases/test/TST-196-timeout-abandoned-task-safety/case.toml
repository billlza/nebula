id = "TST-196-timeout-abandoned-task-safety"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport os\nimport shutil\nimport subprocess\nfrom pathlib import Path\n\nroot = Path('work/timeout_abandoned_task_safety')\nshutil.rmtree(root, ignore_errors=True)\n(root / 'src').mkdir(parents=True, exist_ok=True)\n(root / 'nebula.toml').write_text('''schema_version = 1\\n\\n[package]\\nname = \"timeout-abandoned-task-safety\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n''', encoding='utf-8')\n(root / 'src' / 'main.nb').write_text('''module main\\nimport std::net\\nimport std::task\\nimport std::time\\n\\nasync fn main() -> Void {\\n  match ipv4(\"127.0.0.1\", 0) {\\n    Ok(addr) => {\\n      match await bind(addr) {\\n        Ok(listener) => {\\n          let attempts = 0\\n          let ok = true\\n          while attempts < 128 {\\n            match await timeout(millis(1), listener.accept()) {\\n              Ok(_) => {\\n                ok = false\\n                print(\"timeout-abandoned-task-unexpected-accept\")\\n              }\\n              Err(msg) => {\\n                if msg != \"timeout\" {\\n                  ok = false\\n                  print(msg)\\n                }\\n              }\\n            }\\n            if !ok {\\n              attempts = 128\\n            } else {\\n              attempts += 1\\n            }\\n          }\\n          listener.close()\\n          await sleep(millis(50))\\n          if ok {\\n            print(\"timeout-abandoned-task-ok\")\\n          }\\n        }\\n        Err(msg) => { print(msg) }\\n      }\\n    }\\n    Err(msg) => { print(msg) }\\n  }\\n}\\n''', encoding='utf-8')\nupdate = subprocess.run([os.environ['NEBULA_BINARY'], 'update', str(root)], capture_output=True, text=True, env=os.environ.copy())\nprint(update.stdout, end='')\nprint(update.stderr, end='')\nif update.returncode != 0:\n    raise SystemExit(update.returncode)\nrun = subprocess.run([os.environ['NEBULA_BINARY'], 'run', str(root), '--run-gate', 'none'], capture_output=True, text=True, env=os.environ.copy())\nprint(run.stdout, end='')\nprint(run.stderr, end='')\nif run.returncode != 0:\n    raise SystemExit(run.returncode)\nif 'timeout-abandoned-task-ok' not in run.stdout:\n    raise SystemExit('timeout-abandoned-task-ok missing from output')\nif 'unexpected-accept' in run.stdout:\n    raise SystemExit('listener unexpectedly accepted a connection during timeout safety test')\nPY"
expect_rc = 0
expect_stdout_contains = ["timeout-abandoned-task-ok"]
