id = "TST-105-installed-binary-official-crypto-git-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "rm -rf work/release_asset work/install-root work/installed-crypto"
expect_rc = 0

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport hashlib\nimport os\nimport platform\nimport subprocess\nfrom pathlib import Path\n\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nroot = Path('work/release_asset')\nroot.mkdir(parents=True, exist_ok=True)\nversion = (repo_root / 'VERSION').read_text(encoding='utf-8').strip()\nsystem = platform.system()\nmachine = platform.machine().lower()\nif system == 'Darwin' and machine in ('arm64', 'aarch64'):\n    target = 'darwin-arm64'\n    host_kind = 'unix'\n    binary_name = 'nebula'\nelif system == 'Darwin' and machine == 'x86_64':\n    target = 'darwin-x86_64'\n    host_kind = 'unix'\n    binary_name = 'nebula'\nelif system == 'Linux' and machine == 'x86_64':\n    target = 'linux-x86_64'\n    host_kind = 'unix'\n    binary_name = 'nebula'\nelif system.startswith('MSYS') or system.startswith('MINGW') or system == 'Windows':\n    target = 'windows-x86_64'\n    host_kind = 'windows'\n    binary_name = 'nebula.exe'\nelse:\n    raise SystemExit(f'unsupported host for installed crypto smoke: {system}/{machine}')\nsubprocess.run([\n    'python3', str(repo_root / 'scripts' / 'package_release.py'),\n    '--binary', os.environ['NEBULA_BINARY'],\n    '--target', target,\n    '--output-dir', str(root),\n], check=True)\nasset = next(root.glob('nebula-v*.zip' if host_kind == 'windows' else 'nebula-v*.tar.gz'))\nh = hashlib.sha256()\nwith asset.open('rb') as fh:\n    for chunk in iter(lambda: fh.read(1024 * 1024), b''):\n        h.update(chunk)\n(root / 'SHA256SUMS.txt').write_text(f'{h.hexdigest()}  {asset.name}\\n', encoding='utf-8')\n(root / 'VERSION.txt').write_text(version + '\\n', encoding='utf-8')\n(root / 'HOST_KIND').write_text(host_kind + '\\n', encoding='utf-8')\n(root / 'BINARY_NAME').write_text(binary_name + '\\n', encoding='utf-8')\nPY"
expect_rc = 0

[[steps]]
kind = "shell"
run = "version=$(cat work/release_asset/VERSION.txt) && kind=$(cat work/release_asset/HOST_KIND) && if [ \"$kind\" = windows ]; then prefix=$(cygpath -w \"$PWD/work/install-root\") && base=$(cygpath -w \"$PWD/work/release_asset\") && script=$(cygpath -w \"$NEBULA_REPO_ROOT/scripts/install.ps1\") && pwsh -File \"$script\" -Version \"$version\" -InstallPrefix \"$prefix\" -BaseUrl \"$base\" > work/installed-crypto-install.out 2>&1; else bash \"$NEBULA_REPO_ROOT/scripts/install.sh\" --version \"$version\" --prefix \"$PWD/work/install-root\" --base-url \"$PWD/work/release_asset\" > work/installed-crypto-install.out 2>&1; fi"
expect_rc = 0

[[steps]]
kind = "shell"
run = "bin=$(cat work/release_asset/BINARY_NAME) && work/install-root/bin/$bin new work/installed-crypto/app >/dev/null"
expect_rc = 0

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nfrom pathlib import Path\nimport os\nimport shutil\nimport subprocess\nroot = Path('work/installed-crypto')\npkg = root / 'nebula-crypto'\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nshutil.copytree(repo_root / 'official' / 'nebula-crypto', pkg)\napp = root / 'app'\n(app / 'src' / 'main.nb').write_text('module main\\nimport crypto::hash\\nimport crypto::pqc.kem\\nimport crypto::pqc.sign\\nimport crypto::rand\\nimport std::bytes\\nimport std::result\\n\\nfn main() -> Void {\\n  let ok = true\\n  if hex(sha3_256(from_string(\"nebula\"))) != \"816ba2b6c12bad00ef102303a48ce3d07a44a49b029f1cac49c6e0d581850044\" {\\n    ok = false\\n  }\\n  if len(blake3(from_string(\"nebula\"))) != 32 {\\n    ok = false\\n  }\\n  match random_bytes(16) {\\n    Ok(bytes) => {\\n      if len(bytes) != 16 {\\n        ok = false\\n      }\\n    }\\n    Err(_) => {\\n      ok = false\\n    }\\n  }\\n  match ml_kem_768_keypair() {\\n    Ok(kem_pair) => {\\n      let pk = kem_pair.public_key()\\n      let sk = kem_pair.secret_key()\\n      match encapsulate(pk) {\\n        Ok(encap) => {\\n          match decapsulate(sk, encap.ciphertext()) {\\n            Ok(ss2) => {\\n              if encap.shared_secret().equal(ss2) == false {\\n                ok = false\\n              }\\n            }\\n            Err(_) => {\\n              ok = false\\n            }\\n          }\\n        }\\n        Err(_) => {\\n          ok = false\\n        }\\n      }\\n    }\\n    Err(_) => {\\n      ok = false\\n    }\\n  }\\n  match ml_dsa_65_keypair() {\\n    Ok(sig_pair) => {\\n      let msg = from_string(\"nebula-sign\")\\n      match sign(sig_pair.secret_key(), msg) {\\n        Ok(sig) => {\\n          if verify(sig_pair.public_key(), msg, sig) == false {\\n            ok = false\\n          }\\n        }\\n        Err(_) => {\\n          ok = false\\n        }\\n      }\\n    }\\n    Err(_) => {\\n      ok = false\\n    }\\n  }\\n  if ok {\\n    print(\"installed-crypto-ok\")\\n  } else {\\n    print(\"installed-crypto-bad\")\\n  }\\n}\\n', encoding='utf-8')\nsubprocess.run(['git', 'init', pkg], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\nsubprocess.run(['git', '-C', str(pkg), 'config', 'user.email', 'tests@example.com'], check=True)\nsubprocess.run(['git', '-C', str(pkg), 'config', 'user.name', 'Nebula Tests'], check=True)\nsubprocess.run(['git', '-C', str(pkg), 'add', '.'], check=True)\nsubprocess.run(['git', '-C', str(pkg), 'commit', '-m', 'init'], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\nPY"
expect_rc = 0

[[steps]]
kind = "shell"
run = "bin=$(cat work/release_asset/BINARY_NAME) && work/install-root/bin/$bin add work/installed-crypto/app crypto --git \"$PWD/work/installed-crypto/nebula-crypto\" --rev HEAD >/dev/null"
expect_rc = 0

[[steps]]
kind = "shell"
run = "bin=$(cat work/release_asset/BINARY_NAME) && work/install-root/bin/$bin fetch work/installed-crypto/app >/dev/null"
expect_rc = 0

[[steps]]
kind = "shell"
run = "bin=$(cat work/release_asset/BINARY_NAME) && (cd work && install-root/bin/$bin run installed-crypto/app --run-gate none)"
expect_rc = 0
expect_stdout_contains = ["installed-crypto-ok"]
