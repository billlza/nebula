id = "TST-173-install-prefix-backend-sdk-opt-in-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport hashlib\nimport http.client\nimport importlib.util\nimport os\nimport platform\nimport shutil\nimport socket\nimport subprocess\nimport sys\nimport threading\nimport time\nfrom pathlib import Path\n\nif platform.system() != 'Linux' or platform.machine().lower() not in ('x86_64', 'amd64'):\n    print('backend-sdk-install-skip-unsupported-host')\n    raise SystemExit(0)\n\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nsys.path.insert(0, str(repo_root / 'tests' / 'lib'))\nfrom service_probe import wait_for_observe_event_in_file\nroot = Path('work/install_backend_sdk')\nshutil.rmtree(root, ignore_errors=True)\nroot.mkdir(parents=True, exist_ok=True)\nversion = (repo_root / 'VERSION').read_text(encoding='utf-8').strip()\nsubprocess.run([\n    'python3', str(repo_root / 'scripts' / 'package_release.py'),\n    '--binary', os.environ['NEBULA_BINARY'],\n    '--target', 'linux-x86_64',\n    '--output-dir', str(root),\n    '--include-backend-sdk',\n], check=True)\nchecksums = []\nfor asset in sorted(root.glob('nebula-*.tar.gz')):\n    h = hashlib.sha256()\n    with asset.open('rb') as fh:\n        for chunk in iter(lambda: fh.read(1024 * 1024), b''):\n            h.update(chunk)\n    checksums.append(f'{h.hexdigest()}  {asset.name}')\n(root / 'SHA256SUMS.txt').write_text('\\n'.join(checksums) + '\\n', encoding='utf-8')\ninstall_root = root / 'prefix'\nsubprocess.run([\n    'bash', str(repo_root / 'scripts' / 'install.sh'),\n    '--version', version,\n    '--prefix', str(install_root),\n    '--base-url', str(root),\n    '--with-backend-sdk',\n], check=True)\nservice_manifest = install_root / 'share' / 'nebula' / 'sdk' / 'backend' / 'nebula-service' / 'nebula.toml'\nobserve_manifest = install_root / 'share' / 'nebula' / 'sdk' / 'backend' / 'nebula-observe' / 'nebula.toml'\ndb_manifest = install_root / 'share' / 'nebula' / 'sdk' / 'backend' / 'nebula-db-sqlite' / 'nebula.toml'\nobserve_bridge = install_root / 'share' / 'nebula' / 'sdk' / 'backend' / 'nebula-observe' / 'prometheus_bridge.py'\nexample_root = install_root / 'share' / 'nebula' / 'sdk' / 'backend' / 'examples' / 'hello_api'\nexample_manifest = example_root / 'nebula.toml'\nexample_readme = example_root / 'README.md'\noperator_guide = install_root / 'share' / 'nebula' / 'sdk' / 'backend' / 'docs' / 'backend_operator_guide.md'\nif not service_manifest.exists() or not observe_manifest.exists() or not db_manifest.exists() or not observe_bridge.exists() or not example_manifest.exists() or not example_readme.exists() or not operator_guide.exists():\n    raise SystemExit('backend SDK install is missing expected files')\nexample_manifest_text = example_manifest.read_text(encoding='utf-8')\nexample_readme_text = example_readme.read_text(encoding='utf-8')\noperator_guide_text = operator_guide.read_text(encoding='utf-8')\nif 'installed = \"nebula-service\"' not in example_manifest_text:\n    raise SystemExit('installed hello_api example did not use installed nebula-service dependency')\nif '../../official/' in example_manifest_text or '../../official/' in example_readme_text:\n    raise SystemExit('installed hello_api example still contains repo-local official paths')\nif '../../nebula-observe/prometheus_bridge.py serve --input hello-api.observe.ndjson' not in example_readme_text:\n    raise SystemExit('installed hello_api README did not point at installed bridge helper path')\nif 'panic(...) is not converted into an in-process JSON `500`' not in operator_guide_text:\n    raise SystemExit('installed backend operator guide was missing the panic contract')\nproject = root / 'app'\nnebula_bin = install_root / 'bin' / 'nebula'\nsubprocess.run([str(nebula_bin), 'new', str(project), '--template', 'backend-service'], check=True)\nreadme = (project / 'README.md').read_text(encoding='utf-8')\nif '/path/to/nebula-observe' in readme:\n    raise SystemExit('installed backend-service template README still contains a placeholder bridge path')\nif str(observe_bridge) not in readme:\n    raise SystemExit('installed backend-service template README did not render the installed bridge path')\nsubprocess.run([str(nebula_bin), 'fetch', str(project)], check=True)\ntext = (project / 'nebula.lock').read_text(encoding='utf-8')\nif 'source_kind = \"installed\"' not in text:\n    raise SystemExit('backend-service project lock did not record installed dependency source kind')\n\nsqlite_project = root / 'sqlite_preview_app'\nsubprocess.run([str(nebula_bin), 'new', str(sqlite_project)], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\n(sqlite_project / 'nebula.toml').write_text('''schema_version = 1\\n\\n[package]\\nname = \"sqlite-preview-app\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n\\n[dependencies]\\ndb_sqlite = { installed = \"nebula-db-sqlite\" }\\n''', encoding='utf-8')\ndb_path = (root / 'installed-preview.db').resolve()\n(sqlite_project / 'src' / 'main.nb').write_text(f'''module main\\nimport db_sqlite::sqlite\\nimport std::json\\n\\nfn main() -> Void {{\\n  let migrations = array_build(array_push(array_builder(), migration(1, \"init\", \"create table if not exists demo (id integer primary key, value text not null);\")))\\n  match open(\"{db_path}\") {{\\n    Ok(conn) => {{\\n      match conn.run_migrations(migrations) {{\\n        Ok(_) => {{\\n          match conn.close() {{\\n            Ok(_) => {{ print(\"sqlite-installed-preview-ok\") }}\\n            Err(msg) => {{ print(msg) }}\\n          }}\\n        }}\\n        Err(msg) => {{ print(msg) }}\\n      }}\\n    }}\\n    Err(msg) => {{ print(msg) }}\\n  }}\\n}}\\n''', encoding='utf-8')\nsubprocess.run([str(nebula_bin), 'fetch', str(sqlite_project)], check=True)\nsqlite_lock = (sqlite_project / 'nebula.lock').read_text(encoding='utf-8')\nif 'name = \"nebula-db-sqlite\"' not in sqlite_lock or 'source_kind = \"installed\"' not in sqlite_lock:\n    raise SystemExit('installed-preview sqlite project lock did not record installed nebula-db-sqlite')\nsqlite_run = subprocess.run([str(nebula_bin), 'run', str(sqlite_project), '--run-gate', 'none'], capture_output=True, text=True)\nif sqlite_run.returncode != 0 or 'sqlite-installed-preview-ok' not in sqlite_run.stdout:\n    print(sqlite_run.stdout, end='')\n    print(sqlite_run.stderr, end='')\n    raise SystemExit('installed-preview sqlite project did not run successfully')\n\nsample_log = root / 'observe.ndjson'\nsample_log.write_text('{\"schema\":\"nebula.observe.metric.v1\",\"signal\":\"metric\",\"service\":\"installed-sdk\",\"metric\":\"handler_errors\",\"unit\":\"1\",\"value\":2,\"unix_ms\":1}\\n', encoding='utf-8')\nrendered = subprocess.check_output([\n    'python3',\n    str(observe_bridge),\n    'render',\n    '--input',\n    str(sample_log),\n], text=True)\nif 'nebula_service_handler_errors_total{service=\"installed-sdk\"} 2' not in rendered:\n    raise SystemExit(f'installed backend SDK prometheus bridge render failed: {rendered!r}')\nsubprocess.run([str(nebula_bin), 'fetch', str(example_root)], check=True)\nbridge_spec = importlib.util.spec_from_file_location('installed_prometheus_bridge', observe_bridge)\nbridge_mod = importlib.util.module_from_spec(bridge_spec)\nbridge_spec.loader.exec_module(bridge_mod)\nlog_path = root / 'hello-api.observe.ndjson'\nlog_handle = log_path.open('w')\nservice = subprocess.Popen([\n    str(nebula_bin),\n    'run',\n    str(example_root),\n    '--run-gate',\n    'none',\n], stdout=subprocess.DEVNULL, stderr=log_handle, text=True, env={**os.environ, 'NEBULA_BIND_HOST': '127.0.0.1', 'NEBULA_PORT': '0'})\nbound = wait_for_observe_event_in_file(log_path, 'listener_bound', 10, service)\nservice_port = bound.get('port')\nif not isinstance(service_port, int) or service_port <= 0:\n    raise SystemExit(f'invalid listener_bound payload: {bound!r}')\nbridge_server = bridge_mod.MetricsServer(('127.0.0.1', 0), log_path.resolve())\nbridge_port = bridge_server.server_address[1]\nbridge_thread = threading.Thread(target=bridge_server.serve_forever, kwargs={'poll_interval': 0.2}, daemon=True)\nbridge_thread.start()\ntry:\n    deadline = time.time() + 20\n    ready = False\n    while time.time() < deadline:\n        if service.poll() is not None:\n            raise SystemExit(f'installed hello_api example exited early: rc={service.returncode}')\n        try:\n            conn = http.client.HTTPConnection('127.0.0.1', service_port, timeout=1)\n            conn.request('GET', '/healthz')\n            resp = conn.getresponse()\n            body = resp.read().decode('utf-8')\n            conn.close()\n            if resp.status == 200 and '\"status\":\"ok\"' in body:\n                ready = True\n                break\n        except Exception:\n            time.sleep(0.1)\n    if not ready:\n        raise SystemExit('installed hello_api example did not become ready')\n\n    bridge_ready = False\n    deadline = time.time() + 10\n    while time.time() < deadline:\n        try:\n            conn = http.client.HTTPConnection('127.0.0.1', bridge_port, timeout=1)\n            conn.request('GET', '/healthz')\n            resp = conn.getresponse()\n            body = resp.read().decode('utf-8')\n            conn.close()\n            if resp.status == 200 and '\"status\":\"ok\"' in body:\n                bridge_ready = True\n                break\n        except Exception:\n            time.sleep(0.1)\n    if not bridge_ready:\n        raise SystemExit('installed hello_api bridge did not become ready')\n\n    conn = http.client.HTTPConnection('127.0.0.1', service_port, timeout=2)\n    conn.request('GET', '/hello/nebula')\n    resp = conn.getresponse()\n    body = resp.read().decode('utf-8')\n    conn.close()\n    if resp.status != 200 or body != 'nebula':\n        raise SystemExit(f'installed hello_api example returned unexpected hello response: {(resp.status, body)!r}')\n\n    huge_header = 'a' * 20000\n    bad_request = ('GET /hello/nebula HTTP/1.1\\r\\n'\n                   'Host: 127.0.0.1\\r\\n'\n                   'X-Big: ' + huge_header + '\\r\\n\\r\\n').encode('ascii')\n    with socket.create_connection(('127.0.0.1', service_port), timeout=2) as bad_sock:\n        bad_sock.sendall(bad_request)\n        bad_sock.settimeout(1)\n        bad_response = bad_sock.recv(4096).decode('latin1', 'replace')\n    if '400 Bad Request' not in bad_response:\n        raise SystemExit(f'installed hello_api example did not reject oversized headers: {bad_response!r}')\n\n    metrics_text = ''\n    deadline = time.time() + 10\n    while time.time() < deadline:\n        conn = http.client.HTTPConnection('127.0.0.1', bridge_port, timeout=2)\n        conn.request('GET', '/metrics')\n        resp = conn.getresponse()\n        metrics_text = resp.read().decode('utf-8')\n        conn.close()\n        if 'nebula_service_bad_requests_total{service=\"hello-api\"} 1' in metrics_text:\n            break\n        time.sleep(0.1)\n    else:\n        raise SystemExit(f'installed hello_api bridge missing bad_requests counter: {metrics_text!r}')\nfinally:\n    bridge_server.shutdown()\n    bridge_server.server_close()\n    if service.poll() is None:\n        service.terminate()\n        try:\n            service.wait(timeout=5)\n        except subprocess.TimeoutExpired:\n            service.kill()\n            service.wait(timeout=5)\n    log_handle.close()\nprint('backend-sdk-install-ok')\nPY"
expect_rc = 0
