id = "TST-181-official-tls13-only-server-required"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport os\nimport platform\nimport queue\nimport shutil\nimport socket\nimport ssl\nimport subprocess\nimport threading\nfrom pathlib import Path\n\nsystem = platform.system().lower()\nif system.startswith('windows') or system.startswith('msys') or system.startswith('mingw') or system.startswith('cygwin'):\n    print('tls13-only-skip-unsupported-host')\n    raise SystemExit(0)\nif shutil.which('openssl') is None:\n    raise SystemExit('openssl is required for official TLS 1.3-only smoke test')\nif not hasattr(ssl, 'TLSVersion') or not hasattr(ssl.TLSVersion, 'TLSv1_3'):\n    print('tls13-only-skip-no-python-tls13')\n    raise SystemExit(0)\n\nroot = Path('work/official_tls13_only')\napp = root / 'app'\nshutil.rmtree(root, ignore_errors=True)\n(app / 'src').mkdir(parents=True, exist_ok=True)\n(root / 'openssl_ca.cnf').write_text('''[req]\\ndistinguished_name = dn\\nx509_extensions = v3_ca\\nprompt = no\\n\\n[dn]\\nCN = Nebula TLS13 CA\\n\\n[v3_ca]\\nsubjectKeyIdentifier = hash\\nauthorityKeyIdentifier = keyid:always,issuer\\nbasicConstraints = critical, CA:true\\nkeyUsage = critical, digitalSignature, keyCertSign, cRLSign\\n''', encoding='utf-8')\n(root / 'openssl_server.cnf').write_text('''[req]\\ndistinguished_name = dn\\nreq_extensions = v3_req\\nprompt = no\\n\\n[dn]\\nCN = localhost\\n\\n[v3_req]\\nsubjectAltName = @alt_names\\nbasicConstraints = CA:false\\nkeyUsage = critical, digitalSignature, keyEncipherment\\nextendedKeyUsage = serverAuth\\n\\n[alt_names]\\nDNS.1 = localhost\\nIP.1 = 127.0.0.1\\n''', encoding='utf-8')\nsubprocess.run(['openssl', 'req', '-x509', '-newkey', 'rsa:2048', '-nodes', '-keyout', str(root / 'ca.key'), '-out', str(root / 'ca.pem'), '-days', '2', '-config', str(root / 'openssl_ca.cnf')], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\nsubprocess.run(['openssl', 'req', '-newkey', 'rsa:2048', '-nodes', '-keyout', str(root / 'server.key'), '-out', str(root / 'server.csr'), '-config', str(root / 'openssl_server.cnf')], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\nsubprocess.run(['openssl', 'x509', '-req', '-in', str(root / 'server.csr'), '-CA', str(root / 'ca.pem'), '-CAkey', str(root / 'ca.key'), '-CAcreateserial', '-out', str(root / 'server.pem'), '-days', '2', '-sha256', '-extfile', str(root / 'openssl_server.cnf'), '-extensions', 'v3_req'], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\n\nport_q: queue.Queue[int] = queue.Queue()\ndone_q: queue.Queue[object] = queue.Queue()\n\ndef serve() -> None:\n    try:\n        ctx = ssl.SSLContext(ssl.PROTOCOL_TLS_SERVER)\n        ctx.minimum_version = ssl.TLSVersion.TLSv1_3\n        ctx.maximum_version = ssl.TLSVersion.TLSv1_3\n        ctx.load_cert_chain(str(root / 'server.pem'), str(root / 'server.key'))\n        with socket.socket(socket.AF_INET, socket.SOCK_STREAM) as sock:\n            sock.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)\n            sock.bind(('127.0.0.1', 0))\n            sock.listen(1)\n            sock.settimeout(60)\n            port_q.put(sock.getsockname()[1])\n            conn, _ = sock.accept()\n            with ctx.wrap_socket(conn, server_side=True) as tls:\n                tls.settimeout(60)\n                data = tls.recv(4096)\n                if data == b'ping':\n                    tls.sendall(b'tls13-ok')\n                else:\n                    tls.sendall(b'bad:' + data)\n        done_q.put(None)\n    except Exception as exc:\n        done_q.put(exc)\n\nthread = threading.Thread(target=serve, daemon=True)\nthread.start()\nport = port_q.get(timeout=10)\nca_pem = (root / 'ca.pem').read_text(encoding='utf-8')\nca_literal = ca_pem.replace('\\\\', '\\\\\\\\').replace('\\n', '\\\\n').replace('\"', '\\\\\"')\n(app / 'nebula.toml').write_text(f'''schema_version = 1\\n\\n[package]\\nname = \"official-tls13-only-required\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n\\n[dependencies]\\ntls = {{ path = \"{os.environ['NEBULA_REPO_ROOT']}/official/nebula-tls\" }}\\n''', encoding='utf-8')\n(app / 'src' / 'main.nb').write_text(f'''module main\\nimport std::bytes\\nimport std::net\\nimport tls::client\\n\\nasync fn main() -> Void {{\\n  let ok = true\\n  match client_config_from_ca_pem_text(\"{ca_literal}\") {{\\n    Ok(base) => {{\\n      let config = with_version_policy(base, tls13_only())\\n      match await dial_host(\"localhost\", {port}, config) {{\\n        Ok(stream) => {{\\n          let version = TlsClientStream_tls_version(stream)\\n          match await TlsClientStream_write_all(stream, from_string(\"ping\")) {{\\n            Ok(_) => {{\\n              match await TlsClientStream_read(stream, 128) {{\\n                Ok(bytes) => {{\\n                  let body = to_string(bytes)\\n                  if version == \"TLSv1.3\" && body == \"tls13-ok\" {{\\n                    print(\"tls13-only-contract-ok\")\\n                  }} else {{\\n                    ok = false\\n                    print(version)\\n                    print(body)\\n                  }}\\n                }}\\n                Err(msg) => {{\\n                  ok = false\\n                  print(msg)\\n                }}\\n              }}\\n            }}\\n            Err(msg) => {{\\n              ok = false\\n              print(msg)\\n            }}\\n          }}\\n          let _ = await TlsClientStream_close(stream)\\n        }}\\n        Err(msg) => {{\\n          ok = false\\n          print(msg)\\n        }}\\n      }}\\n    }}\\n    Err(msg) => {{\\n      ok = false\\n      print(msg)\\n    }}\\n  }}\\n  if ok == false {{\\n    print(\"tls13-only-contract-bad\")\\n  }}\\n}}\\n''', encoding='utf-8')\n\nupdate = subprocess.run([os.environ['NEBULA_BINARY'], 'update', str(app)], capture_output=True, text=True, env=os.environ.copy())\nprint(update.stdout, end='')\nprint(update.stderr, end='')\nif update.returncode != 0:\n    raise SystemExit(update.returncode)\nrun = subprocess.run([os.environ['NEBULA_BINARY'], 'run', str(app), '--run-gate', 'none'], capture_output=True, text=True, env=os.environ.copy())\nprint(run.stdout, end='')\nprint(run.stderr, end='')\nif run.returncode != 0:\n    raise SystemExit(run.returncode)\nserver_result = done_q.get(timeout=60)\nif server_result is not None:\n    raise server_result\nif 'tls13-only-contract-ok' not in run.stdout:\n    raise SystemExit('expected TLS 1.3-only success output')\nif 'tls13-only-contract-bad' in run.stdout:\n    raise SystemExit('TLS 1.3-only smoke reported failure')\nPY"
expect_rc = 0
