id = "TST-256-release-control-plane-platform-preview-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport json\nimport os\nimport subprocess\nimport sys\nfrom pathlib import Path\n\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nsys.path.insert(0, str(repo_root / 'tests' / 'lib'))\nfrom release_control_plane_workspace import (\n    build_service_binary,\n    copy_example,\n    fetch_workspace,\n    require_success,\n    run_ctl,\n    start_service,\n    terminate_process,\n    wait_until_health_ok,\n)\n\nbinary = os.environ['NEBULA_BINARY']\nroot = Path('work/release_control_plane_platform_preview')\nstate_dir = root / 'state'\nctl_out_dir = root / '.ctl-out'\ncopy_example(repo_root, root)\nfetch_workspace(binary, root)\nproc, stderr_lines, port = start_service(binary, root, {'APP_STATE_DIR': str(state_dir)})\ntry:\n    wait_until_health_ok(proc, stderr_lines, port)\n    base_url = f'http://127.0.0.1:{port}'\n    prewarm = run_ctl(binary, root, 'control-plane-validate', '--url', base_url, out_dir=ctl_out_dir)\n    require_success(prewarm, 'prewarm ctl binary')\n    capabilities = run_ctl(binary, root, '--json', '--url', base_url, 'platform', 'capabilities', out_dir=ctl_out_dir, no_build=True)\n    require_success(capabilities, 'ctl platform capabilities')\n    payload = json.loads(capabilities.stdout)\n    names = [item.get('name') for item in payload.get('capabilities', [])]\n    expected = [\n        'dag_workflows',\n        'cron_schedule',\n        'external_broker',\n        'postgres',\n        'jwt_resource_server_auth',\n        'free_form_shell_command_tasks',\n        'public_webhook_integrations',\n        'distributed_deploy_orchestration',\n    ]\n    if names != expected:\n        raise SystemExit(f'unexpected capability names: {names!r}')\n    for item in payload.get('capabilities', []):\n        if item.get('name') == 'dag_workflows':\n            if item.get('status') != 'preview_available' or item.get('default_enabled') is not True:\n                raise SystemExit(f'DAG capability is not marked available: {item!r}')\n        elif item.get('status') != 'preview_contract_default_off' or item.get('default_enabled') is not False:\n            raise SystemExit(f'capability is not default-off preview: {item!r}')\nfinally:\n    terminate_process(proc)\n\nservice_binary = build_service_binary(binary, root)\nfail_env = {\n    **os.environ,\n    'NEBULA_BIND_HOST': '127.0.0.1',\n    'NEBULA_PORT': '0',\n    'APP_STATE_DIR': str(root / 'state-fail'),\n    'APP_SHELL_TASKS_PREVIEW': '1',\n}\nfailed = subprocess.run([str(service_binary)], capture_output=True, text=True, env=fail_env, timeout=10)\nif failed.returncode == 0:\n    raise SystemExit('shell task preview unexpectedly started without auth')\nif 'startup preflight failed: free_form_shell_command_tasks preview requires APP_AUTH_REQUIRED=1' not in failed.stdout:\n    print(failed.stdout, end='')\n    print(failed.stderr, end='')\n    raise SystemExit('shell task preview missing default-off auth diagnostic')\n\nprint('release-control-plane-platform-preview-ok')\nPY"
expect_rc = 0
expect_stdout_contains = ["release-control-plane-platform-preview-ok"]
