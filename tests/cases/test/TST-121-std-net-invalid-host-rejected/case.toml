id = "TST-121-std-net-invalid-host-rejected"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport os\nimport subprocess\nfrom pathlib import Path\n\nroot = Path('work/net_invalid_host')\n(root / 'src').mkdir(parents=True, exist_ok=True)\n(root / 'nebula.toml').write_text('''schema_version = 1\\n\\n[package]\\nname = \"net-invalid-host\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n''', encoding='utf-8')\n(root / 'src' / 'main.nb').write_text('''module main\\nimport std::net\\n\\nasync fn main() -> Void {\\n  match await connect_host(\"bad host name\", 80) {\\n    Ok(_) => {\\n      print(\"invalid-host-bad\")\\n    }\\n    Err(msg) => {\\n      print(\"invalid-host-ok\")\\n      print(msg)\\n    }\\n  }\\n}\\n''', encoding='utf-8')\n\nupdate = subprocess.run([os.environ['NEBULA_BINARY'], 'update', str(root)], capture_output=True, text=True, env=os.environ.copy())\nprint(update.stdout, end='')\nprint(update.stderr, end='')\nif update.returncode != 0:\n    raise SystemExit(update.returncode)\nrun = subprocess.run([os.environ['NEBULA_BINARY'], 'run', str(root), '--run-gate', 'none'], capture_output=True, text=True, env=os.environ.copy())\nprint(run.stdout, end='')\nprint(run.stderr, end='')\nif run.returncode != 0:\n    raise SystemExit(run.returncode)\nif 'invalid-host-ok' not in run.stdout:\n    raise SystemExit('invalid-host-ok missing from output')\nif \"resolve failed for host 'bad host name'\" not in run.stdout:\n    raise SystemExit('expected resolve failure message missing from output')\nPY"
expect_rc = 0
