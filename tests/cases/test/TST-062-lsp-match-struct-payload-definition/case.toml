id = "TST-062-lsp-match-struct-payload-definition"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nfrom pathlib import Path\nimport json, os, subprocess, tempfile\nroot = Path(tempfile.mkdtemp(dir='work'))\nfile = root / 'match_struct_defs.nb'\nfile.write_text('struct Pair {\\n  x: Int\\n  y: Int\\n}\\n\\nenum Option<T> {\\n  Some(T)\\n  None(Void)\\n}\\n\\nfn main() -> Int {\\n  let value = Some(Pair(1, 2))\\n  match value {\\n    Some({ y: y0 }) => {\\n      return y0\\n    }\\n    None => {\\n      return 0\\n    }\\n  }\\n}\\n', encoding='utf-8')\nproc = subprocess.Popen([os.environ['NEBULA_BINARY'], 'lsp'], stdin=subprocess.PIPE, stdout=subprocess.PIPE, stderr=subprocess.STDOUT)\n\ndef send(obj):\n    body = json.dumps(obj, separators=(',', ':')).encode()\n    payload = f'Content-Length: {len(body)}\\r\\n\\r\\n'.encode() + body\n    proc.stdin.write(payload)\n    proc.stdin.flush()\n\ndef recv():\n    header = b''\n    while b'\\r\\n\\r\\n' not in header:\n        chunk = proc.stdout.read(1)\n        if not chunk:\n            raise RuntimeError('lsp closed while waiting for header')\n        header += chunk\n    head, _, rest = header.partition(b'\\r\\n\\r\\n')\n    length = 0\n    for line in head.decode().split('\\r\\n'):\n        if line.lower().startswith('content-length:'):\n            length = int(line.split(':', 1)[1].strip())\n    body = rest\n    while len(body) < length:\n        chunk = proc.stdout.read(length - len(body))\n        if not chunk:\n            raise RuntimeError('lsp closed while waiting for body')\n        body += chunk\n    return body.decode()\n\nuri = 'file://' + str(file.resolve())\nresponses = []\nmessages = [\n    {'jsonrpc': '2.0', 'id': 1, 'method': 'initialize', 'params': {}},\n    {'jsonrpc': '2.0', 'method': 'textDocument/didOpen', 'params': {'textDocument': {'uri': uri, 'languageId': 'nebula', 'version': 1, 'text': file.read_text(encoding='utf-8')}}},\n    {'jsonrpc': '2.0', 'id': 2, 'method': 'textDocument/definition', 'params': {'textDocument': {'uri': uri}, 'position': {'line': 14, 'character': 13}}},\n    {'jsonrpc': '2.0', 'id': 3, 'method': 'shutdown', 'params': {}},\n]\nfor msg in messages:\n    send(msg)\n    responses.append(recv())\nsend({'jsonrpc': '2.0', 'method': 'exit', 'params': {}})\nproc.stdin.close()\nproc.wait(timeout=5)\nPath('work/lsp-match-struct-payload.out').write_text('\\n'.join(responses), encoding='utf-8')\nraise SystemExit(proc.returncode)\nPY"
expect_rc = 0

[[steps]]
kind = "shell"
run = "grep -F '\"id\":2' work/lsp-match-struct-payload.out && grep -F '\"start\":{\"character\":14,\"line\":13}' work/lsp-match-struct-payload.out && grep -F '\"uri\":\"file://' work/lsp-match-struct-payload.out"
expect_rc = 0
