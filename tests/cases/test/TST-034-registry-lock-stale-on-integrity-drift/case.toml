id = "TST-034-registry-lock-stale-on-integrity-drift"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nfrom pathlib import Path\nroot = Path('work/registry_stale_app')\n(reg_root := root / '.nebula' / 'registry' / 'dep' / '1.2.3').mkdir(parents=True, exist_ok=True)\n(reg_root / 'src').mkdir(parents=True, exist_ok=True)\n(root / 'src').mkdir(parents=True, exist_ok=True)\n(root / 'nebula.toml').write_text('schema_version = 1\\n\\n[package]\\nname = \"registry-stale-app\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n\\n[dependencies]\\ndep = \"1.2.3\"\\n', encoding='utf-8')\n(root / 'src' / 'main.nb').write_text('module main\\nimport dep::lib\\n\\nfn main() -> Void {\\n  print(\"never-runs\")\\n}\\n', encoding='utf-8')\n(reg_root / 'nebula.toml').write_text('schema_version = 1\\n\\n[package]\\nname = \"dep\"\\nversion = \"1.2.3\"\\nentry = \"src/lib.nb\"\\nsrc_dir = \"src\"\\n', encoding='utf-8')\n(reg_root / 'src' / 'lib.nb').write_text('module lib\\n\\nfn dep_answer() -> Int {\\n  return 42\\n}\\n', encoding='utf-8')\n(reg_root / 'metadata.txt').write_text('checksum = \"v1\"\\n', encoding='utf-8')\nPY"
expect_rc = 0

[[steps]]
kind = "nebula"
command = "fetch"
args = ["work/registry_stale_app"]
expect_rc = 0

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nfrom pathlib import Path\nmeta = Path('work/registry_stale_app/.nebula/registry/dep/1.2.3/metadata.txt')\nmeta.write_text('checksum = \"v2\"\\n', encoding='utf-8')\nPY"
expect_rc = 0

[[steps]]
kind = "shell"
run = "$NEBULA_BINARY check work/registry_stale_app --diag-format json > work/registry-stale.json 2>&1"
expect_rc = 1

[[steps]]
kind = "shell"
run = "grep -F '\"code\":\"NBL-CLI-LOCK-STALE\"' work/registry-stale.json"
expect_rc = 0
