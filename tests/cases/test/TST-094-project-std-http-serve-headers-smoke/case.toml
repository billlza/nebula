id = "TST-094-project-std-http-serve-headers-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nfrom pathlib import Path\n\nroot = Path('work/httpserve')\n(root / 'src').mkdir(parents=True, exist_ok=True)\n(root / 'nebula.toml').write_text('schema_version = 1\\n\\n[package]\\nname = \"httpserve\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n', encoding='utf-8')\n(root / 'src' / 'server.nb').write_text('module server\\nimport std::http\\nimport std::net\\nimport std::result\\n\\nasync fn handle_request(request: Request) -> Response {\\n  if !path_matches(\"/probe\", request) {\\n    return not_found_text(\"not-found\")\\n  }\\n  match header_value(request, \"Host\") {\\n    Ok(host) => {\\n      match content_type(request) {\\n        Ok(kind) => {\\n          if host == \"localhost\" && kind == \"application/json\" {\\n            return ok_text(\"headers-ok\")\\n          }\\n          return bad_request_text(\"headers-bad\")\\n        }\\n        Err(msg) => {\\n          return bad_request_text(msg)\\n        }\\n      }\\n    }\\n    Err(msg) => {\\n      return bad_request_text(msg)\\n    }\\n  }\\n}\\n', encoding='utf-8')\n(root / 'src' / 'main.nb').write_text('module main\\nimport server\\nimport std::bytes\\nimport std::http\\nimport std::net\\nimport std::result\\nimport std::task\\nimport std::time\\n\\nfn expected() -> String {\\n  return \"HTTP/1.1 200 OK\\\\r\\\\nContent-Length: 10\\\\r\\\\nContent-Type: text/plain; charset=utf-8\\\\r\\\\nConnection: close\\\\r\\\\n\\\\r\\\\nheaders-ok\"\\n}\\n\\nasync fn main() -> Void {\\n  match ipv4(\"127.0.0.1\", 0) {\\n    Ok(bind_addr) => {\\n      match await bind(bind_addr) {\\n        Ok(listener) => {\\n          match listener.local_addr() {\\n            Ok(addr) => {\\n              let task = spawn(serve(listener, handle_request))\\n              await sleep(millis(1))\\n              match await connect(addr) {\\n                Ok(stream) => {\\n                  let request = from_string(\"POST /probe HTTP/1.1\\\\r\\\\nHost: localhost\\\\r\\\\nContent-Type: application/json\\\\r\\\\nContent-Length: 0\\\\r\\\\n\\\\r\\\\n\")\\n                  match await stream.write_all(request) {\\n                    Ok(_) => {\\n                      match await stream.read(256) {\\n                        Ok(bytes) => {\\n                          let text = to_string(bytes)\\n                          stream.close()\\n                          listener.close()\\n                          match await join(task) {\\n                            Ok(_) => {\\n                              if text == expected() {\\n                                print(\"serve-headers-ok\")\\n                              } else {\\n                                print(\"serve-headers-bad\")\\n                              }\\n                            }\\n                            Err(msg) => {\\n                              print(msg)\\n                            }\\n                          }\\n                        }\\n                        Err(msg) => {\\n                          print(msg)\\n                        }\\n                      }\\n                    }\\n                    Err(msg) => {\\n                      print(msg)\\n                    }\\n                  }\\n                }\\n                Err(msg) => {\\n                  print(msg)\\n                }\\n              }\\n            }\\n            Err(msg) => {\\n              print(msg)\\n            }\\n          }\\n        }\\n        Err(msg) => {\\n          print(msg)\\n        }\\n      }\\n    }\\n    Err(msg) => {\\n      print(msg)\\n    }\\n  }\\n}\\n', encoding='utf-8')\nPY"
expect_rc = 0

[[steps]]
kind = "shell"
run = "\"$NEBULA_BINARY\" run work/httpserve --run-gate none"
expect_rc = 0
expect_stdout_contains = ["serve-headers-ok"]
