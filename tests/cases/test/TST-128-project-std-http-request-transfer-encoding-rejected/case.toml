id = "TST-128-project-std-http-request-transfer-encoding-rejected"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nfrom pathlib import Path\n\nroot = Path('work/http_request_te_rejected')\n(root / 'src').mkdir(parents=True, exist_ok=True)\nport_path = (root / 'port.txt').resolve()\nif port_path.exists():\n    port_path.unlink()\n(root / 'nebula.toml').write_text('''schema_version = 1\\n\\n[package]\\nname = \"http-request-te-rejected\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n''', encoding='utf-8')\n(root / 'src' / 'server.nb').write_text('''module server\\nimport std::http\\nimport std::net\\nimport std::result\\n\\nasync fn handle_request(request: Request) -> Response {\\n  return ok_text(\"unexpected\")\\n}\\n\\nasync fn serve_one(listener: TcpListener) -> Void {\\n  match await serve_n(listener, 1, handle_request) {\\n    Ok(_) => {}\\n    Err(msg) => { print(msg) }\\n  }\\n}\\n''', encoding='utf-8')\n(root / 'src' / 'main.nb').write_text(f'''module main\\nimport server\\nimport std::fs\\nimport std::json\\nimport std::net\\nimport std::result\\nimport std::task\\n\\nasync fn main() -> Void {{\\n  match ipv4(\"127.0.0.1\", 0) {{\\n    Ok(addr) => {{\\n      match await bind(addr) {{\\n        Ok(listener) => {{\\n          match listener.local_addr() {{\\n            Ok(bound_addr) => {{\\n              match bound_addr.port() {{\\n                Ok(port) => {{\\n                  match write_string(\"{port_path}\", stringify(int_value(port))) {{\\n                    Ok(_) => {{\\n                      let task = spawn(serve_one(listener))\\n                      await join(task)\\n                      listener.close()\\n                    }}\\n                    Err(msg) => {{ print(msg) }}\\n                  }}\\n                }}\\n                Err(msg) => {{ print(msg) }}\\n              }}\\n            }}\\n            Err(msg) => {{ print(msg) }}\\n          }}\\n        }}\\n        Err(msg) => {{ print(msg) }}\\n      }}\\n    }}\\n    Err(msg) => {{ print(msg) }}\\n  }}\\n}}\\n''', encoding='utf-8')\nPY"
expect_rc = 0

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport os\nimport socket\nimport subprocess\nimport time\nfrom pathlib import Path\n\nroot = Path('work/http_request_te_rejected')\nport_path = root / 'port.txt'\nproc = subprocess.Popen([os.environ['NEBULA_BINARY'], 'run', str(root), '--run-gate', 'none'], stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True)\ntry:\n    deadline = time.time() + 8.0\n    port = None\n    while time.time() < deadline:\n        if proc.poll() is not None:\n            raise SystemExit(proc.returncode)\n        try:\n            port = int(port_path.read_text(encoding='utf-8').strip())\n            break\n        except (FileNotFoundError, ValueError):\n            time.sleep(0.05)\n    if port is None:\n        raise SystemExit('server did not publish port in time')\n    deadline = time.time() + 8.0\n    payload = (\n        b'POST /upload HTTP/1.1\\r\\n'\n        b'Host: localhost\\r\\n'\n        b'Transfer-Encoding: chunked\\r\\n\\r\\n'\n        b'4\\r\\ntest\\r\\n0\\r\\n\\r\\n'\n    )\n    while time.time() < deadline:\n        try:\n            with socket.create_connection(('127.0.0.1', port), timeout=0.3) as sock:\n                sock.sendall(payload)\n                try:\n                    sock.recv(4096)\n                except OSError:\n                    pass\n                break\n        except OSError:\n            if proc.poll() is not None:\n                raise SystemExit(proc.returncode)\n            time.sleep(0.05)\n    else:\n        raise SystemExit('server did not accept malformed TE request in time')\nfinally:\n    stdout, stderr = proc.communicate(timeout=10)\n    Path('work/http_request_te_rejected.stdout').write_text(stdout, encoding='utf-8')\n    Path('work/http_request_te_rejected.stderr').write_text(stderr, encoding='utf-8')\n    if proc.returncode != 0:\n        raise SystemExit(proc.returncode)\n\nstdout = Path('work/http_request_te_rejected.stdout').read_text(encoding='utf-8')\nif 'HTTP request Transfer-Encoding is unsupported' not in stdout:\n    raise SystemExit('expected request Transfer-Encoding rejection missing from stdout')\nprint('request-te-ok')\nPY"
expect_rc = 0
