id = "TST-231-official-service-tls-mtls-peer-identity-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport json\nimport os\nimport platform\nimport shutil\nimport socket\nimport subprocess\nimport time\nfrom pathlib import Path\n\nsystem = platform.system().lower()\nif system.startswith('windows') or system.startswith('msys') or system.startswith('mingw') or system.startswith('cygwin'):\n    print('service-tls-mtls-peer-identity-skip-unsupported-host')\n    raise SystemExit(0)\nif shutil.which('openssl') is None:\n    raise SystemExit('openssl is required for official service TLS mTLS peer identity smoke test')\n\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nroot = Path('work/official_service_tls_mtls_peer_identity')\nserver_app = root / 'server_app'\nclient_app = root / 'client_app'\nready_path = root / 'server.ready'\nshutil.rmtree(root, ignore_errors=True)\n(server_app / 'src').mkdir(parents=True, exist_ok=True)\n(client_app / 'src').mkdir(parents=True, exist_ok=True)\n\nwith socket.socket(socket.AF_INET, socket.SOCK_STREAM) as probe:\n    probe.bind(('127.0.0.1', 0))\n    port = probe.getsockname()[1]\n\n(root / 'openssl_ca.cnf').write_text('''[req]\\ndistinguished_name = dn\\nx509_extensions = v3_ca\\nprompt = no\\n\\n[dn]\\nCN = Nebula Service mTLS Peer Identity CA\\n\\n[v3_ca]\\nsubjectKeyIdentifier = hash\\nauthorityKeyIdentifier = keyid:always,issuer\\nbasicConstraints = critical, CA:true\\nkeyUsage = critical, digitalSignature, keyCertSign, cRLSign\\n''', encoding='utf-8')\n(root / 'openssl_server.cnf').write_text('''[req]\\ndistinguished_name = dn\\nreq_extensions = v3_req\\nprompt = no\\n\\n[dn]\\nCN = localhost\\n\\n[v3_req]\\nsubjectAltName = @alt_names\\nbasicConstraints = CA:false\\nkeyUsage = critical, digitalSignature, keyEncipherment\\nextendedKeyUsage = serverAuth\\n\\n[alt_names]\\nDNS.1 = localhost\\nIP.1 = 127.0.0.1\\n''', encoding='utf-8')\n(root / 'openssl_client.cnf').write_text('''[req]\\ndistinguished_name = dn\\nreq_extensions = v3_req\\nprompt = no\\n\\n[dn]\\nCN = nebula-client\\n\\n[v3_req]\\nsubjectAltName = @alt_names\\nbasicConstraints = CA:false\\nkeyUsage = critical, digitalSignature, keyEncipherment\\nextendedKeyUsage = clientAuth\\n\\n[alt_names]\\nDNS.1 = client.local\\nemail.1 = client@example.com\\nURI.1 = spiffe://nebula/client\\nIP.1 = 10.1.2.3\\n''', encoding='utf-8')\nsubprocess.run(['openssl', 'req', '-x509', '-newkey', 'rsa:2048', '-nodes', '-keyout', str(root / 'ca.key'), '-out', str(root / 'ca.pem'), '-days', '2', '-config', str(root / 'openssl_ca.cnf')], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\nsubprocess.run(['openssl', 'req', '-newkey', 'rsa:2048', '-nodes', '-keyout', str(root / 'server.key'), '-out', str(root / 'server.csr'), '-config', str(root / 'openssl_server.cnf')], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\nsubprocess.run(['openssl', 'x509', '-req', '-in', str(root / 'server.csr'), '-CA', str(root / 'ca.pem'), '-CAkey', str(root / 'ca.key'), '-CAcreateserial', '-out', str(root / 'server.pem'), '-days', '2', '-sha256', '-extfile', str(root / 'openssl_server.cnf'), '-extensions', 'v3_req'], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\nsubprocess.run(['openssl', 'req', '-newkey', 'rsa:2048', '-nodes', '-keyout', str(root / 'client.key'), '-out', str(root / 'client.csr'), '-config', str(root / 'openssl_client.cnf')], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\nsubprocess.run(['openssl', 'x509', '-req', '-in', str(root / 'client.csr'), '-CA', str(root / 'ca.pem'), '-CAkey', str(root / 'ca.key'), '-CAcreateserial', '-out', str(root / 'client.pem'), '-days', '2', '-sha256', '-extfile', str(root / 'openssl_client.cnf'), '-extensions', 'v3_req'], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\n\nserver_cert = (root / 'server.pem').read_text(encoding='utf-8')\nserver_key = (root / 'server.key').read_text(encoding='utf-8')\nclient_cert = (root / 'client.pem').read_text(encoding='utf-8')\nclient_key = (root / 'client.key').read_text(encoding='utf-8')\nca_pem = (root / 'ca.pem').read_text(encoding='utf-8')\n\ndef lit(text: str) -> str:\n    return text.replace('\\\\', '\\\\\\\\').replace('\\n', '\\\\n').replace('\"', '\\\\\"')\n\n(server_app / 'nebula.toml').write_text(f'''schema_version = 1\\n\\n[package]\\nname = \"official-service-tls-mtls-peer-identity-server-smoke\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n\\n[dependencies]\\nservice = {{ path = \"{repo_root / 'official' / 'nebula-service'}\" }}\\ntlss = {{ path = \"{repo_root / 'official' / 'nebula-tls-server'}\" }}\\ntlsc = {{ path = \"{repo_root / 'official' / 'nebula-tls'}\" }}\\n''', encoding='utf-8')\n(server_app / 'src' / 'server_handler.nb').write_text('''module server_handler\\nimport service::context\\nimport service::tls\\nimport std::http\\nimport std::http_json\\nimport std::json\\nimport std::result\\n\\nasync fn handle_request(ctx: RequestContext, request: Request) -> Result<Response, String> {\\n  return await authorize_mtls_result(ctx, request, handle_identity)\\n}\\n\\nasync fn handle_identity(ctx: RequestContext, request: Request) -> Result<Response, String> {\\n  let subject = ctx.tls_peer_subject()?\\n  let fingerprint = ctx.tls_peer_fingerprint_sha256()?\\n  let san_claims = ctx.tls_peer_san_claims()?\\n  let identity_debug = ctx.tls_peer_identity_debug()\\n  match ctx.principal() {\\n    Ok(value) => {\\n      let scheme = get_string(value.claims, \"scheme\")?\\n      let principal_fingerprint = get_string(value.claims, \"tls_peer_fingerprint_sha256\")?\\n      let principal_san_claims = get_value(value.claims, \"tls_peer_san_claims\")?\\n      let principal_identity_debug = get_value(value.claims, \"tls_peer_identity\")?\\n      return Ok(ok_json(object5(\\n        \"subject\",\\n        string_value(subject),\\n        \"fingerprint_sha256\",\\n        string_value(fingerprint),\\n        \"san_claims\",\\n        san_claims,\\n        \"identity_debug\",\\n        identity_debug,\\n        \"principal\",\\n        object5(\\n          \"subject\",\\n          string_value(value.subject),\\n          \"scheme\",\\n          string_value(scheme),\\n          \"fingerprint_sha256\",\\n          string_value(principal_fingerprint),\\n          \"san_claims\",\\n          principal_san_claims,\\n          \"identity_debug\",\\n          principal_identity_debug\\n        )\\n      )))\\n    }\\n    Err(msg) => {\\n      return Err(msg)\\n    }\\n  }\\n}\\n''', encoding='utf-8')\n(server_app / 'src' / 'tlsutil.nb').write_text('''module tlsutil\\nimport std::result\\nimport tlsc::client\\n\\nfn trust_store_from_ca_pem_text_for_server(ca_pem: String) -> Result<TlsTrustStore, String> {\\n  return trust_store_from_ca_pem_text(ca_pem)\\n}\\n''', encoding='utf-8')\n(server_app / 'src' / 'main.nb').write_text(f'''module main\\nimport server_handler\\nimport service::config\\nimport service::tls\\nimport std::fs\\nimport std::result\\nimport tlsutil\\nimport tlss::server\\n\\nfn build_server_tls_config(ca_pem: String) -> Result<ServerConfig, String> {{\\n  let trust_store = trust_store_from_ca_pem_text_for_server(ca_pem)?\\n  let identity = server_identity_from_pem_text(\"{lit(server_cert)}\", \"{lit(server_key)}\")?\\n  let tls_cfg0 = with_version_policy(server_config(identity), tls12_or_13_policy())\\n  let tls_cfg1 = with_alpn_policy(tls_cfg0, alpn_http11_only_policy())\\n  return Ok(with_client_auth_policy(tls_cfg1, required_client_auth(trust_store)))\\n}}\\n\\nasync fn main() -> Void {{\\n  match config_from_env(\"svc-tls-mtls-peer-identity\", 0) {{\\n    Ok(cfg) => {{\\n      match build_server_tls_config(\"{lit(ca_pem)}\") {{\\n        Ok(tls_cfg) => {{\\n          match write_string(\"{lit(str(ready_path))}\", \"starting\") {{\\n            Ok(_) => {{}}\\n            Err(msg) => {{ print(msg) }}\\n          }}\\n          match await bind_tls_listener(cfg, tls_cfg) {{\\n            Ok(listener) => {{\\n              match write_string(\"{lit(str(ready_path))}\", \"ready\") {{\\n                Ok(_) => {{}}\\n                Err(msg) => {{ print(msg) }}\\n              }}\\n              match await serve_requests_n_result_with_context_tls(listener, cfg, 1, handle_request) {{\\n                Ok(_) => {{}}\\n                Err(msg) => {{ print(msg) }}\\n              }}\\n            }}\\n            Err(msg) => {{ print(msg) }}\\n          }}\\n        }}\\n        Err(msg) => {{ print(msg) }}\\n      }}\\n    }}\\n    Err(msg) => {{ print(msg) }}\\n  }}\\n}}\\n''', encoding='utf-8')\n\n(client_app / 'nebula.toml').write_text(f'''schema_version = 1\\n\\n[package]\\nname = \"official-service-tls-mtls-peer-identity-client-smoke\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n\\n[dependencies]\\ntlsc = {{ path = \"{repo_root / 'official' / 'nebula-tls'}\" }}\\n''', encoding='utf-8')\n(client_app / 'src' / 'main.nb').write_text(f'''module main\\nimport std::http\\nimport std::http_json\\nimport std::json\\nimport std::result\\nimport tlsc::client\\nimport tlsc::http\\n\\nfn build_client_config() -> Result<ClientConfig, String> {{\\n  let base_cfg = client_config_from_ca_pem_text(\"{lit(ca_pem)}\")?\\n  let identity = client_identity_from_pem_text(\"{lit(client_cert)}\", \"{lit(client_key)}\")?\\n  let cfg0 = with_client_identity(base_cfg, identity)\\n  let cfg1 = with_version_policy(cfg0, tls12_or_13())\\n  return Ok(with_alpn_policy(cfg1, alpn_http11_only()))\\n}}\\n\\nasync fn main() -> Void {{\\n  match build_client_config() {{\\n    Ok(cfg) => {{\\n      match await dial_host(\"localhost\", {port}, cfg) {{\\n        Ok(stream) => {{\\n          let request = get_request(\"localhost:{port}\", \"/whoami\")\\n          match await TlsClientStream_write_request(stream, request) {{\\n            Ok(_) => {{\\n              match await TlsClientStream_read_response(stream) {{\\n                Ok(response) => {{\\n                  match parse_json_body(response.body) {{\\n                    Ok(body) => {{ print(stringify(body)) }}\\n                    Err(msg) => {{ print(msg) }}\\n                  }}\\n                }}\\n                Err(msg) => {{ print(msg) }}\\n              }}\\n            }}\\n            Err(msg) => {{ print(msg) }}\\n          }}\\n        }}\\n        Err(msg) => {{ print(msg) }}\\n      }}\\n    }}\\n    Err(msg) => {{ print(msg) }}\\n  }}\\n}}\\n''', encoding='utf-8')\n\nfor app in (server_app, client_app):\n    update = subprocess.run([os.environ['NEBULA_BINARY'], 'update', str(app)], capture_output=True, text=True, env=os.environ.copy())\n    print(update.stdout, end='')\n    print(update.stderr, end='')\n    if update.returncode != 0:\n        raise SystemExit(update.returncode)\n\nserver_proc = subprocess.Popen([os.environ['NEBULA_BINARY'], 'run', str(server_app), '--run-gate', 'none'], stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True, env={**os.environ, 'NEBULA_BIND_HOST': '127.0.0.1', 'NEBULA_PORT': str(port)})\ntry:\n    deadline = time.time() + 30\n    while time.time() < deadline:\n        if ready_path.exists() and ready_path.read_text(encoding='utf-8') == 'ready':\n            break\n        if server_proc.poll() is not None:\n            out, err = server_proc.communicate(timeout=5)\n            print(out, end='')\n            print(err, end='')\n            raise SystemExit(f'service tls mTLS peer identity server exited early rc={server_proc.returncode}')\n        time.sleep(0.1)\n    else:\n        out, err = server_proc.communicate(timeout=5)\n        print(out, end='')\n        print(err, end='')\n        raise SystemExit('service tls mTLS peer identity server never became ready')\n\n    client = subprocess.run([os.environ['NEBULA_BINARY'], 'run', str(client_app), '--run-gate', 'none'], capture_output=True, text=True, env=os.environ.copy())\n    print(client.stdout, end='')\n    print(client.stderr, end='')\n    if client.returncode != 0:\n        raise SystemExit(client.returncode)\n    lines = [line.strip() for line in client.stdout.splitlines() if line.strip()]\n    payload = json.loads(lines[-1])\n    if payload.get('subject') != 'CN=nebula-client':\n        raise SystemExit(f'unexpected transport subject payload: {payload!r}')\n    fingerprint = payload.get('fingerprint_sha256')\n    if not isinstance(fingerprint, str) or len(fingerprint) != 64:\n        raise SystemExit(f'unexpected fingerprint payload: {payload!r}')\n    san_claims = payload.get('san_claims')\n    if san_claims.get('dns_names') != ['client.local']:\n        raise SystemExit(f'unexpected dns_names SAN claims: {payload!r}')\n    if san_claims.get('ip_addresses') != ['10.1.2.3']:\n        raise SystemExit(f'unexpected ip_addresses SAN claims: {payload!r}')\n    if san_claims.get('email_addresses') != ['client@example.com']:\n        raise SystemExit(f'unexpected email_addresses SAN claims: {payload!r}')\n    if san_claims.get('uris') != ['spiffe://nebula/client']:\n        raise SystemExit(f'unexpected uri SAN claims: {payload!r}')\n\n    identity_debug = payload.get('identity_debug')\n    if not isinstance(identity_debug, dict):\n        raise SystemExit(f'missing identity_debug payload: {payload!r}')\n    if identity_debug.get('subject') != 'CN=nebula-client':\n        raise SystemExit(f'unexpected identity_debug subject: {payload!r}')\n    if identity_debug.get('fingerprint_sha256') != fingerprint:\n        raise SystemExit(f'identity_debug fingerprint drifted: {payload!r}')\n    chain = identity_debug.get('chain')\n    if not isinstance(chain, list) or len(chain) < 1:\n        raise SystemExit(f'missing certificate chain snapshot: {payload!r}')\n    leaf = chain[0]\n    if leaf.get('index') != 0 or leaf.get('subject') != 'CN=nebula-client':\n        raise SystemExit(f'unexpected certificate chain leaf payload: {payload!r}')\n    if leaf.get('fingerprint_sha256') != fingerprint:\n        raise SystemExit(f'certificate chain leaf fingerprint drifted: {payload!r}')\n    if leaf.get('san_claims') != san_claims:\n        raise SystemExit(f'certificate chain leaf SAN claims drifted: {payload!r}')\n\n    principal = payload.get('principal')\n    if not isinstance(principal, dict):\n        raise SystemExit(f'missing principal payload: {payload!r}')\n    if principal.get('subject') != 'CN=nebula-client' or principal.get('scheme') != 'mtls':\n        raise SystemExit(f'unexpected principal payload: {payload!r}')\n    if principal.get('fingerprint_sha256') != fingerprint:\n        raise SystemExit(f'principal fingerprint drifted from transport fingerprint: {payload!r}')\n    if principal.get('san_claims') != san_claims:\n        raise SystemExit(f'principal SAN claims drifted from transport SAN claims: {payload!r}')\n    if principal.get('identity_debug') != identity_debug:\n        raise SystemExit(f'principal identity_debug drifted from transport identity_debug: {payload!r}')\nfinally:\n    if server_proc.poll() is None:\n        server_proc.terminate()\n        try:\n            out, err = server_proc.communicate(timeout=5)\n        except subprocess.TimeoutExpired:\n            server_proc.kill()\n            out, err = server_proc.communicate(timeout=5)\n    else:\n        out, err = server_proc.communicate(timeout=5)\n    print(out, end='')\n    print(err, end='')\n\nprint('service-tls-mtls-peer-identity-ok')\nPY"
expect_rc = 0
