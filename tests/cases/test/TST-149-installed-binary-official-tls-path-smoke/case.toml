id = "TST-149-installed-binary-official-tls-path-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport hashlib\nimport os\nimport platform\nimport queue\nimport shutil\nimport socket\nimport ssl\nimport subprocess\nimport threading\nfrom pathlib import Path\n\nsystem = platform.system().lower()\nif system.startswith('windows') or system.startswith('msys') or system.startswith('mingw') or system.startswith('cygwin'):\n    print('installed-tls-skip-unsupported-host')\n    raise SystemExit(0)\nif shutil.which('openssl') is None:\n    print('installed-tls-skip-missing-openssl')\n    raise SystemExit(0)\n\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nroot = Path('work/installed_tls')\nrelease_root = Path('work/release_asset_tls')\ninstall_root = Path('work/install-root-tls')\nshutil.rmtree(root, ignore_errors=True)\nshutil.rmtree(release_root, ignore_errors=True)\nshutil.rmtree(install_root, ignore_errors=True)\nroot.mkdir(parents=True, exist_ok=True)\nrelease_root.mkdir(parents=True, exist_ok=True)\n\nmachine = platform.machine().lower()\nif system == 'darwin' and machine in ('arm64', 'aarch64'):\n    target = 'darwin-arm64'\nelif system == 'darwin' and machine == 'x86_64':\n    target = 'darwin-x86_64'\nelif system == 'linux' and machine == 'x86_64':\n    target = 'linux-x86_64'\nelse:\n    raise SystemExit(f'unsupported host for installed TLS smoke: {system}/{machine}')\n\nversion = (repo_root / 'VERSION').read_text(encoding='utf-8').strip()\nsubprocess.run([\n    'python3', str(repo_root / 'scripts' / 'package_release.py'),\n    '--binary', os.environ['NEBULA_BINARY'],\n    '--target', target,\n    '--output-dir', str(release_root),\n], check=True)\nasset = next(release_root.glob('nebula-v*.tar.gz'))\nh = hashlib.sha256()\nwith asset.open('rb') as fh:\n    for chunk in iter(lambda: fh.read(1024 * 1024), b''):\n        h.update(chunk)\n(release_root / 'SHA256SUMS.txt').write_text(f'{h.hexdigest()}  {asset.name}\\n', encoding='utf-8')\nsubprocess.run([\n    'bash', str(repo_root / 'scripts' / 'install.sh'),\n    '--version', version,\n    '--prefix', str(install_root),\n    '--base-url', str(release_root),\n], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\n\n(root / 'openssl_ca.cnf').write_text('''[req]\\ndistinguished_name = dn\\nx509_extensions = v3_ca\\nprompt = no\\n\\n[dn]\\nCN = Installed TLS CA\\n\\n[v3_ca]\\nsubjectKeyIdentifier = hash\\nauthorityKeyIdentifier = keyid:always,issuer\\nbasicConstraints = critical, CA:true\\nkeyUsage = critical, digitalSignature, keyCertSign, cRLSign\\n''', encoding='utf-8')\n(root / 'openssl_server.cnf').write_text('''[req]\\ndistinguished_name = dn\\nreq_extensions = v3_req\\nprompt = no\\n\\n[dn]\\nCN = localhost\\n\\n[v3_req]\\nsubjectAltName = @alt_names\\nbasicConstraints = CA:false\\nkeyUsage = critical, digitalSignature, keyEncipherment\\nextendedKeyUsage = serverAuth\\n\\n[alt_names]\\nDNS.1 = localhost\\nIP.1 = 127.0.0.1\\n''', encoding='utf-8')\nsubprocess.run(['openssl', 'req', '-x509', '-newkey', 'rsa:2048', '-nodes', '-keyout', str(root / 'ca.key'), '-out', str(root / 'ca.pem'), '-days', '2', '-config', str(root / 'openssl_ca.cnf')], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\nsubprocess.run(['openssl', 'req', '-newkey', 'rsa:2048', '-nodes', '-keyout', str(root / 'server.key'), '-out', str(root / 'server.csr'), '-config', str(root / 'openssl_server.cnf')], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\nsubprocess.run(['openssl', 'x509', '-req', '-in', str(root / 'server.csr'), '-CA', str(root / 'ca.pem'), '-CAkey', str(root / 'ca.key'), '-CAcreateserial', '-out', str(root / 'server.pem'), '-days', '2', '-sha256', '-extfile', str(root / 'openssl_server.cnf'), '-extensions', 'v3_req'], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\n\nport_q: queue.Queue[int] = queue.Queue()\ndone_q: queue.Queue[object] = queue.Queue()\n\ndef serve() -> None:\n    try:\n        ctx = ssl.SSLContext(ssl.PROTOCOL_TLS_SERVER)\n        ctx.load_cert_chain(str(root / 'server.pem'), str(root / 'server.key'))\n        with socket.socket(socket.AF_INET, socket.SOCK_STREAM) as sock:\n            sock.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)\n            sock.bind(('127.0.0.1', 0))\n            sock.listen(1)\n            sock.settimeout(60)\n            port_q.put(sock.getsockname()[1])\n            conn, _ = sock.accept()\n            with ctx.wrap_socket(conn, server_side=True) as tls:\n                tls.settimeout(60)\n                data = tls.recv(4096)\n                if data == b'ping':\n                    tls.sendall(b'tls-installed-ok')\n                else:\n                    tls.sendall(b'bad:' + data)\n        done_q.put(None)\n    except Exception as exc:\n        done_q.put(exc)\n\nthread = threading.Thread(target=serve, daemon=True)\nthread.start()\nport = port_q.get(timeout=10)\n\npkg = root / 'official' / 'nebula-tls'\napp = root / 'app'\nshutil.copytree(repo_root / 'official' / 'nebula-tls', pkg)\nsubprocess.run([str(install_root / 'bin' / 'nebula'), 'new', str(app)], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\nca_pem = (root / 'ca.pem').read_text(encoding='utf-8')\nca_literal = ca_pem.replace('\\\\', '\\\\\\\\').replace('\\n', '\\\\n').replace('\"', '\\\\\"')\n(app / 'nebula.toml').write_text(f'''schema_version = 1\\n\\n[package]\\nname = \"installed-tls-app\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n\\n[dependencies]\\ntls = {{ path = \"{pkg.resolve()}\" }}\\n''', encoding='utf-8')\n(app / 'src' / 'main.nb').write_text(f'''module main\\nimport std::bytes\\nimport std::net\\nimport tls::client\\n\\nasync fn main() -> Void {{\\n  match client_config_from_ca_pem_text(\"{ca_literal}\") {{\\n    Ok(config) => {{\\n      match ipv4(\"127.0.0.1\", {port}) {{\\n        Ok(addr) => {{\\n          match await dial(addr, \"localhost\", config) {{\\n            Ok(stream) => {{\\n              match await stream.write_all(from_string(\"ping\")) {{\\n                Ok(_) => {{\\n                  match await stream.read(128) {{\\n                    Ok(bytes) => {{\\n                      if to_string(bytes) == \"tls-installed-ok\" {{\\n                        print(\"installed-tls-ok\")\\n                      }} else {{\\n                        print(\"installed-tls-bad\")\\n                      }}\\n                    }}\\n                    Err(msg) => {{ print(msg) }}\\n                  }}\\n                }}\\n                Err(msg) => {{ print(msg) }}\\n              }}\\n              let _ = await stream.close()\\n            }}\\n            Err(msg) => {{ print(msg) }}\\n          }}\\n        }}\\n        Err(msg) => {{ print(msg) }}\\n      }}\\n    }}\\n    Err(msg) => {{ print(msg) }}\\n  }}\\n}}\\n''', encoding='utf-8')\n\nsubprocess.run([str(install_root / 'bin' / 'nebula'), 'update', str(app)], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\nrun = subprocess.run([str(install_root / 'bin' / 'nebula'), 'run', str(app), '--run-gate', 'none'], capture_output=True, text=True, env=os.environ.copy())\nprint(run.stdout, end='')\nprint(run.stderr, end='')\nif run.returncode != 0:\n    raise SystemExit(run.returncode)\nserver_result = done_q.get(timeout=60)\nif server_result is not None:\n    raise server_result\nif 'installed-tls-ok' not in run.stdout:\n    raise SystemExit('installed-tls-ok missing from output')\nPY"
expect_rc = 0
