id = "TST-225-official-tls-server-package-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport json\nimport os\nimport platform\nimport shutil\nimport socket\nimport ssl\nimport subprocess\nimport time\nfrom pathlib import Path\n\nsystem = platform.system().lower()\nif system.startswith('windows') or system.startswith('msys') or system.startswith('mingw') or system.startswith('cygwin'):\n    print('tls-server-package-skip-unsupported-host')\n    raise SystemExit(0)\nif shutil.which('openssl') is None:\n    raise SystemExit('openssl is required for official TLS server package smoke test')\n\nroot = Path('work/official_tls_server_package')\napp = root / 'app'\nready_path = root / 'listener.ready'\nshutil.rmtree(root, ignore_errors=True)\n(app / 'src').mkdir(parents=True, exist_ok=True)\n\nwith socket.socket(socket.AF_INET, socket.SOCK_STREAM) as probe:\n    probe.bind(('127.0.0.1', 0))\n    port = probe.getsockname()[1]\n\n(root / 'openssl_ca.cnf').write_text('''[req]\\ndistinguished_name = dn\\nx509_extensions = v3_ca\\nprompt = no\\n\\n[dn]\\nCN = Nebula TLS server package CA\\n\\n[v3_ca]\\nsubjectKeyIdentifier = hash\\nauthorityKeyIdentifier = keyid:always,issuer\\nbasicConstraints = critical, CA:true\\nkeyUsage = critical, digitalSignature, keyCertSign, cRLSign\\n''', encoding='utf-8')\n(root / 'openssl_server.cnf').write_text('''[req]\\ndistinguished_name = dn\\nreq_extensions = v3_req\\nprompt = no\\n\\n[dn]\\nCN = localhost\\n\\n[v3_req]\\nsubjectAltName = @alt_names\\nbasicConstraints = CA:false\\nkeyUsage = critical, digitalSignature, keyEncipherment\\nextendedKeyUsage = serverAuth\\n\\n[alt_names]\\nDNS.1 = localhost\\nIP.1 = 127.0.0.1\\n''', encoding='utf-8')\nsubprocess.run(['openssl', 'req', '-x509', '-newkey', 'rsa:2048', '-nodes', '-keyout', str(root / 'ca.key'), '-out', str(root / 'ca.pem'), '-days', '2', '-config', str(root / 'openssl_ca.cnf')], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\nsubprocess.run(['openssl', 'req', '-newkey', 'rsa:2048', '-nodes', '-keyout', str(root / 'server.key'), '-out', str(root / 'server.csr'), '-config', str(root / 'openssl_server.cnf')], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\nsubprocess.run(['openssl', 'x509', '-req', '-in', str(root / 'server.csr'), '-CA', str(root / 'ca.pem'), '-CAkey', str(root / 'ca.key'), '-CAcreateserial', '-out', str(root / 'server.pem'), '-days', '2', '-sha256', '-extfile', str(root / 'openssl_server.cnf'), '-extensions', 'v3_req'], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\n\nserver_cert = (root / 'server.pem').read_text(encoding='utf-8')\nserver_key = (root / 'server.key').read_text(encoding='utf-8')\nserver_cert_literal = server_cert.replace('\\\\', '\\\\\\\\').replace('\\n', '\\\\n').replace('\"', '\\\\\"')\nserver_key_literal = server_key.replace('\\\\', '\\\\\\\\').replace('\\n', '\\\\n').replace('\"', '\\\\\"')\nready_literal = str(ready_path).replace('\\\\', '\\\\\\\\').replace('\"', '\\\\\"')\nca_pem = (root / 'ca.pem').read_text(encoding='utf-8')\n\n(app / 'nebula.toml').write_text(f'''schema_version = 1\\n\\n[package]\\nname = \"official-tls-server-package-smoke\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n\\n[dependencies]\\ntlss = {{ path = \"{os.environ['NEBULA_REPO_ROOT']}/official/nebula-tls-server\" }}\\n''', encoding='utf-8')\nsource = '''module main\\nimport std::fs\\nimport std::http\\nimport std::http_json\\nimport std::json\\nimport tlss::server\\nimport tlss::http\\n\\nasync fn main() -> Void {\\n  match server_identity_from_pem_text(\"__CERT__\", \"__KEY__\") {\\n    Ok(identity) => {\\n      let cfg0 = with_version_policy(server_config(identity), tls12_or_13_policy())\\n      let cfg1 = with_alpn_policy(cfg0, alpn_none_policy())\\n      let cfg2 = with_client_auth_policy(cfg1, disabled_client_auth())\\n      match await bind_host(\"127.0.0.1\", __PORT__, cfg2) {\\n        Ok(listener) => {\\n          match write_string(\"__READY__\", \"ready\") {\\n            Ok(_) => {}\\n            Err(msg) => { print(msg) }\\n          }\\n          match await TlsListener_accept(listener) {\\n            Ok(stream) => {\\n              match await TlsServerStream_read_request(stream) {\\n                Ok(request) => {\\n                  let response = ok_json(object4(\\n                    \"path\",\\n                    string_value(request.path),\\n                    \"peer_present\",\\n                    bool_value(TlsServerStream_peer_present(stream)),\\n                    \"peer_verified\",\\n                    bool_value(TlsServerStream_peer_verified(stream)),\\n                    \"tls_version\",\\n                    string_value(TlsServerStream_tls_version(stream))\\n                  ))\\n                  let write_result = await TlsServerStream_write_response_with_connection(stream, response, true)\\n                  let listener_close = TlsListener_close(listener)\\n                  match write_result {\\n                    Ok(_) => {}\\n                    Err(msg) => { print(msg) }\\n                  }\\n                  match listener_close {\\n                    Ok(_) => {}\\n                    Err(msg) => { print(msg) }\\n                  }\\n                }\\n                Err(msg) => {\\n                  print(msg)\\n                }\\n              }\\n            }\\n            Err(msg) => {\\n              print(msg)\\n            }\\n          }\\n        }\\n        Err(msg) => {\\n          print(msg)\\n        }\\n      }\\n    }\\n    Err(msg) => {\\n      print(msg)\\n    }\\n  }\\n}\\n'''\nsource = source.replace('__CERT__', server_cert_literal)\nsource = source.replace('__KEY__', server_key_literal)\nsource = source.replace('__READY__', ready_literal)\nsource = source.replace('__PORT__', str(port))\n(app / 'src' / 'main.nb').write_text(source, encoding='utf-8')\n\nupdate = subprocess.run([os.environ['NEBULA_BINARY'], 'update', str(app)], capture_output=True, text=True, env=os.environ.copy())\nprint(update.stdout, end='')\nprint(update.stderr, end='')\nif update.returncode != 0:\n    raise SystemExit(update.returncode)\n\nproc = subprocess.Popen([os.environ['NEBULA_BINARY'], 'run', str(app), '--run-gate', 'none'], stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True, env=os.environ.copy())\ntry:\n    deadline = time.time() + 30\n    while time.time() < deadline:\n        if ready_path.exists():\n            break\n        if proc.poll() is not None:\n            out, err = proc.communicate(timeout=5)\n            print(out, end='')\n            print(err, end='')\n            raise SystemExit(f'tls server app exited early rc={proc.returncode}')\n        time.sleep(0.1)\n    else:\n        out, err = proc.communicate(timeout=5)\n        print(out, end='')\n        print(err, end='')\n        raise SystemExit('tls server app never became ready')\n\n    ctx = ssl.SSLContext(ssl.PROTOCOL_TLS_CLIENT)\n    ctx.check_hostname = True\n    ctx.verify_mode = ssl.CERT_REQUIRED\n    ctx.load_verify_locations(cadata=ca_pem)\n    with socket.create_connection(('127.0.0.1', port), timeout=10) as raw:\n        with ctx.wrap_socket(raw, server_hostname='localhost') as tls_sock:\n            request = (\n                'GET /hello HTTP/1.1\\r\\n'\n                f'Host: localhost:{port}\\r\\n'\n                'Connection: close\\r\\n\\r\\n'\n            )\n            tls_sock.sendall(request.encode('utf-8'))\n            data = b''\n            while True:\n                chunk = tls_sock.recv(4096)\n                if not chunk:\n                    break\n                data += chunk\n    body = data.split(b'\\r\\n\\r\\n', 1)[1]\n    payload = json.loads(body.decode('utf-8'))\n    if payload['path'] != '/hello':\n        raise SystemExit(f'unexpected path payload: {payload!r}')\n    if payload['peer_present'] is not False or payload['peer_verified'] is not False:\n        raise SystemExit(f'unexpected peer metadata: {payload!r}')\n    if payload['tls_version'] != 'TLSv1.3':\n        raise SystemExit(f'unexpected tls_version: {payload!r}')\nfinally:\n    if proc.poll() is None:\n        proc.terminate()\n        try:\n            out, err = proc.communicate(timeout=5)\n        except subprocess.TimeoutExpired:\n            proc.kill()\n            out, err = proc.communicate(timeout=5)\n    else:\n        out, err = proc.communicate(timeout=5)\n    print(out, end='')\n    print(err, end='')\n\nprint('tls-server-package-ok')\nPY"
expect_rc = 0
