id = "TST-293-nebula-ui-headless-contract-smoke"
suite = "test"
description = "nebula-ui headless adapter rejects malformed preview IR before render or dispatch"

[[steps]]
kind = "shell"
run = """
python3 - <<'PY'
import os
import json
import shutil
import subprocess
from pathlib import Path

repo_root = Path(os.environ["NEBULA_REPO_ROOT"])
binary = os.environ["NEBULA_BINARY"]
root = Path("work/nebula-ui-headless-contract")
app = root / "app"
shutil.rmtree(root, ignore_errors=True)
(app / "src").mkdir(parents=True, exist_ok=True)

(app / "nebula.toml").write_text(f'''schema_version = 1

[package]
name = "nebula-ui-headless-contract"
version = "0.1.0"
entry = "src/main.nb"
src_dir = "src"

[dependencies]
ui = {{ path = "{repo_root / 'official' / 'nebula-ui'}" }}
''', encoding="utf-8")
subprocess.run([binary, "update", str(app)], check=True)

source_template = r'''module main
import std::json
import std::result
import ui::headless

fn emit_bool(result: Result<Bool, String>) -> Void {
  match result {
    Ok(value) => {
      if value {
        print("validate-ok")
      } else {
        print("validate-false")
      }
    }
    Err(msg) => {
      print(msg)
    }
  }
}

fn emit_string(result: Result<String, String>) -> Void {
  match result {
    Ok(value) => { print(value) }
    Err(msg) => { print(msg) }
  }
}

fn emit_json(result: Result<Json, String>) -> Void {
  match result {
    Ok(value) => { print(stringify(value)) }
    Err(msg) => { print(msg) }
  }
}

fn emit_layout_pipeline(tree: Json) -> Void {
  match layout(tree) {
    Ok(layout_value) => {
      print(stringify(layout_value))
      emit_json(render_list(layout_value))
      emit_string(hit_test(layout_value, 30, 60))
    }
    Err(msg) => {
      print(msg)
    }
  }
}

fn emit_patch(tree: Json) -> Void {
  match parse(__PATCH_JSON_LITERAL__) {
    Ok(next_tree) => {
      emit_json(patch(tree, next_tree))
    }
    Err(msg) => {
      print(msg)
    }
  }
}

fn emit_action_summary(tree: Json) -> Void {
  match action_summary(tree) {
    Ok(summary) => {
      print(stringify(summary))
      emit_string(dispatch_action_summary(summary, "targets.filter"))
    }
    Err(msg) => {
      print(msg)
    }
  }
}

fn main() -> Int {
  match parse(__JSON_LITERAL__) {
    Ok(tree) => {
      emit_bool(validate(tree))
      emit_string(render(tree))
      emit_string(smoke(tree))
      emit_string(dispatch_action(tree, "targets.refresh"))
      emit_string(dispatch_action(tree, "targets.filter"))
      emit_action_summary(tree)
      emit_layout_pipeline(tree)
      emit_patch(tree)
      return 0
    }
    Err(msg) => {
      print(msg)
      return 1
    }
  }
}
'''

def run_tree(name, json_text):
    patched = source_template.replace("__JSON_LITERAL__", json.dumps(json_text)).replace("__PATCH_JSON_LITERAL__", json.dumps(valid_next))
    (app / "src" / "main.nb").write_text(patched, encoding="utf-8")
    subprocess.run([binary, "update", str(app)], check=True, capture_output=True, text=True)
    subprocess.run([binary, "check", str(app)], check=True, capture_output=True, text=True)
    run = subprocess.run([binary, "run", str(app), "--run-gate", "none"], capture_output=True, text=True, check=True)
    if "warning:" in run.stdout or "warning:" in run.stderr:
        raise SystemExit(f"{name} emitted warning:\\nSTDOUT={run.stdout}\\nSTDERR={run.stderr}")
    return run.stdout

valid = '{"schema":"nebula-ui.tree.v1","component":"Window","props":{"title":"Local Ops"},"children":[{"schema":"nebula-ui.tree.v1","component":"Column","props":{"spacing":12},"children":[{"schema":"nebula-ui.tree.v1","component":"Text","props":{"text":"Local Ops"},"children":[]},{"schema":"nebula-ui.tree.v1","component":"Input","props":{"value":"targets","action":"targets.filter","accessibility_label":"Filter targets"},"children":[]},{"schema":"nebula-ui.tree.v1","component":"Button","props":{"text":"Refresh","action":"targets.refresh"},"children":[]}]}]}'
valid_next = '{"schema":"nebula-ui.tree.v1","component":"Window","props":{"title":"Local Ops"},"children":[{"schema":"nebula-ui.tree.v1","component":"Column","props":{"spacing":12},"children":[{"schema":"nebula-ui.tree.v1","component":"Text","props":{"text":"Local Ops"},"children":[]},{"schema":"nebula-ui.tree.v1","component":"Input","props":{"value":"prod","action":"targets.filter","accessibility_label":"Filter targets"},"children":[]},{"schema":"nebula-ui.tree.v1","component":"Button","props":{"text":"Refresh","action":"targets.refresh"},"children":[]}]}]}'
valid_out = run_tree("valid", valid)
for marker in (
    "validate-ok",
    "Window title=Local Ops",
    "Input value=targets action=targets.filter accessibility_label=Filter targets",
    "Button text=Refresh action=targets.refresh",
    "nebula-ui-headless-ok",
    "nebula-ui-action-dispatched=targets.refresh",
    "nebula-ui-action-dispatched=targets.filter",
    '"schema":"nebula-ui.action-summary.v1"',
    '"first_button_action":"targets.refresh"',
    '"schema":"nebula-ui.layout.v1"',
    '"schema":"nebula-ui.render-list.v1"',
    '"command_count":5',
    "targets.filter",
    '"schema":"nebula-ui.patch.v1"',
    '"kind":"props"',
    '"op":"replace-prop"',
):
    if marker not in valid_out:
        raise SystemExit(f"valid tree missing marker {marker!r}: {valid_out!r}")

bad_cases = [
    ("bad-schema", '{"schema":"wrong","component":"Window","props":{},"children":[]}', "expected nebula-ui.tree.v1 root-view schema"),
    ("missing-component", '{"schema":"nebula-ui.tree.v1","props":{},"children":[]}', "expected UI node component string"),
    ("unknown-component", '{"schema":"nebula-ui.tree.v1","component":"Stack","props":{},"children":[]}', "unsupported UI component: Stack"),
    ("missing-children", '{"schema":"nebula-ui.tree.v1","component":"Window","props":{}}', "expected UI node children array"),
    ("children-not-array", '{"schema":"nebula-ui.tree.v1","component":"Window","props":{},"children":{}}', "expected UI node children array"),
    ("button-missing-action", '{"schema":"nebula-ui.tree.v1","component":"Button","props":{"text":"Refresh"},"children":[]}', "Button node requires non-empty action string"),
    ("button-empty-action", '{"schema":"nebula-ui.tree.v1","component":"Button","props":{"text":"Refresh","action":""},"children":[]}', "Button node requires non-empty action string"),
    ("input-missing-action", '{"schema":"nebula-ui.tree.v1","component":"Input","props":{"value":"targets","accessibility_label":"Filter targets"},"children":[]}', "Input node requires non-empty action string"),
    ("input-empty-action", '{"schema":"nebula-ui.tree.v1","component":"Input","props":{"value":"targets","action":"","accessibility_label":"Filter targets"},"children":[]}', "Input node requires non-empty action string"),
    ("input-missing-accessibility", '{"schema":"nebula-ui.tree.v1","component":"Input","props":{"value":"targets","action":"targets.filter"},"children":[]}', "Input node requires non-empty accessibility_label string"),
    ("input-empty-accessibility", '{"schema":"nebula-ui.tree.v1","component":"Input","props":{"value":"targets","action":"targets.filter","accessibility_label":""},"children":[]}', "Input node requires non-empty accessibility_label string"),
]
for name, json_text, expected in bad_cases:
    out = run_tree(name, json_text)
    if out.count(expected) != 8:
        raise SystemExit(f"{name} expected eight validation-first errors {expected!r}, got: {out!r}")

print("nebula-ui-headless-contract-ok")
PY
"""
expect_rc = 0
expect_stdout_contains = ["nebula-ui-headless-contract-ok"]
