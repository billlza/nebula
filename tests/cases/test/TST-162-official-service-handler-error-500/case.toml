id = "TST-162-official-service-handler-error-500"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport os\nimport subprocess\nfrom pathlib import Path\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nroot = Path('work/official_service_handler_error')\n(root / 'src').mkdir(parents=True, exist_ok=True)\n(root / 'nebula.toml').write_text('''schema_version = 1\\n\\n[package]\\nname = \"official-service-handler-error\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n\\n[dependencies]\\nservice = { path = \"''' + str(repo_root / 'official' / 'nebula-service') + '''\" }\\n''', encoding='utf-8')\n(root / 'src' / 'server.nb').write_text('''module server\\nimport std::result\\nimport service::context\\nimport std::http\\n\\nasync fn handle_request(ctx: RequestContext, request: Request) -> Result<Response, String> {\\n  return Err(\"boom\")\\n}\\n''', encoding='utf-8')\n(root / 'src' / 'main.nb').write_text('''module main\\nimport server\\nimport service::config\\nimport service::server\\nimport std::http\\nimport std::http_json\\nimport std::json\\nimport std::net\\nimport std::result\\nimport std::task\\nimport std::time\\n\\nasync fn main() -> Void {\\n  match config_from_env(\"svc-handler-error\", 0) {\\n    Ok(cfg) => {\\n      match await bind_listener(cfg) {\\n        Ok(listener) => {\\n          match listener.local_addr() {\\n            Ok(addr) => {\\n              let task = spawn(serve_requests_n_result_with_context(listener, cfg, 1, handle_request))\\n              await sleep(millis(1))\\n              match await connect(addr) {\\n                Ok(stream) => {\\n                  let req = get_request(\"localhost\", \"/boom\")\\n                  match await stream.write_request(req) {\\n                    Ok(_) => {\\n                      match await timeout(millis(500), stream.read_response()) {\\n                        Ok(outcome) => {\\n                          match outcome {\\n                            Ok(resp) => {\\n                              stream.close()\\n                              listener.close()\\n                              match await join(task) {\\n                                Ok(_) => {\\n                                  if resp.status == 500 && resp.content_type == \"application/json; charset=utf-8\" {\\n                                    match parse_json_body(resp.body) {\\n                                      Ok(value) => {\\n                                        match get_string(value, \"error\") {\\n                                          Ok(error_code) => {\\n                                            match get_int(value, \"request_id\") {\\n                                              Ok(request_id) => {\\n                                                if error_code == \"internal_error\" && request_id > 0 {\\n                                                  print(\"service-handler-error-ok\")\\n                                                } else {\\n                                                  print(\"service-handler-error-bad\")\\n                                                }\\n                                              }\\n                                              Err(msg) => { print(msg) }\\n                                            }\\n                                          }\\n                                          Err(msg) => { print(msg) }\\n                                        }\\n                                      }\\n                                      Err(msg) => { print(msg) }\\n                                    }\\n                                  } else {\\n                                    print(\"service-handler-error-bad\")\\n                                  }\\n                                }\\n                                Err(msg) => { print(msg) }\\n                              }\\n                            }\\n                            Err(msg) => { print(msg) }\\n                          }\\n                        }\\n                        Err(msg) => { print(msg) }\\n                      }\\n                    }\\n                    Err(msg) => { print(msg) }\\n                  }\\n                }\\n                Err(msg) => { print(msg) }\\n              }\\n            }\\n            Err(msg) => { print(msg) }\\n          }\\n        }\\n        Err(msg) => { print(msg) }\\n      }\\n    }\\n    Err(msg) => { print(msg) }\\n  }\\n}\\n''', encoding='utf-8')\nupdate = subprocess.run([os.environ['NEBULA_BINARY'], 'update', str(root)], capture_output=True, text=True, env=os.environ.copy())\nprint(update.stdout, end='')\nprint(update.stderr, end='')\nif update.returncode != 0:\n    raise SystemExit(update.returncode)\nrun = subprocess.run([os.environ['NEBULA_BINARY'], 'run', str(root), '--run-gate', 'none'], capture_output=True, text=True, env={**os.environ, 'NEBULA_BIND_HOST': '127.0.0.1', 'NEBULA_PORT': '0'})\nprint(run.stdout, end='')\nprint(run.stderr, end='')\nmetric_fragments = [\n    '\"schema\":\"nebula.observe.metric.v1\"',\n    '\"signal\":\"metric\"',\n    '\"service\":\"svc-handler-error\"',\n    '\"metric\":\"handler_errors\"',\n    '\"unit\":\"1\"',\n    '\"value\":1',\n]\nmissing = [fragment for fragment in metric_fragments if fragment not in run.stderr]\nif missing:\n    raise SystemExit(f'missing handler-error metric fragments: {missing!r} in stderr {run.stderr!r}')\nraise SystemExit(run.returncode)\nPY"
expect_rc = 0
expect_stdout_contains = ["service-handler-error-ok"]
