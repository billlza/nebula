id = "TST-265-official-db-postgres-preview-smoke"
suite = "test"
description = "official Postgres preview package compiles, runs, and reports libpq availability explicitly"

[[steps]]
kind = "shell"
run = """
python3 - <<'PY'
import os
import shutil
import subprocess
from pathlib import Path

repo_root = Path(os.environ["NEBULA_REPO_ROOT"])
root = Path("work/official_db_postgres_preview_smoke")
shutil.rmtree(root, ignore_errors=True)
(root / "src").mkdir(parents=True, exist_ok=True)
(root / "nebula.toml").write_text(f'''schema_version = 1

[package]
name = "postgres-preview-smoke"
version = "0.1.0"
entry = "src/main.nb"
src_dir = "src"

[dependencies]
db_postgres = {{ path = "{repo_root / "official" / "nebula-db-postgres"}" }}
''', encoding="utf-8")
(root / "src" / "main.nb").write_text('''module main
import db_postgres::postgres
import std::env
import std::json
import std::result

fn live_migrations() -> Json {
  let builder = array_builder()
  let sql = "CREATE TABLE IF NOT EXISTS nebula_pg_preview_items (id INTEGER PRIMARY KEY AUTOINCREMENT, name TEXT NOT NULL UNIQUE)"
  return array_build(array_push(builder, migration(1, "create_items", sql)))
}

fn one_string_param(value: String) -> Json {
  let builder = array_builder()
  return array_build(array_push(builder, string_value(value)))
}

fn expect_count(conn: Connection, expected: Int) -> Result<Bool, String> {
  let rows = conn.query0("SELECT COUNT(*) AS count FROM nebula_pg_preview_items")?
  let row = rows.row(0)?
  if row.get_int("count")? != expected {
    return Err("postgres live count drifted")
  }
  return Ok(true)
}

fn expect_migration_status_readable(conn: Connection) -> Result<Bool, String> {
  let status = conn.migration_status(live_migrations())?
  if as_int(get_value(status, "target_version")?)? != 1 {
    return Err("postgres migration status target drifted")
  }
  if get_bool(status, "safe_to_apply")? == false {
    return Err("postgres migration status unexpectedly unsafe")
  }
  if get_string(status, "status")? == "history_mismatch" {
    return Err("postgres migration status reported history mismatch")
  }
  return Ok(true)
}

fn expect_migration_status_clean(conn: Connection) -> Result<Bool, String> {
  let status = conn.migration_status(live_migrations())?
  if get_string(status, "status")? != "up_to_date" {
    return Err("postgres migration status did not converge")
  }
  if as_int(get_value(status, "pending_count")?)? != 0 {
    return Err("postgres migration status still has pending migrations")
  }
  return Ok(true)
}

fn run_live_smoke(dsn: String) -> Result<Bool, String> {
  let conn = connect(dsn)?
  expect_migration_status_readable(conn)?
  conn.run_migrations(live_migrations())?
  expect_migration_status_clean(conn)?
  conn.execute0("DELETE FROM nebula_pg_preview_items")?
  conn.execute("INSERT INTO nebula_pg_preview_items(name) VALUES (?)", one_string_param("alpha"))?
  let id_rows = conn.query0("SELECT last_insert_rowid() AS row_id")?
  let id_row = id_rows.row(0)?
  if id_row.get_int("row_id")? <= 0 {
    return Err("postgres last insert id compatibility failed")
  }
  conn.execute("INSERT OR IGNORE INTO nebula_pg_preview_items(name) VALUES (?)", one_string_param("alpha"))?
  let rollback_tx = conn.begin_transaction()?
  rollback_tx.execute("INSERT INTO nebula_pg_preview_items(name) VALUES (?)", one_string_param("rollback"))?
  rollback_tx.rollback()?
  let commit_tx = conn.begin_transaction()?
  commit_tx.execute("INSERT INTO nebula_pg_preview_items(name) VALUES (?)", one_string_param("gamma"))?
  commit_tx.commit()?
  expect_count(conn, 2)?
  conn.close()?
  return Ok(true)
}

fn main() -> Int {
  match probe_runtime() {
    Ok(_) => {
      let dsn = get_or_default("NEBULA_TEST_POSTGRES_DSN", "")
      if dsn != "" {
        match run_live_smoke(dsn) {
          Ok(_) => {
            print("official-db-postgres-live-ok")
            return 0
          }
          Err(msg) => {
            print(msg)
            return 1
          }
        }
      }
      print("official-db-postgres-runtime-ok")
      return 0
    }
    Err(msg) => {
      if msg == "libpq dynamic library is unavailable; install PostgreSQL client libraries" ||
         msg == "libpq dynamic library is missing required symbols" {
        print("official-db-postgres-runtime-missing-ok")
        return 0
      }
      print(msg)
      return 1
    }
  }
}
''', encoding="utf-8")
subprocess.run([os.environ["NEBULA_BINARY"], "fetch", str(root)], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
subprocess.run([os.environ["NEBULA_BINARY"], "check", str(root)], check=True)
result = subprocess.run([os.environ["NEBULA_BINARY"], "run", str(root), "--run-gate", "none"], capture_output=True, text=True)
if result.returncode != 0:
    print(result.stdout, end="")
    print(result.stderr, end="")
    raise SystemExit(result.returncode)
if "official-db-postgres-runtime-ok" not in result.stdout and "official-db-postgres-runtime-missing-ok" not in result.stdout:
    if "official-db-postgres-live-ok" not in result.stdout:
        print(result.stdout, end="")
        print(result.stderr, end="")
        raise SystemExit("unexpected postgres preview smoke output")
print("official-db-postgres-preview-ok")
PY
"""
expect_rc = 0
expect_stdout_contains = ["official-db-postgres-preview-ok"]
