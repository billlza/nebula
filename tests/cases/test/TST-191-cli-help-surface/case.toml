id = "TST-191-cli-help-surface"
suite = "test"

[[steps]]
kind = "shell"
run = "\"$NEBULA_BINARY\" -help > work/cli-help.out 2>&1"
expect_rc = 0

[[steps]]
kind = "shell"
run = "grep -F 'nebula explain <path> [--file PATH] [--line N] [--col N] [--symbol NAME] [--format text|json]' work/cli-help.out"
expect_rc = 0

[[steps]]
kind = "shell"
run = "\"$NEBULA_BINARY\" explain --help > work/cli-explain-help.out 2>&1"
expect_rc = 0

[[steps]]
kind = "shell"
run = "grep -F 'usage: nebula explain <path> [--file PATH] [--line N] [--col N] [--symbol NAME] [--format text|json]' work/cli-explain-help.out"
expect_rc = 0

[[steps]]
kind = "shell"
run = "\"$NEBULA_BINARY\" new --help > work/cli-new-help.out 2>&1"
expect_rc = 0

[[steps]]
kind = "shell"
run = "grep -F 'usage: nebula new <path> [--template basic|cli|http-service|backend-service|control-plane-workspace]' work/cli-new-help.out"
expect_rc = 0

[[steps]]
kind = "shell"
run = "\"$NEBULA_BINARY\" fmt --help > work/cli-fmt-help.out 2>&1"
expect_rc = 0

[[steps]]
kind = "shell"
run = "grep -F 'usage: nebula fmt <file-or-dir>' work/cli-fmt-help.out"
expect_rc = 0
