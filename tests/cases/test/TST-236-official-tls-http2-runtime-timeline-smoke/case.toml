id = "TST-236-official-tls-http2-runtime-timeline-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport json\nimport os\nimport platform\nimport shutil\nimport socket\nimport ssl\nimport subprocess\nimport threading\nimport time\nfrom pathlib import Path\n\nsystem = platform.system().lower()\nif system.startswith('windows') or system.startswith('msys') or system.startswith('mingw') or system.startswith('cygwin'):\n    print('tls-http2-runtime-timeline-skip-unsupported-host')\n    raise SystemExit(0)\nif shutil.which('openssl') is None:\n    raise SystemExit('openssl is required for official TLS HTTP/2 runtime timeline test')\n\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nroot = Path('work/official_tls_http2_runtime_timeline')\nclient_app = root / 'client_app'\nready_path = root / 'server.ready'\nshutil.rmtree(root, ignore_errors=True)\n(client_app / 'src').mkdir(parents=True, exist_ok=True)\n\nwith socket.socket(socket.AF_INET, socket.SOCK_STREAM) as probe:\n    probe.bind(('127.0.0.1', 0))\n    port = probe.getsockname()[1]\n\n(root / 'openssl_ca.cnf').write_text('''[req]\\ndistinguished_name = dn\\nx509_extensions = v3_ca\\nprompt = no\\n\\n[dn]\\nCN = Nebula TLS HTTP2 Timeline CA\\n\\n[v3_ca]\\nsubjectKeyIdentifier = hash\\nauthorityKeyIdentifier = keyid:always,issuer\\nbasicConstraints = critical, CA:true\\nkeyUsage = critical, digitalSignature, keyCertSign, cRLSign\\n''', encoding='utf-8')\n(root / 'openssl_server.cnf').write_text('''[req]\\ndistinguished_name = dn\\nreq_extensions = v3_req\\nprompt = no\\n\\n[dn]\\nCN = localhost\\n\\n[v3_req]\\nsubjectAltName = @alt_names\\nbasicConstraints = CA:false\\nkeyUsage = critical, digitalSignature, keyEncipherment\\nextendedKeyUsage = serverAuth\\n\\n[alt_names]\\nDNS.1 = localhost\\nIP.1 = 127.0.0.1\\n''', encoding='utf-8')\nsubprocess.run(['openssl', 'req', '-x509', '-newkey', 'rsa:2048', '-nodes', '-keyout', str(root / 'ca.key'), '-out', str(root / 'ca.pem'), '-days', '2', '-config', str(root / 'openssl_ca.cnf')], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\nsubprocess.run(['openssl', 'req', '-newkey', 'rsa:2048', '-nodes', '-keyout', str(root / 'server.key'), '-out', str(root / 'server.csr'), '-config', str(root / 'openssl_server.cnf')], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\nsubprocess.run(['openssl', 'x509', '-req', '-in', str(root / 'server.csr'), '-CA', str(root / 'ca.pem'), '-CAkey', str(root / 'ca.key'), '-CAcreateserial', '-out', str(root / 'server.pem'), '-days', '2', '-sha256', '-extfile', str(root / 'openssl_server.cnf'), '-extensions', 'v3_req'], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\n\nca_pem = (root / 'ca.pem').read_text(encoding='utf-8')\nserver_cert_path = root / 'server.pem'\nserver_key_path = root / 'server.key'\n\nPREFACE = b'PRI * HTTP/2.0\\r\\n\\r\\nSM\\r\\n\\r\\n'\nFRAME_DATA = 0x0\nFRAME_HEADERS = 0x1\nFRAME_SETTINGS = 0x4\nFRAME_GOAWAY = 0x7\nFRAME_WINDOW_UPDATE = 0x8\nFLAG_END_STREAM = 0x1\nFLAG_END_HEADERS = 0x4\n\n\ndef recv_exact(sock, size: int) -> bytes:\n    data = bytearray()\n    while len(data) < size:\n        chunk = sock.recv(size - len(data))\n        if not chunk:\n            raise EOFError('unexpected EOF while reading HTTP/2 bytes')\n        data.extend(chunk)\n    return bytes(data)\n\n\ndef read_frame(sock):\n    header = recv_exact(sock, 9)\n    length = int.from_bytes(header[0:3], 'big')\n    frame_type = header[3]\n    flags = header[4]\n    stream_id = int.from_bytes(header[5:9], 'big') & 0x7FFFFFFF\n    payload = recv_exact(sock, length)\n    return frame_type, flags, stream_id, payload\n\n\ndef build_frame(frame_type: int, flags: int, stream_id: int, payload: bytes) -> bytes:\n    return len(payload).to_bytes(3, 'big') + bytes([frame_type, flags]) + (stream_id & 0x7FFFFFFF).to_bytes(4, 'big') + payload\n\n\ndef goaway_payload(last_stream_id: int, error_code: int = 0) -> bytes:\n    return (last_stream_id & 0x7FFFFFFF).to_bytes(4, 'big') + error_code.to_bytes(4, 'big')\n\n\ndef window_update_payload(increment: int) -> bytes:\n    return (increment & 0x7FFFFFFF).to_bytes(4, 'big')\n\n\nserver_error = []\n\n\ndef fake_server():\n    try:\n        context = ssl.SSLContext(ssl.PROTOCOL_TLS_SERVER)\n        context.minimum_version = ssl.TLSVersion.TLSv1_3\n        context.maximum_version = ssl.TLSVersion.TLSv1_3\n        context.set_alpn_protocols(['h2'])\n        context.load_cert_chain(certfile=str(server_cert_path), keyfile=str(server_key_path))\n        with socket.socket(socket.AF_INET, socket.SOCK_STREAM) as listener:\n            listener.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)\n            listener.bind(('127.0.0.1', port))\n            listener.listen(1)\n            ready_path.write_text('ready', encoding='utf-8')\n            conn, _ = listener.accept()\n            with context.wrap_socket(conn, server_side=True) as tls_sock:\n                if recv_exact(tls_sock, len(PREFACE)) != PREFACE:\n                    raise RuntimeError('invalid HTTP/2 client preface')\n                frame_type, _flags, stream_id, _payload = read_frame(tls_sock)\n                if frame_type != FRAME_SETTINGS or stream_id != 0:\n                    raise RuntimeError(f'unexpected initial client frame: type={frame_type} stream_id={stream_id}')\n                tls_sock.sendall(build_frame(FRAME_SETTINGS, 0, 0, b''))\n\n                saw_headers = False\n                saw_data = False\n                deadline = time.time() + 10\n                while time.time() < deadline:\n                    frame_type, flags, stream_id, _payload = read_frame(tls_sock)\n                    if frame_type == FRAME_HEADERS and stream_id == 1:\n                        saw_headers = True\n                    if frame_type == FRAME_DATA and stream_id == 1 and (flags & FLAG_END_STREAM):\n                        saw_data = True\n                        break\n                if not saw_headers or not saw_data:\n                    raise RuntimeError('client did not send the expected HEADERS and DATA frames')\n\n                tls_sock.sendall(build_frame(FRAME_WINDOW_UPDATE, 0, 1, window_update_payload(4096)))\n                tls_sock.sendall(build_frame(FRAME_GOAWAY, 0, 0, goaway_payload(1, 0)))\n                tls_sock.sendall(build_frame(FRAME_HEADERS, FLAG_END_HEADERS, 3, b''))\n    except Exception as exc:\n        server_error.append(str(exc))\n\n\nthread = threading.Thread(target=fake_server, daemon=True)\nthread.start()\n\n(client_app / 'nebula.toml').write_text(f'''schema_version = 1\\n\\n[package]\\nname = \"official-tls-http2-runtime-timeline-client\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n\\n[dependencies]\\ntlsc = {{ path = \"{repo_root / 'official' / 'nebula-tls'}\" }}\\n''', encoding='utf-8')\n(client_app / 'src' / 'main.nb').write_text(f'''module main\\nimport std::bytes\\nimport std::http\\nimport std::json\\nimport tlsc::client\\nimport tlsc::http2\\n\\nasync fn main() -> Void {{\\n  match client_config_from_ca_pem_text(\"{ca_pem.replace('\\\\', '\\\\\\\\').replace('\\n', '\\\\n').replace('\"', '\\\\\"')}\") {{\\n    Ok(base_cfg) => {{\\n      let cfg0 = with_version_policy(base_cfg, tls13_only())\\n      let cfg1 = with_alpn_policy(cfg0, alpn_http2_only())\\n      match await dial_host(\"localhost\", {port}, cfg1) {{\\n        Ok(stream) => {{\\n          let request = post_request(\"localhost:{port}\", \"/upload\", \"text/plain\", from_string(\"payload\"))\\n          match await TlsClientStream_write_request_h2(stream, request) {{\\n            Ok(_) => {{\\n              match await TlsClientStream_read_response_h2(stream) {{\\n                Ok(_) => {{ print(\"unexpected-http2-read-success\") }}\\n                Err(msg) => {{\\n                  match TlsClientStream_http2_debug_state(stream) {{\\n                    Ok(debug) => {{\\n                      print(stringify(object2(\\n                        \"error\",\\n                        string_value(msg),\\n                        \"debug\",\\n                        debug\\n                      )))\\n                    }}\\n                    Err(debug_msg) => {{\\n                      print(stringify(object2(\\n                        \"error\",\\n                        string_value(msg),\\n                        \"debug_error\",\\n                        string_value(debug_msg)\\n                      )))\\n                    }}\\n                  }}\\n                }}\\n              }}\\n            }}\\n            Err(msg) => {{ print(msg) }}\\n          }}\\n        }}\\n        Err(msg) => {{ print(msg) }}\\n      }}\\n    }}\\n    Err(msg) => {{ print(msg) }}\\n  }}\\n}}\\n''', encoding='utf-8')\n\nupdate = subprocess.run([os.environ['NEBULA_BINARY'], 'update', str(client_app)], capture_output=True, text=True, env=os.environ.copy())\nprint(update.stdout, end='')\nprint(update.stderr, end='')\nif update.returncode != 0:\n    raise SystemExit(update.returncode)\n\ndeadline = time.time() + 10\nwhile time.time() < deadline:\n    if ready_path.exists() and ready_path.read_text(encoding='utf-8') == 'ready':\n        break\n    if server_error:\n        raise SystemExit(server_error[0])\n    time.sleep(0.05)\nelse:\n    raise SystemExit('fake HTTP/2 timeline server never became ready')\n\nclient = subprocess.run([os.environ['NEBULA_BINARY'], 'run', str(client_app), '--run-gate', 'none'], capture_output=True, text=True, env=os.environ.copy())\nprint(client.stdout, end='')\nprint(client.stderr, end='')\nthread.join(timeout=5)\nif server_error:\n    raise SystemExit(server_error[0])\nif client.returncode != 0:\n    raise SystemExit(client.returncode)\nif 'unexpected-http2-read-success' in client.stdout:\n    raise SystemExit('expected the HTTP/2 read path to fail after the synthetic concurrent HEADERS frame')\nlines = [line.strip() for line in client.stdout.splitlines() if line.strip()]\npayload = json.loads(lines[-1])\ndebug = payload.get('debug')\nif not isinstance(debug, dict):\n    raise SystemExit(f'missing HTTP/2 runtime timeline debug payload: {payload!r}')\ntimeline = debug.get('timeline')\nif not isinstance(timeline, dict):\n    raise SystemExit(f'missing HTTP/2 runtime timeline container: {payload!r}')\nrecent_events = timeline.get('recent_events')\nif not isinstance(recent_events, list) or len(recent_events) < 4:\n    raise SystemExit(f'HTTP/2 runtime timeline was incomplete: {payload!r}')\nframe_types = {item.get('frame_type') for item in recent_events}\nif not {'HEADERS', 'DATA', 'WINDOW_UPDATE', 'GOAWAY'}.issubset(frame_types):\n    raise SystemExit(f'HTTP/2 runtime timeline missed expected frame types: {payload!r}')\ndirections = {item.get('direction') for item in recent_events if item.get('frame_type') in {'WINDOW_UPDATE', 'GOAWAY'}}\nif 'inbound' not in directions:\n    raise SystemExit(f'HTTP/2 runtime timeline missed inbound control frames: {payload!r}')\nkinds = {item.get('kind') for item in recent_events}\nif not {'stream_open', 'stream_closed', 'goaway_observed'}.issubset(kinds):\n    raise SystemExit(f'HTTP/2 runtime timeline missed expected semantic phases: {payload!r}')\nclassification_by_kind = {}\nfor item in recent_events:\n    classification = item.get('classification')\n    if not isinstance(classification, dict):\n        continue\n    classification_by_kind.setdefault(item.get('kind'), set()).add(\n        (classification.get('reason'), classification.get('detail'))\n    )\nif ('request_start', 'local_request_headers_sent') not in classification_by_kind.get('stream_open', set()):\n    raise SystemExit(f'HTTP/2 runtime timeline missed stream_open classification: {payload!r}')\nif ('shutdown', 'peer_goaway_no_error') not in classification_by_kind.get('goaway_observed', set()):\n    raise SystemExit(f'HTTP/2 runtime timeline missed goaway classification: {payload!r}')\nif ('preview_limit', 'concurrent_response_headers') not in classification_by_kind.get('stream_closed', set()):\n    raise SystemExit(f'HTTP/2 runtime timeline missed stream_closed classification: {payload!r}')\n\nprint('tls-http2-runtime-timeline-ok')\nPY"
expect_rc = 0
expect_stdout_contains = ["tls-http2-runtime-timeline-ok"]
