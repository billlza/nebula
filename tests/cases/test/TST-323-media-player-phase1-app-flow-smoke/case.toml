id = "TST-323-media-player-phase1-app-flow-smoke"
suite = "test"
description = "thin-host media player phase1 keeps media library, playback sidecar, download progress, and recovery diagnostics in Nebula"

[[steps]]
kind = "shell"
run = """
python3 - <<'PY'
import json
import os
import shutil
import sqlite3
import subprocess
from pathlib import Path

repo = Path(os.environ["NEBULA_REPO_ROOT"])
binary = os.environ["NEBULA_BINARY"]
app = repo / "examples" / "thin_host_media_player"
root = Path("work/media_player_phase1")
entry = root / "thin-host-media-player"
receipt_db = root / "state" / "receipts.db"
jobs_dir = Path("work/thin_host_media_player")
media_db = jobs_dir / "media.db"
shutil.rmtree(root, ignore_errors=True)
shutil.rmtree(jobs_dir, ignore_errors=True)
receipt_db.parent.mkdir(parents=True, exist_ok=True)

subprocess.run([binary, "update", str(app)], check=True, capture_output=True, text=True)
check = subprocess.run([binary, "check", str(app)], capture_output=True, text=True, check=True)
if "warning:" in check.stdout or "warning:" in check.stderr:
    raise SystemExit(f"media player check emitted warnings:\\n{check.stdout}\\n{check.stderr}")
subprocess.run([binary, "build", str(app), "--out", str(entry)], check=True, capture_output=True, text=True)

env = {
    **os.environ,
    "APP_SQLITE_PATH": str(receipt_db),
    "APP_LOCAL_APP_ID": "thin-host-media-player",
    "NEBULA_MEDIA_PLAYER_COMMAND_MODE": "phase1",
}
run = subprocess.run([str(entry)], capture_output=True, text=True, env=env, check=True)
output = run.stdout
if "thin-host-media-player-error" in output or "app-local-error:" in output:
    raise SystemExit(output)

events = []
snapshots = []
diagnostics = []
for line in output.splitlines():
    if line.startswith("media-player-event:"):
        events.append(json.loads(line[len("media-player-event:"):]))
    if line.startswith("media-player-snapshot:"):
        snapshots.append(json.loads(line[len("media-player-snapshot:"):]))
    if line.startswith("media-player-recovery-diagnostics:"):
        diagnostics.append(json.loads(line[len("media-player-recovery-diagnostics:"):]))

if len(diagnostics) != 1:
    raise SystemExit(f"missing recovery diagnostics: {diagnostics!r}")
diag = diagnostics[0]
if diag["schema"] != "media-player.recovery-diagnostics.v1":
    raise SystemExit(f"bad diagnostics schema: {diag!r}")
if diag["recommendation"] != "clean_start":
    raise SystemExit(f"unexpected recovery recommendation: {diag!r}")
if diag["sidecars"]["codec_adapter"] != "native-sidecar-boundary":
    raise SystemExit(f"codec sidecar boundary not visible: {diag!r}")
if diag["sidecars"]["torrent_adapter"] != "stub-progress-events":
    raise SystemExit(f"torrent sidecar boundary not visible: {diag!r}")

kinds = [event["kind"] for event in events]
expected = [
    "media_player_booted",
    "library_file_imported",
    "library_item_selected",
    "playback_sidecar_open_requested",
    "playback_progress_recorded",
    "download_import_queued",
    "download_progress_recorded",
    "download_progress_recorded",
    "media_player_quit",
]
if kinds != expected:
    raise SystemExit(f"unexpected phase1 event kinds: {kinds!r}")
if [event["state_revision"] for event in events] != list(range(0, 9)):
    raise SystemExit(f"unexpected phase1 revisions: {events!r}")

final = snapshots[-1]
if final["selection"]["media_id"] != "media:sample-public-domain":
    raise SystemExit(f"selection did not persist in snapshot: {final!r}")
if final["playback"]["status"] != "playing" or final["playback"]["position_ms"] != 42000:
    raise SystemExit(f"playback sidecar progress missing: {final!r}")
if final["downloads"]["completed"] != 1 or final["downloads"]["active"] != 0:
    raise SystemExit(f"download completion missing: {final!r}")
if final["downloads"]["progress_percent"] != 100:
    raise SystemExit(f"download progress missing: {final!r}")
if final["runtime"]["recovery_recommendation"] != "clean_start":
    raise SystemExit(f"recovery recommendation missing from snapshot: {final!r}")
if "codec=native-sidecar-boundary" not in final["runtime"]["sidecar_status"]:
    raise SystemExit(f"sidecar status missing from snapshot: {final!r}")

with sqlite3.connect(receipt_db) as conn:
    counts = dict(conn.execute(
        "SELECT receipt_kind, COUNT(*) FROM app_local_runtime_receipts GROUP BY receipt_kind"
    ).fetchall())
if counts.get("command_context") != 8 or counts.get("event") != 8:
    raise SystemExit(f"phase1 command/event receipts missing: {counts!r}")
if counts.get("snapshot") != 9 or counts.get("host_snapshot_readiness") != 9:
    raise SystemExit(f"phase1 snapshot readiness receipts missing: {counts!r}")
if counts.get("lifecycle_marker") != 3:
    raise SystemExit(f"phase1 lifecycle receipts missing: {counts!r}")

with sqlite3.connect(media_db) as conn:
    library = conn.execute(
        "SELECT media_id, title, source_kind FROM media_library_items"
    ).fetchall()
    settings = dict(conn.execute(
        "SELECT setting_key, setting_value FROM media_settings"
    ).fetchall())
    imports = conn.execute(
        "SELECT source_kind, status FROM media_import_tasks ORDER BY source_kind"
    ).fetchall()
    downloads = conn.execute(
        "SELECT progress_percent, status FROM media_download_tasks"
    ).fetchall()
    recovery = conn.execute(
        "SELECT recommendation, state_revision FROM media_recovery_diagnostics"
    ).fetchall()
if library != [("media:sample-public-domain", "Sample Public Domain Clip", "file")]:
    raise SystemExit(f"media library store mismatch: {library!r}")
if settings != {"audio_quality": "balanced", "video_quality": "1080p", "bitrate_policy": "adaptive"}:
    raise SystemExit(f"media settings store mismatch: {settings!r}")
if imports != [("file", "completed"), ("torrent", "queued")]:
    raise SystemExit(f"media import task store mismatch: {imports!r}")
if downloads != [(100, "download_complete")]:
    raise SystemExit(f"media download task store mismatch: {downloads!r}")
if recovery != [("clean_start", 0)]:
    raise SystemExit(f"media recovery diagnostics store mismatch: {recovery!r}")

print("media-player-phase1-app-flow-ok")
PY
"""
expect_rc = 0
expect_stdout_contains = ["media-player-phase1-app-flow-ok"]
