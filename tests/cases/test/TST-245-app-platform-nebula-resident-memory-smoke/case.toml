id = "TST-245-app-platform-nebula-resident-memory-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport json\nimport os\nimport subprocess\nfrom pathlib import Path\n\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nout_path = Path('work/app_platform_nebula_resident_memory.json')\nout_path.parent.mkdir(parents=True, exist_ok=True)\nresult = subprocess.run([\n    'python3',\n    str(repo_root / 'scripts' / 'app_platform_bench.py'),\n    'run-nebula',\n    '--binary',\n    os.environ['NEBULA_BINARY'],\n    '--workload',\n    'resident_memory',\n    '--json-out',\n    str(out_path),\n], capture_output=True, text=True, check=False)\nprint(result.stdout, end='')\nprint(result.stderr, end='')\nif result.returncode != 0:\n    raise SystemExit(result.returncode)\npayload = json.loads(out_path.read_text(encoding='utf-8'))\nif payload.get('kind') != 'app_platform_nebula_results':\n    raise SystemExit(f'unexpected payload kind: {payload!r}')\nresults = {item['workload']: item for item in payload.get('results', [])}\nitem = results.get('resident_memory')\nif item is None:\n    raise SystemExit(f'missing resident_memory result: {payload!r}')\nif item.get('status') != 'ok':\n    raise SystemExit(f'resident_memory did not run successfully: {item!r}')\nmetrics = item.get('metrics', {})\nrequired = ['metric_kind', 'unit', 'mean_rss_mib', 'p50_rss_mib', 'max_rss_mib', 'steady_state_seconds']\nfor key in required:\n    if key not in metrics:\n        raise SystemExit(f'missing resident memory metric field {key}: {item!r}')\nif metrics.get('metric_kind') != 'resident_memory' or metrics.get('unit') != 'MiB':\n    raise SystemExit(f'unexpected resident memory metric shape: {item!r}')\nif float(metrics['mean_rss_mib']) <= 0 or float(metrics['max_rss_mib']) <= 0:\n    raise SystemExit(f'invalid resident memory sample: {item!r}')\nprint('app-platform-nebula-resident-memory-ok')\nPY"
expect_rc = 0
expect_stdout_contains = ["app-platform-nebula-resident-memory-ok"]
