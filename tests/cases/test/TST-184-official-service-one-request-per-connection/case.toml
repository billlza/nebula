id = "TST-184-official-service-one-request-per-connection"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport os\nimport shutil\nimport socket\nimport subprocess\nimport sys\nimport time\nfrom pathlib import Path\n\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nsys.path.insert(0, str(repo_root / 'tests' / 'lib'))\nfrom service_probe import fail_with_output, finish_process_output, wait_for_listener_bound\nroot = Path('work/official_service_connection_lifecycle')\nshutil.rmtree(root, ignore_errors=True)\n(root / 'src').mkdir(parents=True, exist_ok=True)\n(root / 'nebula.toml').write_text('''schema_version = 1\\n\\n[package]\\nname = \"official-service-connection-lifecycle\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n\\n[dependencies]\\nservice = { path = \"''' + str(repo_root / 'official' / 'nebula-service') + '''\" }\\n''', encoding='utf-8')\n(root / 'src' / 'server.nb').write_text('''module server\\nimport service::context\\nimport std::http\\nimport std::result\\n\\nasync fn handle_request(ctx: RequestContext, request: Request) -> Result<Response, String> {\\n  return Ok(ok_text(\"one-shot\"))\\n}\\n''', encoding='utf-8')\n(root / 'src' / 'main.nb').write_text('''module main\\nimport service::config\\nimport service::server\\nimport server\\n\\nasync fn main() -> Void {\\n  match config_from_env(\"svc-connection-lifecycle\", 0) {\\n    Ok(cfg) => {\\n      match await bind_listener(cfg) {\\n        Ok(listener) => {\\n          match await serve_requests_n_result_with_context(listener, cfg, 1, handle_request) {\\n            Ok(_) => {}\\n            Err(msg) => { print(msg) }\\n          }\\n        }\\n        Err(msg) => { print(msg) }\\n      }\\n    }\\n    Err(msg) => { print(msg) }\\n  }\\n}\\n''', encoding='utf-8')\nsubprocess.run([os.environ['NEBULA_BINARY'], 'update', str(root)], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\nproc = subprocess.Popen([\n    os.environ['NEBULA_BINARY'],\n    'run',\n    str(root),\n    '--run-gate',\n    'none',\n], stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True, env={**os.environ, 'NEBULA_BIND_HOST': '127.0.0.1', 'NEBULA_PORT': '0'})\nstderr_lines = []\n_, port = wait_for_listener_bound(proc, stderr_lines)\nclient = None\ntry:\n    deadline = time.time() + 10\n    while time.time() < deadline:\n        try:\n            client = socket.create_connection(('127.0.0.1', port), timeout=0.2)\n            break\n        except OSError:\n            if proc.poll() is not None:\n                fail_with_output(proc, stderr_lines, f'connection-lifecycle service exited before listening: rc={proc.returncode}')\n            time.sleep(0.05)\n    if client is None:\n        fail_with_output(proc, stderr_lines, 'connection-lifecycle service did not start listening in time')\n    client.settimeout(2)\n    first = b'GET /hello HTTP/1.1\\r\\nHost: localhost\\r\\nContent-Length: 0\\r\\n\\r\\n'\n    client.sendall(first)\n    response = b''\n    while True:\n        chunk = client.recv(4096)\n        if not chunk:\n            break\n        response += chunk\n    if b'200 OK' not in response or not response.endswith(b'one-shot'):\n        raise SystemExit(f'unexpected first response bytes: {response!r}')\n    closed_after_first = False\n    try:\n        client.sendall(first)\n        followup = client.recv(1)\n        if followup == b'':\n            closed_after_first = True\n    except OSError:\n        closed_after_first = True\n    if not closed_after_first:\n        raise SystemExit('connection remained reusable after first response')\n    try:\n        proc.wait(timeout=10)\n    except subprocess.TimeoutExpired:\n        raise SystemExit('connection-lifecycle service did not exit after first request')\n    stdout, stderr = finish_process_output(proc, stderr_lines)\n    print(stdout, end='')\n    print(stderr, end='')\n    if proc.returncode != 0:\n        raise SystemExit(proc.returncode)\n    print('service-connection-lifecycle-ok')\nfinally:\n    if client is not None:\n        client.close()\n    if proc.poll() is None:\n        proc.terminate()\n        try:\n            proc.wait(timeout=5)\n        except subprocess.TimeoutExpired:\n            proc.kill()\n            proc.wait(timeout=5)\nPY"
expect_rc = 0
expect_stdout_contains = ["service-connection-lifecycle-ok"]
