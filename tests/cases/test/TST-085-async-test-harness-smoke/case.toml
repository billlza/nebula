id = "TST-085-async-test-harness-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "rm -rf work/async_test_dir && mkdir -p work/async_test_dir"
expect_rc = 0

[[steps]]
kind = "shell"
run = "cp \"$NEBULA_REPO_ROOT/tests/fixtures/async_main_run.nb\" work/async_test_dir/async_test.nb && python3 - <<'PY'\nfrom pathlib import Path\np = Path('work/async_test_dir/async_test.nb')\np.write_text('import std::task\\n\\n@test\\nasync fn check_async() -> Void {\\n  expect_eq(await join(spawn(work())), 5)\\n}\\n\\nasync fn work() -> Int {\\n  await yield_now()\\n  return 5\\n}\\n', encoding='utf-8')\nPY"
expect_rc = 0

[[steps]]
kind = "nebula"
command = "test"
args = ["--dir", "work/async_test_dir"]
expect_rc = 0
expect_stdout_contains = ["[test] check_async", "[test] ok"]
