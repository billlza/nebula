id = "TST-171-official-service-request-id-duplicate-header-falls-back"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport os\nfrom pathlib import Path\nimport subprocess\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nroot = Path('work/official_service_request_id_duplicate')\n(root / 'src').mkdir(parents=True, exist_ok=True)\n(root / 'nebula.toml').write_text('''schema_version = 1\\n\\n[package]\\nname = \"official-service-request-id-duplicate\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n\\n[dependencies]\\nservice = { path = \"''' + str(repo_root / 'official' / 'nebula-service') + '''\" }\\n''', encoding='utf-8')\n(root / 'src' / 'server.nb').write_text('''module server\\nimport service::context\\nimport std::http\\nimport std::http_json\\nimport std::result\\n\\nasync fn handle_request(ctx: RequestContext, request: Request) -> Result<Response, String> {\\n  return Ok(ok_json(ctx.as_json()))\\n}\\n''', encoding='utf-8')\n(root / 'src' / 'main.nb').write_text('''module main\\nimport server\\nimport service::config\\nimport service::server\\nimport std::bytes\\nimport std::http\\nimport std::http_json\\nimport std::json\\nimport std::net\\nimport std::result\\nimport std::task\\nimport std::time\\n\\nasync fn main() -> Void {\\n  let cfg = default_config(\"svc-request-id-duplicate\", 0)\\n  match await bind_listener(cfg) {\\n    Ok(listener) => {\\n      match listener.local_addr() {\\n        Ok(addr) => {\\n          let task = spawn(serve_requests_n_result_with_context(listener, cfg, 1, handle_request))\\n          await sleep(millis(1))\\n          match await connect(addr) {\\n            Ok(stream) => {\\n              match request2(Get, \"localhost\", \"/ctx\", \"\", from_string(\"\"), \"X-Request-Id\", \"client-a\", \"X-Request-Id\", \"client-b\") {\\n                Ok(req) => {\\n                  match await stream.write_request(req) {\\n                    Ok(_) => {\\n                      match await timeout(millis(500), stream.read_response()) {\\n                        Ok(outcome) => {\\n                          match outcome {\\n                            Ok(resp) => {\\n                              stream.close()\\n                              listener.close()\\n                              match await join(task) {\\n                                Ok(_) => {\\n                                  match parse_json_body(resp.body) {\\n                                    Ok(value) => {\\n                                      match get_string(value, \"request_id_text\") {\\n                                        Ok(request_id_text) => {\\n                                          match get_bool(value, \"request_id_from_header\") {\\n                                            Ok(from_header) => {\\n                                              if resp.status == 200 && request_id_text != \"client-a\" && request_id_text != \"client-b\" && from_header == false {\\n                                                print(\"service-request-id-duplicate-ok\")\\n                                              } else {\\n                                                print(\"service-request-id-duplicate-bad\")\\n                                              }\\n                                            }\\n                                            Err(msg) => { print(msg) }\\n                                          }\\n                                        }\\n                                        Err(msg) => { print(msg) }\\n                                      }\\n                                    }\\n                                    Err(msg) => { print(msg) }\\n                                  }\\n                                }\\n                                Err(msg) => { print(msg) }\\n                              }\\n                            }\\n                            Err(msg) => { print(msg) }\\n                          }\\n                        }\\n                        Err(msg) => { print(msg) }\\n                      }\\n                    }\\n                    Err(msg) => { print(msg) }\\n                  }\\n                }\\n                Err(msg) => { print(msg) }\\n              }\\n            }\\n            Err(msg) => { print(msg) }\\n          }\\n        }\\n        Err(msg) => { print(msg) }\\n      }\\n    }\\n    Err(msg) => { print(msg) }\\n  }\\n}\\n''', encoding='utf-8')\nupdate = subprocess.run([os.environ['NEBULA_BINARY'], 'update', str(root)], capture_output=True, text=True, env=os.environ.copy())\nprint(update.stdout, end='')\nprint(update.stderr, end='')\nraise SystemExit(update.returncode)\nPY"
expect_rc = 0

[[steps]]
kind = "shell"
run = "\"$NEBULA_BINARY\" run work/official_service_request_id_duplicate --run-gate none"
expect_rc = 0
expect_stdout_contains = ["service-request-id-duplicate-ok"]
