id = "TST-185-example-pqc-signed-service-verify-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport http.client\nimport json\nimport os\nimport shutil\nimport subprocess\nimport sys\nimport time\nfrom pathlib import Path\n\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nsys.path.insert(0, str(repo_root / 'tests' / 'lib'))\nfrom service_probe import fail_with_output, wait_for_listener_bound\nroot = Path('work/example_pqc_signed_service')\nshutil.rmtree(root, ignore_errors=True)\nshutil.copytree(repo_root / 'examples' / 'pqc_signed_service', root)\n(root / 'nebula.toml').write_text(f'''schema_version = 1\\n\\n[package]\\nname = \"pqc-signed-service\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n\\n[dependencies]\\ncrypto = {{ path = \"{(repo_root / 'official' / 'nebula-crypto').resolve()}\" }}\\npqc = {{ path = \"{(repo_root / 'official' / 'nebula-pqc-protocols').resolve()}\" }}\\nservice = {{ path = \"{(repo_root / 'official' / 'nebula-service').resolve()}\" }}\\n''', encoding='utf-8')\nlock_path = root / 'nebula.lock'\nif lock_path.exists():\n    lock_path.unlink()\nsubprocess.run([os.environ['NEBULA_BINARY'], 'update', str(root)], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\nproc = subprocess.Popen([\n    os.environ['NEBULA_BINARY'],\n    'run',\n    str(root),\n    '--run-gate',\n    'none',\n], stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True, env={**os.environ, 'NEBULA_BIND_HOST': '127.0.0.1', 'NEBULA_PORT': '0'})\nstderr_lines = []\n_, port = wait_for_listener_bound(proc, stderr_lines, timeout=45.0)\ntry:\n    deadline = time.time() + 40\n    ready = False\n    while time.time() < deadline:\n        if proc.poll() is not None:\n            fail_with_output(proc, stderr_lines, f'pqc_signed_service exited before ready: rc={proc.returncode}')\n        try:\n            conn = http.client.HTTPConnection('127.0.0.1', port, timeout=1)\n            conn.request('GET', '/healthz')\n            resp = conn.getresponse()\n            body = resp.read().decode('utf-8')\n            conn.close()\n            if resp.status == 200 and '\"status\":\"ok\"' in body:\n                ready = True\n                break\n        except Exception:\n            time.sleep(0.1)\n    if not ready:\n        fail_with_output(proc, stderr_lines, 'pqc_signed_service did not become ready')\n\n    sign_body = b'nebula-auth'\n    conn = http.client.HTTPConnection('127.0.0.1', port, timeout=2)\n    conn.request('POST', '/sign', body=sign_body, headers={'Content-Type': 'application/octet-stream'})\n    resp = conn.getresponse()\n    body = resp.read().decode('utf-8')\n    conn.close()\n    if resp.status != 200:\n        raise SystemExit(f'unexpected /sign status: {(resp.status, body)!r}')\n    signed_payload = json.loads(body)\n    for field in ('public_key_hex', 'body_sha3_256', 'signature_hex'):\n        if not signed_payload.get(field):\n            raise SystemExit(f'/sign response missing {field}: {signed_payload!r}')\n\n    verify_request = {\n        'body_text': sign_body.decode('utf-8'),\n        'public_key_hex': signed_payload['public_key_hex'],\n        'body_sha3_256': signed_payload['body_sha3_256'],\n        'signature_hex': signed_payload['signature_hex'],\n    }\n    conn = http.client.HTTPConnection('127.0.0.1', port, timeout=2)\n    conn.request('POST', '/verify', body=json.dumps(verify_request), headers={'Content-Type': 'application/json'})\n    resp = conn.getresponse()\n    body = resp.read().decode('utf-8')\n    conn.close()\n    parsed = json.loads(body)\n    if resp.status != 200 or parsed.get('verified') is not True:\n        raise SystemExit(f'unexpected successful /verify response: {(resp.status, parsed)!r}')\n\n    verify_request['body_text'] = 'tampered'\n    conn = http.client.HTTPConnection('127.0.0.1', port, timeout=2)\n    conn.request('POST', '/verify', body=json.dumps(verify_request), headers={'Content-Type': 'application/json'})\n    resp = conn.getresponse()\n    body = resp.read().decode('utf-8')\n    conn.close()\n    parsed = json.loads(body)\n    if resp.status != 401 or parsed.get('error') != 'signature_invalid':\n        raise SystemExit(f'unexpected tampered /verify response: {(resp.status, parsed)!r}')\n\n    conn = http.client.HTTPConnection('127.0.0.1', port, timeout=2)\n    conn.request('POST', '/verify', body=json.dumps({'body_text': 'missing-fields'}), headers={'Content-Type': 'application/json'})\n    resp = conn.getresponse()\n    body = resp.read().decode('utf-8')\n    conn.close()\n    parsed = json.loads(body)\n    if resp.status != 400 or parsed.get('error') != 'bad_request':\n        raise SystemExit(f'unexpected malformed /verify response: {(resp.status, parsed)!r}')\n\n    print('example-pqc-signed-service-ok')\nfinally:\n    if proc.poll() is None:\n        proc.terminate()\n        try:\n            proc.wait(timeout=5)\n        except subprocess.TimeoutExpired:\n            proc.kill()\n            proc.wait(timeout=5)\nPY"
expect_rc = 0
expect_stdout_contains = ["example-pqc-signed-service-ok"]
