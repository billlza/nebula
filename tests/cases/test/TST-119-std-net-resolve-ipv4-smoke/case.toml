id = "TST-119-std-net-resolve-ipv4-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport os\nimport platform\nimport queue\nimport socket\nimport subprocess\nimport threading\nfrom pathlib import Path\n\nif platform.system().lower().startswith('windows'):\n    print('resolve-ipv4-skip-unsupported-host')\n    raise SystemExit(0)\n\nroot = Path('work/net_resolve_ipv4')\napp = root / 'app'\n(app / 'src').mkdir(parents=True, exist_ok=True)\n\nport_q: queue.Queue[int] = queue.Queue()\ndone_q: queue.Queue[object] = queue.Queue()\n\ndef serve() -> None:\n    try:\n        with socket.socket(socket.AF_INET, socket.SOCK_STREAM) as sock:\n            sock.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)\n            sock.bind(('127.0.0.1', 0))\n            sock.listen(1)\n            sock.settimeout(60)\n            port_q.put(sock.getsockname()[1])\n            conn, _ = sock.accept()\n            with conn:\n                conn.settimeout(60)\n                data = conn.recv(4096)\n                if data != b'hello':\n                    raise RuntimeError('unexpected payload: ' + repr(data))\n                conn.sendall(b'world')\n        done_q.put(None)\n    except Exception as exc:\n        done_q.put(exc)\n\nthread = threading.Thread(target=serve, daemon=True)\nthread.start()\nport = port_q.get(timeout=10)\n\n(app / 'nebula.toml').write_text('''schema_version = 1\\n\\n[package]\\nname = \"net-resolve-ipv4\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n''', encoding='utf-8')\n(app / 'src' / 'main.nb').write_text(f'''module main\\nimport std::bytes\\nimport std::net\\n\\nasync fn main() -> Void {{\\n  match await resolve_ipv4(\"localhost\", {port}) {{\\n    Ok(addr) => {{\\n      match await connect(addr) {{\\n        Ok(stream) => {{\\n          match await stream.write_all(from_string(\"hello\")) {{\\n            Ok(_) => {{\\n              match await stream.read(64) {{\\n                Ok(bytes) => {{\\n                  if to_string(bytes) == \"world\" {{\\n                    print(\"resolve-ipv4-ok\")\\n                  }} else {{\\n                    print(\"resolve-ipv4-bad\")\\n                  }}\\n                }}\\n                Err(msg) => {{ print(msg) }}\\n              }}\\n            }}\\n            Err(msg) => {{ print(msg) }}\\n          }}\\n          stream.close()\\n        }}\\n        Err(msg) => {{ print(msg) }}\\n      }}\\n    }}\\n    Err(msg) => {{ print(msg) }}\\n  }}\\n}}\\n''', encoding='utf-8')\n\nupdate = subprocess.run([os.environ['NEBULA_BINARY'], 'update', str(app)], capture_output=True, text=True, env=os.environ.copy())\nprint(update.stdout, end='')\nprint(update.stderr, end='')\nif update.returncode != 0:\n    raise SystemExit(update.returncode)\nrun = subprocess.run([os.environ['NEBULA_BINARY'], 'run', str(app), '--run-gate', 'none'], capture_output=True, text=True, env=os.environ.copy())\nprint(run.stdout, end='')\nprint(run.stderr, end='')\nif run.returncode != 0:\n    raise SystemExit(run.returncode)\nserver_result = done_q.get(timeout=60)\nif server_result is not None:\n    raise server_result\nif 'resolve-ipv4-ok' not in run.stdout:\n    raise SystemExit('resolve-ipv4-ok missing from output')\nPY"
expect_rc = 0
