id = "TST-150-installed-binary-official-pqc-protocols-path-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport hashlib\nimport os\nimport platform\nimport shutil\nimport subprocess\nfrom pathlib import Path\n\nsystem = platform.system().lower()\nif system.startswith('windows') or system.startswith('msys') or system.startswith('mingw') or system.startswith('cygwin'):\n    print('installed-pqc-skip-unsupported-host')\n    raise SystemExit(0)\n\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nroot = Path('work/installed_pqc')\nrelease_root = Path('work/release_asset_pqc')\ninstall_root = Path('work/install-root-pqc')\nshutil.rmtree(root, ignore_errors=True)\nshutil.rmtree(release_root, ignore_errors=True)\nshutil.rmtree(install_root, ignore_errors=True)\nroot.mkdir(parents=True, exist_ok=True)\nrelease_root.mkdir(parents=True, exist_ok=True)\n\nmachine = platform.machine().lower()\nif system == 'darwin' and machine in ('arm64', 'aarch64'):\n    target = 'darwin-arm64'\nelif system == 'darwin' and machine == 'x86_64':\n    target = 'darwin-x86_64'\nelif system == 'linux' and machine == 'x86_64':\n    target = 'linux-x86_64'\nelse:\n    raise SystemExit(f'unsupported host for installed PQC smoke: {system}/{machine}')\n\nversion = (repo_root / 'VERSION').read_text(encoding='utf-8').strip()\nsubprocess.run([\n    'python3', str(repo_root / 'scripts' / 'package_release.py'),\n    '--binary', os.environ['NEBULA_BINARY'],\n    '--target', target,\n    '--output-dir', str(release_root),\n], check=True)\nasset = next(release_root.glob('nebula-v*.tar.gz'))\nh = hashlib.sha256()\nwith asset.open('rb') as fh:\n    for chunk in iter(lambda: fh.read(1024 * 1024), b''):\n        h.update(chunk)\n(release_root / 'SHA256SUMS.txt').write_text(f'{h.hexdigest()}  {asset.name}\\n', encoding='utf-8')\nsubprocess.run([\n    'bash', str(repo_root / 'scripts' / 'install.sh'),\n    '--version', version,\n    '--prefix', str(install_root),\n    '--base-url', str(release_root),\n], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\n\nofficial_root = root / 'official'\ncrypto_pkg = official_root / 'nebula-crypto'\npqc_pkg = official_root / 'nebula-pqc-protocols'\napp = root / 'app'\nshutil.copytree(repo_root / 'official' / 'nebula-crypto', crypto_pkg)\nshutil.copytree(repo_root / 'official' / 'nebula-pqc-protocols', pqc_pkg)\nsubprocess.run([str(install_root / 'bin' / 'nebula'), 'new', str(app)], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\n(app / 'nebula.toml').write_text(f'''schema_version = 1\\n\\n[package]\\nname = \"installed-pqc-app\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n\\n[dependencies]\\ncrypto = {{ path = \"{crypto_pkg.resolve()}\" }}\\npqc = {{ path = \"{pqc_pkg.resolve()}\" }}\\n''', encoding='utf-8')\n(app / 'src' / 'main.nb').write_text('''module main\\nimport crypto::hash\\nimport crypto::pqc.kem\\nimport crypto::pqc.sign\\nimport pqc::kem\\nimport pqc::signed\\nimport std::bytes\\nimport std::json\\n\\nfn main() -> Void {\\n  let ok = true\\n  let body = from_string(\"installed-pqc\")\\n  match ml_kem_768_keypair() {\\n    Ok(kem_pair) => {\\n      match encapsulate_wire(kem_pair.public_key()) {\\n        Ok(wire) => {\\n          let envelope = wire.envelope()\\n          let shared_secret = wire.shared_secret()\\n          if envelope.ciphertext_hex() == hex(shared_secret.to_bytes()) {\\n            ok = false\\n          }\\n          match ml_kem_768_ciphertext_envelope_from_json_text(stringify(envelope.as_json())) {\\n            Ok(parsed) => {\\n              match decapsulate_wire(kem_pair.secret_key(), parsed) {\\n                Ok(recovered) => {\\n                  if recovered.equal(shared_secret) == false {\\n                    ok = false\\n                  }\\n                }\\n                Err(_) => {\\n                  ok = false\\n                }\\n              }\\n            }\\n            Err(_) => {\\n              ok = false\\n            }\\n          }\\n        }\\n        Err(_) => {\\n          ok = false\\n        }\\n      }\\n    }\\n    Err(_) => {\\n      ok = false\\n    }\\n  }\\n  match ml_dsa_65_keypair() {\\n    Ok(sig_pair) => {\\n      match sign_body(sig_pair.secret_key(), body) {\\n        Ok(envelope) => {\\n          match sign(sig_pair.secret_key(), body) {\\n            Ok(signature) => {\\n              if envelope.body_sha3_256_hex() != hex(sha3_256(body)) {\\n                ok = false\\n              }\\n              if verify_body(sig_pair.public_key(), body, signature) == false {\\n                ok = false\\n              }\\n            }\\n            Err(_) => {\\n              ok = false\\n            }\\n          }\\n        }\\n        Err(_) => {\\n          ok = false\\n        }\\n      }\\n    }\\n    Err(_) => {\\n      ok = false\\n    }\\n  }\\n  if ok {\\n    print(\"installed-pqc-ok\")\\n  } else {\\n    print(\"installed-pqc-bad\")\\n  }\\n}\\n''', encoding='utf-8')\n\nsubprocess.run([str(install_root / 'bin' / 'nebula'), 'update', str(app)], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\nrun = subprocess.run([str(install_root / 'bin' / 'nebula'), 'run', str(app), '--run-gate', 'none'], capture_output=True, text=True, env=os.environ.copy())\nprint(run.stdout, end='')\nprint(run.stderr, end='')\nif run.returncode != 0:\n    raise SystemExit(run.returncode)\nif 'installed-pqc-ok' not in run.stdout:\n    raise SystemExit('installed-pqc-ok missing from output')\nPY"
expect_rc = 0
