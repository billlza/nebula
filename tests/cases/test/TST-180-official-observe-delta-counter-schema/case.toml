id = "TST-180-official-observe-delta-counter-schema"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport os\nimport subprocess\nfrom pathlib import Path\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nroot = Path('work/official_observe_delta_counter')\n(root / 'src').mkdir(parents=True, exist_ok=True)\n(root / 'nebula.toml').write_text('''schema_version = 1\\n\\n[package]\\nname = \"official-observe-delta-counter\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n\\n[dependencies]\\nobserve = { path = \"''' + str(repo_root / 'official' / 'nebula-observe') + '''\" }\\n''', encoding='utf-8')\n(root / 'src' / 'main.nb').write_text('''module main\\nimport observe::metrics\\n\\nfn main() -> Void {\\n  delta_counter(\"svc-observe\", \"jobs_processed\", \"1\", 3)\\n  print(\"observe-delta-counter-ok\")\\n}\\n''', encoding='utf-8')\nupdate = subprocess.run([os.environ['NEBULA_BINARY'], 'update', str(root)], capture_output=True, text=True, env=os.environ.copy())\nprint(update.stdout, end='')\nprint(update.stderr, end='')\nif update.returncode != 0:\n    raise SystemExit(update.returncode)\nrun = subprocess.run([os.environ['NEBULA_BINARY'], 'run', str(root), '--run-gate', 'none'], capture_output=True, text=True, env=os.environ.copy())\nprint(run.stdout, end='')\nprint(run.stderr, end='')\nmetric_fragments = [\n    '\"schema\":\"nebula.observe.metric.v1\"',\n    '\"signal\":\"metric\"',\n    '\"service\":\"svc-observe\"',\n    '\"metric\":\"jobs_processed\"',\n    '\"unit\":\"1\"',\n    '\"value\":3',\n]\nmissing = [fragment for fragment in metric_fragments if fragment not in run.stderr]\nif missing:\n    raise SystemExit(f'missing delta-counter fragments: {missing!r} in stderr {run.stderr!r}')\nraise SystemExit(run.returncode)\nPY"
expect_rc = 0
expect_stdout_contains = ["observe-delta-counter-ok"]
