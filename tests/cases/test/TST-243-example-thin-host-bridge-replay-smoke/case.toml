id = "TST-243-example-thin-host-bridge-replay-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport os\nimport subprocess\nfrom pathlib import Path\n\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nbinary = os.environ['NEBULA_BINARY']\n\ndef run_project(path: Path) -> str:\n    result = subprocess.run([binary, 'run', str(path), '--run-gate', 'none'], capture_output=True, text=True, check=False)\n    print(result.stdout, end='')\n    print(result.stderr, end='')\n    if result.returncode != 0:\n        raise SystemExit(result.returncode)\n    return result.stdout\n\nhost_out = run_project(repo_root / 'examples' / 'thin_host_app_core')\nreplay_out = run_project(repo_root / 'examples' / 'thin_host_bridge_replay')\n\nhost_lines = [line for line in host_out.splitlines() if line.startswith(('event:', 'render:'))]\nreplay_lines = []\nin_parity = False\nfor line in replay_out.splitlines():\n    if line == 'replay-begin':\n        in_parity = True\n        continue\n    if line == 'replay-end':\n        in_parity = False\n        continue\n    if in_parity and line.startswith(('event:', 'render:')):\n        replay_lines.append(line)\nif host_lines != replay_lines:\n    raise SystemExit(f'host/replay parity mismatch\\nhost={host_lines!r}\\nreplay={replay_lines!r}')\nfor fragment in [\n    'negative-begin',\n    '\"kind\":\"command_rejected\"',\n    'malformed thin-host command envelope',\n    'unsupported thin-host command schema',\n    'missing thin-host command kind',\n    'unknown thin-host command kind',\n    'invalid counter transition: cannot decrement below zero',\n    'negative-end',\n]:\n    if fragment not in replay_out:\n        raise SystemExit(f'missing replay negative fragment: {fragment}')\nprint('thin-host-bridge-replay-parity-ok')\nPY"
expect_rc = 0
expect_stdout_contains = ["replay-begin", "command:{\"schema\":\"thin-host-bridge.command.v1\",\"kind\":\"increment\",\"correlation_id\":\"host-1\",\"state_revision\":0}", "\"kind\":\"increment_applied\"", "\"kind\":\"command_rejected\"", "\"kind\":\"quit_requested\"", "\"terminal\":true", "replay-end", "negative-end", "thin-host-bridge-replay-parity-ok"]
