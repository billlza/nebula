id = "TST-292-official-pqc-channel-pinned-initiator-smoke"
suite = "test"
description = "pqc channel server-side accept can require a pinned signed initiator identity"

[[steps]]
kind = "shell"
run = "rm -rf work/official-pqc-channel-pinned && mkdir -p work/official-pqc-channel-pinned && cp -R \"$NEBULA_REPO_ROOT/official/nebula-crypto\" work/official-pqc-channel-pinned/nebula-crypto && cp -R \"$NEBULA_REPO_ROOT/official/nebula-pqc-protocols\" work/official-pqc-channel-pinned/pqc && mkdir -p work/official-pqc-channel-pinned/app/src && cat > work/official-pqc-channel-pinned/app/nebula.toml <<'EOF'\nschema_version = 1\n\n[package]\nname = \"official-pqc-channel-pinned-app\"\nversion = \"0.1.0\"\nentry = \"src/main.nb\"\nsrc_dir = \"src\"\n\n[dependencies]\ncrypto = { path = \"../nebula-crypto\" }\npqc = { path = \"../pqc\" }\nEOF\ncat > work/official-pqc-channel-pinned/app/src/main.nb <<'EOF'\nmodule main\nimport crypto::pqc.kem\nimport crypto::pqc.sign\nimport pqc::channel\nimport std::bytes\nimport std::result\n\nfn expect_unsigned_rejected(server_kem: MlKem768KeyPair,\n                            server_signer: ChannelSigner,\n                            expected_client_key: MlDsa65PublicKey) -> Result<Bool, String> {\n  match initiate(server_kem.public_key(), unsigned()) {\n    Ok(unsigned_init) => {\n      match accept_pinned_initiator(server_kem.secret_key(), signed(server_signer), expected_client_key, unsigned_init.hello()) {\n        Ok(_) => { return Ok(false) }\n        Err(msg) => { return Ok(msg == \"expected a signed initiator hello\") }\n      }\n    }\n    Err(msg) => { return Err(msg) }\n  }\n}\n\nfn expect_wrong_pin_rejected(server_kem: MlKem768KeyPair,\n                             server_signer: ChannelSigner,\n                             client_signer: ChannelSigner,\n                             wrong_client_key: MlDsa65PublicKey) -> Result<Bool, String> {\n  match initiate(server_kem.public_key(), signed(client_signer)) {\n    Ok(init) => {\n      match accept_pinned_initiator(server_kem.secret_key(), signed(server_signer), wrong_client_key, init.hello()) {\n        Ok(_) => { return Ok(false) }\n        Err(msg) => { return Ok(msg == \"pqc channel initiator hello public key mismatch\") }\n      }\n    }\n    Err(msg) => { return Err(msg) }\n  }\n}\n\nfn expect_bad_signature_rejected(server_kem: MlKem768KeyPair,\n                                 server_signer: ChannelSigner,\n                                 client_key: MlDsa65PublicKey,\n                                 client_signer: ChannelSigner) -> Result<Bool, String> {\n  match initiate(server_kem.public_key(), signed(client_signer)) {\n    Ok(init) => {\n      let hello = init.hello()\n      let tampered = ClientHello(hello.format_version,\n                                 hello.channel_suite,\n                                 hello.kem_ciphertext_hex,\n                                 hello.initiator_sign_public_key_hex,\n                                 \"00\")\n      match accept_pinned_initiator(server_kem.secret_key(), signed(server_signer), client_key, tampered) {\n        Ok(_) => { return Ok(false) }\n        Err(msg) => {\n          return Ok(msg == \"MlDsa65Signature must be exactly 3309 bytes\" || msg == \"pqc channel initiator hello signature verification failed\")\n        }\n      }\n    }\n    Err(msg) => { return Err(msg) }\n  }\n}\n\nfn expect_pinned_happy_path(server_kem: MlKem768KeyPair,\n                            server_signer: ChannelSigner,\n                            server_sign_key: MlDsa65PublicKey,\n                            client_signer: ChannelSigner,\n                            client_sign_key: MlDsa65PublicKey) -> Result<Bool, String> {\n  match initiate(server_kem.public_key(), signed(client_signer)) {\n    Ok(init) => {\n      match accept_pinned_initiator(server_kem.secret_key(), signed(server_signer), client_sign_key, init.hello()) {\n        Ok(server_accept) => {\n          match finalize(init, pinned_peer(server_sign_key), server_accept.message()) {\n            Ok(client_session) => {\n              let server_session = server_accept.session()\n              match seal_next(client_session, from_string(\"pinned-client\"), from_string(\"aad\")) {\n                Ok(sent) => {\n                  match open_next(server_session, sent.ciphertext(), from_string(\"aad\")) {\n                    Ok(opened) => { return Ok(to_string(opened.plaintext()) == \"pinned-client\") }\n                    Err(msg) => { return Err(msg) }\n                  }\n                }\n                Err(msg) => { return Err(msg) }\n              }\n            }\n            Err(msg) => { return Err(msg) }\n          }\n        }\n        Err(msg) => { return Err(msg) }\n      }\n    }\n    Err(msg) => { return Err(msg) }\n  }\n}\n\nfn main() -> Void {\n  let ok = true\n  match ml_kem_768_keypair() {\n    Ok(server_kem) => {\n      match ml_dsa_65_keypair() {\n        Ok(client_sign_keys) => {\n          match ml_dsa_65_keypair() {\n            Ok(wrong_client_sign_keys) => {\n              match ml_dsa_65_keypair() {\n                Ok(server_sign_keys) => {\n                  let client_signer = channel_signer(client_sign_keys)\n                  let server_signer = channel_signer(server_sign_keys)\n                  match expect_unsigned_rejected(server_kem, server_signer, client_sign_keys.public_key()) {\n                    Ok(result) => { if result == false { ok = false } }\n                    Err(_) => { ok = false }\n                  }\n                  match expect_wrong_pin_rejected(server_kem, server_signer, client_signer, wrong_client_sign_keys.public_key()) {\n                    Ok(result) => { if result == false { ok = false } }\n                    Err(_) => { ok = false }\n                  }\n                  match expect_bad_signature_rejected(server_kem, server_signer, client_sign_keys.public_key(), client_signer) {\n                    Ok(result) => { if result == false { ok = false } }\n                    Err(_) => { ok = false }\n                  }\n                  match expect_pinned_happy_path(server_kem, server_signer, server_sign_keys.public_key(), client_signer, client_sign_keys.public_key()) {\n                    Ok(result) => { if result == false { ok = false } }\n                    Err(_) => { ok = false }\n                  }\n                }\n                Err(_) => { ok = false }\n              }\n            }\n            Err(_) => { ok = false }\n          }\n        }\n        Err(_) => { ok = false }\n      }\n    }\n    Err(_) => { ok = false }\n  }\n  if ok {\n    print(\"pqc-channel-pinned-initiator-ok\")\n  } else {\n    print(\"pqc-channel-pinned-initiator-bad\")\n  }\n}\nEOF"
expect_rc = 0

[[steps]]
kind = "nebula"
command = "fetch"
args = ["work/official-pqc-channel-pinned/app"]
expect_rc = 0

[[steps]]
kind = "nebula"
command = "run"
source = "work/official-pqc-channel-pinned/app"
args = ["--run-gate", "none"]
expect_rc = 0
expect_stdout_contains = ["pqc-channel-pinned-initiator-ok"]
