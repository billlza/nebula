id = "TST-006-cache-report-json"
suite = "test"

[[steps]]
kind = "shell"
run = "mkdir -p work/cache_json && cp fixtures/smoke.nb work/cache_json/a.nb"
expect_rc = 0

[[steps]]
kind = "nebula"
command = "test"
args = ["--diag-format", "json", "--dir", "work/cache_json", "--cache-report", "on", "--cache-report-format", "json"]
expect_rc = 0
expect_stdout_contains = [
  "\"cache_report\":{\"hits\":0,\"misses\":1,\"evictions\":0,\"entries\":1,\"cross_stage_candidates\":0,\"cross_stage_breakdown\":{\"preflight_to_build\":0,\"build_to_preflight\":0,\"other\":0}",
  "\"cross_stage_reused\":0",
  "\"cross_stage_saved_ms_estimate\":0"
]
expect_stdout_regex = ['\{"cache_report":\{.*"disk_entries":[0-9]+\}\}$']
