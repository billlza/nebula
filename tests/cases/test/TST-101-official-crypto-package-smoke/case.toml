id = "TST-101-official-crypto-package-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "rm -rf work/official-crypto && mkdir -p work/official-crypto && cp -R \"$NEBULA_REPO_ROOT/official/nebula-crypto\" work/official-crypto/pkg && mkdir -p work/official-crypto/app/src && cat > work/official-crypto/app/nebula.toml <<'EOF'\nschema_version = 1\n\n[package]\nname = \"official-crypto-app\"\nversion = \"0.1.0\"\nentry = \"src/main.nb\"\nsrc_dir = \"src\"\n\n[dependencies]\ncrypto = { path = \"../pkg\" }\nEOF\ncat > work/official-crypto/app/src/main.nb <<'EOF'\nmodule main\nimport crypto::aead\nimport crypto::hash\nimport crypto::kdf\nimport crypto::pqc.kem\nimport crypto::pqc.sign\nimport crypto::rand\nimport std::bytes\nimport std::result\n\nfn main() -> Void {\n  let ok = true\n  let nebula_sha3_256 = sha3_256(from_string(\"nebula\"))\n  let nebula_sha3_256_hex = \"816ba2b6c12bad00ef102303a48ce3d07a44a49b029f1cac49c6e0d581850044\"\n  if hex(nebula_sha3_256) != nebula_sha3_256_hex {\n    ok = false\n  }\n  match from_hex(nebula_sha3_256_hex) {\n    Ok(decoded) => {\n      if equal(decoded, nebula_sha3_256) == false {\n        ok = false\n      }\n    }\n    Err(_) => {\n      ok = false\n    }\n  }\n  if hex(sha3_512(from_string(\"nebula\"))) != \"648fb8f02a39f1a7e6f30725cbca404c915506dd7856d9122c21f9939bb4871c13f938ee249b1d6e6d0b1bbd015e4c722c83478c3d2e43e92894d50449fa11ab\" {\n    ok = false\n  }\n  if len(blake3(from_string(\"nebula\"))) != 32 {\n    ok = false\n  }\n  match blake3_derive_key(\"nebula/test/channel\", from_string(\"material\"), 32) {\n    Ok(k1) => {\n      match blake3_derive_key(\"nebula/test/channel\", from_string(\"material\"), 32) {\n        Ok(k2) => {\n          if equal(k1, k2) == false {\n            ok = false\n          }\n        }\n        Err(_) => {\n          ok = false\n        }\n      }\n      match blake3_derive_key(\"nebula/test/other\", from_string(\"material\"), 32) {\n        Ok(k3) => {\n          if equal(k1, k3) {\n            ok = false\n          }\n          match chacha20_poly1305_key_from_bytes(k1) {\n            Ok(aead_key) => {\n              match seal(aead_key,\n                         from_string(\"0123456789ab\"),\n                         from_string(\"aad\"),\n                         from_string(\"hello-pqc\")) {\n                Ok(ciphertext) => {\n                  match open(aead_key, from_string(\"0123456789ab\"), from_string(\"aad\"), ciphertext) {\n                    Ok(plaintext) => {\n                      if to_string(plaintext) != \"hello-pqc\" {\n                        ok = false\n                      }\n                    }\n                    Err(_) => {\n                      ok = false\n                    }\n                  }\n                }\n                Err(_) => {\n                  ok = false\n                }\n              }\n            }\n            Err(_) => {\n              ok = false\n            }\n          }\n        }\n        Err(_) => {\n          ok = false\n        }\n      }\n    }\n    Err(_) => {\n      ok = false\n    }\n  }\n  match random_bytes(16) {\n    Ok(bytes) => {\n      if len(bytes) != 16 {\n        ok = false\n      }\n    }\n    Err(_) => {\n      ok = false\n    }\n  }\n  match ml_kem_768_keypair() {\n    Ok(kem_pair) => {\n      let pk = kem_pair.public_key()\n      let sk = kem_pair.secret_key()\n      match ml_kem_768_public_key_from_bytes(pk.to_bytes()) {\n        Ok(pk2) => {\n          match encapsulate(pk2) {\n            Ok(encap) => {\n              let ct = encap.ciphertext()\n              let ss1 = encap.shared_secret()\n              match ml_kem_768_ciphertext_from_bytes(ct.to_bytes()) {\n                Ok(ct2) => {\n                  match decapsulate(sk, ct2) {\n                    Ok(ss2) => {\n                      if ss1.equal(ss2) == false {\n                        ok = false\n                      }\n                    }\n                    Err(_) => {\n                      ok = false\n                    }\n                  }\n                }\n                Err(_) => {\n                  ok = false\n                }\n              }\n            }\n            Err(_) => {\n              ok = false\n            }\n          }\n        }\n        Err(_) => {\n          ok = false\n        }\n      }\n    }\n    Err(_) => {\n      ok = false\n    }\n  }\n  match ml_dsa_65_keypair() {\n    Ok(sig_pair) => {\n      let sig_pk = sig_pair.public_key()\n      let sig_sk = sig_pair.secret_key()\n      let msg = from_string(\"nebula-sign\")\n      let wrong = from_string(\"nebula-wrong\")\n      match sign(sig_sk, msg) {\n        Ok(sig) => {\n          match ml_dsa_65_signature_from_bytes(sig.to_bytes()) {\n            Ok(sig2) => {\n              if verify(sig_pk, msg, sig2) == false {\n                ok = false\n              }\n              if verify(sig_pk, wrong, sig2) {\n                ok = false\n              }\n            }\n            Err(_) => {\n              ok = false\n            }\n          }\n        }\n        Err(_) => {\n          ok = false\n        }\n      }\n    }\n    Err(_) => {\n      ok = false\n    }\n  }\n  if ok {\n    print(\"crypto-ok\")\n  } else {\n    print(\"crypto-bad\")\n  }\n}\nEOF"
expect_rc = 0

[[steps]]
kind = "nebula"
command = "fetch"
args = ["work/official-crypto/app"]
expect_rc = 0

[[steps]]
kind = "nebula"
command = "run"
source = "work/official-crypto/app"
args = ["--run-gate", "none"]
expect_rc = 0
expect_stdout_contains = ["crypto-ok"]
