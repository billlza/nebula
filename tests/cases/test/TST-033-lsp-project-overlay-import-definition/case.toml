id = "TST-033-lsp-project-overlay-import-definition"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nfrom pathlib import Path\nimport json, os, subprocess, tempfile\nroot = Path(tempfile.mkdtemp(dir='work'))\nproj = root / 'proj'\n(proj / 'src' / 'app').mkdir(parents=True)\n(proj / 'nebula.toml').write_text('schema_version = 1\\n\\n[package]\\nname = \"demo\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n', encoding='utf-8')\nmain = proj / 'src' / 'main.nb'\nutil = proj / 'src' / 'app' / 'util.nb'\nmain.write_text('module main\\nimport app.util\\n\\nfn main() -> Int {\\n  return helper()\\n}\\n', encoding='utf-8')\nutil.write_text('module app.util\\n\\nfn helper() -> Int {\\n  return 1\\n}\\n', encoding='utf-8')\nutil_overlay = 'module app.util\\n\\n// shifted\\nfn helper() -> Int {\\n  return 1\\n}\\n'\nproc = subprocess.Popen([os.environ['NEBULA_BINARY'], 'lsp'], stdin=subprocess.PIPE, stdout=subprocess.PIPE, stderr=subprocess.STDOUT)\n\ndef send(obj):\n    body = json.dumps(obj, separators=(',', ':')).encode()\n    proc.stdin.write(f'Content-Length: {len(body)}\\r\\n\\r\\n'.encode() + body)\n    proc.stdin.flush()\n\ndef recv():\n    header = b''\n    while b'\\r\\n\\r\\n' not in header:\n        chunk = proc.stdout.read(1)\n        if not chunk:\n            raise RuntimeError('lsp closed while waiting for header')\n        header += chunk\n    head, _, rest = header.partition(b'\\r\\n\\r\\n')\n    length = 0\n    for line in head.decode().split('\\r\\n'):\n        if line.lower().startswith('content-length:'):\n            length = int(line.split(':', 1)[1].strip())\n    body = rest\n    while len(body) < length:\n        chunk = proc.stdout.read(length - len(body))\n        if not chunk:\n            raise RuntimeError('lsp closed while waiting for body')\n        body += chunk\n    return body.decode()\n\nmain_uri = 'file://' + str(main.resolve())\nutil_uri = 'file://' + str(util.resolve())\nresponses = []\nmessages = [\n    {'jsonrpc': '2.0', 'id': 1, 'method': 'initialize', 'params': {}},\n    {'jsonrpc': '2.0', 'method': 'textDocument/didOpen', 'params': {'textDocument': {'uri': main_uri, 'languageId': 'nebula', 'version': 1, 'text': main.read_text(encoding='utf-8')}}},\n    {'jsonrpc': '2.0', 'id': 2, 'method': 'textDocument/definition', 'params': {'textDocument': {'uri': main_uri}, 'position': {'line': 4, 'character': 10}}},\n    {'jsonrpc': '2.0', 'method': 'textDocument/didOpen', 'params': {'textDocument': {'uri': util_uri, 'languageId': 'nebula', 'version': 1, 'text': util_overlay}}},\n    {'jsonrpc': '2.0', 'id': 3, 'method': 'textDocument/definition', 'params': {'textDocument': {'uri': main_uri}, 'position': {'line': 4, 'character': 10}}},\n    {'jsonrpc': '2.0', 'id': 4, 'method': 'textDocument/hover', 'params': {'textDocument': {'uri': main_uri}, 'position': {'line': 4, 'character': 10}}},\n    {'jsonrpc': '2.0', 'id': 5, 'method': 'shutdown', 'params': {}},\n]\nfor msg in messages:\n    send(msg)\n    responses.append(recv())\nsend({'jsonrpc': '2.0', 'method': 'exit', 'params': {}})\nproc.stdin.close()\nproc.wait(timeout=5)\nPath('work/lsp-project-overlay.out').write_text('\\n'.join(responses), encoding='utf-8')\nraise SystemExit(proc.returncode)\nPY"
expect_rc = 0

[[steps]]
kind = "shell"
run = "grep -F '\"id\":2,\"result\":{\"uri\":\"file://' work/lsp-project-overlay.out && grep -F '\"id\":2,\"result\":{\"uri\":\"file://' work/lsp-project-overlay.out | grep -F '\"start\":{\"line\":2,\"character\":0}' && grep -F '\"id\":3,\"result\":{\"uri\":\"file://' work/lsp-project-overlay.out | grep -F '\"start\":{\"line\":3,\"character\":0}' && grep -F '\"id\":4,\"result\":{\"contents\":{\"kind\":\"markdown\",\"value\":\"fn helper\"}}' work/lsp-project-overlay.out"
expect_rc = 0
