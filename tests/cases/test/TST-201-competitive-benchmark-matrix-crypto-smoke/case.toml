id = "TST-201-competitive-benchmark-matrix-crypto-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport json\nimport os\nimport platform\nimport subprocess\nfrom pathlib import Path\n\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nout_path = Path('work/backend_crypto_matrix_crypto.json')\nout_path.parent.mkdir(parents=True, exist_ok=True)\nsubprocess.run([\n    'python3',\n    str(repo_root / 'scripts' / 'competitive_bench.py'),\n    'run-matrix',\n    '--binary',\n    os.environ['NEBULA_BINARY'],\n    '--workload',\n    'hash_throughput',\n    '--json-out',\n    str(out_path),\n], check=True)\nreport = json.loads(out_path.read_text(encoding='utf-8'))\nworkload = report['workloads'][0]\nif workload['id'] != 'hash_throughput':\n    raise SystemExit(f'unexpected crypto workload row: {workload!r}')\nresults = workload['results']\nif results['nebula']['status'] != 'ok' or results['cpp']['status'] != 'ok':\n    raise SystemExit(f'crypto matrix missing nebula/cpp success: {results!r}')\nif results['rust']['status'] not in ('ok', 'skipped_toolchain_missing'):\n    raise SystemExit(f'unexpected rust crypto status: {results[\"rust\"]!r}')\nallowed_swift = {'ok', 'skipped_toolchain_missing'}\nif platform.system() != 'Darwin':\n    allowed_swift.add('skipped_swift_scope_macos_only')\nif results['swift']['status'] not in allowed_swift:\n    raise SystemExit(f'unexpected swift crypto status: {results[\"swift\"]!r}')\naggregate = workload['comparisons']['cpp_rust_best']\nif aggregate['status'] not in ('hard_win', 'hard_trail', 'within_band'):\n    raise SystemExit(f'unexpected cpp_rust_best status: {aggregate!r}')\nprint('competitive-benchmark-matrix-crypto-ok')\nPY"
expect_rc = 0
expect_stdout_contains = ["competitive-benchmark-matrix-crypto-ok"]
