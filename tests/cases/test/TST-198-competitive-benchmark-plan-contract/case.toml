id = "TST-198-competitive-benchmark-plan-contract"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport json\nimport os\nimport subprocess\nfrom pathlib import Path\n\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nsubprocess.run(['python3', str(repo_root / 'scripts' / 'competitive_bench.py'), 'verify'], check=True)\nplan_json = subprocess.check_output([\n    'python3',\n    str(repo_root / 'scripts' / 'competitive_bench.py'),\n    'plan',\n    '--format',\n    'json',\n], text=True)\nplan = json.loads(plan_json)\nworkloads = plan['matrix']['workloads']\nids = [item['id'] for item in workloads]\nexpected = [\n    'http_route_roundtrip',\n    'json_payload_roundtrip',\n    'bytes_frame_hotpath',\n    'hash_throughput',\n    'aead_pqc_core',\n]\nif ids != expected:\n    raise SystemExit(f'unexpected workload ids: {ids!r}')\nthresholds = plan['matrix']['victory_thresholds']\nif thresholds['required_win_count'] != 3:\n    raise SystemExit(f'unexpected required_win_count: {thresholds!r}')\nif thresholds['min_lead_vs_cpp_rust_pct'] != 10.0:\n    raise SystemExit(f'unexpected min lead threshold: {thresholds!r}')\nif thresholds['max_allowed_trail_pct'] != -5.0:\n    raise SystemExit(f'unexpected max trail threshold: {thresholds!r}')\nfor key in ('nebula', 'clang++', 'rustc', 'swiftc'):\n    if key not in plan['toolchains']:\n        raise SystemExit(f'missing toolchain entry: {key}')\nif plan['machine']['machine'] == '':\n    raise SystemExit(f'missing machine info: {plan!r}')\nfor workload in workloads:\n    refs = workload.get('references')\n    if sorted(refs.keys()) != ['cpp', 'rust', 'swift']:\n        raise SystemExit(f'missing reference map: {workload!r}')\n    if not isinstance(workload.get('reference_support'), list):\n        raise SystemExit(f'missing reference_support list: {workload!r}')\n    for key in ('timed_scope', 'setup_scope', 'input_profile', 'correctness_contract'):\n        if key not in workload:\n            raise SystemExit(f'missing workload metadata {key}: {workload!r}')\nprint('competitive-benchmark-plan-ok')\nPY"
expect_rc = 0
expect_stdout_contains = ["competitive-benchmark-plan-ok"]
