id = "TST-211-std-fs-config-storage-helpers"
suite = "test"

[[steps]]
kind = "shell"
run = "mkdir -p work/fs_config_helpers/src"
expect_rc = 0

[[steps]]
kind = "shell"
run = "cat > work/fs_config_helpers/nebula.toml <<'EOF'\nschema_version = 1\n\n[package]\nname = \"fs-config-helpers\"\nversion = \"0.1.0\"\nentry = \"src/main.nb\"\nsrc_dir = \"src\"\nEOF\ncat > work/fs_config_helpers/src/main.nb <<'EOF'\nmodule main\nimport std::bytes\nimport std::fs\nimport std::json\n\nfn main() -> Int {\n  let root = \"work/fs_config_helpers/runtime\"\n  let dir = \"work/fs_config_helpers/runtime/configs\"\n  let alpha_path = \"work/fs_config_helpers/runtime/configs/a.json\"\n  let beta_path = \"work/fs_config_helpers/runtime/configs/b.json\"\n  let gamma_path = \"work/fs_config_helpers/runtime/configs/c.txt\"\n\n  match create_dir_all(dir) {\n    Ok(_) => {}\n    Err(msg) => {\n      print(msg)\n      return 1\n    }\n  }\n  match write_bytes_atomic(alpha_path, from_string(\"alpha\")) {\n    Ok(_) => {}\n    Err(msg) => {\n      print(msg)\n      return 1\n    }\n  }\n  match write_string_atomic(beta_path, \"bravo\") {\n    Ok(_) => {}\n    Err(msg) => {\n      print(msg)\n      return 1\n    }\n  }\n  match write_string(gamma_path, \"charlie\") {\n    Ok(_) => {}\n    Err(msg) => {\n      print(msg)\n      return 1\n    }\n  }\n  match list_dir(dir) {\n    Ok(entries) => {\n      match array_len(entries) {\n        Ok(count) => {\n          if count != 3 {\n            print(\"fs-config-helpers-bad\")\n            return 1\n          }\n          match array_get(entries, 0) {\n            Ok(first) => {\n              match array_get(entries, 1) {\n                Ok(second) => {\n                  match array_get(entries, 2) {\n                    Ok(third) => {\n                      match as_string(first) {\n                        Ok(first_name) => {\n                          match as_string(second) {\n                            Ok(second_name) => {\n                              match as_string(third) {\n                                Ok(third_name) => {\n                                  if first_name != \"a.json\" || second_name != \"b.json\" || third_name != \"c.txt\" {\n                                    print(\"fs-config-helpers-bad\")\n                                    return 1\n                                  }\n                                }\n                                Err(msg) => {\n                                  print(msg)\n                                  return 1\n                                }\n                              }\n                            }\n                            Err(msg) => {\n                              print(msg)\n                              return 1\n                            }\n                          }\n                        }\n                        Err(msg) => {\n                          print(msg)\n                          return 1\n                        }\n                      }\n                    }\n                    Err(msg) => {\n                      print(msg)\n                      return 1\n                    }\n                  }\n                }\n                Err(msg) => {\n                  print(msg)\n                  return 1\n                }\n              }\n            }\n            Err(msg) => {\n              print(msg)\n              return 1\n            }\n          }\n        }\n        Err(msg) => {\n          print(msg)\n          return 1\n        }\n      }\n    }\n    Err(msg) => {\n      print(msg)\n      return 1\n    }\n  }\n  match remove_file(beta_path) {\n    Ok(_) => {}\n    Err(msg) => {\n      print(msg)\n      return 1\n    }\n  }\n  match exists(beta_path) {\n    Ok(value) => {\n      if value {\n        print(\"fs-config-helpers-bad\")\n        return 1\n      }\n    }\n    Err(msg) => {\n      print(msg)\n      return 1\n    }\n  }\n  match remove_file(beta_path) {\n    Ok(_) => {\n      print(\"fs-config-helpers-bad\")\n      return 1\n    }\n    Err(_) => {}\n  }\n  print(\"fs-config-helpers-ok\")\n  return 0\n}\nEOF"
expect_rc = 0

[[steps]]
kind = "nebula"
command = "run"
source = "work/fs_config_helpers"
args = ["--run-gate", "none"]
expect_rc = 0
expect_stdout_contains = ["fs-config-helpers-ok"]
