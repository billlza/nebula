id = "TST-054-locked-git-project-check-without-git-tool"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nfrom pathlib import Path\nimport subprocess\nroot = Path('work/git_locked_project')\ndep = root / 'dep'\napp = root / 'app'\n(dep / 'src').mkdir(parents=True, exist_ok=True)\ndep.joinpath('nebula.toml').write_text('schema_version = 1\\n\\n[package]\\nname = \"dep\"\\nversion = \"0.1.0\"\\nentry = \"src/lib.nb\"\\nsrc_dir = \"src\"\\n', encoding='utf-8')\ndep.joinpath('src/lib.nb').write_text('module lib\\n\\nfn lib_value() -> Int {\\n  return 7\\n}\\n', encoding='utf-8')\nsubprocess.run(['git', 'init', dep], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\nsubprocess.run(['git', '-C', str(dep), 'config', 'user.email', 'tests@example.com'], check=True)\nsubprocess.run(['git', '-C', str(dep), 'config', 'user.name', 'Nebula Tests'], check=True)\nsubprocess.run(['git', '-C', str(dep), 'add', '.'], check=True)\nsubprocess.run(['git', '-C', str(dep), 'commit', '-m', 'init'], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\nPY"
expect_rc = 0

[[steps]]
kind = "shell"
run = "$NEBULA_BINARY new work/git_locked_project/app >/dev/null"
expect_rc = 0

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nfrom pathlib import Path\napp = Path('work/git_locked_project/app')\n(app / 'src' / 'main.nb').write_text('module main\\nimport dep::lib\\n\\nfn main() -> Int {\\n  return lib_value()\\n}\\n', encoding='utf-8')\nPY"
expect_rc = 0

[[steps]]
kind = "shell"
run = "\"$NEBULA_BINARY\" add work/git_locked_project/app dep --git \"$PWD/work/git_locked_project/dep\" --rev HEAD >/dev/null"
expect_rc = 0

[[steps]]
kind = "shell"
run = "\"$NEBULA_BINARY\" fetch work/git_locked_project/app >/dev/null"
expect_rc = 0

[[steps]]
kind = "shell"
run = "PATH='' \"$NEBULA_BINARY\" check work/git_locked_project/app > work/git-locked-no-tool.out 2>&1"
expect_rc = 0

[[steps]]
kind = "shell"
run = "! grep -F 'NBL-CLI-DEP-GIT-TOOL' work/git-locked-no-tool.out && ! grep -F 'NBL-CLI-LOCK-STALE' work/git-locked-no-tool.out"
expect_rc = 0
