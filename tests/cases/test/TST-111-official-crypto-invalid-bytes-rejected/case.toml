id = "TST-111-official-crypto-invalid-bytes-rejected"
suite = "test"

[[steps]]
kind = "shell"
run = "rm -rf work/official-crypto-invalid && mkdir -p work/official-crypto-invalid && cp -R \"$NEBULA_REPO_ROOT/official/nebula-crypto\" work/official-crypto-invalid/pkg && mkdir -p work/official-crypto-invalid/app/src && cat > work/official-crypto-invalid/app/nebula.toml <<'EOF'\nschema_version = 1\n\n[package]\nname = \"official-crypto-invalid-app\"\nversion = \"0.1.0\"\nentry = \"src/main.nb\"\nsrc_dir = \"src\"\n\n[dependencies]\ncrypto = { path = \"../pkg\" }\nEOF\ncat > work/official-crypto-invalid/app/src/main.nb <<'EOF'\nmodule main\nimport crypto::aead\nimport crypto::hash\nimport crypto::kdf\nimport crypto::pqc.kem\nimport crypto::pqc.sign\nimport std::bytes\nimport std::result\n\nfn main() -> Void {\n  let ok = true\n  match ml_kem_768_public_key_from_bytes(from_string(\"short\")) {\n    Ok(_) => {\n      ok = false\n    }\n    Err(msg) => {\n      if msg != \"MlKem768PublicKey must be exactly 1184 bytes\" {\n        ok = false\n      }\n    }\n  }\n  match ml_kem_768_secret_key_from_bytes(from_string(\"short\")) {\n    Ok(_) => {\n      ok = false\n    }\n    Err(msg) => {\n      if msg != \"MlKem768SecretKey must be exactly 2400 bytes\" {\n        ok = false\n      }\n    }\n  }\n  match ml_kem_768_shared_secret_from_bytes(from_string(\"short\")) {\n    Ok(_) => {\n      ok = false\n    }\n    Err(msg) => {\n      if msg != \"MlKem768SharedSecret must be exactly 32 bytes\" {\n        ok = false\n      }\n    }\n  }\n  match ml_kem_768_keypair_from_bytes(from_string(\"short\")) {\n    Ok(_) => {\n      ok = false\n    }\n    Err(msg) => {\n      if msg != \"MlKem768KeyPair must be exactly 3584 bytes\" {\n        ok = false\n      }\n    }\n  }\n  match ml_kem_768_encapsulation_from_bytes(from_string(\"short\")) {\n    Ok(_) => {\n      ok = false\n    }\n    Err(msg) => {\n      if msg != \"MlKem768Encapsulation must be exactly 1120 bytes\" {\n        ok = false\n      }\n    }\n  }\n  match ml_dsa_65_keypair_from_bytes(from_string(\"short\")) {\n    Ok(_) => {\n      ok = false\n    }\n    Err(msg) => {\n      if msg != \"MlDsa65KeyPair must be exactly 5984 bytes\" {\n        ok = false\n      }\n    }\n  }\n  match ml_dsa_65_secret_key_from_bytes(from_string(\"short\")) {\n    Ok(_) => {\n      ok = false\n    }\n    Err(msg) => {\n      if msg != \"MlDsa65SecretKey must be exactly 4032 bytes\" {\n        ok = false\n      }\n    }\n  }\n  match ml_dsa_65_signature_from_bytes(from_string(\"short\")) {\n    Ok(_) => {\n      ok = false\n    }\n    Err(msg) => {\n      if msg != \"MlDsa65Signature must be exactly 3309 bytes\" {\n        ok = false\n      }\n    }\n  }\n  match from_hex(\"abc\") {\n    Ok(_) => {\n      ok = false\n    }\n    Err(msg) => {\n      if msg != \"hex text must have even length\" {\n        ok = false\n      }\n    }\n  }\n  match from_hex(\"zz\") {\n    Ok(_) => {\n      ok = false\n    }\n    Err(msg) => {\n      if msg != \"hex text contains a non-hex character\" {\n        ok = false\n      }\n    }\n  }\n  match blake3_derive_key(\"ctx\", from_string(\"material\"), -1) {\n    Ok(_) => {\n      ok = false\n    }\n    Err(msg) => {\n      if msg != \"blake3_derive_key out_len must be non-negative\" {\n        ok = false\n      }\n    }\n  }\n  match chacha20_poly1305_key_from_bytes(from_string(\"short\")) {\n    Ok(_) => {\n      ok = false\n    }\n    Err(msg) => {\n      if msg != \"ChaCha20Poly1305Key must be exactly 32 bytes\" {\n        ok = false\n      }\n    }\n  }\n  match chacha20_poly1305_key_from_bytes(from_string(\"01234567890123456789012345678901\")) {\n    Ok(key) => {\n      match seal(key, from_string(\"short\"), from_string(\"aad\"), from_string(\"plaintext\")) {\n        Ok(_) => {\n          ok = false\n        }\n        Err(msg) => {\n          if msg != \"ChaCha20Poly1305 nonce must be exactly 12 bytes\" {\n            ok = false\n          }\n        }\n      }\n      match seal(key, from_string(\"0123456789ab\"), from_string(\"aad\"), from_string(\"plaintext\")) {\n        Ok(ciphertext) => {\n          let bad = concat(ciphertext, from_string(\"x\"))\n          match open(key, from_string(\"0123456789ab\"), from_string(\"aad\"), bad) {\n            Ok(_) => {\n              ok = false\n            }\n            Err(msg) => {\n              if msg != \"chacha20_poly1305 authentication failed\" {\n                ok = false\n              }\n            }\n          }\n        }\n        Err(_) => {\n          ok = false\n        }\n      }\n    }\n    Err(_) => {\n      ok = false\n    }\n  }\n  if ok {\n    print(\"crypto-invalid-ok\")\n  } else {\n    print(\"crypto-invalid-bad\")\n  }\n}\nEOF"
expect_rc = 0

[[steps]]
kind = "nebula"
command = "fetch"
args = ["work/official-crypto-invalid/app"]
expect_rc = 0

[[steps]]
kind = "nebula"
command = "run"
source = "work/official-crypto-invalid/app"
args = ["--run-gate", "none"]
expect_rc = 0
expect_stdout_contains = ["crypto-invalid-ok"]
