id = "TST-165-official-service-request-context-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport os\nfrom pathlib import Path\nimport subprocess\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nroot = Path('work/official_service_request_context')\n(root / 'src').mkdir(parents=True, exist_ok=True)\n(root / 'nebula.toml').write_text('''schema_version = 1\\n\\n[package]\\nname = \"official-service-request-context\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n\\n[dependencies]\\nservice = { path = \"''' + str(repo_root / 'official' / 'nebula-service') + '''\" }\\n''', encoding='utf-8')\n(root / 'src' / 'server.nb').write_text('''module server\\nimport service::context\\nimport std::http\\nimport std::http_json\\nimport std::json\\nimport std::result\\n\\nasync fn handle_request(ctx: RequestContext, request: Request) -> Result<Response, String> {\\n  return Ok(ok_json(object2(\\n    \"request_id\",\\n    int_value(ctx.request_id),\\n    \"draining\",\\n    bool_value(ctx.draining)\\n  )))\\n}\\n''', encoding='utf-8')\n(root / 'src' / 'main.nb').write_text('''module main\\nimport server\\nimport service::config\\nimport service::server\\nimport std::http\\nimport std::http_json\\nimport std::json\\nimport std::net\\nimport std::result\\nimport std::task\\nimport std::time\\n\\nasync fn main() -> Void {\\n  match config_from_env(\"svc-request-context\", 0) {\\n    Ok(cfg) => {\\n      match await bind_listener(cfg) {\\n        Ok(listener) => {\\n          match listener.local_addr() {\\n            Ok(addr) => {\\n              let task = spawn(serve_requests_n_result_with_context(listener, cfg, 1, handle_request))\\n              await sleep(millis(1))\\n              match await connect(addr) {\\n                Ok(stream) => {\\n                  let req = get_request(\"localhost\", \"/ctx\")\\n                  match await stream.write_request(req) {\\n                    Ok(_) => {\\n                      match await timeout(millis(500), stream.read_response()) {\\n                        Ok(outcome) => {\\n                          match outcome {\\n                            Ok(resp) => {\\n                              stream.close()\\n                              listener.close()\\n                              match await join(task) {\\n                                Ok(_) => {\\n                                  match parse_json_body(resp.body) {\\n                                    Ok(value) => {\\n                                      match get_int(value, \"request_id\") {\\n                                        Ok(request_id) => {\\n                                          match get_bool(value, \"draining\") {\\n                                            Ok(draining) => {\\n                                              if resp.status == 200 && request_id > 0 && draining == false {\\n                                                print(\"service-request-context-ok\")\\n                                              } else {\\n                                                print(\"service-request-context-bad\")\\n                                              }\\n                                            }\\n                                            Err(msg) => { print(msg) }\\n                                          }\\n                                        }\\n                                        Err(msg) => { print(msg) }\\n                                      }\\n                                    }\\n                                    Err(msg) => { print(msg) }\\n                                  }\\n                                }\\n                                Err(msg) => { print(msg) }\\n                              }\\n                            }\\n                            Err(msg) => { print(msg) }\\n                          }\\n                        }\\n                        Err(msg) => { print(msg) }\\n                      }\\n                    }\\n                    Err(msg) => { print(msg) }\\n                  }\\n                }\\n                Err(msg) => { print(msg) }\\n              }\\n            }\\n            Err(msg) => { print(msg) }\\n          }\\n        }\\n        Err(msg) => { print(msg) }\\n      }\\n    }\\n    Err(msg) => { print(msg) }\\n  }\\n}\\n''', encoding='utf-8')\nupdate = subprocess.run([os.environ['NEBULA_BINARY'], 'update', str(root)], capture_output=True, text=True, env=os.environ.copy())\nprint(update.stdout, end='')\nprint(update.stderr, end='')\nraise SystemExit(update.returncode)\nPY"
expect_rc = 0

[[steps]]
kind = "shell"
run = "NEBULA_BIND_HOST=127.0.0.1 NEBULA_PORT=0 \"$NEBULA_BINARY\" run work/official_service_request_context --run-gate none"
expect_rc = 0
expect_stdout_contains = ["service-request-context-ok"]
