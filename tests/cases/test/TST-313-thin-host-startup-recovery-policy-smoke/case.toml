id = "TST-313-thin-host-startup-recovery-policy-smoke"
suite = "test"
description = "thin-host GUI host shell emits app-local startup recovery policy from prior SQLite receipts"

[[steps]]
kind = "shell"
run = """
python3 - <<'PY'
import json
import os
import shutil
import sqlite3
import subprocess
from pathlib import Path

repo = Path(os.environ["NEBULA_REPO_ROOT"])
binary = os.environ["NEBULA_BINARY"]
app = repo / "examples" / "thin_host_gui_host_shell"
stage = Path("work/thin_host_startup_recovery_policy")
receipt_db = Path("work") / "thin_host_gui_host_shell" / "app-local-receipts.db"
shutil.rmtree(stage, ignore_errors=True)
receipt_db.unlink(missing_ok=True)
stage.mkdir(parents=True, exist_ok=True)
entry = stage / "thin-host-gui-host-shell"

subprocess.run([binary, "update", str(app)], check=True, capture_output=True, text=True)
check = subprocess.run([binary, "check", str(app)], capture_output=True, text=True, check=True)
if "warning:" in check.stdout or "warning:" in check.stderr:
    raise SystemExit(f"thin-host GUI shell check emitted warnings:\\n{check.stdout}\\n{check.stderr}")
build = subprocess.run([binary, "build", str(app), "--out", str(entry)], capture_output=True, text=True, check=True)
if "warning:" in build.stdout or "warning:" in build.stderr:
    raise SystemExit(f"thin-host GUI shell build emitted warnings:\\n{build.stdout}\\n{build.stderr}")

def run_shell() -> str:
    run = subprocess.run([str(entry)], capture_output=True, text=True, check=True)
    if "thin-host-gui-shell-error" in run.stdout or "app-local-error:" in run.stdout:
        raise SystemExit(run.stdout)
    return run.stdout

def startup_policy(output: str) -> dict:
    policies = [
        json.loads(line[len("app-local-startup-policy:"):])
        for line in output.splitlines()
        if line.startswith("app-local-startup-policy:")
    ]
    if len(policies) != 1:
        raise SystemExit(f"unexpected startup policy lines: {policies!r}\\n{output}")
    return policies[0]

first = startup_policy(run_shell())
if first["schema"] != "nebula.app-local.startup-recovery-policy.v1":
    raise SystemExit(f"bad first policy schema: {first!r}")
if first["recommendation"] != "clean_start" or first["latest_revision"]["confidence"] != "none":
    raise SystemExit(f"first launch should be a clean start: {first!r}")
if first["diagnostic_only"] is not True or first["action_owner"] != "app":
    raise SystemExit(f"first launch policy is not app-owned diagnostic-only: {first!r}")

second_output = run_shell()
second = startup_policy(second_output)
latest = second["latest_revision"]
if second["recommendation"] != "inspect_update_marker":
    raise SystemExit(f"second launch did not surface update marker: {second!r}")
if second["reason"] != "latest startup evidence includes an update marker; app must verify or ignore it":
    raise SystemExit(f"bad second launch reason: {second!r}")
if latest != {"value": 3, "correlation_id": "gui-3", "source": "event", "confidence": "windowed"}:
    raise SystemExit(f"bad latest revision evidence: {latest!r}")
if second["diagnostic_only"] is not True or second["action_owner"] != "app":
    raise SystemExit(f"second launch policy is not app-owned diagnostic-only: {second!r}")

evidence = second["evidence"]
commands = evidence["commands"]
markers = evidence["markers"]
lifecycle = evidence["lifecycle"]
if evidence["last_snapshot"]["receipt_key"] != "snapshot:gui-3":
    raise SystemExit(f"bad last snapshot evidence: {evidence['last_snapshot']!r}")
if commands["last_rejected_event"]["payload"]["event_kind"] != "command_rejected":
    raise SystemExit(f"bad rejected command evidence: {commands!r}")
if commands["last_rejected_event"]["payload"]["accepted"] is not False:
    raise SystemExit(f"rejected command evidence accepted flag drifted: {commands!r}")
if markers["last_recovery_marker"]["payload"]["status"] != "manual-preview":
    raise SystemExit(f"bad recovery marker evidence: {markers!r}")
if markers["last_update_marker"]["payload"]["status"] != "staged-preview":
    raise SystemExit(f"bad update marker evidence: {markers!r}")
if markers["last_update_marker"]["payload"]["manifest_path"] != "deploy/update/manifest.preview.json":
    raise SystemExit(f"bad update marker path: {markers!r}")
if lifecycle["previous_session_clean"] is not True:
    raise SystemExit(f"previous session should be clean: {lifecycle!r}")
if lifecycle["last_lifecycle_marker"]["payload"]["status"] != "shutdown_clean":
    raise SystemExit(f"bad lifecycle evidence: {lifecycle!r}")
if second["trace"]["receipt_count"] != 21:
    raise SystemExit(f"startup trace should explain prior 21 receipts: {second['trace']!r}")

with sqlite3.connect(receipt_db) as conn:
    count = conn.execute("SELECT COUNT(*) FROM app_local_runtime_receipts").fetchone()[0]
    kinds = dict(conn.execute(
        "SELECT receipt_kind, COUNT(*) FROM app_local_runtime_receipts GROUP BY receipt_kind"
    ).fetchall())
if count != 21:
    raise SystemExit(f"second launch should be idempotent over receipt keys, got {count}")
if kinds != {"snapshot": 6, "command_context": 5, "event": 5, "lifecycle_marker": 3, "recovery_marker": 1, "update_marker": 1}:
    raise SystemExit(f"unexpected receipt kind counts after replay: {kinds!r}")

print("thin-host-startup-recovery-policy-ok")
PY
"""
expect_rc = 0
expect_stdout_contains = ["thin-host-startup-recovery-policy-ok"]

[[steps]]
kind = "shell"
run = """
python3 - <<'PY'
from pathlib import Path
import os

repo = Path(os.environ["NEBULA_REPO_ROOT"])
readme = (repo / "examples" / "thin_host_gui_host_shell" / "README.md").read_text(encoding="utf-8")
doc = (repo / "docs" / "thin_host_app_shell.md").read_text(encoding="utf-8")
for marker in [
    "app-local-startup-policy:",
    "nebula.app-local.startup-recovery-policy.v1",
    "action_owner=",
]:
    if marker not in readme:
        raise SystemExit(f"thin-host GUI README missing startup policy marker: {marker}")
for marker in [
    "app-local-startup-policy:",
    "nebula.app-local.startup-recovery-policy.v1",
    "diagnostic startup inputs",
    "remain app-owned",
]:
    if marker not in doc:
        raise SystemExit(f"thin-host app shell doc missing startup policy marker: {marker}")
print("thin-host-startup-recovery-policy-docs-ok")
PY
"""
expect_rc = 0
expect_stdout_contains = ["thin-host-startup-recovery-policy-docs-ok"]
