id = "TST-161-release-signoff-helper"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport shutil\nimport subprocess\nimport tarfile\nimport zipfile\nfrom pathlib import Path\n\nrepo_root = Path(__import__('os').environ['NEBULA_REPO_ROOT'])\nversion = (repo_root / 'VERSION').read_text(encoding='utf-8').strip()\nnotes_name = f'RELEASE_NOTES_v{version}.md'\nroot = Path('work/release_signoff')\nshutil.rmtree(root, ignore_errors=True)\nroot.mkdir(parents=True, exist_ok=True)\n\ntargets = {\n    'darwin-x86_64': ('nebula', 'tar.gz'),\n    'darwin-arm64': ('nebula', 'tar.gz'),\n    'linux-x86_64': ('nebula', 'tar.gz'),\n    'windows-x86_64': ('nebula.exe', 'zip'),\n}\n\nfor target, (binary_name, archive_kind) in targets.items():\n    stage = root / f'nebula-v{version}-{target}'\n    (stage / 'bin').mkdir(parents=True, exist_ok=True)\n    (stage / 'include' / 'runtime').mkdir(parents=True, exist_ok=True)\n    (stage / 'share' / 'nebula' / 'registry').mkdir(parents=True, exist_ok=True)\n    (stage / 'share' / 'nebula' / 'std').mkdir(parents=True, exist_ok=True)\n    (stage / 'share' / 'doc' / 'nebula').mkdir(parents=True, exist_ok=True)\n    (stage / 'bin' / binary_name).write_text('stub-binary\\n', encoding='utf-8')\n    (stage / 'include' / 'runtime' / 'nebula_runtime.hpp').write_text('// runtime\\n', encoding='utf-8')\n    (stage / 'include' / 'runtime' / 'region_allocator.hpp').write_text('// region\\n', encoding='utf-8')\n    (stage / 'share' / 'nebula' / 'registry' / 'client.py').write_text('#!/usr/bin/env python3\\n', encoding='utf-8')\n    (stage / 'share' / 'nebula' / 'registry' / 'server.py').write_text('#!/usr/bin/env python3\\n', encoding='utf-8')\n    (stage / 'share' / 'nebula' / 'registry' / 'README.md').write_text('# registry\\n', encoding='utf-8')\n    (stage / 'share' / 'nebula' / 'std' / 'task.nb').write_text('module task\\n', encoding='utf-8')\n    (stage / 'share' / 'nebula' / 'std' / 'fs.nb').write_text('module fs\\n', encoding='utf-8')\n    (stage / 'share' / 'doc' / 'nebula' / 'VERSION').write_text(version + '\\n', encoding='utf-8')\n    (stage / 'share' / 'doc' / 'nebula' / 'README.md').write_text('# Nebula\\n', encoding='utf-8')\n    shutil.copy2(repo_root / notes_name, stage / 'share' / 'doc' / 'nebula' / notes_name)\n\n    archive_base = root / f'nebula-v{version}-{target}'\n    if archive_kind == 'zip':\n        archive = Path(str(archive_base) + '.zip')\n        with zipfile.ZipFile(archive, 'w', compression=zipfile.ZIP_DEFLATED) as zf:\n            for path in sorted(stage.rglob('*')):\n                if path.is_dir():\n                    continue\n                zf.write(path, arcname=str(path.relative_to(root)))\n    else:\n        archive = Path(str(archive_base) + '.tar.gz')\n        with tarfile.open(archive, 'w:gz') as tf:\n            tf.add(stage, arcname=stage.name)\n\n    (root / f'nebula-v{version}-{target}.spdx.json').write_text('{\"spdxVersion\":\"SPDX-2.3\"}\\n', encoding='utf-8')\n    (root / f'nebula-v{version}-{target}.provenance.intoto.jsonl').write_text('{}\\n', encoding='utf-8')\n    (root / f'nebula-v{version}-{target}.sbom.intoto.jsonl').write_text('{}\\n', encoding='utf-8')\n\nbackend_stage = root / f'nebula-backend-sdk-v{version}-linux-x86_64'\n(backend_stage / 'share' / 'nebula' / 'sdk' / 'backend' / 'nebula-service').mkdir(parents=True, exist_ok=True)\n(backend_stage / 'share' / 'nebula' / 'sdk' / 'backend' / 'nebula-observe').mkdir(parents=True, exist_ok=True)\n(backend_stage / 'share' / 'nebula' / 'sdk' / 'backend' / 'nebula-db-sqlite').mkdir(parents=True, exist_ok=True)\n(backend_stage / 'share' / 'nebula' / 'sdk' / 'backend' / 'examples' / 'hello_api').mkdir(parents=True, exist_ok=True)\n(backend_stage / 'share' / 'nebula' / 'sdk' / 'backend' / 'docs').mkdir(parents=True, exist_ok=True)\n(backend_stage / 'share' / 'nebula' / 'sdk' / 'backend' / 'nebula-service' / 'nebula.toml').write_text('schema_version = 1\\n', encoding='utf-8')\n(backend_stage / 'share' / 'nebula' / 'sdk' / 'backend' / 'nebula-observe' / 'nebula.toml').write_text('schema_version = 1\\n', encoding='utf-8')\n(backend_stage / 'share' / 'nebula' / 'sdk' / 'backend' / 'nebula-db-sqlite' / 'nebula.toml').write_text('schema_version = 1\\n', encoding='utf-8')\n(backend_stage / 'share' / 'nebula' / 'sdk' / 'backend' / 'nebula-observe' / 'prometheus_bridge.py').write_text('#!/usr/bin/env python3\\n', encoding='utf-8')\n(backend_stage / 'share' / 'nebula' / 'sdk' / 'backend' / 'examples' / 'hello_api' / 'nebula.toml').write_text('schema_version = 1\\n', encoding='utf-8')\n(backend_stage / 'share' / 'nebula' / 'sdk' / 'backend' / 'docs' / 'service_profile.md').write_text('# service profile\\n', encoding='utf-8')\n(backend_stage / 'share' / 'nebula' / 'sdk' / 'backend' / 'docs' / 'reverse_proxy_deployment.md').write_text('# reverse proxy\\n', encoding='utf-8')\n(backend_stage / 'share' / 'nebula' / 'sdk' / 'backend' / 'docs' / 'backend_operator_guide.md').write_text('# operator guide\\n', encoding='utf-8')\nbackend_archive = root / f'nebula-backend-sdk-v{version}-linux-x86_64.tar.gz'\nwith tarfile.open(backend_archive, 'w:gz') as tf:\n    tf.add(backend_stage, arcname=backend_stage.name)\n(root / f'nebula-backend-sdk-v{version}-linux-x86_64.spdx.json').write_text('{\"spdxVersion\":\"SPDX-2.3\"}\\n', encoding='utf-8')\n(root / f'nebula-backend-sdk-v{version}-linux-x86_64.provenance.intoto.jsonl').write_text('{}\\n', encoding='utf-8')\n(root / f'nebula-backend-sdk-v{version}-linux-x86_64.sbom.intoto.jsonl').write_text('{}\\n', encoding='utf-8')\n\nshutil.copy2(repo_root / notes_name, root / notes_name)\n(root / 'SHA256SUMS.txt.intoto.jsonl').write_text('{}\\n', encoding='utf-8')\nsubprocess.run([\n    'python3', str(repo_root / 'scripts' / 'render_homebrew_formula.py'),\n    '--artifact-dir', str(root),\n    '--output', str(root / 'nebula.rb'),\n    '--url-base', 'file://' + str(root.resolve()),\n], check=True)\nsubprocess.run([\n    'python3', str(repo_root / 'scripts' / 'generate_release_manifest.py'),\n    '--artifact-dir', str(root),\n    '--checksums-out', str(root / 'SHA256SUMS.txt'),\n    '--manifest-out', str(root / 'release-manifest.json'),\n    '--base-url', 'file://' + str(root.resolve()),\n    '--require-all', 'on',\n], check=True)\nPY"
expect_rc = 0

[[steps]]
kind = "shell"
run = "python3 \"$NEBULA_REPO_ROOT/scripts/release_signoff.py\" --artifact-dir work/release_signoff --json-out work/release_signoff/signoff.json --markdown-out work/release_signoff/signoff.md"
expect_rc = 0
must_exist = ["work/release_signoff/signoff.json", "work/release_signoff/signoff.md"]

[[steps]]
kind = "shell"
run = "grep -F '\"all_passed\": true' work/release_signoff/signoff.json >/dev/null && grep -F 'gh workflow run release.yml --ref release/1.0' work/release_signoff/signoff.md >/dev/null && grep -F 'python3 scripts/release_signoff.py --artifact-dir work/release-bundle --verify-attestations' work/release_signoff/signoff.md >/dev/null"
expect_rc = 0

[[steps]]
kind = "shell"
run = "mkdir -p work/fake-gh-signoff\ncat > work/fake-gh-signoff/gh <<'EOF'\n#!/usr/bin/env python3\nimport os\nimport sys\nfrom pathlib import Path\nPath(os.environ['NEBULA_TEST_GH_LOG']).open('a', encoding='utf-8').write('gh ' + ' '.join(sys.argv[1:]) + '\\n')\nraise SystemExit(0)\nEOF\nchmod +x work/fake-gh-signoff/gh"
expect_rc = 0

[[steps]]
kind = "shell"
run = "NEBULA_TEST_GH_LOG=\"$PWD/work/release_signoff/gh.log\" PATH=\"$PWD/work/fake-gh-signoff:$PATH\" python3 \"$NEBULA_REPO_ROOT/scripts/release_signoff.py\" --artifact-dir work/release_signoff --verify-attestations --json-out work/release_signoff/signoff-verify.json --markdown-out work/release_signoff/signoff-verify.md"
expect_rc = 0
must_exist = ["work/release_signoff/signoff-verify.json", "work/release_signoff/signoff-verify.md", "work/release_signoff/gh.log"]

[[steps]]
kind = "shell"
run = "grep -F '\"all_passed\": true' work/release_signoff/signoff-verify.json >/dev/null && grep -F 'nebula-backend-sdk-v' work/release_signoff/gh.log >/dev/null && grep -F '.provenance.intoto.jsonl' work/release_signoff/gh.log >/dev/null && grep -F '.sbom.intoto.jsonl --predicate-type https://spdx.dev/Document/v2.3' work/release_signoff/gh.log >/dev/null"
expect_rc = 0
