id = "TST-314-thin-host-app-runtime-preflight-smoke"
suite = "test"
description = "thin-host GUI host shell uses app-local env preflight for app id, receipt path, principal, and observe startup diagnostics"

[[steps]]
kind = "shell"
run = """
python3 - <<'PY'
import json
import os
import shutil
import sqlite3
import subprocess
from pathlib import Path

repo = Path(os.environ["NEBULA_REPO_ROOT"])
binary = os.environ["NEBULA_BINARY"]
app = repo / "examples" / "thin_host_gui_host_shell"
root = Path("work/thin_host_runtime_preflight")
entry = root / "thin-host-gui-host-shell"
receipt_db = root / "state" / "receipts.db"
secret_file = root / "postgres.dsn"
shutil.rmtree(root, ignore_errors=True)
receipt_db.parent.mkdir(parents=True, exist_ok=True)
secret_file.parent.mkdir(parents=True, exist_ok=True)
secret_file.write_text("postgresql://user:pass@127.0.0.1:5432/runtime_preflight\\n", encoding="utf-8")

subprocess.run([binary, "update", str(app)], check=True, capture_output=True, text=True)
check = subprocess.run([binary, "check", str(app)], capture_output=True, text=True, check=True)
if "warning:" in check.stdout or "warning:" in check.stderr:
    raise SystemExit(f"thin-host GUI shell check emitted warnings:\\n{check.stdout}\\n{check.stderr}")
build = subprocess.run([binary, "build", str(app), "--out", str(entry)], capture_output=True, text=True, check=True)
if "warning:" in build.stdout or "warning:" in build.stderr:
    raise SystemExit(f"thin-host GUI shell build emitted warnings:\\n{build.stdout}\\n{build.stderr}")

env = {
    **os.environ,
    "APP_LOCAL_APP_ID": "thin-host-runtime-preflight-app",
    "APP_DATA_BACKEND": "sqlite",
    "APP_SQLITE_PATH": str(receipt_db),
    "APP_POSTGRES_DSN_FILE": str(secret_file.resolve()),
    "APP_AUTH_REQUIRED": "true",
    "APP_AUTH_MODE": "internal",
    "APP_PRINCIPAL_SUBJECT": "preflight-operator",
    "APP_OBSERVE_SERVICE": "thin-host-runtime-preflight",
}
run = subprocess.run([str(entry)], capture_output=True, text=True, env=env, check=True)
output = run.stdout
combined = run.stdout + run.stderr
if "thin-host-gui-shell-error" in output or "app-local-error:" in output:
    raise SystemExit(output)
if "postgresql://user:pass@127.0.0.1:5432/runtime_preflight" in combined:
    raise SystemExit("thin-host runtime preflight leaked postgres DSN")

preflights = []
startup_policies = []
contexts = []
lifecycle = []
for line in output.splitlines():
    if line.startswith("app-local-preflight:"):
        preflights.append(json.loads(line[len("app-local-preflight:"):]))
    if line.startswith("app-local-startup-policy:"):
        startup_policies.append(json.loads(line[len("app-local-startup-policy:"):]))
    if line.startswith("app-local-context:"):
        contexts.append(json.loads(line[len("app-local-context:"):]))
    if line.startswith("app-local-lifecycle:"):
        lifecycle.append(json.loads(line[len("app-local-lifecycle:"):]))

if len(preflights) != 1:
    raise SystemExit(f"unexpected preflight lines: {preflights!r}")
preflight = preflights[0]
if preflight["schema"] != "nebula.app-local.preflight.v1":
    raise SystemExit(f"bad preflight schema: {preflight!r}")
if preflight["data_backend"] != "sqlite" or preflight["sqlite_path"] != str(receipt_db):
    raise SystemExit(f"bad preflight storage selection: {preflight!r}")
if preflight["auth_required"] is not True or preflight["auth_mode"] != "internal":
    raise SystemExit(f"bad preflight auth selection: {preflight!r}")
if preflight["principal_subject"] != "preflight-operator":
    raise SystemExit(f"bad preflight principal: {preflight!r}")
if preflight["postgres_preview"] is not False or preflight["postgres_runtime_available"] is not False:
    raise SystemExit(f"postgres preview should stay disabled for sqlite runtime: {preflight!r}")

if len(startup_policies) != 1:
    raise SystemExit(f"unexpected startup policy lines: {startup_policies!r}")
policy = startup_policies[0]
if policy["app_id"] != "thin-host-runtime-preflight-app" or policy["recommendation"] != "clean_start":
    raise SystemExit(f"startup policy did not use runtime app id: {policy!r}")
if policy["trace"]["app_id"] != "thin-host-runtime-preflight-app":
    raise SystemExit(f"startup trace did not use runtime app id: {policy!r}")
if policy["diagnostic_only"] is not True or policy["action_owner"] != "app":
    raise SystemExit(f"startup policy is not app-owned diagnostic-only: {policy!r}")

if not contexts or {item["actor_subject"] for item in contexts} != {"preflight-operator"}:
    raise SystemExit(f"runtime principal did not flow into command contexts: {contexts!r}")
if [item["status"] for item in lifecycle] != ["startup_started", "app_ready", "shutdown_clean"]:
    raise SystemExit(f"runtime lifecycle markers missing: {lifecycle!r}")
if {item["app_id"] for item in lifecycle} != {"thin-host-runtime-preflight-app"}:
    raise SystemExit(f"runtime app id did not flow into lifecycle markers: {lifecycle!r}")
if '"service":"thin-host-runtime-preflight"' not in run.stderr:
    raise SystemExit(f"observe service missing from stderr: {run.stderr!r}")
if '"event":"app_local_preflight_ok"' not in run.stderr:
    raise SystemExit(f"observe preflight event missing from stderr: {run.stderr!r}")
if '"metric":"app_local_preflight"' not in run.stderr:
    raise SystemExit(f"observe preflight metric missing from stderr: {run.stderr!r}")

with sqlite3.connect(receipt_db) as conn:
    rows = conn.execute(
        "SELECT app_id, receipt_kind, receipt_key, correlation_id, state_revision FROM app_local_runtime_receipts ORDER BY receipt_id"
    ).fetchall()
    counts = dict(conn.execute(
        "SELECT receipt_kind, COUNT(*) FROM app_local_runtime_receipts GROUP BY receipt_kind"
    ).fetchall())
if counts != {"snapshot": 6, "host_snapshot_readiness": 6, "command_context": 5, "event": 5, "lifecycle_marker": 3, "recovery_marker": 1, "update_marker": 1}:
    raise SystemExit(f"unexpected runtime preflight receipt counts: {counts!r}")
if {row[0] for row in rows} != {"thin-host-runtime-preflight-app"}:
    raise SystemExit(f"runtime app id did not flow into receipts: {rows!r}")

print("thin-host-app-runtime-preflight-ok")
PY
"""
expect_rc = 0
expect_stdout_contains = ["thin-host-app-runtime-preflight-ok"]

[[steps]]
kind = "shell"
run = """
python3 - <<'PY'
from pathlib import Path
import os

repo = Path(os.environ["NEBULA_REPO_ROOT"])
readme = (repo / "examples" / "thin_host_gui_host_shell" / "README.md").read_text(encoding="utf-8")
doc = (repo / "docs" / "thin_host_app_shell.md").read_text(encoding="utf-8")
for marker in [
    "app-local-preflight:",
    "nebula.app-local.preflight.v1",
    "app-local env/config contract",
]:
    if marker not in readme:
        raise SystemExit(f"thin-host GUI README missing runtime preflight marker: {marker}")
for marker in [
    "app-local-preflight:",
    "nebula.app-local.preflight.v1",
    "SQLite receipt path",
    "PostgreSQL preview gate",
    "diagnostic startup inputs",
]:
    if marker not in doc:
        raise SystemExit(f"thin-host app shell doc missing runtime preflight marker: {marker}")
print("thin-host-app-runtime-preflight-docs-ok")
PY
"""
expect_rc = 0
expect_stdout_contains = ["thin-host-app-runtime-preflight-docs-ok"]
