id = "TST-301-std-http-compiled-route-fast-path-smoke"
suite = "test"
description = "std::http compiled route preview preserves route matching semantics while enabling cached fast paths"

[[steps]]
kind = "shell"
run = """
python3 - <<'PY'
import os
import subprocess
from pathlib import Path

root = Path("work/std_http_compiled_route")
(root / "src").mkdir(parents=True, exist_ok=True)
(root / "nebula.toml").write_text('''schema_version = 1

[package]
name = "std-http-compiled-route"
version = "0.1.0"
entry = "src/main.nb"
src_dir = "src"
''', encoding="utf-8")
(root / "src" / "main.nb").write_text(r'''module main
import std::bytes
import std::http
import std::result

fn get_method() -> Method {
  return Get
}

fn make_request(path: String) -> Request {
  return Request(get_method(), path, from_string(""))
}

fn marker(condition: Bool, name: String) -> Void {
  if condition {
    print(name)
  } else {
    print("fail:marker")
  }
}

fn check_params2() -> Void {
  match compile_route("/v1/:project/:environment") {
    Ok(route) => {
      let req = make_request("/v1/nebula/prod")
      marker(compiled_path_matches(route, req), "compiled-path-match-ok")
      match compiled_route_params2(route, req) {
        Ok(params) => {
          marker(params.first == "nebula" && params.second == "prod", "compiled-params2-ok")
        }
        Err(_) => { print("fail:compiled-params2") }
      }
      match route_params2("/v1/:project/:environment", req) {
        Ok(params) => {
          marker(params.first == "nebula" && params.second == "prod", "compiled-uncompiled-parity-ok")
        }
        Err(_) => { print("fail:uncompiled-params2") }
      }
    }
    Err(_) => { print("fail:compile-params2") }
  }
}

fn check_params3_suffix() -> Void {
  match compile_route("/users/:id/:section/:tab/profile") {
    Ok(route) => {
      let req = make_request("/users/bill/settings/security/profile")
      match compiled_route_params3(route, req) {
        Ok(params) => {
          marker(params.first == "bill" && params.second == "settings" && params.third == "security",
                 "compiled-params3-suffix-ok")
        }
        Err(_) => { print("fail:compiled-params3") }
      }
    }
    Err(_) => { print("fail:compile-params3") }
  }
}

fn check_param1_rejections() -> Void {
  match compile_route("/hello/:name") {
    Ok(route) => {
      match compiled_route_param1(route, make_request("/hello/nebula")) {
        Ok(name) => { marker(name == "nebula", "compiled-param1-ok") }
        Err(_) => { print("fail:compiled-param1") }
      }
      match compiled_route_param1(route, make_request("/hello/")) {
        Ok(_) => { print("fail:missing-param-accepted") }
        Err(msg) => { marker(msg == "request path does not match route pattern", "missing-param-rejected") }
      }
      marker(!compiled_path_matches(route, make_request("/hello/nebula/extra")), "trailing-segment-rejected")
    }
    Err(_) => { print("fail:compile-param1") }
  }

  match compile_route("/literal/healthz") {
    Ok(route) => {
      marker(compiled_path_matches(route, make_request("/literal/healthz")), "literal-route-match-ok")
      marker(!compiled_path_matches(route, make_request("/literal/healthz/")), "literal-trailing-slash-rejected")
    }
    Err(_) => { print("fail:compile-literal") }
  }
}

fn check_malformed_patterns() -> Void {
  match compile_route("v1/:project") {
    Ok(_) => { print("fail:bad-schema-accepted") }
    Err(msg) => { marker(msg == "route pattern must start with '/'", "missing-slash-rejected") }
  }
  match compile_route("/v1/:") {
    Ok(_) => { print("fail:empty-param-accepted") }
    Err(msg) => { marker(msg == "route pattern contains an empty parameter segment", "empty-param-rejected") }
  }
  match compile_route("/v1/:project") {
    Ok(route) => {
      match compiled_route_params2(route, make_request("/v1/nebula")) {
        Ok(_) => { print("fail:wrong-arity-accepted") }
        Err(msg) => {
          marker(msg == "route pattern does not expose the expected parameter count", "wrong-arity-rejected")
        }
      }
    }
    Err(_) => { print("fail:compile-wrong-arity") }
  }
}

fn main() -> Void {
  check_params2()
  check_params3_suffix()
  check_param1_rejections()
  check_malformed_patterns()
}
''', encoding="utf-8")

run = subprocess.run(
    [os.environ["NEBULA_BINARY"], "run", str(root), "--run-gate", "none"],
    capture_output=True,
    text=True,
    check=True,
)
required = [
    "compiled-path-match-ok",
    "compiled-params2-ok",
    "compiled-uncompiled-parity-ok",
    "compiled-params3-suffix-ok",
    "compiled-param1-ok",
    "missing-param-rejected",
    "trailing-segment-rejected",
    "literal-route-match-ok",
    "literal-trailing-slash-rejected",
    "missing-slash-rejected",
    "empty-param-rejected",
    "wrong-arity-rejected",
]
for marker in required:
    if marker not in run.stdout:
        raise SystemExit(f"missing marker {marker!r}: {run.stdout!r}\\nstderr={run.stderr!r}")
if "fail:" in run.stdout or "warning:" in run.stdout or "warning:" in run.stderr:
    raise SystemExit(f"compiled route smoke failed or emitted warning:\\n{run.stdout}\\n{run.stderr}")
print("std-http-compiled-route-fast-path-ok")
PY
"""
expect_rc = 0
expect_stdout_contains = ["std-http-compiled-route-fast-path-ok"]
