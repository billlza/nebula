id = "TST-050-lsp-robust-jsonrpc-parser"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nfrom pathlib import Path\nimport json, os, subprocess, tempfile\nroot = Path(tempfile.mkdtemp(dir='work'))\nfile = root / 'emoji-😀.nb'\nfile.write_text('fn main() -> Int {\\n  return 1\\n}\\n', encoding='utf-8')\nproc = subprocess.Popen([os.environ['NEBULA_BINARY'], 'lsp'], stdin=subprocess.PIPE, stdout=subprocess.PIPE, stderr=subprocess.STDOUT)\n\ndef send_bytes(body: bytes, header_name: str = 'Content-Length'):\n    payload = f'{header_name}: {len(body)}\\r\\n\\r\\n'.encode('ascii') + body\n    proc.stdin.write(payload)\n    proc.stdin.flush()\n\ndef send_json(obj, header_name: str = 'Content-Length', **dump_kwargs):\n    body = json.dumps(obj, **dump_kwargs).encode('utf-8')\n    send_bytes(body, header_name=header_name)\n\ndef recv_text() -> str:\n    header = b''\n    while b'\\r\\n\\r\\n' not in header:\n        chunk = proc.stdout.read(1)\n        if not chunk:\n            raise RuntimeError('lsp closed while waiting for header')\n        header += chunk\n    head, _, rest = header.partition(b'\\r\\n\\r\\n')\n    length = 0\n    for line in head.decode('ascii').split('\\r\\n'):\n        if line.lower().startswith('content-length:'):\n            length = int(line.split(':', 1)[1].strip())\n    body = rest\n    while len(body) < length:\n        chunk = proc.stdout.read(length - len(body))\n        if not chunk:\n            raise RuntimeError('lsp closed while waiting for body')\n        body += chunk\n    return body.decode('utf-8')\n\nuri = 'file://' + str(file.resolve())\nresponses = []\nsend_json({'method': 'initialize', 'id': 'init-1', 'params': {}, 'jsonrpc': '2.0'}, header_name='cOnTeNt-LeNgTh', indent=2)\nresponses.append(recv_text())\nsend_json({'params': {'textDocument': {'version': 1, 'languageId': 'nebula', 'text': file.read_text(encoding='utf-8'), 'uri': uri}}, 'method': 'textDocument/didOpen', 'jsonrpc': '2.0'}, header_name='content-length', indent=2)\nresponses.append(recv_text())\nsend_bytes(b'{\"jsonrpc\":\"2.0\",\"id\":\"bad-parse\",\"method\":', header_name='Content-Length')\nresponses.append(recv_text())\nsend_json({'jsonrpc': '2.0', 'id': 'shutdown-1', 'method': 'shutdown', 'params': {}}, header_name='CONTENT-LENGTH')\nresponses.append(recv_text())\nsend_json({'jsonrpc': '2.0', 'method': 'exit', 'params': {}}, header_name='Content-Length')\nproc.stdin.close()\nproc.wait(timeout=5)\nPath('work/lsp-robust-jsonrpc.out').write_text('\\n'.join(responses), encoding='utf-8')\nraise SystemExit(proc.returncode)\nPY"
expect_rc = 0

[[steps]]
kind = "shell"
run = "grep -F '\"id\":\"init-1\"' work/lsp-robust-jsonrpc.out && grep -F '\"textDocumentSync\":{\"change\":2,\"openClose\":true}' work/lsp-robust-jsonrpc.out && grep -F '\"renameProvider\":true' work/lsp-robust-jsonrpc.out && grep -F '\"workspaceSymbolProvider\":true' work/lsp-robust-jsonrpc.out && grep -F '\"codeActionProvider\":true' work/lsp-robust-jsonrpc.out && grep -F '\"semanticTokensProvider\":{\"full\":true' work/lsp-robust-jsonrpc.out && grep -F '\"hoverProvider\":true' work/lsp-robust-jsonrpc.out && grep -F '\"definitionProvider\":true' work/lsp-robust-jsonrpc.out && grep -F 'emoji-😀.nb' work/lsp-robust-jsonrpc.out && grep -F '\"id\":null' work/lsp-robust-jsonrpc.out && grep -F '\"code\":-32700' work/lsp-robust-jsonrpc.out && grep -F '\"id\":\"shutdown-1\"' work/lsp-robust-jsonrpc.out && grep -F '\"result\":null' work/lsp-robust-jsonrpc.out"
expect_rc = 0
