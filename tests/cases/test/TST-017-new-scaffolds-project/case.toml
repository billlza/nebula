id = "TST-017-new-scaffolds-project"
suite = "test"

[[steps]]
kind = "shell"
run = "$NEBULA_BINARY new work/demo"
expect_rc = 0
must_exist = ["work/demo/nebula.toml", "work/demo/src/main.nb"]

[[steps]]
kind = "nebula"
command = "run"
source = "work/demo"
args = ["--run-gate", "none"]
expect_rc = 0
expect_stdout_contains = ["Hello from Nebula"]
