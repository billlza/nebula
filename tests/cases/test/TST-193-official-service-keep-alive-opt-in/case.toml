id = "TST-193-official-service-keep-alive-opt-in"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport os\nimport shutil\nimport socket\nimport subprocess\nimport sys\nimport time\nfrom pathlib import Path\n\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nsys.path.insert(0, str(repo_root / 'tests' / 'lib'))\nfrom service_probe import fail_with_output, finish_process_output, wait_for_listener_bound\nroot = Path('work/official_service_keep_alive_opt_in')\nshutil.rmtree(root, ignore_errors=True)\n(root / 'src').mkdir(parents=True, exist_ok=True)\n(root / 'nebula.toml').write_text('''schema_version = 1\\n\\n[package]\\nname = \"official-service-keep-alive-opt-in\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n\\n[dependencies]\\nservice = { path = \"''' + str(repo_root / 'official' / 'nebula-service') + '''\" }\\n''', encoding='utf-8')\n(root / 'src' / 'server.nb').write_text('''module server\\nimport service::context\\nimport std::http\\nimport std::result\\n\\nasync fn handle_request(ctx: RequestContext, request: Request) -> Result<Response, String> {\\n  match route_param1(\"/hello/:name\", request) {\\n    Ok(name) => {\\n      return Ok(ok_text(name))\\n    }\\n    Err(msg) => {\\n      return Err(msg)\\n    }\\n  }\\n}\\n''', encoding='utf-8')\n(root / 'src' / 'main.nb').write_text('''module main\\nimport service::config\\nimport service::server\\nimport server\\n\\nasync fn main() -> Void {\\n  match config_from_env(\"svc-keep-alive\", 0) {\\n    Ok(base_cfg) => {\\n      let cfg = with_keep_alive(base_cfg, 200, 2)\\n      match await bind_listener(cfg) {\\n        Ok(listener) => {\\n          match await serve_requests_n_result_with_context(listener, cfg, 2, handle_request) {\\n            Ok(_) => {}\\n            Err(msg) => { print(msg) }\\n          }\\n        }\\n        Err(msg) => { print(msg) }\\n      }\\n    }\\n    Err(msg) => { print(msg) }\\n  }\\n}\\n''', encoding='utf-8')\nsubprocess.run([os.environ['NEBULA_BINARY'], 'update', str(root)], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\nproc = subprocess.Popen([\n    os.environ['NEBULA_BINARY'],\n    'run',\n    str(root),\n    '--run-gate',\n    'none',\n], stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True, env={**os.environ, 'NEBULA_BIND_HOST': '127.0.0.1', 'NEBULA_PORT': '0'})\nstderr_lines = []\n_, port = wait_for_listener_bound(proc, stderr_lines)\n\ndef read_response(sock: socket.socket) -> tuple[str, bytes]:\n    data = b''\n    while b'\\r\\n\\r\\n' not in data:\n        chunk = sock.recv(4096)\n        if not chunk:\n            raise RuntimeError('unexpected EOF while reading response head')\n        data += chunk\n    header_end = data.find(b'\\r\\n\\r\\n')\n    head = data[:header_end].decode('latin1')\n    body = data[header_end + 4:]\n    length = 0\n    for line in head.split('\\r\\n')[1:]:\n        if line.lower().startswith('content-length:'):\n            length = int(line.split(':', 1)[1].strip())\n    while len(body) < length:\n        chunk = sock.recv(4096)\n        if not chunk:\n            break\n        body += chunk\n    return head, body[:length]\n\nclient = None\ntry:\n    deadline = time.time() + 10\n    while time.time() < deadline:\n        try:\n            client = socket.create_connection(('127.0.0.1', port), timeout=0.2)\n            break\n        except OSError:\n            if proc.poll() is not None:\n                fail_with_output(proc, stderr_lines, f'keep-alive service exited before listening: rc={proc.returncode}')\n            time.sleep(0.05)\n    if client is None:\n        fail_with_output(proc, stderr_lines, 'keep-alive service did not start listening in time')\n    client.settimeout(2)\n    client.sendall(b'GET /hello/one HTTP/1.1\\r\\nHost: localhost\\r\\nContent-Length: 0\\r\\n\\r\\n')\n    first_head, first_body = read_response(client)\n    if 'HTTP/1.1 200 OK' not in first_head or 'Connection: keep-alive' not in first_head or first_body.decode('utf-8') != 'one':\n        raise SystemExit(f'unexpected first keep-alive response: {(first_head, first_body)!r}')\n    client.sendall(b'GET /hello/two HTTP/1.1\\r\\nHost: localhost\\r\\nContent-Length: 0\\r\\n\\r\\n')\n    second_head, second_body = read_response(client)\n    if 'HTTP/1.1 200 OK' not in second_head or 'Connection: close' not in second_head or second_body.decode('utf-8') != 'two':\n        raise SystemExit(f'unexpected second keep-alive response: {(second_head, second_body)!r}')\n    trailing = client.recv(1)\n    if trailing != b'':\n        raise SystemExit(f'expected close after second response, got trailing bytes: {trailing!r}')\n    try:\n        proc.wait(timeout=10)\n    except subprocess.TimeoutExpired:\n        raise SystemExit('keep-alive service did not exit after second request')\n    stdout, stderr = finish_process_output(proc, stderr_lines)\n    print(stdout, end='')\n    print(stderr, end='')\n    if proc.returncode != 0:\n        raise SystemExit(proc.returncode)\n    print('service-keep-alive-opt-in-ok')\nfinally:\n    if client is not None:\n        client.close()\n    if proc.poll() is None:\n        proc.terminate()\n        try:\n            proc.wait(timeout=5)\n        except subprocess.TimeoutExpired:\n            proc.kill()\n            proc.wait(timeout=5)\nPY"
expect_rc = 0
expect_stdout_contains = ["service-keep-alive-opt-in-ok"]
