id = "TST-264-release-control-plane-deploy-sidecar-smoke"
suite = "test"
description = "release control plane deploy alias validates targets and drives shell sidecar workflow execution"

[[steps]]
kind = "shell"
run = """
python3 - <<'PY'
import json
import os
import subprocess
import sys
from pathlib import Path

repo_root = Path(os.environ["NEBULA_REPO_ROOT"])
sys.path.insert(0, str(repo_root / "tests" / "lib"))
from release_control_plane_workspace import (
    copy_example,
    fetch_workspace,
    require_success,
    run_ctl,
    start_service,
    terminate_process,
    wait_until_health_ok,
)

binary = os.environ["NEBULA_BINARY"]
root = Path("work/release_control_plane_deploy_sidecar")
state_dir = root / "state"
ctl_out = root / ".ctl-out"
work_dir = root / "shell-work"
shell_allowlist_path = root / "shell-allowlist.json"
deploy_targets_path = root / "deploy-targets.json"
admin_token = "admin-deploy-token"
writer_token = "writer-deploy-token"
reader_token = "reader-deploy-token"
worker_token = "worker-deploy-token"

copy_example(repo_root, root)
fetch_workspace(binary, root)
work_dir.mkdir(parents=True, exist_ok=True)
shell_allowlist_path.write_text(json.dumps({
    "commands": [{
        "id": "deploy-local",
        "program": "/bin/echo",
        "args": ["deploy"],
        "timeout_ms": 1000,
        "max_stdout_bytes": 1024,
        "max_stderr_bytes": 1024,
        "allow_event_args": True,
    }],
}, separators=(",", ":")), encoding="utf-8")
deploy_targets_path.write_text(json.dumps({
    "targets": [{"id": "local", "command_id": "deploy-local", "args": ["local"]}],
}, separators=(",", ":")), encoding="utf-8")

service_env = {
    "APP_STATE_DIR": str(state_dir),
    "APP_SHELL_TASKS_PREVIEW": "1",
    "APP_SHELL_TASK_ALLOWLIST": str(shell_allowlist_path),
    "APP_SHELL_TASK_WORK_DIR": str(work_dir),
    "APP_DISTRIBUTED_DEPLOY_PREVIEW": "1",
    "APP_DEPLOY_TARGET_ALLOWLIST": str(deploy_targets_path),
    "APP_AUTH_REQUIRED": "1",
    "APP_ADMIN_TOKEN": admin_token,
    "APP_WRITE_TOKEN": writer_token,
    "APP_READ_TOKEN": reader_token,
    "APP_WORKER_TOKEN": worker_token,
}

proc, stderr_lines, port = start_service(binary, root, service_env)
try:
    wait_until_health_ok(proc, stderr_lines, port)
    base_url = f"http://127.0.0.1:{port}"
    require_success(run_ctl(binary, root, "control-plane-validate", "--url", base_url, out_dir=ctl_out), "prewarm ctl")

    validate_targets = run_ctl(binary, root, "deploy", "target", "validate", "--file", str(deploy_targets_path), "--json", out_dir=ctl_out, no_build=True)
    require_success(validate_targets, "deploy target validate")
    if json.loads(validate_targets.stdout).get("status") != "ok":
        raise SystemExit(f"deploy target validate payload drifted: {validate_targets.stdout!r}")

    require_success(run_ctl(binary, root, "config", "put", "--app", "control-plane", "--channel", "prod", "--key", "feature.flag", "--bool", "true", "--description", "deploy sidecar", "--url", base_url, "--token", writer_token, "--json", out_dir=ctl_out, no_build=True), "config put")
    require_success(run_ctl(binary, root, "release", "put", "--app", "control-plane", "--channel", "prod", "--version", "2026.04.23", "--config-revision", "1", "--description", "deploy sidecar", "--url", base_url, "--token", writer_token, "--json", out_dir=ctl_out, no_build=True), "release put")

    spec = root / "deploy-workflow.json"
    spec.write_text(json.dumps({
        "trigger_kind": "internal_event",
        "event_kind": "release_apply_requested",
        "stages": [
            {"name": "approval", "kind": "approval_gate", "task_kind": "", "timeout_s": 0, "max_attempts": 0, "depends_on": []},
            {"name": "deploy", "kind": "leased_task", "task_kind": "shell_command", "timeout_s": 30, "max_attempts": 2, "depends_on": ["approval"]},
        ],
    }), encoding="utf-8")
    require_success(run_ctl(binary, root, "workflow", "put", "--app", "control-plane", "--channel", "prod", "--if-match", "1", "--spec-file", str(spec), "--url", base_url, "--token", admin_token, "--json", out_dir=ctl_out, no_build=True), "workflow put deploy shell")
    require_success(run_ctl(binary, root, "approval", "decide", "--app", "control-plane", "--channel", "prod", "--if-match", "1", "--decision", "approved", "--reason", "deploy approved", "--url", base_url, "--token", admin_token, "--json", out_dir=ctl_out, no_build=True), "approval decide")

    submit = run_ctl(binary, root, "deploy", "apply", "--app", "control-plane", "--channel", "prod", "--target", "local", "--event-id", "deploy-event-1", "--release-revision", "1", "--target-file", str(deploy_targets_path), "--url", base_url, "--token", writer_token, "--json", out_dir=ctl_out, no_build=True)
    require_success(submit, "deploy apply submit")
    submit_payload = json.loads(submit.stdout)
    run_id = submit_payload.get("run", {}).get("run_id")
    if submit_payload.get("outcome") != "created" or run_id <= 0:
        raise SystemExit(f"deploy apply did not create workflow run: {submit_payload!r}")

    sidecar = run_ctl(binary, root, "shell", "worker", "run-once", "--worker-id", "deploy-worker", "--allowlist-file", str(shell_allowlist_path), "--work-dir", str(work_dir), "--url", base_url, "--token", worker_token, "--json", out_dir=ctl_out, no_build=True)
    require_success(sidecar, "deploy shell worker run-once")
    completed = json.loads(sidecar.stdout).get("run", {})
    if completed.get("meta", {}).get("status") != "completed":
        raise SystemExit(f"deploy workflow did not complete: {completed!r}")

    run_view = run_ctl(binary, root, "workflow", "run", "--app", "control-plane", "--channel", "prod", "--run-id", str(run_id), "--url", base_url, "--token", reader_token, "--json", out_dir=ctl_out, no_build=True)
    require_success(run_view, "workflow run view")
    stages = json.loads(run_view.stdout).get("run", {}).get("meta", {}).get("stages", [])
    deploy_stage = next((stage for stage in stages if stage.get("stage_name") == "deploy"), {})
    payload_out = deploy_stage.get("meta", {}).get("result_payload", {})
    if payload_out.get("kind") != "shell_task_result" or payload_out.get("stdout") != "deploy local\\n" or payload_out.get("exit_code") != 0:
        raise SystemExit(f"unexpected deploy result payload: {payload_out!r}")
finally:
    terminate_process(proc)

service_binary = root / ".service-out" / "main.out"
missing_env = {
    **os.environ,
    "NEBULA_BIND_HOST": "127.0.0.1",
    "NEBULA_PORT": "0",
    "APP_STATE_DIR": str(root / "state-deploy-missing"),
    "APP_DISTRIBUTED_DEPLOY_PREVIEW": "1",
    "APP_AUTH_REQUIRED": "1",
    "APP_ADMIN_TOKEN": admin_token,
    "APP_WRITE_TOKEN": writer_token,
    "APP_READ_TOKEN": reader_token,
    "APP_WORKER_TOKEN": worker_token,
}
failed_start = subprocess.run([str(service_binary)], capture_output=True, text=True, env=missing_env, timeout=10)
if failed_start.returncode == 0:
    raise SystemExit("distributed deploy preview unexpectedly started without target allowlist")
if "startup preflight failed: distributed_deploy_orchestration preview requires APP_DEPLOY_TARGET_ALLOWLIST" not in failed_start.stdout:
    print(failed_start.stdout, end="")
    print(failed_start.stderr, end="")
    raise SystemExit("missing distributed deploy target allowlist diagnostic")

print("release-control-plane-deploy-sidecar-ok")
PY
"""
expect_rc = 0
expect_stdout_contains = ["release-control-plane-deploy-sidecar-ok"]
