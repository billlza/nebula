id = "TST-267-release-control-plane-postgres-data-plane-smoke"
suite = "test"
description = "release control plane can opt into the official Postgres data plane while SQLite remains default"

[[steps]]
kind = "shell"
timeout = 240
run = """
python3 - <<'PY'
import json
import os
import subprocess
import sys
import time
from pathlib import Path

repo_root = Path(os.environ["NEBULA_REPO_ROOT"])
sys.path.insert(0, str(repo_root / "tests" / "lib"))
from release_control_plane_workspace import (
    build_service_binary,
    copy_example,
    fetch_workspace,
    require_success,
    run_ctl,
    start_service,
    terminate_process,
    wait_until_health_ok,
)

binary = os.environ["NEBULA_BINARY"]
root = Path("work/release_control_plane_postgres_data_plane")
state_dir = root / "state"
ctl_out = root / ".ctl-out"
admin_token = "admin-postgres-data-token"
writer_token = "writer-postgres-data-token"
reader_token = "reader-postgres-data-token"
worker_token = "worker-postgres-data-token"

copy_example(repo_root, root)
fetch_workspace(binary, root)
service_binary = build_service_binary(binary, root)

base_env = {
    **os.environ,
    "NEBULA_BIND_HOST": "127.0.0.1",
    "NEBULA_PORT": "0",
}

missing_preview = subprocess.run([str(service_binary)], capture_output=True, text=True, env={
    **base_env,
    "APP_STATE_DIR": str(state_dir / "missing-preview"),
    "APP_DATA_BACKEND": "postgres",
    "APP_AUTH_REQUIRED": "1",
    "APP_ADMIN_TOKEN": admin_token,
    "APP_WRITE_TOKEN": writer_token,
    "APP_READ_TOKEN": reader_token,
    "APP_WORKER_TOKEN": worker_token,
    "APP_POSTGRES_DSN": "postgresql://127.0.0.1:1/nebula_preview",
}, timeout=10)
if missing_preview.returncode == 0 or "startup preflight failed: APP_DATA_BACKEND=postgres requires APP_POSTGRES_PREVIEW=1" not in missing_preview.stdout:
    print(missing_preview.stdout, end="")
    print(missing_preview.stderr, end="")
    raise SystemExit("missing APP_DATA_BACKEND postgres preview diagnostic")

missing_auth = subprocess.run([str(service_binary)], capture_output=True, text=True, env={
    **base_env,
    "APP_STATE_DIR": str(state_dir / "missing-auth"),
    "APP_DATA_BACKEND": "postgres",
    "APP_POSTGRES_PREVIEW": "1",
    "APP_POSTGRES_DSN": "postgresql://127.0.0.1:1/nebula_preview",
}, timeout=10)
if missing_auth.returncode == 0 or "startup preflight failed: postgres preview requires APP_AUTH_REQUIRED=1" not in missing_auth.stdout:
    print(missing_auth.stdout, end="")
    print(missing_auth.stderr, end="")
    raise SystemExit("missing postgres auth diagnostic")

missing_dsn = subprocess.run([str(service_binary)], capture_output=True, text=True, env={
    **base_env,
    "APP_STATE_DIR": str(state_dir / "missing-dsn"),
    "APP_DATA_BACKEND": "postgres",
    "APP_POSTGRES_PREVIEW": "1",
    "APP_AUTH_REQUIRED": "1",
    "APP_ADMIN_TOKEN": admin_token,
    "APP_WRITE_TOKEN": writer_token,
    "APP_READ_TOKEN": reader_token,
    "APP_WORKER_TOKEN": worker_token,
}, timeout=10)
if missing_dsn.returncode == 0 or "startup preflight failed: postgres preview requires APP_POSTGRES_DSN or APP_POSTGRES_DSN_FILE" not in missing_dsn.stdout:
    print(missing_dsn.stdout, end="")
    print(missing_dsn.stderr, end="")
    raise SystemExit("missing postgres DSN diagnostic")

dsn = os.environ.get("NEBULA_TEST_POSTGRES_DSN", "")
if not dsn:
    print("release-control-plane-postgres-live-skip")
    print("release-control-plane-postgres-data-plane-ok")
    raise SystemExit(0)

run_id_suffix = str(int(time.time() * 1000))
app_name = "pg-smoke-" + run_id_suffix
dsn_file = root / "postgres.dsn"
dsn_file.write_text(dsn, encoding="utf-8")
service_env = {
    "APP_STATE_DIR": str(state_dir / "live"),
    "APP_DATA_BACKEND": "postgres",
    "APP_POSTGRES_PREVIEW": "1",
    "APP_POSTGRES_DSN_FILE": str(dsn_file),
    "APP_AUTH_REQUIRED": "1",
    "APP_ADMIN_TOKEN": admin_token,
    "APP_WRITE_TOKEN": writer_token,
    "APP_READ_TOKEN": reader_token,
    "APP_WORKER_TOKEN": worker_token,
}

proc, stderr_lines, port = start_service(binary, root, service_env)
try:
    wait_until_health_ok(proc, stderr_lines, port)
    base_url = f"http://127.0.0.1:{port}"
    require_success(run_ctl(binary, root, "control-plane-validate", "--url", base_url, out_dir=ctl_out), "prewarm ctl")

    require_success(run_ctl(binary, root, "config", "put", "--app", app_name, "--channel", "prod", "--key", "feature.flag", "--bool", "true", "--description", "postgres data plane", "--url", base_url, "--token", writer_token, "--json", out_dir=ctl_out, no_build=True), "config put")
    list_config = run_ctl(binary, root, "config", "list", "--app", app_name, "--channel", "prod", "--url", base_url, "--token", reader_token, "--json", out_dir=ctl_out, no_build=True)
    require_success(list_config, "config list")
    entries = json.loads(list_config.stdout).get("entries", [])
    if len(entries) != 1 or entries[0].get("key") != "feature.flag":
        raise SystemExit(f"unexpected postgres config list: {entries!r}")

    require_success(run_ctl(binary, root, "release", "put", "--app", app_name, "--channel", "prod", "--version", "2026.04.23", "--config-revision", "1", "--description", "postgres data plane", "--url", base_url, "--token", writer_token, "--json", out_dir=ctl_out, no_build=True), "release put")
    spec = root / "postgres-workflow.json"
    spec.write_text(json.dumps({
        "trigger_kind": "internal_event",
        "event_kind": "release_apply_requested",
        "stages": [
            {"name": "approval", "kind": "approval_gate", "task_kind": "", "timeout_s": 0, "max_attempts": 0, "depends_on": []},
            {"name": "apply", "kind": "leased_task", "task_kind": "apply_release", "timeout_s": 30, "max_attempts": 2, "depends_on": ["approval"]},
        ],
    }), encoding="utf-8")
    require_success(run_ctl(binary, root, "workflow", "put", "--app", app_name, "--channel", "prod", "--if-match", "1", "--spec-file", str(spec), "--url", base_url, "--token", admin_token, "--json", out_dir=ctl_out, no_build=True), "workflow put")
    require_success(run_ctl(binary, root, "approval", "decide", "--app", app_name, "--channel", "prod", "--if-match", "1", "--decision", "approved", "--reason", "postgres approved", "--url", base_url, "--token", admin_token, "--json", out_dir=ctl_out, no_build=True), "approval decide")

    submit = run_ctl(binary, root, "workflow", "event", "submit", "--app", app_name, "--channel", "prod", "--event-id", "pg-event-" + run_id_suffix, "--event-kind", "release_apply_requested", "--release-revision", "1", "--url", base_url, "--token", writer_token, "--json", out_dir=ctl_out, no_build=True)
    require_success(submit, "workflow event submit")
    run_id = json.loads(submit.stdout).get("run", {}).get("run_id")
    claim = run_ctl(binary, root, "worker", "claim", "--worker-id", "pg-worker", "--task-kind", "apply_release", "--url", base_url, "--token", worker_token, "--json", out_dir=ctl_out, no_build=True)
    require_success(claim, "worker claim")
    lease_id = json.loads(claim.stdout).get("lease", {}).get("lease_id")
    complete = run_ctl(binary, root, "worker", "complete", "--worker-id", "pg-worker", "--lease-id", lease_id, "--status", "succeeded", "--message", "postgres applied", "--url", base_url, "--token", worker_token, "--json", out_dir=ctl_out, no_build=True)
    require_success(complete, "worker complete")
    completed = json.loads(complete.stdout).get("run", {})
    if completed.get("meta", {}).get("status") != "completed" or completed.get("run_id") != run_id:
        raise SystemExit(f"unexpected completed postgres workflow run: {completed!r}")
    audit = run_ctl(binary, root, "audit", "list", "--app", app_name, "--channel", "prod", "--url", base_url, "--token", reader_token, "--json", out_dir=ctl_out, no_build=True)
    require_success(audit, "audit list")
    if len(json.loads(audit.stdout).get("events", [])) <= 0:
        raise SystemExit("postgres audit list was empty")
finally:
    terminate_process(proc)

print("release-control-plane-postgres-live-ok")
print("release-control-plane-postgres-data-plane-ok")
PY
"""
expect_rc = 0
expect_stdout_contains = ["release-control-plane-postgres-data-plane-ok"]
