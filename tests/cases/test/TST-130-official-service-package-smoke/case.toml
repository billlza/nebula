id = "TST-130-official-service-package-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport os\nfrom pathlib import Path\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nroot = Path('work/official_service_smoke')\n(root / 'src').mkdir(parents=True, exist_ok=True)\n(root / 'nebula.toml').write_text('''schema_version = 1\\n\\n[package]\\nname = \"official-service-smoke\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n\\n[dependencies]\\nservice = { path = \"''' + str(repo_root / 'official' / 'nebula-service') + '''\" }\\n''', encoding='utf-8')\n(root / 'src' / 'server.nb').write_text('''module server\\nimport service::health\\nimport std::http\\n\\nfn service_name() -> String {\\n  return \"svc-smoke\"\\n}\\n\\nasync fn handle_request(request: Request) -> Response {\\n  if path_matches(\"/healthz\", request) {\\n    return live_response(service_name())\\n  }\\n  return not_found_text(\"not-found\")\\n}\\n''', encoding='utf-8')\n(root / 'src' / 'main.nb').write_text('''module main\\nimport server\\nimport service::config\\nimport service::server\\nimport std::http\\nimport std::net\\nimport std::result\\nimport std::task\\nimport std::time\\n\\nasync fn main() -> Void {\\n  match config_from_env(\"svc-smoke\", 40494) {\\n    Ok(cfg) => {\\n      match await bind_listener(cfg) {\\n        Ok(listener) => {\\n          match listener.local_addr() {\\n            Ok(addr) => {\\n              let task = spawn(serve_requests_n(listener, cfg, 1, handle_request))\\n              await sleep(millis(1))\\n              match await connect(addr) {\\n                Ok(stream) => {\\n                  let req = get_request(\"localhost\", \"/healthz\")\\n                  match await stream.write_request(req) {\\n                    Ok(_) => {\\n                      match await stream.read_response() {\\n                        Ok(resp) => {\\n                          stream.close()\\n                          listener.close()\\n                          match await join(task) {\\n                            Ok(_) => {\\n                              if resp.status == 200 && resp.content_type == \"application/json; charset=utf-8\" {\\n                                print(\"official-service-ok\")\\n                              } else {\\n                                print(\"official-service-bad\")\\n                              }\\n                            }\\n                            Err(msg) => {\\n                              print(msg)\\n                            }\\n                          }\\n                        }\\n                        Err(msg) => {\\n                          print(msg)\\n                        }\\n                      }\\n                    }\\n                    Err(msg) => {\\n                      print(msg)\\n                    }\\n                  }\\n                }\\n                Err(msg) => {\\n                  print(msg)\\n                }\\n              }\\n            }\\n            Err(msg) => {\\n              print(msg)\\n            }\\n          }\\n        }\\n        Err(msg) => {\\n          print(msg)\\n        }\\n      }\\n    }\\n    Err(msg) => {\\n      print(msg)\\n    }\\n  }\\n}\\n''', encoding='utf-8')\nPY"
expect_rc = 0

[[steps]]
kind = "shell"
run = "\"$NEBULA_BINARY\" fetch work/official_service_smoke"
expect_rc = 0

[[steps]]
kind = "shell"
run = "NEBULA_BIND_HOST=127.0.0.1 NEBULA_PORT=0 \"$NEBULA_BINARY\" run work/official_service_smoke --run-gate none"
expect_rc = 0
expect_stdout_contains = ["official-service-ok"]
