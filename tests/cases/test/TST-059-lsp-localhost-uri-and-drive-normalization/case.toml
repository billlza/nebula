id = "TST-059-lsp-localhost-uri-and-drive-normalization"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nfrom pathlib import Path\nimport json, os, subprocess, tempfile\nroot = Path(tempfile.mkdtemp(dir='work'))\nfile = root / 'localhost-path.nb'\nfile.write_text('extern fn host_add(a: Int, b: Int) -> Int\\n\\nfn main() -> Int {\\n  return host_add(1, 2)\\n}\\n', encoding='utf-8')\nuri = file.resolve().as_uri()\nlocalhost_uri = uri.replace('file:///', 'file://localhost/', 1)\nif os.name == 'nt':\n    prefix = 'file://localhost/'\n    if localhost_uri.startswith(prefix) and len(localhost_uri) > len(prefix) + 1 and localhost_uri[len(prefix) + 1] == ':':\n        localhost_uri = prefix + localhost_uri[len(prefix)].lower() + localhost_uri[len(prefix) + 1:]\nproc = subprocess.Popen([os.environ['NEBULA_BINARY'], 'lsp'], stdin=subprocess.PIPE, stdout=subprocess.PIPE, stderr=subprocess.STDOUT)\n\ndef send(obj):\n    body = json.dumps(obj, separators=(',', ':')).encode('utf-8')\n    proc.stdin.write(f'Content-Length: {len(body)}\\r\\n\\r\\n'.encode('ascii') + body)\n    proc.stdin.flush()\n\ndef recv():\n    header = b''\n    while b'\\r\\n\\r\\n' not in header:\n        chunk = proc.stdout.read(1)\n        if not chunk:\n            raise RuntimeError('lsp closed while waiting for header')\n        header += chunk\n    head, _, rest = header.partition(b'\\r\\n\\r\\n')\n    length = 0\n    for line in head.decode('ascii').split('\\r\\n'):\n        if line.lower().startswith('content-length:'):\n            length = int(line.split(':', 1)[1].strip())\n    body = rest\n    while len(body) < length:\n        chunk = proc.stdout.read(length - len(body))\n        if not chunk:\n            raise RuntimeError('lsp closed while waiting for body')\n        body += chunk\n    return body.decode('utf-8')\n\nresponses = []\nfor msg in [\n    {'jsonrpc': '2.0', 'id': 1, 'method': 'initialize', 'params': {}},\n    {'jsonrpc': '2.0', 'method': 'textDocument/didOpen', 'params': {'textDocument': {'uri': localhost_uri, 'languageId': 'nebula', 'version': 1, 'text': file.read_text(encoding='utf-8')}}},\n    {'jsonrpc': '2.0', 'id': 2, 'method': 'textDocument/definition', 'params': {'textDocument': {'uri': localhost_uri}, 'position': {'line': 3, 'character': 10}}},\n    {'jsonrpc': '2.0', 'id': 3, 'method': 'shutdown', 'params': {}},\n]:\n    send(msg)\n    responses.append(recv())\nsend({'jsonrpc': '2.0', 'method': 'exit', 'params': {}})\nproc.stdin.close()\nproc.wait(timeout=5)\nPath('work/lsp-localhost-uri.out').write_text('\\n'.join(responses), encoding='utf-8')\nraise SystemExit(proc.returncode)\nPY"
expect_rc = 0

[[steps]]
kind = "shell"
run = "grep -F 'publishDiagnostics' work/lsp-localhost-uri.out && grep -F '\"id\":2' work/lsp-localhost-uri.out && grep -F '\"range\":' work/lsp-localhost-uri.out && grep -F '\"uri\":\"file://' work/lsp-localhost-uri.out"
expect_rc = 0
