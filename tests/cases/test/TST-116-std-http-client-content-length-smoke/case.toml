id = "TST-116-std-http-client-content-length-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport os\nimport platform\nimport queue\nimport socket\nimport subprocess\nimport threading\nfrom pathlib import Path\n\nif platform.system().lower().startswith('windows'):\n    print('http-client-skip-unsupported-host')\n    raise SystemExit(0)\n\nroot = Path('work/http_client_content_length')\napp = root / 'app'\n(app / 'src').mkdir(parents=True, exist_ok=True)\n\nport_q: queue.Queue[int] = queue.Queue()\ndone_q: queue.Queue[object] = queue.Queue()\n\ndef recv_exact_body(conn, header_bytes: bytes) -> tuple[bytes, bytes]:\n    header_end = header_bytes.find(b'\\r\\n\\r\\n')\n    head = header_bytes[:header_end].decode('utf-8')\n    body = header_bytes[header_end + 4:]\n    length = 0\n    for line in head.split('\\r\\n')[1:]:\n        if line.lower().startswith('content-length:'):\n            length = int(line.split(':', 1)[1].strip())\n    while len(body) < length:\n        chunk = conn.recv(4096)\n        if not chunk:\n            break\n        body += chunk\n    return head.encode('utf-8'), body\n\ndef serve() -> None:\n    try:\n        with socket.socket(socket.AF_INET, socket.SOCK_STREAM) as sock:\n            sock.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)\n            sock.bind(('127.0.0.1', 0))\n            sock.listen(1)\n            sock.settimeout(60)\n            port_q.put(sock.getsockname()[1])\n            conn, _ = sock.accept()\n            with conn:\n                conn.settimeout(60)\n                data = b''\n                while b'\\r\\n\\r\\n' not in data:\n                    chunk = conn.recv(4096)\n                    if not chunk:\n                        break\n                    data += chunk\n                head_bytes, body = recv_exact_body(conn, data)\n                head = head_bytes.decode('utf-8')\n                if not head.startswith('POST /api HTTP/1.1\\r\\n'):\n                    raise RuntimeError('unexpected request line: ' + head.split('\\r\\n', 1)[0])\n                if '\\r\\nHost: 127.0.0.1:' not in head:\n                    raise RuntimeError('missing Host header')\n                if '\\r\\nX-Token: secret\\r\\n' not in head:\n                    raise RuntimeError('missing X-Token header')\n                if '\\r\\nContent-Type: text/plain\\r\\n' not in head:\n                    raise RuntimeError('missing Content-Type header')\n                if body != b'ping':\n                    raise RuntimeError('unexpected body: ' + repr(body))\n                response = (\n                    b'HTTP/1.1 200 OK\\r\\n'\n                    b'Content-Length: 9\\r\\n'\n                    b'Content-Type: text/plain\\r\\n'\n                    b'X-Reply: ok\\r\\n'\n                    b'Connection: close\\r\\n\\r\\n'\n                    b'client-ok'\n                )\n                conn.sendall(response)\n        done_q.put(None)\n    except Exception as exc:\n        done_q.put(exc)\n\nthread = threading.Thread(target=serve, daemon=True)\nthread.start()\nport = port_q.get(timeout=10)\n\n(app / 'nebula.toml').write_text('''schema_version = 1\\n\\n[package]\\nname = \"http-client-content-length\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n''', encoding='utf-8')\n(app / 'src' / 'main.nb').write_text(f'''module main\\nimport std::bytes\\nimport std::http\\nimport std::net\\n\\nasync fn main() -> Void {{\\n  match ipv4(\"127.0.0.1\", {port}) {{\\n    Ok(addr) => {{\\n      match await connect(addr) {{\\n        Ok(stream) => {{\\n          match request1(Post, \"127.0.0.1:{port}\", \"/api\", \"text/plain\", from_string(\"ping\"), \"X-Token\", \"secret\") {{\\n            Ok(req) => {{\\n              match await stream.write_request(req) {{\\n                Ok(_) => {{\\n                  match await stream.read_response() {{\\n                    Ok(resp) => {{\\n                      if resp.status == 200 && resp.content_type == \"text/plain\" {{\\n                        match response_header(resp, \"X-Reply\") {{\\n                          Ok(value) => {{\\n                            if value == \"ok\" && to_string(resp.body) == \"client-ok\" {{\\n                              print(\"http-client-ok\")\\n                            }} else {{\\n                              print(\"http-client-bad\")\\n                            }}\\n                          }}\\n                          Err(msg) => {{\\n                            print(msg)\\n                          }}\\n                        }}\\n                      }} else {{\\n                        print(\"http-client-bad\")\\n                      }}\\n                    }}\\n                    Err(msg) => {{\\n                      print(msg)\\n                    }}\\n                  }}\\n                }}\\n                Err(msg) => {{\\n                  print(msg)\\n                }}\\n              }}\\n            }}\\n            Err(msg) => {{\\n              print(msg)\\n            }}\\n          }}\\n        }}\\n        Err(msg) => {{\\n          print(msg)\\n        }}\\n      }}\\n    }}\\n    Err(msg) => {{\\n      print(msg)\\n    }}\\n  }}\\n}}\\n''', encoding='utf-8')\n\nupdate = subprocess.run([os.environ['NEBULA_BINARY'], 'update', str(app)], capture_output=True, text=True, env=os.environ.copy())\nprint(update.stdout, end='')\nprint(update.stderr, end='')\nif update.returncode != 0:\n    raise SystemExit(update.returncode)\nrun = subprocess.run([os.environ['NEBULA_BINARY'], 'run', str(app), '--run-gate', 'none'], capture_output=True, text=True, env=os.environ.copy())\nprint(run.stdout, end='')\nprint(run.stderr, end='')\nif run.returncode != 0:\n    raise SystemExit(run.returncode)\nserver_result = done_q.get(timeout=60)\nif server_result is not None:\n    raise server_result\nif 'http-client-ok' not in run.stdout:\n    raise SystemExit('http-client-ok missing from output')\nPY"
expect_rc = 0
