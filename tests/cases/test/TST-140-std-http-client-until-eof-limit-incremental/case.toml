id = "TST-140-std-http-client-until-eof-limit-incremental"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport os\nimport platform\nimport queue\nimport socket\nimport subprocess\nimport threading\nimport time\nfrom pathlib import Path\n\nif platform.system().lower().startswith('windows'):\n    print('http-until-eof-skip-unsupported-host')\n    raise SystemExit(0)\n\nroot = Path('work/http_client_until_eof_limit')\napp = root / 'app'\n(app / 'src').mkdir(parents=True, exist_ok=True)\n\nport_q: queue.Queue[int] = queue.Queue()\ndone_q: queue.Queue[object] = queue.Queue()\n\ndef serve() -> None:\n    try:\n        with socket.socket(socket.AF_INET, socket.SOCK_STREAM) as sock:\n            sock.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)\n            sock.bind(('127.0.0.1', 0))\n            sock.listen(1)\n            sock.settimeout(60)\n            port_q.put(sock.getsockname()[1])\n            conn, _ = sock.accept()\n            with conn:\n                conn.settimeout(60)\n                data = b''\n                while b'\\r\\n\\r\\n' not in data:\n                    chunk = conn.recv(4096)\n                    if not chunk:\n                        break\n                    data += chunk\n                if not data.startswith(b'GET /close-delimited HTTP/1.1\\r\\n'):\n                    raise RuntimeError('unexpected request line')\n                conn.sendall(\n                    b'HTTP/1.1 200 OK\\r\\n'\n                    b'Content-Type: text/plain\\r\\n'\n                    b'Connection: close\\r\\n\\r\\n'\n                    b'toolong'\n                )\n                time.sleep(0.4)\n        done_q.put(None)\n    except Exception as exc:\n        done_q.put(exc)\n\nthread = threading.Thread(target=serve, daemon=True)\nthread.start()\nport = port_q.get(timeout=10)\n\n(app / 'nebula.toml').write_text('''schema_version = 1\\n\\n[package]\\nname = \"http-client-until-eof-limit\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n''', encoding='utf-8')\n(app / 'src' / 'main.nb').write_text(f'''module main\\nimport std::bytes\\nimport std::http\\nimport std::net\\nimport std::task\\nimport std::time\\n\\nasync fn main() -> Void {{\\n  match ipv4(\"127.0.0.1\", {port}) {{\\n    Ok(addr) => {{\\n      match await connect(addr) {{\\n        Ok(stream) => {{\\n          let req = get_request(\"127.0.0.1:{port}\", \"/close-delimited\")\\n          match await stream.write_request(req) {{\\n            Ok(_) => {{\\n              match await timeout(millis(100), stream.read_response_limited(8192, 4)) {{\\n                Ok(outcome) => {{\\n                  match outcome {{\\n                    Ok(_) => {{ print(\"until-eof-limit-bad\") }}\\n                    Err(msg) => {{\\n                      print(msg)\\n                      if msg == \"HTTP response body exceeds configured limit\" {{\\n                        print(\"until-eof-limit-ok\")\\n                      }}\\n                    }}\\n                  }}\\n                }}\\n                Err(msg) => {{ print(msg) }}\\n              }}\\n            }}\\n            Err(msg) => {{ print(msg) }}\\n          }}\\n          stream.close()\\n        }}\\n        Err(msg) => {{ print(msg) }}\\n      }}\\n    }}\\n    Err(msg) => {{ print(msg) }}\\n  }}\\n}}\\n''', encoding='utf-8')\n\nupdate = subprocess.run([os.environ['NEBULA_BINARY'], 'update', str(app)], capture_output=True, text=True, env=os.environ.copy())\nprint(update.stdout, end='')\nprint(update.stderr, end='')\nif update.returncode != 0:\n    raise SystemExit(update.returncode)\nrun = subprocess.run([os.environ['NEBULA_BINARY'], 'run', str(app), '--run-gate', 'none'], capture_output=True, text=True, env=os.environ.copy())\nprint(run.stdout, end='')\nprint(run.stderr, end='')\nif run.returncode != 0:\n    raise SystemExit(run.returncode)\nserver_result = done_q.get(timeout=60)\nif server_result is not None:\n    raise server_result\nif 'until-eof-limit-ok' not in run.stdout:\n    raise SystemExit('until-eof-limit-ok missing from output')\nif 'timeout' in run.stdout:\n    raise SystemExit('close-delimited limit check waited for EOF instead of failing incrementally')\nPY"
expect_rc = 0
