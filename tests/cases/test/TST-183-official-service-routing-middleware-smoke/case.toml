id = "TST-183-official-service-routing-middleware-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport http.client\nimport json\nimport os\nimport selectors\nimport shutil\nimport subprocess\nimport time\nfrom pathlib import Path\n\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nroot = Path('work/official_service_routing_middleware')\nshutil.rmtree(root, ignore_errors=True)\n(root / 'src').mkdir(parents=True, exist_ok=True)\ndrain_file = root / 'routing.draining'\n(root / 'nebula.toml').write_text('''schema_version = 1\\n\\n[package]\\nname = \"official-service-routing-middleware\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n\\n[dependencies]\\nservice = { path = \"''' + str(repo_root / 'official' / 'nebula-service') + '''\" }\\n''', encoding='utf-8')\n(root / 'src' / 'server.nb').write_text('''module server\\nimport service::context\\nimport service::health\\nimport service::middleware\\nimport service::routing\\nimport std::http\\nimport std::result\\n\\nasync fn handle_request(ctx: RequestContext, request: Request) -> Result<Response, String> {\\n  return await dispatch_ctx4_result(\\n    ctx,\\n    request,\\n    Get,\\n    \"/healthz\",\\n    handle_health_route,\\n    Get,\\n    \"/readyz\",\\n    handle_ready_route,\\n    Get,\\n    \"/hello/:name\",\\n    handle_hello_route,\\n    Post,\\n    \"/echo\",\\n    handle_echo_route,\\n    not_found_text(\"not found\")\\n  )\\n}\\n\\nasync fn handle_health_route(ctx: RequestContext, request: Request) -> Result<Response, String> {\\n  return Ok(live_response_with_context(ctx))\\n}\\n\\nasync fn handle_ready_route(ctx: RequestContext, request: Request) -> Result<Response, String> {\\n  if ctx.is_draining() {\\n    return Ok(draining_response_with_context(ctx))\\n  }\\n  return Ok(ready_response_with_context(ctx))\\n}\\n\\nasync fn handle_hello_route(ctx: RequestContext, request: Request) -> Result<Response, String> {\\n  return await reject_when_draining_result(ctx, request, handle_hello_route_inner)\\n}\\n\\nasync fn handle_hello_route_inner(ctx: RequestContext, request: Request) -> Result<Response, String> {\\n  match route_param1(\"/hello/:name\", request) {\\n    Ok(name) => {\\n      return Ok(ok_text(name))\\n    }\\n    Err(msg) => {\\n      return Err(msg)\\n    }\\n  }\\n}\\n\\nasync fn handle_echo_route(ctx: RequestContext, request: Request) -> Result<Response, String> {\\n  return Ok(ok_text(\"echo\"))\\n}\\n''', encoding='utf-8')\n(root / 'src' / 'main.nb').write_text('''module main\\nimport service::config\\nimport service::drain\\nimport service::server\\nimport server\\n\\nasync fn main() -> Void {\\n  match config_from_env(\"svc-routing-middleware\", 0) {\\n    Ok(cfg) => {\\n      match from_env() {\\n        Ok(drain_cfg) => {\\n          match await bind_listener(cfg) {\\n            Ok(listener) => {\\n              match await serve_requests_result_until_drained(listener, cfg, drain_cfg, handle_request) {\\n                Ok(_) => {}\\n                Err(msg) => { print(msg) }\\n              }\\n            }\\n            Err(msg) => { print(msg) }\\n          }\\n        }\\n        Err(msg) => { print(msg) }\\n      }\\n    }\\n    Err(msg) => { print(msg) }\\n  }\\n}\\n''', encoding='utf-8')\nsubprocess.run([os.environ['NEBULA_BINARY'], 'update', str(root)], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\nproc = subprocess.Popen([\n    os.environ['NEBULA_BINARY'],\n    'run',\n    str(root),\n    '--run-gate',\n    'none',\n], stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True, env={**os.environ, 'NEBULA_BIND_HOST': '127.0.0.1', 'NEBULA_PORT': '0', 'NEBULA_DRAIN_FILE': str(drain_file), 'NEBULA_DRAIN_POLL_MS': '100'})\nselector = selectors.DefaultSelector()\nselector.register(proc.stderr, selectors.EVENT_READ)\nstderr_lines = []\n\ndef flush_failure(message: str) -> None:\n    stdout, stderr = proc.communicate(timeout=20)\n    stderr_lines.append(stderr)\n    print(stdout, end='')\n    print(''.join(stderr_lines), end='')\n    raise SystemExit(message)\n\ndef read_observe_until(deadline: float, event_name: str):\n    while time.time() < deadline:\n        if proc.poll() is not None:\n            flush_failure(f'service exited early while waiting for {event_name}: rc={proc.returncode}')\n        events = selector.select(timeout=0.05)\n        if not events:\n            continue\n        for key, _ in events:\n            line = key.fileobj.readline()\n            if not line:\n                continue\n            stderr_lines.append(line)\n            stripped = line.strip()\n            json_start = stripped.find('{')\n            if json_start < 0:\n                continue\n            try:\n                payload = json.loads(stripped[json_start:])\n            except json.JSONDecodeError:\n                continue\n            if payload.get('event') == event_name:\n                return payload\n    flush_failure(f'timed out waiting for {event_name}')\n\nbound = read_observe_until(time.time() + 30, 'listener_bound')\nactual_port = bound.get('port')\nif not isinstance(actual_port, int) or actual_port <= 0:\n    flush_failure(f'invalid listener_bound port: {bound!r}')\n\ntry:\n    deadline = time.time() + 20\n    ready = False\n    while time.time() < deadline:\n        if proc.poll() is not None:\n            flush_failure(f'routing-middleware service exited before ready: rc={proc.returncode}')\n        try:\n            conn = http.client.HTTPConnection('127.0.0.1', actual_port, timeout=1)\n            conn.request('GET', '/healthz')\n            resp = conn.getresponse()\n            body = resp.read().decode('utf-8')\n            conn.close()\n            if resp.status == 200 and '\"status\":\"ok\"' in body:\n                ready = True\n                break\n        except Exception:\n            time.sleep(0.1)\n    if not ready:\n        flush_failure('routing-middleware service did not become ready')\n\n    conn = http.client.HTTPConnection('127.0.0.1', actual_port, timeout=2)\n    conn.request('GET', '/readyz')\n    resp = conn.getresponse()\n    body = resp.read().decode('utf-8')\n    conn.close()\n    if resp.status != 200 or '\"status\":\"ready\"' not in body:\n        raise SystemExit(f'unexpected readyz response: {(resp.status, body)!r}')\n\n    conn = http.client.HTTPConnection('127.0.0.1', actual_port, timeout=2)\n    conn.request('GET', '/hello/nebula')\n    resp = conn.getresponse()\n    body = resp.read().decode('utf-8')\n    conn.close()\n    if resp.status != 200 or body != 'nebula':\n        raise SystemExit(f'unexpected hello response: {(resp.status, body)!r}')\n\n    conn = http.client.HTTPConnection('127.0.0.1', actual_port, timeout=2)\n    conn.request('POST', '/hello/nebula', body='x', headers={'Content-Type': 'text/plain; charset=utf-8'})\n    resp = conn.getresponse()\n    body = resp.read().decode('utf-8')\n    conn.close()\n    if resp.status != 405 or body != 'method not allowed':\n        raise SystemExit(f'unexpected method-not-allowed response: {(resp.status, body)!r}')\n\n    conn = http.client.HTTPConnection('127.0.0.1', actual_port, timeout=2)\n    conn.request('GET', '/missing')\n    resp = conn.getresponse()\n    body = resp.read().decode('utf-8')\n    conn.close()\n    if resp.status != 404 or body != 'not found':\n        raise SystemExit(f'unexpected not-found response: {(resp.status, body)!r}')\n\n    drain_file.write_text('drain\\n', encoding='utf-8')\n    deadline = time.time() + 10\n    draining = False\n    while time.time() < deadline:\n        if proc.poll() is not None:\n            flush_failure(f'routing-middleware service exited before draining readiness: rc={proc.returncode}')\n        try:\n            conn = http.client.HTTPConnection('127.0.0.1', actual_port, timeout=1)\n            conn.request('GET', '/readyz')\n            resp = conn.getresponse()\n            body = resp.read().decode('utf-8')\n            conn.close()\n            if resp.status == 503 and '\"status\":\"draining\"' in body:\n                draining = True\n                break\n        except Exception:\n            time.sleep(0.1)\n    if not draining:\n        flush_failure('routing-middleware service did not report draining readiness')\n\n    conn = http.client.HTTPConnection('127.0.0.1', actual_port, timeout=2)\n    conn.request('GET', '/hello/later')\n    resp = conn.getresponse()\n    body = resp.read().decode('utf-8')\n    conn.close()\n    if resp.status != 503 or '\"error\":\"draining\"' not in body:\n        raise SystemExit(f'unexpected draining business response: {(resp.status, body)!r}')\n\n    try:\n        proc.wait(timeout=10)\n    except subprocess.TimeoutExpired:\n        raise SystemExit('routing-middleware service did not exit after drain quiesced')\n    stdout, stderr = proc.communicate(timeout=20)\n    stderr_lines.append(stderr)\n    print(stdout, end='')\n    print(''.join(stderr_lines), end='')\n    if proc.returncode != 0:\n        raise SystemExit(proc.returncode)\n    observe_events = []\n    for raw_line in ''.join(stderr_lines).splitlines():\n        line = raw_line.strip()\n        json_start = line.find('{')\n        if json_start == -1:\n            continue\n        observe_events.append(json.loads(line[json_start:]))\n    bound_events = [item for item in observe_events if item.get('event') == 'listener_bound']\n    drain_events = [item for item in observe_events if item.get('event') == 'drain_requested']\n    stopped_events = [item for item in observe_events if item.get('event') == 'listener_stopped']\n    if len(bound_events) != 1:\n        raise SystemExit(f'expected one listener_bound event: {observe_events!r}')\n    if len(drain_events) != 1:\n        raise SystemExit(f'expected one drain_requested event: {observe_events!r}')\n    if len(stopped_events) != 1:\n        raise SystemExit(f'expected one listener_stopped event: {observe_events!r}')\n    if drain_events[0].get('path') != str(drain_file):\n        raise SystemExit(f'drain_requested path mismatch: {drain_events[0]!r}')\n    if stopped_events[0].get('reason') != 'drained':\n        raise SystemExit(f'listener_stopped reason mismatch: {stopped_events[0]!r}')\n    if bound_events[0].get('port') != actual_port:\n        raise SystemExit(f'listener_bound port mismatch: {bound_events[0]!r}')\n    print('service-routing-middleware-ok')\nfinally:\n    if proc.poll() is None:\n        proc.terminate()\n        try:\n            proc.wait(timeout=5)\n        except subprocess.TimeoutExpired:\n            proc.kill()\n            proc.wait(timeout=5)\nPY"
expect_rc = 0
expect_stdout_contains = ["service-routing-middleware-ok"]
