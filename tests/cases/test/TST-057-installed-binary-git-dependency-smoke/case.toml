id = "TST-057-installed-binary-git-dependency-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "rm -rf work/release_asset work/install-root work/installed-git"
expect_rc = 0

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport hashlib\nimport os\nimport platform\nimport subprocess\nfrom pathlib import Path\n\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nroot = Path('work/release_asset')\nroot.mkdir(parents=True, exist_ok=True)\nversion = (repo_root / 'VERSION').read_text(encoding='utf-8').strip()\nsystem = platform.system()\nmachine = platform.machine().lower()\nif system == 'Darwin' and machine in ('arm64', 'aarch64'):\n    target = 'darwin-arm64'\n    host_kind = 'unix'\n    binary_name = 'nebula'\nelif system == 'Darwin' and machine == 'x86_64':\n    target = 'darwin-x86_64'\n    host_kind = 'unix'\n    binary_name = 'nebula'\nelif system == 'Linux' and machine == 'x86_64':\n    target = 'linux-x86_64'\n    host_kind = 'unix'\n    binary_name = 'nebula'\nelif system.startswith('MSYS') or system.startswith('MINGW') or system == 'Windows':\n    target = 'windows-x86_64'\n    host_kind = 'windows'\n    binary_name = 'nebula.exe'\nelse:\n    raise SystemExit(f'unsupported host for installed git smoke: {system}/{machine}')\nsubprocess.run([\n    'python3', str(repo_root / 'scripts' / 'package_release.py'),\n    '--binary', os.environ['NEBULA_BINARY'],\n    '--target', target,\n    '--output-dir', str(root),\n], check=True)\nasset = next(root.glob('nebula-v*.zip' if host_kind == 'windows' else 'nebula-v*.tar.gz'))\nh = hashlib.sha256()\nwith asset.open('rb') as fh:\n    for chunk in iter(lambda: fh.read(1024 * 1024), b''):\n        h.update(chunk)\n(root / 'SHA256SUMS.txt').write_text(f'{h.hexdigest()}  {asset.name}\\n', encoding='utf-8')\n(root / 'VERSION.txt').write_text(version + '\\n', encoding='utf-8')\n(root / 'HOST_KIND').write_text(host_kind + '\\n', encoding='utf-8')\n(root / 'BINARY_NAME').write_text(binary_name + '\\n', encoding='utf-8')\nPY"
expect_rc = 0

[[steps]]
kind = "shell"
run = "version=$(cat work/release_asset/VERSION.txt) && kind=$(cat work/release_asset/HOST_KIND) && if [ \"$kind\" = windows ]; then prefix=$(cygpath -w \"$PWD/work/install-root\") && base=$(cygpath -w \"$PWD/work/release_asset\") && script=$(cygpath -w \"$NEBULA_REPO_ROOT/scripts/install.ps1\") && pwsh -File \"$script\" -Version \"$version\" -InstallPrefix \"$prefix\" -BaseUrl \"$base\" > work/installed-git-install.out 2>&1; else bash \"$NEBULA_REPO_ROOT/scripts/install.sh\" --version \"$version\" --prefix \"$PWD/work/install-root\" --base-url \"$PWD/work/release_asset\" > work/installed-git-install.out 2>&1; fi"
expect_rc = 0

[[steps]]
kind = "shell"
run = "bin=$(cat work/release_asset/BINARY_NAME) && work/install-root/bin/$bin new work/installed-git/app >/dev/null"
expect_rc = 0

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nfrom pathlib import Path\nimport subprocess\nroot = Path('work/installed-git')\ndep = root / 'dep'\n(dep / 'src').mkdir(parents=True, exist_ok=True)\ndep.joinpath('nebula.toml').write_text('schema_version = 1\\n\\n[package]\\nname = \"dep\"\\nversion = \"0.1.0\"\\nentry = \"src/lib.nb\"\\nsrc_dir = \"src\"\\n', encoding='utf-8')\ndep.joinpath('src/lib.nb').write_text('module lib\\n\\nfn lib_value() -> Int {\\n  return 7\\n}\\n', encoding='utf-8')\napp_main = root / 'app' / 'src' / 'main.nb'\napp_main.write_text('module main\\nimport dep::lib\\n\\nfn main() -> Void {\\n  if lib_value() == 7 {\\n    print(\"git-ok\")\\n  } else {\\n    print(\"git-bad\")\\n  }\\n}\\n', encoding='utf-8')\nsubprocess.run(['git', 'init', dep], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\nsubprocess.run(['git', '-C', str(dep), 'config', 'user.email', 'tests@example.com'], check=True)\nsubprocess.run(['git', '-C', str(dep), 'config', 'user.name', 'Nebula Tests'], check=True)\nsubprocess.run(['git', '-C', str(dep), 'add', '.'], check=True)\nsubprocess.run(['git', '-C', str(dep), 'commit', '-m', 'init'], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\nPY"
expect_rc = 0

[[steps]]
kind = "shell"
run = "bin=$(cat work/release_asset/BINARY_NAME) && work/install-root/bin/$bin add work/installed-git/app dep --git \"$PWD/work/installed-git/dep\" --rev HEAD >/dev/null"
expect_rc = 0

[[steps]]
kind = "shell"
run = "bin=$(cat work/release_asset/BINARY_NAME) && work/install-root/bin/$bin fetch work/installed-git/app >/dev/null"
expect_rc = 0

[[steps]]
kind = "shell"
run = "bin=$(cat work/release_asset/BINARY_NAME) && (cd work && install-root/bin/$bin run installed-git/app --run-gate none)"
expect_rc = 0
expect_stdout_contains = ["git-ok"]
