id = "TST-032-fmt-preserves-comments"
suite = "test"

[[steps]]
kind = "shell"
run = "cp fixtures/format_comments.nb work/format_comments.nb"
expect_rc = 0

[[steps]]
kind = "shell"
run = "$NEBULA_BINARY fmt work/format_comments.nb"
expect_rc = 0

[[steps]]
kind = "shell"
run = "grep -F '// keep-signature' work/format_comments.nb && grep -F '// before sum' work/format_comments.nb && grep -F '/* block' work/format_comments.nb && grep -F 'keep */' work/format_comments.nb && grep -F 'let x = (1 + 2)' work/format_comments.nb"
expect_rc = 0

[[steps]]
kind = "shell"
run = "before=$(shasum work/format_comments.nb | awk '{print $1}') && $NEBULA_BINARY fmt work/format_comments.nb >/dev/null && after=$(shasum work/format_comments.nb | awk '{print $1}') && test \"$before\" = \"$after\""
expect_rc = 0
