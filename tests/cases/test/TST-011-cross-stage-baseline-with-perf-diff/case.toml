id = "TST-011-cross-stage-baseline-with-perf-diff"
suite = "test"

[[steps]]
kind = "shell"
run = "\"$NEBULA_REPO_ROOT/scripts/run_cross_stage_baseline.sh\" \"$NEBULA_BINARY\" fixtures/smoke.nb work/baseline_combo --perf-current fixtures/perf/current_perf.json --perf-baseline fixtures/perf/baseline_perf.json --perf-diff-json work/baseline_combo/perf_diff.json --perf-diff-md work/baseline_combo/perf_diff.md"
expect_rc = 0
expect_stdout_contains = [
  "baseline-csv: work/baseline_combo/cross_stage_reuse_baseline.csv",
  "baseline-json: work/baseline_combo/cross_stage_reuse_baseline.json",
  "perf-baseline-diff: status=pass fail_on_regression=off shared_cases=4",
  "perf-diff-json: work/baseline_combo/perf_diff.json",
  "perf-diff-md: work/baseline_combo/perf_diff.md"
]
must_exist = [
  "work/baseline_combo/cross_stage_reuse_baseline.csv",
  "work/baseline_combo/cross_stage_reuse_baseline.json",
  "work/baseline_combo/perf_diff.json",
  "work/baseline_combo/perf_diff.md"
]
