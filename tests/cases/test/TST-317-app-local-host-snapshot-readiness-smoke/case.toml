id = "TST-317-app-local-host-snapshot-readiness-smoke"
suite = "test"
description = "app-local substrate records first usable host snapshot readiness without depending on GUI or media domains"

[[steps]]
kind = "shell"
run = """
python3 - <<'PY'
import os
import shutil
import sqlite3
import subprocess
from pathlib import Path

repo = Path(os.environ["NEBULA_REPO_ROOT"])
binary = os.environ["NEBULA_BINARY"]
root = Path("work/app_local_host_snapshot_readiness")
app = root / "app"
db_path = root / "state" / "receipts.db"
shutil.rmtree(root, ignore_errors=True)
(app / "src").mkdir(parents=True, exist_ok=True)

(app / "nebula.toml").write_text(f'''schema_version = 1

[package]
name = "app-local-host-snapshot-readiness"
version = "0.1.0"
entry = "src/main.nb"
src_dir = "src"

[dependencies]
app_local = {{ path = "{repo / 'official' / 'nebula-app-local'}" }}
''', encoding="utf-8")

(app / "src" / "main.nb").write_text(r'''module main
import app_local::substrate
import std::json
import std::result

fn db_path() -> String {
  return "work/app_local_host_snapshot_readiness/state/receipts.db"
}

fn rejected_db_path() -> String {
  return "work/app_local_host_snapshot_readiness/state/rejected-receipts.db"
}

fn app_id() -> String {
  return "app.local.snapshot-readiness"
}

fn rejected_app_id() -> String {
  return "app.local.snapshot-readiness.rejected"
}

fn fail() -> Void {
  expect_eq(1, 0)
}

fn expect_text(actual: String, expected: String) -> Void {
  if actual != expected {
    print(actual)
    fail()
  }
}

fn expect_readiness_error(result: Result<AppLocalHostSnapshotReadiness, String>, expected: String) -> Void {
  match result {
    Ok(_) => { fail() }
    Err(msg) => { expect_text(msg, expected) }
  }
}

fn expect_receipt_error(result: Result<AppLocalReceipt, String>, expected: String) -> Void {
  match result {
    Ok(_) => { fail() }
    Err(msg) => { expect_text(msg, expected) }
  }
}

fn snapshot_payload() -> Json {
  return object2("schema",
                 string_value("demo.snapshot.payload.v1"),
                 "view_model",
                 string_value("ready"))
}

fn snapshot_key() -> String {
  return "snapshot:boot"
}

fn rejected_snapshot_key() -> String {
  return "snapshot:rejected"
}

fn readiness_value() -> Result<AppLocalHostSnapshotReadiness, String> {
  return host_snapshot_readiness(app_id(),
                                 "session-1",
                                 "boot",
                                 0,
                                 snapshot_key(),
                                 "demo.snapshot.v1",
                                 "first_usable_snapshot",
                                 "first snapshot persisted")
}

fn missing_snapshot_readiness_value() -> Result<AppLocalHostSnapshotReadiness, String> {
  return host_snapshot_readiness(app_id(),
                                 "session-1",
                                 "missing",
                                 0,
                                 "snapshot:missing",
                                 "demo.snapshot.v1",
                                 "first_usable_snapshot",
                                 "missing snapshot")
}

fn mismatched_schema_readiness_value() -> Result<AppLocalHostSnapshotReadiness, String> {
  return host_snapshot_readiness(app_id(),
                                 "session-1",
                                 "boot",
                                 0,
                                 snapshot_key(),
                                 "demo.snapshot.other.v1",
                                 "first_usable_snapshot",
                                 "wrong schema")
}

fn mismatched_revision_readiness_value() -> Result<AppLocalHostSnapshotReadiness, String> {
  return host_snapshot_readiness(app_id(),
                                 "session-1",
                                 "boot",
                                 1,
                                 snapshot_key(),
                                 "demo.snapshot.v1",
                                 "first_usable_snapshot",
                                 "wrong revision")
}

fn rejected_readiness_value() -> Result<AppLocalHostSnapshotReadiness, String> {
  return host_snapshot_readiness(rejected_app_id(),
                                 "session-rejected",
                                 "rejected",
                                 2,
                                 rejected_snapshot_key(),
                                 "demo.snapshot.v1",
                                 "rejected_snapshot",
                                 "snapshot failed host readiness")
}

fn record_readiness() -> Result<AppLocalReceipt, String> {
  return record_host_snapshot_readiness_receipt(db_path(), readiness_value()?, 1777436000001)
}

fn verify_readiness_json(readiness: AppLocalHostSnapshotReadiness) -> Result<Bool, String> {
  let value = readiness.as_json()
  let readiness_json = get_value(value, "readiness")?
  return Ok(verify_readiness_top_json(value)? &&
            verify_readiness_ref_json(value)? &&
            verify_readiness_value_json(readiness_json)?)
}

fn verify_readiness_top_json(value: Json) -> Result<Bool, String> {
  return Ok(get_string(value, "schema")? == "nebula.app-local.host-snapshot-readiness.v1" &&
            get_string(value, "runtime_session_id")? == "session-1")
}

fn verify_readiness_ref_json(value: Json) -> Result<Bool, String> {
  return Ok(get_string(value, "correlation_id")? == "boot" &&
            get_string(value, "snapshot_receipt_key")? == snapshot_key() &&
            get_string(value, "snapshot_schema")? == "demo.snapshot.v1")
}

fn verify_readiness_value_json(readiness_json: Json) -> Result<Bool, String> {
  return Ok(get_string(readiness_json, "value")? == "first_usable_snapshot" &&
            get_string(readiness_json, "reason")? == "first snapshot persisted")
}

fn verify_startup_policy_readiness() -> Result<Bool, String> {
  let policy = startup_recovery_policy(db_path(), app_id(), 10)?
  if !policy.diagnostic_only || policy.action_owner != "app" {
    return Ok(false)
  }
  if policy.recommendation != "app_decide_from_snapshot" {
    return Ok(false)
  }
  if policy.reason != "latest host snapshot readiness marks the snapshot as first usable for app-owned resume logic" {
    return Ok(false)
  }
  let readiness = get_value(policy.evidence, "snapshot_readiness")?
  return verify_policy_readiness_receipts(readiness)
}

fn verify_policy_readiness_receipts(readiness: Json) -> Result<Bool, String> {
  let last = get_value(readiness, "last_host_snapshot_readiness")?
  let usable = get_value(readiness, "last_usable_host_snapshot_readiness")?
  if get_int(last, "receipt_id")? != get_int(usable, "receipt_id")? {
    return Ok(false)
  }
  return verify_policy_readiness_payload(get_value(last, "payload")?)
}

fn verify_policy_readiness_payload(payload: Json) -> Result<Bool, String> {
  return Ok(get_string(get_value(payload, "readiness")?, "value")? == "first_usable_snapshot" &&
            get_string(payload, "snapshot_receipt_key")? == snapshot_key())
}

fn verify_readiness_ids(first: AppLocalReceipt, duplicate: AppLocalReceipt) -> Bool {
  return first.receipt_id == duplicate.receipt_id
}

fn seed_readiness_contract() -> Result<AppLocalReceipt, String> {
  initialize_receipts(db_path())?
  record_snapshot_receipt(db_path(), app_id(), snapshot_key(), "boot", 0, "demo.snapshot.v1", snapshot_payload(), 1777436000000)?
  return record_readiness()
}

fn verify_trace_readiness() -> Result<Bool, String> {
  let trace = recovery_replay_trace(db_path(), app_id(), 10)?
  let trajectory = get_value(trace.as_json(), "trajectory")?
  let trajectory_count = array_len(get_value(trajectory, "snapshot_readiness")?)?
  let trace_count = array_len(trace.snapshot_readiness)?
  return Ok(trajectory_count == 1 && trace_count == 1)
}

fn verify_readiness_contract() -> Result<Bool, String> {
  let readiness = readiness_value()?
  if !verify_readiness_json(readiness)? {
    return Ok(false)
  }
  let first = seed_readiness_contract()?
  let duplicate = record_readiness()?
  return verify_seeded_readiness_contract(first, duplicate)
}

fn verify_seeded_readiness_contract(first: AppLocalReceipt, duplicate: AppLocalReceipt) -> Result<Bool, String> {
  if !verify_readiness_ids(first, duplicate) || !verify_trace_readiness()? {
    return Ok(false)
  }
  return Ok(verify_startup_policy_readiness()? &&
            verify_rejected_readiness_policy()?)
}

fn seed_rejected_readiness_policy() -> Result<AppLocalStartupRecoveryPolicy, String> {
  initialize_receipts(rejected_db_path())?
  record_snapshot_receipt(rejected_db_path(),
                          rejected_app_id(),
                          rejected_snapshot_key(),
                          "rejected",
                          2,
                          "demo.snapshot.v1",
                          snapshot_payload(),
                          1777436000100)?
  record_host_snapshot_readiness_receipt(rejected_db_path(), rejected_readiness_value()?, 1777436000101)?
  return startup_recovery_policy(rejected_db_path(), rejected_app_id(), 10)
}

fn verify_rejected_readiness_policy() -> Result<Bool, String> {
  let policy = seed_rejected_readiness_policy()?
  return Ok(policy.recommendation == "inspect_rejected_snapshot" &&
            policy.reason == "latest host snapshot readiness rejected the snapshot; app should not resume directly from it")
}

fn verify_negative_identity_contracts() -> Void {
  expect_readiness_error(host_snapshot_readiness("", "session-1", "boot", 0, snapshot_key(), "demo.snapshot.v1", "first_usable_snapshot", "ok"),
                         "app-local substrate host snapshot readiness app_id is required")
  expect_readiness_error(host_snapshot_readiness(app_id(), "", "boot", 0, snapshot_key(), "demo.snapshot.v1", "first_usable_snapshot", "ok"),
                         "app-local substrate host snapshot readiness runtime_session_id is required")
  expect_readiness_error(host_snapshot_readiness(app_id(), "session-1", "", 0, snapshot_key(), "demo.snapshot.v1", "first_usable_snapshot", "ok"),
                         "app-local substrate host snapshot readiness correlation_id is required")
}

fn verify_negative_value_contracts() -> Void {
  expect_readiness_error(host_snapshot_readiness(app_id(), "session-1", "boot", -1, snapshot_key(), "demo.snapshot.v1", "first_usable_snapshot", "ok"),
                         "app-local substrate host snapshot readiness state_revision must be non-negative")
  expect_readiness_error(host_snapshot_readiness(app_id(), "session-1", "boot", 0, "", "demo.snapshot.v1", "first_usable_snapshot", "ok"),
                         "app-local substrate host snapshot readiness snapshot_receipt_key is required")
  expect_readiness_error(host_snapshot_readiness(app_id(), "session-1", "boot", 0, snapshot_key(), "", "first_usable_snapshot", "ok"),
                         "app-local substrate host snapshot readiness snapshot_schema is required")
}

fn verify_negative_readiness_contracts() -> Void {
  expect_readiness_error(host_snapshot_readiness(app_id(), "session-1", "boot", 0, snapshot_key(), "demo.snapshot.v1", "unknown", "ok"),
                         "app-local substrate host snapshot readiness must be first_usable_snapshot, degraded_snapshot, or rejected_snapshot")
  expect_readiness_error(host_snapshot_readiness(app_id(), "session-1", "boot", 0, snapshot_key(), "demo.snapshot.v1", "first_usable_snapshot", ""),
                         "app-local substrate host snapshot readiness reason is required")
}

fn verify_negative_reference_contracts() -> Result<Bool, String> {
  expect_receipt_error(record_host_snapshot_readiness_receipt(db_path(), missing_snapshot_readiness_value()?, 1777436000200),
                       "app-local substrate host snapshot readiness snapshot receipt not found")
  expect_receipt_error(record_host_snapshot_readiness_receipt(db_path(), mismatched_schema_readiness_value()?, 1777436000201),
                       "app-local substrate host snapshot readiness snapshot schema mismatch")
  expect_receipt_error(record_host_snapshot_readiness_receipt(db_path(), mismatched_revision_readiness_value()?, 1777436000202),
                       "app-local substrate host snapshot readiness snapshot state_revision mismatch")
  return Ok(true)
}

fn verify_negative_contracts() -> Void {
  verify_negative_identity_contracts()
  verify_negative_value_contracts()
  verify_negative_readiness_contracts()
}

fn main() -> Int {
  match verify_readiness_contract() {
    Ok(ok) => {
      if !ok {
        print("app-local-host-snapshot-readiness-bad")
        return 1
      }
    }
    Err(msg) => {
      print(msg)
      return 1
    }
  }
  verify_negative_contracts()
  match verify_negative_reference_contracts() {
    Ok(ok) => {
      if !ok {
        print("app-local-host-snapshot-readiness-negative-bad")
        return 1
      }
    }
    Err(msg) => {
      print(msg)
      return 1
    }
  }
  print("app-local-host-snapshot-readiness-ok")
  return 0
}
''', encoding="utf-8")

subprocess.run([binary, "fetch", str(app)], check=True, capture_output=True, text=True)
check = subprocess.run([binary, "check", str(app)], check=True, capture_output=True, text=True)
if "warning:" in check.stdout or "warning:" in check.stderr:
    raise SystemExit(f"app-local host snapshot readiness check emitted warnings:\\n{check.stdout}\\n{check.stderr}")
run = subprocess.run([binary, "run", str(app), "--run-gate", "none"], capture_output=True, text=True)
if run.returncode != 0 or "app-local-host-snapshot-readiness-ok" not in run.stdout:
    print(run.stdout, end="")
    print(run.stderr, end="")
    raise SystemExit("app-local host snapshot readiness smoke failed")

with sqlite3.connect(db_path) as conn:
    counts = dict(conn.execute(
        "SELECT receipt_kind, COUNT(*) FROM app_local_runtime_receipts GROUP BY receipt_kind"
    ).fetchall())
    readiness = conn.execute(
        "SELECT receipt_key, schema FROM app_local_runtime_receipts WHERE receipt_kind = 'host_snapshot_readiness'"
    ).fetchone()
if counts != {"snapshot": 1, "host_snapshot_readiness": 1}:
    raise SystemExit(f"unexpected host snapshot readiness receipt counts: {counts!r}")
if readiness != ("session-1:snapshot:boot", "nebula.app-local.host-snapshot-readiness.v1"):
    raise SystemExit(f"bad host snapshot readiness receipt: {readiness!r}")
print("app-local-host-snapshot-readiness-ok")
PY
"""
expect_rc = 0
expect_stdout_contains = ["app-local-host-snapshot-readiness-ok"]

[[steps]]
kind = "shell"
run = """
python3 - <<'PY'
from pathlib import Path
import os

repo = Path(os.environ["NEBULA_REPO_ROOT"])
readme = (repo / "official" / "nebula-app-local" / "README.md").read_text(encoding="utf-8")
doc = (repo / "docs" / "app_local_substrate.md").read_text(encoding="utf-8")
for marker in [
    "AppLocalHostSnapshotReadiness",
    "host_snapshot_readiness",
    "record_host_snapshot_readiness_receipt",
    "nebula.app-local.host-snapshot-readiness.v1",
    "does not duplicate the snapshot payload",
]:
    if marker not in readme:
        raise SystemExit(f"nebula-app-local README missing host snapshot readiness marker: {marker}")
for marker in [
    "Host snapshot readiness",
    "nebula.app-local.host-snapshot-readiness.v1",
    "snapshot_receipt_key",
    "does not duplicate the snapshot payload",
    "before `app_ready`",
]:
    if marker not in doc:
        raise SystemExit(f"app-local substrate doc missing host snapshot readiness marker: {marker}")
print("app-local-host-snapshot-readiness-docs-ok")
PY
"""
expect_rc = 0
expect_stdout_contains = ["app-local-host-snapshot-readiness-docs-ok"]
