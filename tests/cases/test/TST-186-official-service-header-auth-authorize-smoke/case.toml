id = "TST-186-official-service-header-auth-authorize-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport http.client\nimport json\nimport os\nimport shutil\nimport subprocess\nimport sys\nimport time\nfrom pathlib import Path\n\nrepo_root = Path(os.environ['NEBULA_REPO_ROOT'])\nsys.path.insert(0, str(repo_root / 'tests' / 'lib'))\nfrom service_probe import collect_observe_events, fail_with_output, finish_process_output, wait_for_listener_bound\nroot = Path('work/official_service_header_auth')\nshutil.rmtree(root, ignore_errors=True)\n(root / 'src').mkdir(parents=True, exist_ok=True)\n(root / 'nebula.toml').write_text('''schema_version = 1\\n\\n[package]\\nname = \"official-service-header-auth\"\\nversion = \"0.1.0\"\\nentry = \"src/main.nb\"\\nsrc_dir = \"src\"\\n\\n[dependencies]\\nservice = { path = \"''' + str(repo_root / 'official' / 'nebula-service') + '''\" }\\n''', encoding='utf-8')\n(root / 'src' / 'server.nb').write_text('''module server\\nimport service::context\\nimport service::errors\\nimport service::health\\nimport service::middleware\\nimport service::routing\\nimport std::http\\nimport std::json\\nimport std::result\\n\\nasync fn handle_request(ctx: RequestContext, request: Request) -> Response {\\n  return await dispatch_ctx4(\\n    ctx,\\n    request,\\n    Get,\\n    \"/healthz\",\\n    handle_health_route,\\n    Get,\\n    \"/private\",\\n    handle_private_route,\\n    Get,\\n    \"/deny\",\\n    handle_deny_route,\\n    Get,\\n    \"/explode\",\\n    handle_explode_route,\\n    not_found_text(\"not found\")\\n  )\\n}\\n\\nasync fn handle_health_route(ctx: RequestContext, request: Request) -> Response {\\n  return live_response_with_context(ctx)\\n}\\n\\nasync fn handle_private_route(ctx: RequestContext, request: Request) -> Response {\\n  return await authorize(ctx, request, verify_authorization_header, handle_private_success)\\n}\\n\\nasync fn handle_deny_route(ctx: RequestContext, request: Request) -> Response {\\n  return await authorize(ctx, request, verify_deny, handle_private_success)\\n}\\n\\nasync fn handle_private_success(ctx: RequestContext, request: Request) -> Response {\\n  match ctx.principal() {\\n    Ok(value) => {\\n      match get_string(value.claims, \"role\") {\\n        Ok(role) => {\\n          return ok_text(stringify(object2(\"subject\", string_value(value.subject), \"role\", string_value(role))))\\n        }\\n        Err(msg) => {\\n          return internal_error_text(msg)\\n        }\\n      }\\n    }\\n    Err(msg) => {\\n      return internal_error_text(msg)\\n    }\\n  }\\n}\\n\\nasync fn handle_explode_route(ctx: RequestContext, request: Request) -> Response {\\n  return await authorize(ctx, request, verify_broken, handle_private_success)\\n}\\n\\nasync fn verify_authorization_header(ctx: RequestContext, request: Request) -> Result<AuthDecision, String> {\\n  match header_value_unique(request, \"Authorization\") {\\n    Ok(value) => {\\n      if value == \"Bearer dev-secret\" {\\n        return Ok(allow_principal(principal(\"dev-user\", object1(\"role\", string_value(\"developer\")))))\\n      }\\n      return Ok(deny(for_request(401, ctx, \"unauthorized\", \"missing or invalid authorization\")))\\n    }\\n    Err(_) => {\\n      return Ok(deny(for_request(401, ctx, \"unauthorized\", \"missing or invalid authorization\")))\\n    }\\n  }\\n}\\n\\nasync fn verify_deny(ctx: RequestContext, request: Request) -> Result<AuthDecision, String> {\\n  return Ok(deny(for_request(403, ctx, \"forbidden\", \"deny-by-policy\")))\\n}\\n\\nasync fn verify_broken(ctx: RequestContext, request: Request) -> Result<AuthDecision, String> {\\n  return Err(\"verifier exploded\")\\n}\\n''', encoding='utf-8')\n(root / 'src' / 'main.nb').write_text('''module main\\nimport service::config\\nimport service::server\\nimport server\\n\\nasync fn main() -> Void {\\n  match config_from_env(\"svc-header-auth\", 0) {\\n    Ok(cfg) => {\\n      match await bind_listener(cfg) {\\n        Ok(listener) => {\\n          match await serve_requests_n_with_context(listener, cfg, 5, handle_request) {\\n            Ok(_) => {}\\n            Err(msg) => { print(msg) }\\n          }\\n        }\\n        Err(msg) => { print(msg) }\\n      }\\n    }\\n    Err(msg) => { print(msg) }\\n  }\\n}\\n''', encoding='utf-8')\nsubprocess.run([os.environ['NEBULA_BINARY'], 'update', str(root)], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)\nproc = subprocess.Popen([\n    os.environ['NEBULA_BINARY'],\n    'run',\n    str(root),\n    '--run-gate',\n    'none',\n], stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True, env={**os.environ, 'NEBULA_BIND_HOST': '127.0.0.1', 'NEBULA_PORT': '0'})\nstderr_lines = []\n_, port = wait_for_listener_bound(proc, stderr_lines)\ntry:\n    deadline = time.time() + 20\n    ready = False\n    while time.time() < deadline:\n        if proc.poll() is not None:\n            fail_with_output(proc, stderr_lines, f'header-auth service exited before ready: rc={proc.returncode}')\n        try:\n            conn = http.client.HTTPConnection('127.0.0.1', port, timeout=1)\n            conn.request('GET', '/healthz')\n            resp = conn.getresponse()\n            body = resp.read().decode('utf-8')\n            conn.close()\n            if resp.status == 200 and '\"status\":\"ok\"' in body:\n                ready = True\n                break\n        except Exception:\n            time.sleep(0.1)\n    if not ready:\n        fail_with_output(proc, stderr_lines, 'header-auth service did not become ready')\n\n    conn = http.client.HTTPConnection('127.0.0.1', port, timeout=2)\n    conn.request('GET', '/private')\n    resp = conn.getresponse()\n    body = resp.read().decode('utf-8')\n    conn.close()\n    parsed = json.loads(body)\n    if resp.status != 401 or parsed.get('error') != 'unauthorized':\n        raise SystemExit(f'unexpected unauthorized response: {(resp.status, parsed)!r}')\n\n    conn = http.client.HTTPConnection('127.0.0.1', port, timeout=2)\n    conn.request('GET', '/private', headers={'Authorization': 'Bearer dev-secret'})\n    resp = conn.getresponse()\n    body = resp.read().decode('utf-8')\n    conn.close()\n    parsed = json.loads(body)\n    if resp.status != 200 or parsed.get('subject') != 'dev-user' or parsed.get('role') != 'developer':\n        raise SystemExit(f'unexpected authorized response: {(resp.status, parsed)!r}')\n\n    conn = http.client.HTTPConnection('127.0.0.1', port, timeout=2)\n    conn.request('GET', '/deny', headers={'X-Request-Id': 'deny-id-123'})\n    resp = conn.getresponse()\n    body = resp.read().decode('utf-8')\n    conn.close()\n    parsed = json.loads(body)\n    if resp.status != 403 or parsed.get('error') != 'forbidden' or parsed.get('request_id_text') != 'deny-id-123':\n        raise SystemExit(f'unexpected deny response: {(resp.status, parsed)!r}')\n\n    conn = http.client.HTTPConnection('127.0.0.1', port, timeout=2)\n    conn.request('GET', '/explode', headers={'X-Request-Id': 'explode-id-123'})\n    resp = conn.getresponse()\n    body = resp.read().decode('utf-8')\n    conn.close()\n    parsed = json.loads(body)\n    if resp.status != 500 or parsed.get('error') != 'internal_error':\n        raise SystemExit(f'unexpected verifier-failure response: {(resp.status, parsed)!r}')\n    request_id_text = parsed.get('request_id_text')\n    if request_id_text != 'explode-id-123':\n        raise SystemExit(f'missing request correlation in verifier-failure response: {parsed!r}')\n\n    try:\n        proc.wait(timeout=10)\n    except subprocess.TimeoutExpired:\n        raise SystemExit('header-auth service did not exit after expected requests')\n    stdout, stderr = finish_process_output(proc, stderr_lines)\n    print(stdout, end='')\n    print(stderr, end='')\n    if proc.returncode != 0:\n        raise SystemExit(proc.returncode)\n    observe_events = collect_observe_events(stderr)\n    auth_events = [item for item in observe_events if item.get('event') == 'auth_verifier_error']\n    auth_metrics = [item for item in observe_events if item.get('metric') == 'auth_verifier_errors']\n    handler_metrics = [item for item in observe_events if item.get('metric') == 'handler_errors']\n    if len(auth_events) != 1:\n        raise SystemExit(f'expected exactly one auth_verifier_error event: {observe_events!r}')\n    if len(auth_metrics) != 1:\n        raise SystemExit(f'expected exactly one auth_verifier_errors metric: {observe_events!r}')\n    if handler_metrics:\n        raise SystemExit(f'deny/authorize path should not emit handler_errors: {observe_events!r}')\n    if auth_events[0].get('request_id_text') != request_id_text:\n        raise SystemExit(f'event request_id_text mismatch: {(request_id_text, auth_events[0])!r}')\n    if auth_metrics[0].get('service') != 'svc-header-auth' or auth_metrics[0].get('value') != 1:\n        raise SystemExit(f'unexpected auth_verifier_errors metric payload: {auth_metrics[0]!r}')\n    if any(item.get('request_id_text') == 'deny-id-123' and item.get('event') == 'auth_verifier_error' for item in observe_events):\n        raise SystemExit(f'deny path should not emit auth_verifier_error: {observe_events!r}')\n    print('service-header-auth-ok')\nfinally:\n    if proc.poll() is None:\n        proc.terminate()\n        try:\n            proc.wait(timeout=5)\n        except subprocess.TimeoutExpired:\n            proc.kill()\n            proc.wait(timeout=5)\nPY"
expect_rc = 0
expect_stdout_contains = ["service-header-auth-ok"]
