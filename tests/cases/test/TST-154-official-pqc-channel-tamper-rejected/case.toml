id = "TST-154-official-pqc-channel-tamper-rejected"
suite = "test"

[[steps]]
kind = "shell"
run = "rm -rf work/official-pqc-channel-tamper && mkdir -p work/official-pqc-channel-tamper && cp -R \"$NEBULA_REPO_ROOT/official/nebula-crypto\" work/official-pqc-channel-tamper/nebula-crypto && cp -R \"$NEBULA_REPO_ROOT/official/nebula-pqc-protocols\" work/official-pqc-channel-tamper/pqc && mkdir -p work/official-pqc-channel-tamper/app/src && cat > work/official-pqc-channel-tamper/app/nebula.toml <<'EOF'\nschema_version = 1\n\n[package]\nname = \"official-pqc-channel-tamper-app\"\nversion = \"0.1.0\"\nentry = \"src/main.nb\"\nsrc_dir = \"src\"\n\n[dependencies]\ncrypto = { path = \"../nebula-crypto\" }\npqc = { path = \"../pqc\" }\nEOF\ncat > work/official-pqc-channel-tamper/app/src/main.nb <<'EOF'\nmodule main\nimport crypto::pqc.kem\nimport crypto::pqc.sign\nimport pqc::channel\nimport std::bytes\nimport std::result\n\nfn main() -> Void {\n  let ok = true\n  match ml_kem_768_keypair() {\n    Ok(server_kem) => {\n      match ml_dsa_65_keypair() {\n        Ok(client_sign_keys) => {\n          match ml_dsa_65_keypair() {\n            Ok(server_sign_keys) => {\n              let client_signer = channel_signer(client_sign_keys)\n              let server_signer = channel_signer(server_sign_keys)\n              match initiate(server_kem.public_key(), signed(client_signer)) {\n                Ok(init) => {\n                  let hello = init.hello()\n                  let bad_hello = ClientHello(hello.format_version,\n                                              hello.channel_suite,\n                                              hello.kem_ciphertext_hex,\n                                              hello.initiator_sign_public_key_hex,\n                                              \"00\")\n                  match accept(server_kem.secret_key(), signed(server_signer), bad_hello) {\n                    Ok(_) => {\n                      ok = false\n                    }\n                    Err(msg) => {\n                      if msg != \"pqc channel hello signature verification failed\" && msg != \"MlDsa65Signature must be exactly 3309 bytes\" {\n                        ok = false\n                      }\n                    }\n                  }\n                  match accept(server_kem.secret_key(), signed(server_signer), hello) {\n                    Ok(server_accept) => {\n                      let accept_msg = server_accept.message()\n                      let bad_accept = ServerAcceptMessage(accept_msg.format_version,\n                                                           accept_msg.channel_suite,\n                                                           accept_msg.hello_sha3_256_hex,\n                                                           accept_msg.responder_sign_public_key_hex,\n                                                           \"00\")\n                      match finalize(init, pinned_peer(server_sign_keys.public_key()), bad_accept) {\n                        Ok(_) => {\n                          ok = false\n                        }\n                        Err(msg) => {\n                          if msg != \"hex text must have even length\" && msg != \"hex text contains a non-hex character\" && msg != \"MlDsa65Signature must be exactly 3309 bytes\" && msg != \"pqc channel responder signature verification failed\" {\n                            ok = false\n                          }\n                        }\n                      }\n                      let wrong_suite = ServerAcceptMessage(accept_msg.format_version,\n                                                            \"wrong-suite\",\n                                                            accept_msg.hello_sha3_256_hex,\n                                                            accept_msg.responder_sign_public_key_hex,\n                                                            accept_msg.responder_signature_hex)\n                      match finalize(init, pinned_peer(server_sign_keys.public_key()), wrong_suite) {\n                        Ok(_) => {\n                          ok = false\n                        }\n                        Err(msg) => {\n                          if msg != \"unsupported pqc channel channel_suite\" {\n                            ok = false\n                          }\n                        }\n                      }\n                    }\n                    Err(_) => {\n                      ok = false\n                    }\n                  }\n                }\n                Err(_) => {\n                  ok = false\n                }\n              }\n            }\n            Err(_) => {\n              ok = false\n            }\n          }\n        }\n        Err(_) => {\n          ok = false\n        }\n      }\n    }\n    Err(_) => {\n      ok = false\n    }\n  }\n  if ok {\n    print(\"pqc-channel-tamper-ok\")\n  } else {\n    print(\"pqc-channel-tamper-bad\")\n  }\n}\nEOF"
expect_rc = 0

[[steps]]
kind = "nebula"
command = "fetch"
args = ["work/official-pqc-channel-tamper/app"]
expect_rc = 0

[[steps]]
kind = "nebula"
command = "run"
source = "work/official-pqc-channel-tamper/app"
args = ["--run-gate", "none"]
expect_rc = 0
expect_stdout_contains = ["pqc-channel-tamper-ok"]
