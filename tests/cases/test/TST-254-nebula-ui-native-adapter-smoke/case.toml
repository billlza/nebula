id = "TST-254-nebula-ui-native-adapter-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = """
python3 - <<'PY'
import os
import platform
import shutil
import subprocess
from pathlib import Path

repo = Path(os.environ['NEBULA_REPO_ROOT'])
system = platform.system().lower()
work = Path('work/nebula_ui_native_adapters')
work.mkdir(parents=True, exist_ok=True)
tree = work / 'local_ops_tree.json'
tree.write_text(
    '{"schema":"nebula-ui.tree.v1","component":"Window","props":{"title":"Local Ops"},"children":['
    '{"schema":"nebula-ui.tree.v1","component":"Column","props":{"spacing":12},"children":['
    '{"schema":"nebula-ui.tree.v1","component":"Text","props":{"text":"Local Ops"},"children":[]},'
    '{"schema":"nebula-ui.tree.v1","component":"Input","props":{"value":"targets","action":"targets.filter","accessibility_label":"Filter targets"},"children":[]},'
    '{"schema":"nebula-ui.tree.v1","component":"Button","props":{"text":"Refresh","action":"targets.refresh"},"children":[]}'
    ']}]}',
    encoding='utf-8',
)
common_flags = ['-I', str(repo / 'official' / 'nebula-ui' / 'adapters' / 'common'), '-iquote', str(repo)]

def require_markers(output, prefix):
    for marker in (
        f'nebula-ui-{prefix}-adapter-ok',
        'nebula-ui-tree-title=Local Ops',
        'nebula-ui-tree-button-action=targets.refresh',
        'nebula-ui-tree-input-action=targets.filter',
        'nebula-ui-tree-input-accessibility-label=Filter targets',
        'nebula-ui-accessibility-node=role:textbox;name:Filter targets;action:targets.filter',
        'nebula-ui-window-lifecycle=window-created',
        'nebula-ui-window-lifecycle=rendered',
        'nebula-ui-action-dispatched=targets.filter',
    ):
        if marker not in output:
            raise SystemExit(f'{prefix} smoke marker missing: {marker}')

if system == 'darwin':
    source = repo / 'official' / 'nebula-ui' / 'adapters' / 'appkit' / 'minimal_window.mm'
    out = work / 'nebula-ui-appkit-smoke'
    cxx = os.environ.get('CXX') or shutil.which('clang++') or 'clang++'
    cmd = [cxx, '-std=c++20', '-fobjc-arc', '-Wall', '-Wextra', '-Werror', *common_flags, str(source), '-framework', 'Cocoa', '-o', str(out)]
    subprocess.run(cmd, check=True)
    run = subprocess.run([str(out), '--smoke', '--tree-json', str(tree), '--smoke-dispatch-action', 'targets.filter'], capture_output=True, text=True, check=True)
    print(run.stdout, end='')
    require_markers(run.stdout, 'appkit')
elif system == 'linux':
    if shutil.which('pkg-config') is None:
        print('nebula-ui-gtk4-adapter-skip-missing-pkg-config')
        raise SystemExit(0)
    probe = subprocess.run(['pkg-config', '--exists', 'gtk4'], check=False)
    if probe.returncode != 0:
        print('nebula-ui-gtk4-adapter-skip-missing-gtk4')
        raise SystemExit(0)
    source = repo / 'official' / 'nebula-ui' / 'adapters' / 'gtk4' / 'minimal_window.cpp'
    out = work / 'nebula-ui-gtk4-smoke'
    flags = subprocess.check_output(['pkg-config', '--cflags', '--libs', 'gtk4'], text=True).split()
    cxx = os.environ.get('CXX') or shutil.which('c++') or shutil.which('clang++') or 'c++'
    subprocess.run([cxx, '-std=c++20', '-Wall', '-Wextra', '-Werror', *common_flags, str(source), *flags, '-o', str(out)], check=True)
    run = subprocess.run([str(out), '--smoke', '--tree-json', str(tree), '--smoke-dispatch-action', 'targets.filter'], capture_output=True, text=True, check=True)
    print(run.stdout, end='')
    require_markers(run.stdout, 'gtk4')
else:
    print('nebula-ui-native-adapter-skip-unsupported-host')
PY
"""
expect_rc = 0
expect_stdout_contains = ["nebula-ui-", "nebula-ui-tree-title=Local Ops", "nebula-ui-tree-button-action=targets.refresh", "nebula-ui-tree-input-action=targets.filter", "nebula-ui-tree-input-accessibility-label=Filter targets", "nebula-ui-accessibility-node=role:textbox;name:Filter targets;action:targets.filter", "nebula-ui-window-lifecycle=window-created", "nebula-ui-action-dispatched=targets.filter"]
