id = "TST-254-nebula-ui-native-adapter-smoke"
suite = "test"

[[steps]]
kind = "shell"
run = "python3 - <<'PY'\nimport os\nimport platform\nimport shutil\nimport subprocess\nfrom pathlib import Path\n\nrepo = Path(os.environ['NEBULA_REPO_ROOT'])\nsystem = platform.system().lower()\nwork = Path('work/nebula_ui_native_adapters')\nwork.mkdir(parents=True, exist_ok=True)\ntree = work / 'local_ops_tree.json'\ntree.write_text('{\"schema\":\"nebula-ui.tree.v1\",\"component\":\"Window\",\"props\":{\"title\":\"Local Ops\"},\"children\":[{\"schema\":\"nebula-ui.tree.v1\",\"component\":\"Column\",\"props\":{\"spacing\":12},\"children\":[{\"schema\":\"nebula-ui.tree.v1\",\"component\":\"Text\",\"props\":{\"text\":\"Local Ops\"},\"children\":[]},{\"schema\":\"nebula-ui.tree.v1\",\"component\":\"Button\",\"props\":{\"text\":\"Refresh\",\"action\":\"targets.refresh\"},\"children\":[]}]}]}', encoding='utf-8')\ncommon_flags = ['-I', str(repo / 'official' / 'nebula-ui' / 'adapters' / 'common'), '-iquote', str(repo)]\n\nif system == 'darwin':\n    source = repo / 'official' / 'nebula-ui' / 'adapters' / 'appkit' / 'minimal_window.mm'\n    out = work / 'nebula-ui-appkit-smoke'\n    cxx = os.environ.get('CXX') or shutil.which('clang++') or 'clang++'\n    cmd = [cxx, '-std=c++20', '-fobjc-arc', *common_flags, str(source), '-framework', 'Cocoa', '-o', str(out)]\n    subprocess.run(cmd, check=True)\n    run = subprocess.run([str(out), '--smoke', '--tree-json', str(tree), '--smoke-dispatch-action', 'targets.refresh'], capture_output=True, text=True, check=True)\n    print(run.stdout, end='')\n    for marker in ('nebula-ui-appkit-adapter-ok', 'nebula-ui-tree-title=Local Ops', 'nebula-ui-tree-button-action=targets.refresh', 'nebula-ui-action-dispatched=targets.refresh'):\n        if marker not in run.stdout:\n            raise SystemExit(f'AppKit smoke marker missing: {marker}')\nelif system == 'linux':\n    if shutil.which('pkg-config') is None:\n        print('nebula-ui-gtk4-adapter-skip-missing-pkg-config')\n        raise SystemExit(0)\n    probe = subprocess.run(['pkg-config', '--exists', 'gtk4'], check=False)\n    if probe.returncode != 0:\n        print('nebula-ui-gtk4-adapter-skip-missing-gtk4')\n        raise SystemExit(0)\n    source = repo / 'official' / 'nebula-ui' / 'adapters' / 'gtk4' / 'minimal_window.cpp'\n    out = work / 'nebula-ui-gtk4-smoke'\n    flags = subprocess.check_output(['pkg-config', '--cflags', '--libs', 'gtk4'], text=True).split()\n    cxx = os.environ.get('CXX') or shutil.which('c++') or shutil.which('clang++') or 'c++'\n    subprocess.run([cxx, '-std=c++20', *common_flags, str(source), *flags, '-o', str(out)], check=True)\n    run = subprocess.run([str(out), '--smoke', '--tree-json', str(tree), '--smoke-dispatch-action', 'targets.refresh'], capture_output=True, text=True, check=True)\n    print(run.stdout, end='')\n    for marker in ('nebula-ui-gtk4-adapter-ok', 'nebula-ui-tree-title=Local Ops', 'nebula-ui-tree-button-action=targets.refresh', 'nebula-ui-action-dispatched=targets.refresh'):\n        if marker not in run.stdout:\n            raise SystemExit(f'GTK4 smoke marker missing: {marker}')\nelse:\n    print('nebula-ui-native-adapter-skip-unsupported-host')\nPY"
expect_rc = 0
expect_stdout_contains = ["nebula-ui-", "nebula-ui-tree-title=Local Ops", "nebula-ui-tree-button-action=targets.refresh", "nebula-ui-action-dispatched=targets.refresh"]
