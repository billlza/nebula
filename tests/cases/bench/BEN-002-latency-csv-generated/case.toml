id = "BEN-002-latency-csv-generated"
suite = "bench"

[[steps]]
kind = "shell"
run = "mkdir -p work/benchdir && cp fixtures/smoke.nb work/benchdir/smoke.nb"
expect_rc = 0

[[steps]]
kind = "nebula"
command = "bench"
args = ["--diag-format", "json", "--dir", "work/benchdir"]
expect_rc = 0
must_exist = ["benchmark_results/latency.csv"]

[[steps]]
kind = "shell"
run = "grep -F 'file,warmup_iterations,measure_iterations,samples,p50_ms,p90_ms,p99_ms,mean_ms,stddev_ms,throughput_ops_s,clock,platform,perf_capability,perf_counters,perf_reason' benchmark_results/latency.csv"
expect_rc = 0
