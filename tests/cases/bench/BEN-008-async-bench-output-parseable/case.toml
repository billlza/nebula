id = "BEN-008-async-bench-output-parseable"
suite = "bench"

[[steps]]
kind = "shell"
run = "rm -rf work/async_bench_dir && mkdir -p work/async_bench_dir && python3 - <<'PY'\nfrom pathlib import Path\nPath('work/async_bench_dir/async_bench.nb').write_text('import std::task\\n\\n@bench\\nasync fn bench_async() -> Void {\\n  await yield_now()\\n}\\n', encoding='utf-8')\nPY"
expect_rc = 0

[[steps]]
kind = "nebula"
command = "bench"
args = ["--dir", "work/async_bench_dir"]
expect_rc = 0
expect_stdout_regex = ["NEBULA_BENCH warmup_iterations=.* measure_iterations=.* samples=.* p50_ms=.* p90_ms=.* p99_ms=.* mean_ms=.* stddev_ms=.* throughput_ops_s=.* clock=.* platform=.* perf_capability=.* perf_counters=.* perf_reason=.*"]
