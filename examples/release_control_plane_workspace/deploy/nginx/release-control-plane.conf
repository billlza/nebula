server {
  listen 80;
  server_name control-plane.example.internal;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name control-plane.example.internal;

  ssl_certificate /etc/ssl/control-plane/fullchain.pem;
  ssl_certificate_key /etc/ssl/control-plane/privkey.pem;

  access_log /var/log/nginx/release-control-plane.access.log;
  error_log /var/log/nginx/release-control-plane.error.log;

  location / {
    proxy_pass http://127.0.0.1:40480;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Request-Id $request_id;
    proxy_set_header Connection "";
    proxy_connect_timeout 5s;
    proxy_send_timeout 15s;
    proxy_read_timeout 15s;
  }
}
