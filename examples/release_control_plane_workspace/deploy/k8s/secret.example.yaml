apiVersion: v1
kind: Secret
metadata:
  name: release-control-plane-auth
  namespace: release-control-plane
type: Opaque
stringData:
  read.token: reader-token
  write.token: writer-token
  admin.token: admin-token
  worker.token: worker-token
  postgres.dsn: postgresql://user:pass@postgres:5432/release_control_plane
